<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONDUCTOR - TuMovil</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #1a1a1a; color: white; }
        #map { height: 60vh; width: 100%; }
        .panel-conductor { padding: 15px; background: #222; border-top: 3px solid #ffd700; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .stat-box { background: #333; padding: 10px; border-radius: 8px; text-align: center; width: 48%; }
        .stat-box h3 { margin: 0; font-size: 14px; color: #aaa; }
        .stat-box p { margin: 5px 0 0; font-size: 20px; font-weight: bold; color: #ffd700; }
        .btn-reset { width: 100%; padding: 15px; background: #d9534f; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background:#ffd700; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10000; color:#000; font-weight:bold; }
    </style>
</head>
<body>

<div id="splash">
    <h1>🚕 TUMÓVIL</h1>
    <p>PANEL DEL CONDUCTOR</p>
</div>

<div id="map"></div>

<div class="panel-conductor">
    <div class="stats">
        <div class="stat-box">
            <h3>RECAUDACIÓN</h3>
            <p id="recaudacion">$0</p>
        </div>
        <div class="stat-box">
            <h3>PASAJEROS</h3>
            <p id="cant-pasajeros">0 / 4</p>
        </div>
    </div>
    <button class="btn-reset" onclick="finalizarViaje()">FINALIZAR VIAJE / VACIAR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Splash Screen
    setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 2000);

    // Mapa centrado en Santa Brígida
    const map = L.map('map').setView([-34.562, -58.745], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Iconos
    const iconConductor = L.divIcon({ html: '🚕', className: 'car-icon', iconSize: [30, 30] });
    const iconParada = L.divIcon({ html: '📍', className: 'stop-icon', iconSize: [25, 25] });

    // Paradas Reales
    const paradas = [
        { nombre: "Inicio", coords: [-34.562, -58.745] },
        { nombre: "Caveri y Azara", coords: [-34.565, -58.748] },
        { nombre: "Boulevard Caveri", coords: [-34.568, -58.751] }
    ];

    paradas.forEach(p => {
        L.marker(p.coords, {icon: iconParada}).addTo(map).bindPopup(p.nombre);
    });

    // Marcador del conductor (Simulado para monitoreo)
    let marcadorConductor = L.marker([-34.562, -58.745], {icon: iconConductor}).addTo(map);

    function finalizarViaje() {
        if(confirm("¿Estás seguro de que quieres finalizar el viaje y vaciar los asientos?")) {
            alert("Unidad vacía. Lista para nuevos pasajeros.");
            location.reload();
        }
    }

    // Aquí irá la conexión con Supabase para ver pasajeros en tiempo real
</script>
</body>
</html>
