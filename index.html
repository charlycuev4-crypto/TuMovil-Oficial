<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conductor Pro - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; height: 100vh; overflow: hidden; }
        #map { height: 50vh; width: 100%; }
        
        .panel-control { background: #111; padding: 15px; border-top: 2px solid #FFD700; height: 50vh; }
        
        /* GRILLA DE ASIENTOS (Igual al pasajero) */
        .asientos-monitor { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .m-asiento { aspect-ratio: 1; border: 2px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #555; }
        .m-asiento.ocupado { border-color: #4cd964; color: #4cd964; background: rgba(76, 217, 100, 0.1); font-weight: bold; }

        .btn-status { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; margin-bottom: 10px; }
        .online { background: #4cd964; color: black; }
        .offline { background: #ff3b30; color: white; }

        .pax-scroll { height: 120px; overflow-y: auto; background: #000; border-radius: 10px; padding: 10px; font-size: 14px; }
        .pax-row { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 8px 0; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="panel-control">
        <button id="btn-servicio" class="btn-status online" onclick="toggleServicio()">MÓVIL EN LÍNEA</button>
        
        <p style="font-size: 12px; color: #FFD700; margin: 5px 0;">ESTADO DE CABINA:</p>
        <div class="asientos-monitor">
            <div id="m-as-1" class="m-asiento">1</div>
            <div id="m-as-2" class="m-asiento">2</div>
            <div id="m-as-3" class="m-asiento">3</div>
            <div id="m-as-4" class="m-asiento">4</div>
        </div>

        <div class="pax-scroll" id="lista-pax">Cargando pasajeros...</div>
        <button onclick="cambiarSentido()" id="btn-sentido" style="width:100%; margin-top:10px; background:#222; color:white; border:1px solid #333; padding:10px; border-radius:8px;">HACIA: ABASTO</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let idMovil = 1;
    let enServicio = true;
    let markersPuntos = {}; // Para limpiar el mapa

    // 25 PARADAS (Lista reducida por espacio, asegúrate de tener las tuyas)
    const paradas = [{n:'Miguel Cané', c:[-34.561264, -58.770506]}, /* ... todas las demás ... */ {n:'Abasto y Roca', c:[-34.586030, -58.747278]}];

    let map = L.map('map', {zoomControl: false}).setView(paradas[0].c, 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Ruta espejo
    L.polyline(paradas.map(p => p.c), {color: '#00d4ff', weight: 4}).addTo(map);

    // Marcador del Auto
    let markerTaxi = L.marker(paradas[0].c, {icon: L.divIcon({html:'🚕', className:'', iconSize:[30,30]})}).addTo(map);

    // GPS REAL CON FRENO
    navigator.geolocation.watchPosition(async p => {
        if(!enServicio) return; // SI ESTÁ OFF, NO ENVÍA NADA

        const pos = [p.coords.latitude, p.coords.longitude];
        markerTaxi.setLatLng(pos);
        
        await _s.from('estado_movil').update({ latitud: pos[0], longitud: pos[1], en_servicio: true }).eq('id', idMovil);
    }, null, {enableHighAccuracy: true});

    async function toggleServicio() {
        enServicio = !enServicio;
        const btn = document.getElementById('btn-servicio');
        btn.innerText = enServicio ? "MÓVIL EN LÍNEA" : "MÓVIL FUERA DE LÍNEA";
        btn.className = enServicio ? "btn-status online" : "btn-status offline";
        await _s.from('estado_movil').update({ en_servicio: enServicio }).eq('id', idMovil);
    }

    async function actualizarPanel() {
        const { data: pax } = await _s.from('reservas_activas').select('*').eq('id_movil', idMovil).eq('estado', 'en_curso');

        // 1. Limpiar asientos y mapa
        document.querySelectorAll('.m-asiento').forEach(el => el.classList.remove('ocupado'));
        Object.values(markersPuntos).forEach(m => map.removeLayer(m));
        markersPuntos = {};

        const lista = document.getElementById('lista-pax');
        lista.innerHTML = "";

        pax.forEach(p => {
            // 2. Marcar Asiento Ocupado
            const asCell = document.getElementById('m-as-' + p.asiento_num);
            if(asCell) asCell.classList.add('ocupado');

            // 3. Agregar a lista con botón de finalizar
            lista.innerHTML += `<div class="pax-row">
                <span>${p.nombre_pasajero} (As. ${p.asiento_num})</span>
                <button onclick="terminar(${p.id})" style="background:#4cd964; border:none; border-radius:5px;">LLEGÓ</button>
            </div>`;

            // 4. UBICACIÓN DEL PASAJERO EN MAPA (Si la tenemos en la tabla)
            // Asumiendo que guardas la ubicación del pasajero al pedir
            if(p.pax_lat && p.pax_lon) {
                markersPuntos[p.id] = L.marker([p.pax_lat, p.pax_lon], {
                    icon: L.divIcon({html:'👤', className:'', iconSize:[20,20]})
                }).addTo(map).bindPopup("Recoger a " + p.nombre_pasajero);
            }
            
            // 5. DESTINO DEL PASAJERO
            const cDest = paradas[p.destino_idx].c;
            markersPuntos['d'+p.id] = L.marker(cDest, {
                icon: L.divIcon({html:'📍', className:'', iconSize:[20,20]})
            }).addTo(map).bindPopup("Destino de " + p.nombre_pasajero);
        });
    }

    async function terminar(id) {
        await _s.from('reservas_activas').delete().eq('id', id);
        actualizarPanel();
    }

    setInterval(actualizarPanel, 3000);
</script>
</body>
</html>
