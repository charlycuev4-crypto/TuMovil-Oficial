<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tu Móvil - Ruta Santa Brígida</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #mapa-osm { height: 100vh; width: 100%; background: #f0f0f0; }
        body { margin: 0; padding: 0; overflow: hidden; }
    </style>
</head>
<body>
    <div id="mapa-osm"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 1. CONFIGURACIÓN DE CONEXIÓN
        const SB_URL = "https://nvumdlxervrewqiiaicl.supabase.co";
        const SB_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52dW1kbHhlcnZyZXdxaWlhaWNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTA4NTMsImV4cCI6MjA4OTg4Njg1M30.ejh7dtL2O6JJeoVq47cUK_hXAfRetJPyzks1yI-Lrhs";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        // 2. INICIALIZAR MAPA (Centrado en la primera parada)
        var map = L.map('mapa-osm', { zoomControl: false }).setView([-34.561264, -58.770506], 15);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 3. FUNCIÓN PARA CARGAR DATOS DE SUPABASE
        async function cargarRuta() {
            const { data: paradas, error } = await sb
                .from('paradas')
                .select('*')
                .order('orden', { ascending: true });

            if (error) {
                console.error("Error cargando paradas:", error.message);
                return;
            }

            const coordenadasRuta = [];

            paradas.forEach(p => {
                if (p.latitud && p.longitud) {
                    const punto = [p.latitud, p.longitud];
                    
                    // Dibujar cada parada como un círculo
                    L.circleMarker(punto, {
                        radius: 6,
                        color: '#007bff',
                        fillColor: '#ffffff',
                        fillOpacity: 1,
                        weight: 3
                    }).addTo(map).bindPopup("<b>Parada " + p.orden + "</b><br>" + p.nombre);

                    coordenadasRuta.push(punto);
                }
            });

            // 4. DIBUJAR LA LÍNEA DE LA RUTA
            if (coordenadasRuta.length > 1) {
                L.polyline(coordenadasRuta, {
                    color: '#007bff',
                    weight: 5,
                    opacity: 0.8
                }).addTo(map);

                // Ajustar el zoom para que se vean todas las paradas automáticamente
                map.fitBounds(coordenadasRuta, { padding: [30, 30] });
            }
        }

        // Ejecutar la carga al abrir la página
        cargarRuta();
    </script>
</body>
</html>
