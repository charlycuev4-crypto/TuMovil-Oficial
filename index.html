<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONDUCTOR 01</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #map { flex-grow: 1; width: 100%; background: #121212; z-index: 1; }
        
        .top-ui { position: absolute; top: 10px; width: 100%; z-index: 1000; padding: 0 10px; }
        .stats-row { display: flex; gap: 10px; justify-content: center; }
        .stat-box { background: rgba(0,0,0,0.85); border: 2px solid #FFD700; border-radius: 12px; padding: 10px; flex: 1; text-align: center; color: #FFD700; font-weight: bold; }
        
        .control-row { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 10px; background: rgba(0,0,0,0.9); padding: 10px; border-radius: 30px; border: 1px solid #FFD700; }
        
        .bottom-ui { position: absolute; bottom: 20px; width: 100%; z-index: 1000; padding: 0 20px; }
        .asientos-grid { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; }
        .asiento-btn { width: 60px; height: 60px; border: 2px solid #FFD700; border-radius: 15px; background: #000; color: #FFD700; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        .asiento-btn.active { background: #4cd964; color: #000; border-color: #4cd964; }
        
        .btn-finalizar { width: 100%; padding: 20px; background: #ff3b30; color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; }
        
        /* Switch */
        .switch { position: relative; display: inline-block; width: 50px; height: 25px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; border-radius: 25px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 19px; width: 19px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background-color: #4cd964; }
        input:checked + .slider:before { transform: translateX(25px); }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="top-ui">
        <div class="stats-row">
            <div class="stat-box">RECAUDACIÓN<br><span id="txt-plata" style="font-size: 20px;">$0</span></div>
            <div class="stat-box">PASAJEROS<br><span id="txt-pax" style="font-size: 20px;">0</span></div>
        </div>
        <div style="display:flex; justify-content:center; margin-top:10px;">
            <div class="control-row">
                <span id="label-online" style="color:white; font-size:12px;">OFFLINE</span>
                <label class="switch"><input type="checkbox" id="check-online" onchange="toggleOnline()"> <span class="slider"></span></label>
            </div>
        </div>
    </div>

    <div class="bottom-ui">
        <div class="asientos-grid">
            <div class="asiento-btn" id="p1">1</div>
            <div class="asiento-btn" id="p2">2</div>
            <div class="asiento-btn" id="p3">3</div>
            <div class="asiento-btn" id="p4">4</div>
        </div>
        <button class="btn-finalizar" onclick="finalizarViaje()">🏁 FINALIZAR / VACIAR COCHE 01</button>
    </div>

<script>
    const MI_ID = 1;
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    let map, isOnline = false;

    // 1. Inicialización del Mapa (Solo cuando el HTML está listo)
    document.addEventListener('DOMContentLoaded', () => {
        map = L.map('map', { zoomControl: false }).setView([-34.56, -58.77], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        actualizarDatos(); // Carga inicial
    });

    // 2. Función de estado Online/Offline
    async function toggleOnline() {
        isOnline = document.getElementById('check-online').checked;
        document.getElementById('label-online').innerText = isOnline ? "ONLINE" : "OFFLINE";
        await _s.from('estado_movil').update({ esta_online: isOnline }).eq('id', MI_ID);
    }

    // 3. Lógica principal (Backend)
    async function actualizarDatos() {
        const { data } = await _s.from('reservas_activas').select('*').eq('estado', 'en_curso').eq('id_movil', MI_ID);
        
        // Reset botones
        for(let i=1; i<=4; i++) document.getElementById('p'+i).className = 'asiento-btn';
        
        let rec = 0;
        if(data) {
            data.forEach(d => {
                rec += 1000;
                document.getElementById('p'+d.asiento_num).className = 'asiento-btn active';
            });
            document.getElementById('txt-pax').innerText = data.length;
        } else {
            document.getElementById('txt-pax').innerText = 0;
        }
        document.getElementById('txt-plata').innerText = '$' + rec;
    }

    // 4. "PORTERO": Escucha de cambios
    _s.channel('coche_'+MI_ID)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'reservas_activas', filter: `id_movil=eq.${MI_ID}` }, (payload) => {
          if (!isOnline) return; // Si no estás online, ignorás todo
          actualizarDatos();
      }).subscribe();

    // 5. Finalizar
    async function finalizarViaje() {
        if(!confirm("¿Vaciar todos los asientos?")) return;
        await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('estado', 'en_curso').eq('id_movil', MI_ID);
        actualizarDatos();
    }
</script>
</body>
</html>
