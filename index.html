<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONDUCTOR 01 - LIMPIO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* MANTENGO TUS ESTILOS ORIGINALES */
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .ui-overlay { position: absolute; width: 100%; z-index: 1000; pointer-events: none; }
        .top-stats { top: 10px; display: flex; justify-content: space-around; padding: 0 10px; }
        .stat-box { background: rgba(0,0,0,0.85); border: 2px solid #FFD700; border-radius: 12px; padding: 8px; width: 45%; text-align: center; color: white; pointer-events: auto; }
        .stat-value { font-size: 24px; font-weight: 800; }
        .bottom-ui { bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        .btn-vaciar { background: #ff3b30; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; font-size: 16px; pointer-events: auto; }
        .pill { width: 48px; height: 48px; border: 2px solid #FFD700; border-radius: 12px; color: #FFD700; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); margin: 5px; cursor: pointer; }
        .pill.active { background: #4cd964; border-color: #4cd964; color: black; }
    </style>
</head>
<body>
    <div id="splash"><h1>🚕 COCHE 01</h1></div>
    <div id="map"></div>
    <div class="ui-overlay top-stats">
        <div class="stat-box"><div id="txt-plata" class="stat-value">$0</div></div>
        <div class="stat-box"><div id="txt-pax" class="stat-value">0</div></div>
    </div>
    <div class="ui-overlay bottom-ui">
        <div id="pills" style="display:flex; gap:10px;">
            <div class="pill" onclick="liberarAsiento(1)">1</div>
            <div class="pill" onclick="liberarAsiento(2)">2</div>
            <div class="pill" onclick="liberarAsiento(3)">3</div>
            <div class="pill" onclick="liberarAsiento(4)">4</div>
        </div>
        <button class="btn-vaciar" onclick="confirmarVaciar()">🏁 VACIAR COCHE</button>
    </div>

<script>
    // CONFIG
    const MI_ID = 1;
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    // MAPA
    const map = L.map('map', { zoomControl: false }).setView([-34.56, -58.77], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const marker = L.marker([-34.56, -58.77]).addTo(map);

    // INICIO
    window.onload = () => {
        iniciarGPS();
        actualizarDatos();
        setTimeout(() => document.getElementById('splash').style.display = 'none', 2000);
    };

    function iniciarGPS() {
        navigator.geolocation.watchPosition((p) => {
            const { latitude, longitude } = p.coords;
            marker.setLatLng([latitude, longitude]);
            map.panTo([latitude, longitude]);
            
            _s.from('estado_movil').upsert({
                id: MI_ID, latitud: latitude, longitud: longitude, esta_online: true
            }).then();
        }, null, { enableHighAccuracy: true });
    }

    async function actualizarDatos() {
        try {
            const { data } = await _s.from('reservas_activas').select('*').eq('id_movil', MI_ID).eq('estado', 'en_curso');
            
            // Reset pills
            document.querySelectorAll('.pill').forEach(p => p.className = 'pill');
            
            if (data) {
                let plata = 0;
                data.forEach(r => {
                    const p = document.getElementById('pills').children[r.asiento_num - 1];
                    if(p) p.className = 'pill active';
                    plata += 1000;
                });
                document.getElementById('txt-plata').innerText = '$' + plata;
                document.getElementById('txt-pax').innerText = data.length;
            }
        } catch (e) { console.error("Error sync", e); }
    }

    async function liberarAsiento(num) {
        if(!confirm(`Liberar asiento ${num}?`)) return;
        await _s.from('reservas_activas').update({estado: 'finalizado'}).eq('id_movil', MI_ID).eq('asiento_num', num);
        actualizarDatos();
    }

    async function confirmarVaciar() {
        if(!confirm("¿Borrar todo el coche?")) return;
        // DESTRUCCIÓN TOTAL (Aquí no hay fantasmas)
        await _s.from('reservas_activas').delete().eq('id_movil', MI_ID);
        actualizarDatos();
        alert("Coche limpio");
    }

    // Realtime (Simple)
    _s.channel('room').on('postgres_changes', { event: '*', schema: 'public', table: 'reservas_activas' }, () => {
        actualizarDatos();
    }).subscribe();
</script>
</body>
</html>
