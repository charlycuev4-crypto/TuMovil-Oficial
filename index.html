<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Conductor - Tu Móvil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .grid-asientos { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 300px; margin: 20px auto; }
        .btn-asiento { height: 80px; font-size: 24px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; transition: 0.2s; }
        .libre { background: #28a745; color: white; }
        .ocupado { background: #dc3545; color: white; }
        #gps-status { color: #ffc107; font-size: 14px; margin-top: 20px; background: #222; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <h2>CONTROL DE ASIENTOS</h2>
    <div class="grid-asientos">
        <button id="a1" class="btn-asiento libre" onclick="toggle(0)">1</button>
        <button id="a2" class="btn-asiento libre" onclick="toggle(1)">2</button>
        <button id="a3" class="btn-asiento libre" onclick="toggle(2)">3</button>
        <button id="a4" class="btn-asiento libre" onclick="toggle(3)">4</button>
    </div>
    <div id="gps-status">🛰️ Buscando señal GPS...</div>

<script>
    const _supabase = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    let estadoAsientos = [true, true, true, true];

    async function toggle(index) {
        estadoAsientos[index] = !estadoAsientos[index];
        const btn = document.getElementById('a' + (index + 1));
        btn.className = 'btn-asiento ' + (estadoAsientos[index] ? 'libre' : 'ocupado');
        const libres = estadoAsientos.filter(a => a).length;
        await _supabase.from('estado_movil').update({ asientos_libres: libres }).eq('id', 1);
    }

    navigator.geolocation.watchPosition(async (pos) => {
        const { latitude, longitude } = pos.coords;
        document.getElementById('gps-status').innerText = `📍 Transmitiendo: ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
        await _supabase.from('estado_movil').update({ latitud: latitude, longitud: longitude }).eq('id', 1);
    }, null, { enableHighAccuracy: true });
</script>
</body>
</html>
