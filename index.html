<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - Control Conductor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; color: white; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        /* Interfaz Superior */
        .top-bar {
            position: absolute; top: 0; width: 100%; background: #111;
            padding: 10px 15px; z-index: 1000; display: flex; 
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid #FFD700;
        }
        .stats-container {
            position: absolute; top: 60px; width: 100%; display: flex;
            justify-content: space-around; padding: 0 10px; z-index: 1000;
        }
        .stat-box {
            background: rgba(20, 20, 20, 0.9); border: 2px solid #00d4ff;
            border-radius: 10px; padding: 10px; width: 45%; text-align: center;
        }
        .stat-val { font-size: 20px; font-weight: bold; color: #4cd964; }
        
        .bottom-bar { position: absolute; bottom: 20px; width: 100%; padding: 0 20px; z-index: 1000; }
        .btn-vaciar {
            width: 100%; padding: 15px; background: #ff3b30; color: white;
            border: none; border-radius: 12px; font-weight: bold; font-size: 16px;
        }
        .taxi-icon { font-size: 30px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="color: #FFD700; font-weight: bold;">CONTROL MÓVIL 1</div>
        <div id="status-label" style="font-size: 12px; color: #4cd964;">CONECTADO</div>
    </div>

    <div class="stats-container">
        <div class="stat-box">
            <div style="font-size: 10px; opacity: 0.7;">RECAUDADO</div>
            <div id="total-hoy" class="stat-val">$0</div>
        </div>
        <div class="stat-box">
            <div style="font-size: 10px; opacity: 0.7;">PASAJEROS</div>
            <div id="pax-count" class="stat-val">0</div>
        </div>
    </div>

    <div id="map"></div>

    <div class="bottom-bar">
        <button class="btn-vaciar" onclick="limpiarTodasLasReservas()">FINALIZAR VIAJE / VACIAR</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    const rutaOficial = [
        {n:'Miguel Cané', c:[-34.561128, -58.770586]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false }).setView([-34.577, -58.755], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // DIBUJAR RUTA OFICIAL
    L.polyline(rutaOficial.map(p => p.c), { color: '#FFD700', weight: 4, opacity: 0.4 }).addTo(map);
    rutaOficial.forEach(p => L.circleMarker(p.c, { radius: 4, color: '#FFD700', fillOpacity: 1 }).addTo(map));

    let markerConductor = L.marker([0,0], { 
        icon: L.divIcon({ html: '🚕', className: 'taxi-icon', iconAnchor: [15, 15] }) 
    }).addTo(map);

    let marcadoresPasajeros = {};

    // 1. ACTUALIZAR POSICIÓN TAXI
    navigator.geolocation.watchPosition(async p => {
        const { latitude: lat, longitude: lon } = p.coords;
        markerConductor.setLatLng([lat, lon]);
        await _s.from('estado_movil').update({ latitud: lat, longitud: lon }).eq('id', 1);
    }, null, { enableHighAccuracy: true });

    // 2. TICK DE PASAJEROS Y RECAUDACIÓN
    async function actualizarPanel() {
        const { data: reservas } = await _s.from('reservas_activas').select('*').eq('estado', 'en_curso');
        
        if (reservas) {
            document.getElementById('pax-count').innerText = reservas.length;
            document.getElementById('total-hoy').innerText = "$" + (reservas.length * 1000);

            // Limpiar iconos de gente que ya no está
            const idsActuales = reservas.map(r => r.id);
            Object.keys(marcadoresPasajeros).forEach(id => {
                if (!idsActuales.includes(parseInt(id))) {
                    map.removeLayer(marcadoresPasajeros[id]);
                    delete marcadoresPasajeros[id];
                }
            });

            // Dibujar pasajeros nuevos
            reservas.forEach(r => {
                if (!marcadoresPasajeros[r.id]) {
                    const m = L.marker([r.lat_pax, r.lon_pax], {
                        icon: L.divIcon({ 
                            html: `<div style="background:#4cd964; border:2px solid #000; border-radius:50%; width:22px; height:22px; text-align:center; font-weight:bold; color:black;">${r.asiento_num}</div>`,
                            className: ''
                        })
                    }).addTo(map).bindPopup(`Pasajero: ${r.nombre_pasajero}`);
                    marcadoresPasajeros[r.id] = m;
                }
            });
        }
    }

    setInterval(actualizarPanel, 4000);

    async function limpiarTodasLasReservas() {
        if (!confirm("¿Deseas vaciar el móvil y finalizar los viajes actuales?")) return;
        await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('estado', 'en_curso');
        actualizarPanel();
    }
</script>
</body>
</html>
