<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conductor Pro - Dinámico</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; height: 100vh; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; }

        /* MAPA EN TODA LA PANTALLA */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        /* VISORES FLOTANTES (ESTILO DINÁMICO) */
        .overlay-top {
            position: absolute; top: 15px; left: 10px; right: 10px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            z-index: 1000; pointer-events: none;
        }
        .visor {
            background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 15px;
            padding: 10px; text-align: center; color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .visor-label { font-size: 11px; color: #00d4ff; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .visor-num { font-size: 24px; font-weight: bold; }

        /* PANEL DE ASIENTOS INFERIOR */
        .overlay-bottom {
            position: absolute; bottom: 30px; left: 0; right: 0;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            z-index: 1000;
        }
        .asientos-cont {
            display: flex; gap: 12px; background: rgba(0, 0, 0, 0.6);
            padding: 12px 20px; border-radius: 25px; backdrop-filter: blur(5px);
        }
        .btn-as {
            width: 50px; height: 50px; border-radius: 12px; border: 2px solid #00d4ff;
            background: transparent; color: white; font-size: 20px; font-weight: bold;
            cursor: pointer; transition: all 0.3s;
        }
        .ocupado { background: #ff3b30; border-color: #ff3b30; box-shadow: 0 0 15px rgba(255, 59, 48, 0.5); }

        /* BOTÓN POWER FLOTANTE */
        .btn-pwr {
            width: 55px; height: 55px; border-radius: 50%; border: none;
            font-weight: bold; font-size: 14px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        .on { background: #00d4ff; color: #000; }
        .off { background: #ff3b30; color: #fff; display: none; }

        /* SPLASH SCREEN */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .splash-text { color: #00d4ff; font-size: 32px; font-weight: bold; letter-spacing: 3px; text-shadow: 0 0 10px #00d4ff; }
    </style>
</head>
<body>

    <div id="splash"><div class="splash-text">TU MÓVIL</div></div>

    <div id="map"></div>

    <div class="overlay-top">
        <div class="visor">
            <span class="visor-label">TARIFA HOY</span>
            <div class="visor-num">$ <span id="v-dinero">0</span></div>
        </div>
        <div class="visor">
            <span class="visor-label">PASAJEROS</span>
            <div class="visor-num" id="v-pax">0</div>
        </div>
    </div>

    <div class="overlay-bottom">
        <div class="asientos-cont">
            <button id="b1" class="btn-as" onclick="t(0)">1</button>
            <button id="b2" class="btn-as" onclick="t(1)">2</button>
            <button id="b3" class="btn-as" onclick="t(2)">3</button>
            <button id="b4" class="btn-as" onclick="t(3)">4</button>
        </div>
        <button id="p-on" class="btn-pwr on" onclick="power(true)">ON</button>
        <button id="p-off" class="btn-pwr off" onclick="power(false)">OFF</button>
    </div>

<script>
    // Tu configuración de Supabase
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let activo = false, recaudado = 0, pasajeros = 0, est = [true, true, true, true];

    window.onload = () => { setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => document.getElementById('splash').style.display = 'none', 500); }, 1500); };

    function power(v) {
        activo = v;
        document.getElementById('p-on').style.display = v ? 'none' : 'flex';
        document.getElementById('p-off').style.display = v ? 'flex' : 'none';
        // Opcional: Centrar mapa al encender
        if(v && marker) map.panTo(marker.getLatLng());
    }

    async function t(i) {
        if(!activo) return;
        if(est[i]) { recaudado += 1000; pasajeros += 1; }
        est[i] = !est[i];
        document.getElementById('b'+(i+1)).className = 'btn-as ' + (est[i] ? '' : 'ocupado');
        document.getElementById('v-dinero').innerText = recaudado;
        document.getElementById('v-pax').innerText = pasajeros;
        await _s.from('estado_movil').update({ asientos_libres: est.filter(x=>x).length }).eq('id', 1);
    }

    // MAPA Y RUTA
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-34.561128, -58.770586], 15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map); // Fondo oscuro más elegante

    const rutaSantaBrigida = [
        [-34.561128, -58.770586], [-34.562160, -58.771380], [-34.562494, -58.772133], 
        [-34.563541, -58.773244], [-34.564109, -58.773759], [-34.565342, -58.772061], 
        [-34.567268, -58.769484], [-34.569090, -58.767095], [-34.571016, -58.764443], 
        [-34.571956, -58.763201], [-34.577371, -58.755909], [-34.578528, -58.757064], 
        [-34.579296, -58.755864], [-34.580020, -58.755063], [-34.580901, -58.753842], 
        [-34.581998, -58.752441], [-34.583319, -58.750710], [-34.584740, -58.748804], 
        [-34.585554, -58.749812], [-34.586494, -58.750574], [-34.588041, -58.751542], 
        [-34.588273, -58.751338], [-34.588771, -58.750804], [-34.588244, -58.749877], 
        [-34.588930, -58.750543], [-34.586030, -58.747278]
    ];

    L.polyline(rutaSantaBrigida, {color: '#00d4ff', weight: 4, opacity: 0.8}).addTo(map);
    rutaSantaBrigida.forEach(coord => { L.circleMarker(coord, {radius: 5, fillColor: "#00d4ff", color: "#fff", weight: 1, fillOpacity: 1}).addTo(map); });
    
    let marker = L.marker(rutaSantaBrigida[0], {
        icon: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [35, 35] })
    }).addTo(map);

    navigator.geolocation.watchPosition(p => { 
        if(!activo) return;
        const pos = [p.coords.latitude, p.coords.longitude];
        marker.setLatLng(pos); 
        map.panTo(pos);
        _s.from('estado_movil').update({ latitud: pos[0], longitud: pos[1] }).eq('id', 1);
    }, null, { enableHighAccuracy: true });
</script>
</body>
</html>
