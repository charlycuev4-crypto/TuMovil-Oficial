<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONDUCTOR 01 - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .ui-overlay { position: absolute; width: 100%; z-index: 1000; pointer-events: none; }
        .top-stats { top: 10px; display: flex; justify-content: space-around; padding: 0 10px; }
        .stat-box { background: rgba(0,0,0,0.85); border: 2px solid #FFD700; border-radius: 12px; padding: 8px; width: 45%; text-align: center; color: white; pointer-events: auto; }
        .stat-label { color: #FFD700; font-size: 11px; font-weight: 700; }
        .stat-value { font-size: 24px; font-weight: 800; }
        .green { color: #4cd964; }
        .connection-panel { position: absolute; top: 95px; left: 50%; transform: translateX(-50%); z-index: 1001; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.9); padding: 8px 12px; border-radius: 30px; border: 1px solid #FFD700; pointer-events: auto; }
        .switch { position: relative; width: 46px; height: 22px; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #444; border-radius: 22px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: #4cd964; }
        input:checked + .slider:before { transform: translateX(24px); }
        #status-label { color: white; font-size: 11px; font-weight: bold; width: 85px; text-align: center; }
        #btn-sentido { background: #FFD700; border: none; padding: 6px 12px; border-radius: 15px; font-weight: 800; font-size: 12px; }
        #panel-parada { position: absolute; top: 145px; left: 50%; transform: translateX(-50%); z-index: 1001; background: rgba(0,0,0,0.9); color: #FFD700; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid #FFD700; display:none; }
        
        .leaflet-tooltip { background: #000 !important; color: #FFD700 !important; border: 1.5px solid #FFD700 !important; font-weight: bold !important; font-size: 13px !important; }

        .bottom-ui { position: absolute; bottom: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 1000; }
        .btn-vaciar { background: #ff3b30; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; pointer-events: auto; }
        .asientos-pills { display: flex; gap: 8px; margin-bottom: 15px; pointer-events: auto; }
        .pill { width: 48px; height: 48px; border: 2px solid #FFD700; border-radius: 12px; color: #FFD700; display: flex; align-items: center; justify-content: center; font-weight: bold; background: rgba(0,0,0,0.85); }
        .pill.active { background: #4cd964; border-color: #4cd964; color: black; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="ui-overlay top-stats">
        <div class="stat-box"><div>RECAUDACIÓN</div><div id="txt-plata" class="stat-value green">$0</div></div>
        <div class="stat-box"><div>PASAJEROS</div><div id="txt-pax" class="stat-value">0</div></div>
    </div>
    <div class="connection-panel">
        <span id="status-label">DESCONECTADO</span>
        <label class="switch"><input type="checkbox" id="online-toggle" onchange="gestionarConexion()"><span class="slider"></span></label>
        <button id="btn-sentido" onclick="cambiarSentido()">IDA</button>
    </div>
    <div id="panel-parada">📍 Parada: <span id="txt-parada">--</span></div>
    <div class="bottom-ui">
        <div class="asientos-pills">
            <div id="pill1" class="pill" onclick="liberarAsiento(1)">1</div>
            <div id="pill2" class="pill" onclick="liberarAsiento(2)">2</div>
            <div id="pill3" class="pill" onclick="liberarAsiento(3)">3</div>
            <div id="pill4" class="pill" onclick="liberarAsiento(4)">4</div>
        </div>
        <button class="btn-vaciar" onclick="confirmarVaciar()">🏁 FINALIZAR / VACIAR</button>
    </div>

<script>
    const MI_ID_MOVIL = 1;
    const MI_NOMBRE = "Carlos - Ford Fiesta JCP 478";
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let estaOnline = false, watchId = null, sentidoActual = 'IDA';
    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const rutaLine = L.polyline(paradas.map(p => p.c), { color: '#00d4ff', weight: 6, opacity: 0.4 }).addTo(map);
    paradas.forEach(p => L.circleMarker(p.c, { radius: 6, color: '#FFD700', fillOpacity: 0.8 }).addTo(map));
    
    const markerCoche = L.marker(paradas[0].c, { icon: L.divIcon({ html: '🚕', className: 'taxi-icon', iconAnchor: [15, 15] }) }).addTo(map);
    
    let markersPax = [], markersDest = [];

    function calcularCercana(lat, lon) {
        let min = Infinity, nombre = "";
        paradas.forEach(p => {
            let d = Math.sqrt(Math.pow(p.c[0]-lat,2) + Math.pow(p.c[1]-lon,2));
            if(d < min) { min = d; nombre = p.n; }
        });
        return nombre;
    }

    async function gestionarConexion() {
        const toggle = document.getElementById('online-toggle'), label = document.getElementById('status-label');
        estaOnline = toggle.checked;
        if (estaOnline) {
            label.innerText = "CONECTANDO...";
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude, lon = pos.coords.longitude;
                // CORRECCIÓN: Nombres de columnas según tu base de datos (chofer en lugar de nombre_conductor)
                const datos = { 
                    esta_online: true, 
                    latitud: lat, 
                    longitud: lon, 
                    sentido_flujo: sentidoActual, 
                    ultima_actualizacion: new Date().toISOString(), 
                    chofer: MI_NOMBRE 
                };
                
                // Forzamos actualización siempre al ID 1
                let { error } = await _s.from('estado_movil').update(datos).eq('id', MI_ID_MOVIL);
                
                if (error) {
                    console.error("Error Supabase:", error);
                    label.innerText = "ERROR DB";
                    toggle.checked = false;
                } else {
                    label.innerText = "EN LÍNEA"; label.style.color = "#4cd964";
                    document.getElementById('panel-parada').style.display = 'block';
                    iniciarGPS();
                }
            }, (err) => { 
                toggle.checked = false; 
                label.innerText = "ERROR GPS"; 
            });
        } else {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            await _s.from('estado_movil').update({ esta_online: false }).eq('id', MI_ID_MOVIL);
            label.innerText = "DESCONECTADO"; label.style.color = "white";
            document.getElementById('panel-parada').style.display = 'none';
        }
    }

    function iniciarGPS() {
        watchId = navigator.geolocation.watchPosition(async (p) => {
            const lat = p.coords.latitude, lon = p.coords.longitude;
            markerCoche.setLatLng([lat, lon]);
            map.panTo([lat, lon]);
            document.getElementById('txt-parada').innerText = calcularCercana(lat, lon);
            if (estaOnline) {
                // Actualización continua de ubicación en ID 1
                await _s.from('estado_movil').update({ 
                    latitud: lat, 
                    longitud: lon, 
                    ultima_actualizacion: new Date().toISOString() 
                }).eq('id', MI_ID_MOVIL);
            }
        }, null, { enableHighAccuracy: true });
    }

    async function actualizar() {
        const { data: reservas } = await _s.from('reservas_activas').select('*').eq('id_movil', MI_ID_MOVIL).eq('estado', 'en_curso');
        
        if (reservas) {
            markersPax.forEach(m => map.removeLayer(m));
            markersDest.forEach(m => map.removeLayer(m));
            markersPax = []; markersDest = [];

            document.getElementById('txt-pax').innerText = reservas.length;
            document.getElementById('txt-plata').innerText = "$" + (reservas.length * 1000);
            for(let i=1; i<=4; i++) document.getElementById('pill'+i).className = 'pill';
            
            reservas.forEach(r => {
                if(r.asiento_num <= 4) document.getElementById('pill'+r.asiento_num).className = 'pill active';
                
                if (r.pasajero_lat) {
                    const mp = L.circleMarker([r.pasajero_lat, r.pasajero_lon], { color: 'red', radius: 8 }).addTo(map).bindTooltip(r.nombre_pasajero);
                    markersPax.push(mp);
                }
                
                if (paradas[r.destino_idx]) {
                    const md = L.marker(paradas[r.destino_idx].c).addTo(map).bindTooltip(`BAJA: ${r.nombre_pasajero}`, { permanent: true, direction: 'top' });
                    markersDest.push(md);
                }
            });
        }
    }

    async function cambiarSentido() {
        sentidoActual = (sentidoActual === 'IDA') ? 'VUELTA' : 'IDA';
        document.getElementById('btn-sentido').innerText = sentidoActual;
        rutaLine.setStyle({ color: sentidoActual === 'IDA' ? '#00d4ff' : '#ff6b6b' });
        
        // Sincronizamos el cambio de sentido en la base de datos de inmediato
        if (estaOnline) {
            await _s.from('estado_movil').update({ sentido_flujo: sentidoActual }).eq('id', MI_ID_MOVIL);
        }
    }

    async function liberarAsiento(n) {
        if(confirm(`¿Liberar asiento ${n}?`)) {
            await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('id_movil', MI_ID_MOVIL).eq('asiento_num', n).eq('estado', 'en_curso');
            actualizar();
        }
    }

    async function confirmarVaciar() {
        if(confirm("¿Vaciar todos los asientos?")) {
            await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('id_movil', MI_ID_MOVIL);
            actualizar();
        }
    }

    setInterval(actualizar, 4000);
</script>
</body>
</html>
