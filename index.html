<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let enServicio = false;
    let markerPasajero = null;
    const PRECIO = 1000;

    // --- LAS MISMAS 25 PARADAS DEL PASAJERO ---
    const rutaCompartida = [
        {n:'Miguel Cané (Inicio)', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(rutaCompartida[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Dibujar la línea azul y los puntos de las paradas
    L.polyline(rutaCompartida.map(p=>p.c), {color:'#00d4ff', weight:5, opacity:0.7}).addTo(map);
    rutaCompartida.forEach(p => {
        L.circleMarker(p.c, { radius: 5, color: '#00d4ff', fillOpacity: 0.8 }).addTo(map).bindPopup(p.n);
    });

    const busIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [40, 40] });
    let markerBus = L.marker(rutaCompartida[0].c, { icon: busIcon }).addTo(map);

    // --- GPS ---
    navigator.geolocation.watchPosition(p => {
        if(!enServicio) return;
        const pos = [p.coords.latitude, p.coords.longitude];
        markerBus.setLatLng(pos);
        map.panTo(pos);
        _s.from('estado_movil').update({ latitud: pos[0], longitud: pos[1] }).eq('id', 1).then();
    }, null, {enableHighAccuracy:true});

    // --- CONEXIÓN CON PASAJERO ---
    _s.channel('conductor_realtime').on('postgres_changes', {event:'UPDATE', schema:'public', table:'estado_movil'}, r => {
        const d = r.new;
        // Marcador del pasajero
        if(d.pasa_lat_origen && (4 - d.asientos_libres) > 0) {
            if(!markerPasajero) {
                markerPasajero = L.marker([d.pasa_lat_origen, d.pasa_lng_origen]).addTo(map).bindPopup("¡PASAJERO AQUÍ!").openPopup();
            } else {
                markerPasajero.setLatLng([d.pasa_lat_origen, d.pasa_lng_origen]);
            }
        } else {
            if(markerPasajero) { map.removeLayer(markerPasajero); markerPasajero = null; }
        }
        // Actualizar UI (Asientos, etc)
        actualizarUIConductor(d);
    }).subscribe();

    async function forzarLimpieza() {
        if(confirm("¿Vaciamos el móvil y cancelamos el viaje?")) {
            await _s.from('estado_movil').update({ 
                asientos_libres: 4, 
                pasa_lat_origen: null, 
                pasa_lng_origen: null 
            }).eq('id', 1);
        }
    }
    
    // ... resto de funciones de interfaz (setEstado, etc)
</script>
