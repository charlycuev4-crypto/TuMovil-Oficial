<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil Chofer - Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; }

        /* Splash Screen (Igual al del pasajero para mantener marca) */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.8s ease-out;
        }
        .splash-logo { font-size: 80px; margin-bottom: 20px; animation: pulse 2s infinite; }
        .splash-title { color: #FFD700; font-size: 32px; font-weight: 900; letter-spacing: 4px; margin: 0; }
        .splash-sub { color: #00d4ff; font-size: 14px; letter-spacing: 2px; opacity: 0.8; text-transform: uppercase; }
        .loader { width: 40px; height: 40px; border: 3px solid rgba(255,215,0,0.2); border-top: 3px solid #FFD700; border-radius: 50%; margin-top: 30px; animation: spin 1s linear infinite; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* UI de la App */
        header { 
            position: absolute; top: 0; width: 100%; z-index: 1001;
            background: #111; padding: 12px 15px; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 2px solid #FFD700;
        }
        header h1 { color: #FFD700; margin: 0; font-size: 14px; text-transform: uppercase; }

        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        /* Switch Estilo iPhone */
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4cd964; }
        input:checked + .slider:before { transform: translateX(22px); }

        .offline-overlay { 
            position: absolute; top: 50px; left: 0; width: 100%; height: calc(100% - 50px);
            background: rgba(0,0,0,0.8); z-index: 2000; display: none;
            justify-content: center; align-items: center; text-align: center; color: white;
        }

        .stats-float { position: absolute; top: 65px; width: 100%; display: flex; justify-content: space-around; padding: 0 10px; z-index: 1000; pointer-events: none; }
        .box { background: rgba(0,0,0,0.9); border: 2px solid #00d4ff; border-radius: 12px; padding: 8px; width: 46%; text-align: center; color: white; pointer-events: auto; }
        
        .bottom-panel { position: absolute; bottom: 20px; width: 92%; left: 4%; z-index: 1000; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .pills { display: flex; gap: 8px; margin-bottom: 12px; pointer-events: auto; }
        .pill { min-width: 45px; height: 45px; border: 2px solid #00d4ff; border-radius: 12px; color: #00d4ff; display: flex; align-items: center; justify-content: center; font-weight: bold; background: rgba(0,0,0,0.8); font-size: 12px; }
        .pill.active { background: #FFD700; border-color: #FFD700; color: black; box-shadow: 0 0 10px gold; }
        .btn-main { background: #ff3b30; color: white; border: none; padding: 15px 35px; border-radius: 15px; font-weight: bold; pointer-events: auto; box-shadow: 0 4px 10px rgba(255,59,48,0.3); }

        .taxi-icon { font-size: 30px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-logo">🚕</div>
        <h1 class="splash-title">TU MÓVIL</h1>
        <p class="splash-sub">PANEL DE CONTROL CHOFER</p>
        <div class="loader"></div>
    </div>

    <header>
        <h1>CONTROL MÓVIL 1</h1>
        <div style="display: flex; align-items: center; gap: 8px;">
            <span id="txt-status" style="color: #888; font-size: 10px;">OFFLINE</span>
            <label class="switch">
                <input type="checkbox" id="gps-switch" onchange="toggleServicio()">
                <span class="slider"></span>
            </label>
        </div>
    </header>

    <div id="map"></div>
    <div id="offline-screen" class="offline-overlay">
        <div><h2 style="color: #ff3b30;">MODO PRIVADO</h2><p>Los pasajeros no pueden verte.</p></div>
    </div>

    <div class="stats-float">
        <div class="box"><small>RECAUDADO</small><div id="txt-plata" style="font-size:18px; font-weight:800; color:#4cd964;">$0</div></div>
        <div class="box"><small>PASAJEROS</small><div id="txt-pax" style="font-size:18px; font-weight:800;">0/4</div></div>
    </div>

    <div class="bottom-panel">
        <div class="pills">
            <div id="pill1" class="pill">1</div><div id="pill2" class="pill">2</div>
            <div id="pill3" class="pill">3</div><div id="pill4" class="pill">4</div>
        </div>
        <button class="btn-main" onclick="vaciarTodo()">FINALIZAR VIAJE / VACIAR</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    const paradas = [
        {n:'M. Cané y Marchena', c:[-34.561128, -58.770586]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false }).setView(paradas[10].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // DIBUJAR PUNTOS DE PARADAS
    paradas.forEach(p => {
        L.circleMarker(p.c, { radius: 6, color: '#000', weight: 1, fillColor: '#FFD700', fillOpacity: 1 }).addTo(map);
    });

    const iconTaxi = L.divIcon({ html: '🚕', className: 'taxi-icon', iconAnchor: [15, 15] });
    const marcadorConductor = L.marker(paradas[10].c, { icon: iconTaxi }).addTo(map);

    let markersPax = [];
    let watchID = null;

    async function toggleServicio() {
        const on = document.getElementById('gps-switch').checked;
        document.getElementById('txt-status').innerText = on ? "ONLINE" : "OFFLINE";
        document.getElementById('txt-status').style.color = on ? "#4cd964" : "#888";
        document.getElementById('offline-screen').style.display = on ? "none" : "flex";

        if (on) {
            watchID = navigator.geolocation.watchPosition(async p => {
                const { latitude, longitude } = p.coords;
                marcadorConductor.setLatLng([latitude, longitude]);
                map.panTo([latitude, longitude]);
                await _s.from('conductores').update({ lat: latitude, lon: longitude, online: true }).eq('nombre', 'Móvil 1');
            }, null, { enableHighAccuracy: true });
        } else {
            if(watchID) navigator.geolocation.clearWatch(watchID);
            await _s.from('conductores').update({ online: false }).eq('nombre', 'Móvil 1');
        }
    }

    async function actualizarMapa() {
        markersPax.forEach(m => map.removeLayer(m));
        markersPax = [];
        for(let i=1; i<=4; i++) {
            const p = document.getElementById('pill'+i); p.className = 'pill'; p.innerText = i;
        }

        const { data: reservas } = await _s.from('reservas_activas').select('*').eq('estado', 'en_curso');
        if (reservas) {
            document.getElementById('txt-pax').innerText = reservas.length + "/4";
            document.getElementById('txt-plata').innerText = '$' + (reservas.length * 1000);
            reservas.forEach(res => {
                const pill = document.getElementById('pill' + res.asiento_num);
                if(pill) { pill.className = 'pill active'; pill.innerText = res.nombre_pasajero.substring(0, 5); }
                const mOrig = L.circleMarker([res.lat_pax, res.lon_pax], { color: 'red', radius: 11, fillOpacity: 0.9 }).addTo(map)
                    .bindTooltip(res.nombre_pasajero, { permanent: true, direction: 'top' });
                markersPax.push(mOrig);
            });
        }
    }

    async function vaciarTodo() {
        if(!confirm("¿Vaciar asientos?")) return;
        await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('estado', 'en_curso');
        await _s.from('conductores').update({ pasajeros_actuales: 0 }).eq('nombre', 'Móvil 1');
        actualizarMapa();
    }

    // CONTROL DEL SPLASH AL INICIAR
    window.onload = () => {
        setTimeout(() => {
            const spl = document.getElementById('splash');
            spl.style.opacity = '0';
            setTimeout(() => spl.style.display = 'none', 800);
            actualizarMapa();
        }, 2000);
    };

    setInterval(actualizarMapa, 6000);
</script>
</body>
</html>
