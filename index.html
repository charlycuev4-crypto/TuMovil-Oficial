<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONDUCTOR - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #map { flex-grow: 1; z-index: 1; }
        
        /* UI Panels */
        .top-ui { position: absolute; top: 10px; width: 100%; z-index: 1000; padding: 0 10px; }
        .stats-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .stat-box { background: rgba(0,0,0,0.85); border: 2px solid #FFD700; border-radius: 12px; padding: 10px; flex: 1; text-align: center; color: #FFD700; font-weight: bold; }
        
        .control-row { display: flex; gap: 10px; justify-content: center; background: rgba(0,0,0,0.9); padding: 10px; border-radius: 30px; border: 1px solid #FFD700; align-items: center; }
        
        .bottom-ui { position: absolute; bottom: 20px; width: 100%; z-index: 1000; padding: 0 20px; }
        .asientos-grid { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; }
        .asiento-btn { width: 60px; height: 60px; border: 2px solid #FFD700; border-radius: 15px; background: #000; color: #FFD700; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        .asiento-btn.active { background: #4cd964; color: #000; border-color: #4cd964; }
        .btn-finalizar { width: 100%; padding: 20px; background: #ff3b30; color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; }

        /* Estilo Botones */
        .btn-toggle { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .btn-toggle.active { background: #FFD700; color: #000; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="top-ui">
        <div class="stats-row">
            <div class="stat-box">RECAUDACIÓN<br><span id="txt-plata">$0</span></div>
            <div class="stat-box">PASAJEROS<br><span id="txt-pax">0</span></div>
        </div>
        <div class="control-row">
            <button id="btn-linea" class="btn-toggle" onclick="toggleOnline()">OFFLINE</button>
            <button id="btn-sentido" class="btn-toggle active" onclick="toggleSentido()">IDA</button>
        </div>
    </div>

    <div class="bottom-ui">
        <div class="asientos-grid">
            <div class="asiento-btn" id="p1">1</div>
            <div class="asiento-btn" id="p2">2</div>
            <div class="asiento-btn" id="p3">3</div>
            <div class="asiento-btn" id="p4">4</div>
        </div>
        <button class="btn-finalizar" onclick="finalizarViaje()">🏁 FINALIZAR / VACIAR COCHE 01</button>
    </div>

<script>
    const MI_ID = 1;
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    let map, isOnline = false, sentido = 'IDA';

    // 1. Configuración de Paradas (Las 25 que tenías)
    const paradas = [
        [-34.561264, -58.770506], [-34.562160, -58.771380], [-34.562494, -58.772133],
        [-34.563541, -58.773244], [-34.564109, -58.773759], [-34.565342, -58.772061],
        [-34.567268, -58.769484], [-34.569090, -58.767095], [-34.571016, -58.764443],
        [-34.571956, -58.763201], [-34.577371, -58.755909], [-34.578528, -58.757064],
        [-34.579296, -58.755864], [-34.580020, -58.755063], [-34.580901, -58.753842],
        [-34.581998, -58.752441], [-34.583319, -58.750710], [-34.584740, -58.748804],
        [-34.585554, -58.749812], [-34.586494, -58.750574], [-34.588041, -58.751542],
        [-34.588273, -58.751338], [-34.588771, -58.750804], [-34.588244, -58.749877],
        [-34.586030, -58.747278]
    ];

    document.addEventListener('DOMContentLoaded', () => {
        map = L.map('map', { zoomControl: false }).setView([-34.57, -58.76], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // Dibujar las 25 paradas
        paradas.forEach(coord => {
            L.circleMarker(coord, { radius: 6, fillColor: '#00d2ff', color: '#000', weight: 2, fillOpacity: 1 }).addTo(map);
        });

        actualizarUI();
    });

    // 2. Lógica de Estados
    async function toggleOnline() {
        isOnline = !isOnline;
        document.getElementById('btn-linea').innerText = isOnline ? "ONLINE" : "OFFLINE";
        document.getElementById('btn-linea').style.background = isOnline ? "#4cd964" : "#333";
        await _s.from('estado_movil').update({ esta_online: isOnline }).eq('id', MI_ID);
    }

    async function toggleSentido() {
        sentido = (sentido === 'IDA') ? 'VUELTA' : 'IDA';
        document.getElementById('btn-sentido').innerText = sentido;
        await _s.from('estado_movil').update({ sentido: sentido }).eq('id', MI_ID);
    }

    // 3. Backend / Sincronización
    async function actualizarUI() {
        const { data } = await _s.from('reservas_activas').select('*').eq('estado', 'en_curso').eq('id_movil', MI_ID);
        
        for(let i=1; i<=4; i++) document.getElementById('p'+i).className = 'asiento-btn';
        let rec = 0;
        if(data) {
            data.forEach(d => {
                rec += 1000;
                document.getElementById('p'+d.asiento_num).className = 'asiento-btn active';
            });
            document.getElementById('txt-pax').innerText = data.length;
        }
        document.getElementById('txt-plata').innerText = '$' + rec;
    }

    _s.channel('coche_'+MI_ID).on('postgres_changes', { event: '*', schema: 'public', table: 'reservas_activas', filter: `id_movil=eq.${MI_ID}` }, () => {
        if (!isOnline) return;
        actualizarUI();
    }).subscribe();

    async function finalizarViaje() {
        if(!confirm("¿Vaciar todos los asientos?")) return;
        await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('estado', 'en_curso').eq('id_movil', MI_ID);
        actualizarUI();
    }
</script>
</body>
</html>
