<div class="panel-control">
    <div id="status-gps">📡 GPS: DESCONECTADO</div>
    <div class="asientos-container" id="cont-asientos"></div>
    <button id="btn-servicio" class="btn-servicio inactivo" onclick="toggleServicio()">
        ENCENDER GPS Y SALIR A RUTA
    </button>
</div>

<script>
    // ... (Conexión a Supabase y Mapa igual que antes) ...

    function toggleServicio() {
        enServicio = !enServicio;
        const btn = document.getElementById('btn-servicio');
        const statusGps = document.getElementById('status-gps');

        if (enServicio) {
            btn.innerText = "🛑 APAGAR GPS / TERMINAR";
            btn.className = "btn-servicio activo";
            statusGps.innerText = "🟡 Buscando tu ubicación real...";
            
            // 1. OBTENER UBICACIÓN INICIAL RÁPIDA
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                map.setView([lat, lng], 17); // El mapa hace zoom a donde estás vos
                actualizarPosicion(pos); // La manda a Supabase
            });

            // 2. ACTIVAR SEGUIMIENTO EN TIEMPO REAL
            watchId = navigator.geolocation.watchPosition(
                actualizarPosicion, 
                (err) => { statusGps.innerText = "❌ Error de señal"; }, 
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        } else {
            // APAGADO
            btn.innerText = "ENCENDER GPS Y SALIR A RUTA";
            btn.className = "btn-servicio inactivo";
            statusGps.innerText = "📡 GPS: APAGADO";
            if (watchId) navigator.geolocation.clearWatch(watchId);
            sb.from('estado_movil').update({ en_servicio: false }).eq('id', 1);
        }
    }

    async function actualizarPosicion(pos) {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        
        marcadorAuto.setLatLng([lat, lng]);
        document.getElementById('status-gps').innerText = `✅ EN VIVO: Transmitiendo ubicación`;

        // MANDAR A SUPABASE PARA EL PASAJERO
        await sb.from('estado_movil').update({ 
            latitud: lat, 
            longitud: lng, 
            en_servicio: true,
            ultima_actualizacion: new Date()
        }).eq('id', 1);
    }
</script>
