<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Chofer - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #FFD700; --dark: #050505; --card: #121212; --blue: #00d4ff; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: #111; padding: 12px; border-bottom: 2px solid var(--gold); text-align: center; z-index: 1000; }
        header h1 { margin: 0; font-size: 16px; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }
        
        #map { flex: 1; width: 100%; position: relative; }

        /* Botón Flotante para Ocultar Línea */
        .map-overlay-btn { 
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.7); border: 1px solid var(--gold); color: white;
            padding: 8px 12px; border-radius: 5px; font-size: 12px; cursor: pointer;
        }

        .controls { background: var(--card); padding: 15px; display: flex; flex-direction: column; gap: 8px; border-top: 2px solid var(--gold); }

        .ganancias-container { display: flex; gap: 8px; }
        .box { flex: 1; background: #1a1a1a; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .box span { display: block; font-size: 9px; color: #888; margin-bottom: 2px; text-transform: uppercase; }
        .box strong { font-size: 18px; color: var(--blue); }

        .btn { padding: 16px; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; text-transform: uppercase; }
        .btn-liberar { background: var(--gold); color: black; }
        .btn-sentido { background: #222; color: white; border: 1px solid #444; }
        
        .status-bar { display: flex; justify-content: space-between; font-size: 11px; color: var(--gold); padding: 0 5px; }
    </style>
</head>
<body>

<header><h1>Central de Choferes</h1></header>

<div id="map">
    <button class="map-overlay-btn" onclick="toggleRuta()">📍 Mostrar/Ocultar Ruta</button>
</div>

<div class="controls">
    <div class="ganancias-container">
        <div class="box"><span>Viajes</span><strong id="viajes-hoy">0</strong></div>
        <div class="box"><span>Caja</span><strong id="caja-hoy">$0</strong></div>
        <div class="box"><span>Asientos</span><strong id="pax-count" style="color: var(--gold);">0/4</strong></div>
    </div>

    <div class="status-bar">
        <span id="chofer-tag">MÓVIL: CARGANDO...</span>
        <span id="sentido-tag">SENTIDO: IDA</span>
    </div>
    
    <button class="btn btn-liberar" onclick="liberarAsiento()">🪑 Pasajero Bajó (Liberar)</button>
    <button id="btn-cambio" class="btn btn-sentido" onclick="cambiarSentido()">🔄 Iniciar Regreso</button>
</div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let nombreChofer = "Móvil 1"; 
    let map, rutaLayer, paradasLayer, carMarker;
    let rutaVisible = true;

    const paradasCoords = [[-34.561128, -58.770586], [-34.562160, -58.771380], [-34.562494, -58.772133], [-34.563541, -58.773244], [-34.564109, -58.773759], [-34.565342, -58.772061], [-34.567268, -58.769484], [-34.569090, -58.767095], [-34.571016, -58.764443], [-34.571956, -58.763201], [-34.577371, -58.755909], [-34.578528, -58.757064], [-34.579296, -58.755864], [-34.580020, -58.755063], [-34.580901, -58.753842], [-34.581998, -58.752441], [-34.583319, -58.750710], [-34.584740, -58.748804], [-34.585554, -58.749812], [-34.586494, -58.750574], [-34.588041, -58.751542], [-34.588273, -58.751338], [-34.588771, -58.750804], [-34.588244, -58.749877], [-34.588930, -58.750543], [-34.586030, -58.747278]];

    // Icono del autito amarillo
    const carIcon = L.divIcon({
        html: `<div style="font-size: 24px;">🚕</div>`,
        className: 'car-icon',
        iconSize: [30, 30],
        iconAnchor: [15, 15]
    });

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([-34.572, -58.751], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        rutaLayer = L.polyline(paradasCoords, { color: '#00d4ff', weight: 4, opacity: 0.6 }).addTo(map);
        paradasLayer = L.layerGroup().addTo(map);
        
        paradasCoords.forEach(pos => {
            L.circleMarker(pos, { radius: 5, fillColor: "#FFD700", color: "#000", weight: 1, fillOpacity: 1 }).addTo(paradasLayer);
        });

        // Autito (posición inicial en la primera parada)
        carMarker = L.marker(paradasCoords[0], { icon: carIcon }).addTo(map);

        // Seguimiento GPS real
        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude } = pos.coords;
            const newPos = [latitude, longitude];
            carMarker.setLatLng(newPos);
            map.panTo(newPos);
            // Actualizar ubicación en base de datos
            _s.from('conductores').update({ lat: latitude, lon: longitude }).eq('nombre', nombreChofer);
        });
    }

    function toggleRuta() {
        if (rutaVisible) {
            map.removeLayer(rutaLayer);
            map.removeLayer(paradasLayer);
        } else {
            rutaLayer.addTo(map);
            paradasLayer.addTo(map);
        }
        rutaVisible = !rutaVisible;
    }

    async function actualizar() {
        const { data } = await _s.from('conductores').select('*').eq('nombre', nombreChofer).single();
        if (data) {
            document.getElementById('pax-count').innerText = `${data.pasajeros_actuales}/4`;
            document.getElementById('sentido-tag').innerText = "SENTIDO: " + data.sentido.toUpperCase();
            document.getElementById('chofer-tag').innerText = "MÓVIL: " + data.nombre;
            document.getElementById('viajes-hoy').innerText = data.viajes_realizados || 0;
            document.getElementById('caja-hoy').innerText = "$" + ((data.viajes_realizados || 0) * 1000);
            document.getElementById('btn-cambio').innerText = data.sentido === "ida" ? "🔄 Iniciar Regreso" : "🔄 Iniciar Ida";
        }
    }

    async function liberarAsiento() {
        const { data } = await _s.from('conductores').select('*').eq('nombre', nombreChofer).single();
        if (data.pasajeros_actuales > 0) {
            await _s.from('conductores').update({ 
                pasajeros_actuales: data.pasajeros_actuales - 1,
                viajes_realizados: (data.viajes_realizados || 0) + 1 
            }).eq('nombre', nombreChofer);
            actualizar();
        }
    }

    async function cambiarSentido() {
        const { data } = await _s.from('conductores').select('sentido').eq('nombre', nombreChofer).single();
        const nuevo = data.sentido === "ida" ? "vuelta" : "ida";
        if (confirm("¿Confirmas cambio de sentido?")) {
            await _s.from('conductores').update({ sentido: nuevo, pasajeros_actuales: 0 }).eq('nombre', nombreChofer);
            actualizar();
        }
    }

    initMap();
    actualizar();
    _s.channel('cambios').on('postgres_changes', { event: '*', table: 'conductores' }, () => actualizar()).subscribe();
</script>

</body>
</html>
