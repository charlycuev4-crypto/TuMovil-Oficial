<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - Conductor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; color: white; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .panel-top { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; z-index: 1001; }
        .btn-linea { background: #444; color: white; border: 2px solid #FFD700; padding: 12px 30px; border-radius: 30px; font-weight: bold; }
        .btn-linea.on { background: #4cd964; color: black; }
        .bottom-ui { position: absolute; bottom: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 1000; }
        .pills { display: flex; gap: 8px; margin-bottom: 12px; }
        .pill { width: 45px; height: 45px; border: 2px solid #00d4ff; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); }
        .pill.active { background: #ff3b30; color: white; border-color: #ff3b30; }
        .taxi-icon { font-size: 30px; }
    </style>
</head>
<body>
    <div class="panel-top"><button id="btn-estado" class="btn-linea" onclick="toggleLinea()">FUERA DE LÍNEA</button></div>
    <div id="map"></div>
    <div class="bottom-ui">
        <div class="pills"><div id="p1" class="pill">1</div><div id="p2" class="pill">2</div><div id="p3" class="pill">3</div><div id="p4" class="pill">4</div></div>
        <button style="background:#ff3b30; color:white; border:none; padding:15px 40px; border-radius:15px; font-weight:bold;" onclick="vaciar()">VACIAR TODO</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    const paradas = [{n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]}, {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]}, {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]}, {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]}, {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]}, {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]}, {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]}, {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]}, {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]}, {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]}, {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]}, {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]}, {n:'Abasto y Roca', c:[-34.586030, -58.747278]}];

    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.polyline(paradas.map(p => p.c), {color: '#00d4ff', weight: 4}).addTo(map);

    let mYo = L.marker([0,0], { icon: L.divIcon({ html: '🚕', className: 'taxi-icon' }) }).addTo(map);
    let lineOn = false, markersPax = [], markersDest = [];

    async function toggleLinea() {
        lineOn = !lineOn;
        const btn = document.getElementById('btn-estado');
        btn.innerText = lineOn ? "EN LÍNEA" : "FUERA DE LÍNEA";
        btn.className = lineOn ? "btn-linea on" : "btn-linea";
        if(lineOn) navigator.geolocation.watchPosition(async p => {
            const lat = p.coords.latitude, lon = p.coords.longitude;
            mYo.setLatLng([lat, lon]);
            await _s.from('estado_movil').update({ latitud: lat, longitud: lon, en_servicio: true }).eq('id', 1);
        });
    }

    async function refresh() {
        // BUSCA TODAS LAS RESERVAS SIN FILTRO DE ID_MOVIL
        const { data } = await _s.from('reservas_activas').select('*').eq('estado', 'en_curso');
        markersPax.forEach(m => map.removeLayer(m)); markersDest.forEach(m => map.removeLayer(m));
        for(let i=1; i<=4; i++) document.getElementById('p'+i).className = 'pill';

        if(data) data.forEach(r => {
            document.getElementById('p'+r.asiento_num).className = 'pill active';
            const mp = L.circleMarker([r.pasajero_lat, r.pasajero_lon], {color:'red'}).addTo(map).bindTooltip(r.nombre_pasajero);
            const md = L.marker(paradas[r.destino_idx].c).addTo(map).bindTooltip("Baja: "+r.nombre_pasajero);
            markersPax.push(mp); markersDest.push(md);
        });
    }
    setInterval(refresh, 4000);
    async function vaciar() { await _s.from('reservas_activas').update({estado:'finalizado'}).eq('estado', 'en_curso'); refresh(); }
</script>
</body>
</html>
