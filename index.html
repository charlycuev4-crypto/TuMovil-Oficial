<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PANEL DEL CONDUCTOR - MÓVIL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; color: white; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .header-stats { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; z-index: 1000; padding: 0 10px; }
        .stat-card { background: rgba(20, 20, 20, 0.9); border: 2px solid #00d4ff; border-radius: 12px; padding: 10px; width: 45%; text-align: center; box-shadow: 0 4px 15px rgba(0,212,255,0.2); }
        .stat-label { font-size: 10px; color: #00d4ff; font-weight: bold; text-transform: uppercase; }
        .stat-value { font-size: 22px; font-weight: 800; display: block; }
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 1000; }
        .btn-main { width: 90%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; text-transform: uppercase; background: #ff3b30; color: white; box-shadow: 0 4px 15px rgba(255,59,48,0.3); }
        .asientos-indicator { background: rgba(0,0,0,0.8); border: 2px solid #00d4ff; border-radius: 15px; padding: 10px; margin-bottom: 10px; display: flex; gap: 8px; }
        .mini-as { width: 35px; height: 35px; border: 2px solid #00d4ff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .mini-as.busy { background: #ff3b30; border-color: #ff3b30; }
    </style>
</head>
<body>
    <div class="header-stats">
        <div class="stat-card">
            <span class="stat-label">Recaudación</span>
            <span class="stat-value" id="v-recaudacion">$0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Pasajeros</span>
            <span class="stat-value" id="v-pax">0</span>
        </div>
    </div>

    <div id="map"></div>

    <div class="controls">
        <div class="asientos-indicator" id="indicador-asientos">
            <div id="ma1" class="mini-as">1</div>
            <div id="ma2" class="mini-as">2</div>
            <div id="ma3" class="mini-as">3</div>
            <div id="ma4" class="mini-as">4</div>
        </div>
        <button class="btn-main" onclick="vaciarUnidad()">Finalizar Viaje / Vaciar</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    const rutaOficial = [
        {n:'Miguel Cané (Inicio)', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false }).setView(rutaOficial[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.polyline(rutaOficial.map(p=>p.c), {color:'#00d4ff', weight:6, opacity:0.5}).addTo(map);

    const paxIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/1077/1077114.png', iconSize: [30, 30] });
    const destIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/2776/2776067.png', iconSize: [30, 30] });
    
    let marcadoresPasajeros = [];
    let marcadoresDestinos = [];

    async function dibujarPasajeros() {
        // Limpiar mapa
        marcadoresPasajeros.forEach(m => map.removeLayer(m));
        marcadoresDestinos.forEach(m => map.removeLayer(m));
        marcadoresPasajeros = []; marcadoresDestinos = [];
        
        // Reset indicadores visuales
        for(let i=1; i<=4; i++) document.getElementById('ma'+i).className = 'mini-as';

        const { data: reservas } = await _s.from('reservas_activas').select('*').eq('estado', 'en_curso');

        if (reservas) {
            document.getElementById('v-pax').innerText = reservas.length;
            document.getElementById('v-recaudacion').innerText = '$' + (reservas.length * 1000);

            reservas.forEach(res => {
                // Marcar asiento como ocupado en el panel
                document.getElementById('ma' + res.asiento_num).className = 'mini-as busy';

                // Dibujar Pasajero
                const pM = L.marker([res.pasajero_lat, res.pasajero_lon], { icon: paxIcon })
                            .addTo(map).bindPopup("Sube Asiento " + res.asiento_num);
                marcadoresPasajeros.push(pM);

                // Dibujar Destino
                if(rutaOficial[res.destino_idx]) {
                    const dM = L.marker(rutaOficial[res.destino_idx].c, { icon: destIcon })
                                .addTo(map).bindPopup("Baja Asiento " + res.asiento_num);
                    marcadoresDestinos.push(dM);
                }
            });
        }
    }

    // GPS DEL CONDUCTOR
    navigator.geolocation.watchPosition(async p => {
        const coords = { latitud: p.coords.latitude, longitud: p.coords.longitude };
        await _s.from('estado_movil').update(coords).eq('id', 1);
        // Opcional: centrar mapa en el chofer
    }, null, { enableHighAccuracy: true });

    async function vaciarUnidad() {
        if(!confirm("¿Deseas finalizar todos los viajes y vaciar la unidad?")) return;
        
        // 1. Finalizar todas las reservas en curso
        await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('estado', 'en_curso');
        
        // 2. Resetear contador de asientos
        await _s.from('estado_movil').update({ asientos_libres: 4 }).eq('id', 1);
        
        dibujarPasajeros();
        alert("Unidad vacía y lista.");
    }

    // Escuchar cambios en tiempo real
    _s.channel('cambios_driver')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'reservas_activas' }, () => {
          dibujarPasajeros();
      })
      .subscribe();

    dibujarPasajeros();
</script>
</body>
</html>
