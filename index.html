<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Conductor Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            background: #000; 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Bloque superior con números grandes */
        .header-stats {
            display: flex;
            justify-content: space-around;
            padding: 15px 5px;
            background: #000;
            border-bottom: 2px solid #FFD700;
        }
        .stat-box { text-align: center; flex: 1; }
        .stat-label { color: #FFD700; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 28px; font-weight: 800; display: block; margin-top: 5px; }

        /* Botones táctiles grandes */
        .mando-container {
            display: flex;
            gap: 10px;
            padding: 12px;
            background: #111;
        }
        .btn-principal {
            height: 60px; /* Altura cómoda para el dedo */
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .btn-online { background: #4cd964; color: #000; flex: 2; }
        .btn-sentido { background: #222; color: #FFD700; border: 2px solid #FFD700; flex: 1; }

        /* El Mapa */
        #map { 
            flex-grow: 1; /* Ocupa todo el espacio disponible */
            width: 100%;
            background: #111;
        }

        /* Monitor de asientos optimizado */
        .cabina-container {
            padding: 15px;
            background: #000;
            border-top: 1px solid #333;
        }
        .grid-asientos {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .asiento-card {
            background: #111;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 12px 5px;
            text-align: center;
        }
        .asiento-card.ocupado {
            border-color: #4cd964;
            background: rgba(76, 217, 100, 0.15);
        }
        .asiento-num { font-size: 10px; color: #888; margin-bottom: 4px; }
        .asiento-precio { font-size: 16px; font-weight: bold; color: #4cd964; }
    </style>
</head>
<body>

    <div class="header-stats">
        <div class="stat-box">
            <span class="stat-label">Recaudación</span>
            <span id="total-dinero" class="stat-value">$0</span>
        </div>
        <div class="stat-box" style="border-left: 1px solid #333;">
            <span class="stat-label">Pasajeros</span>
            <span id="total-pax" class="stat-value">0</span>
        </div>
    </div>

    <div class="mando-container">
        <button id="btn-status" class="btn-principal btn-online" onclick="toggleLinea()">MÓVIL EN LÍNEA</button>
        <button id="btn-sentido" class="btn-principal btn-sentido" onclick="cambiarSentido()">IDA</button>
    </div>

    <div id="map"></div>

    <div class="cabina-container">
        <div style="color: #FFD700; font-size: 12px; margin-bottom: 10px; font-weight: bold;">CABINA DE PASAJEROS</div>
        <div id="grid-asientos" class="grid-asientos">
            </div>
    </div>

    <script>
        // ... (Aquí va la lógica de Supabase y Leaflet que ya tenemos) ...
        // Asegúrate de incluir el L.tileLayer para que no se vea negro
        // Y el filtro de coordenadas para evitar triángulos
    </script>
</body>
</html>
