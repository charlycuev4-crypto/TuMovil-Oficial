<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASAJERO - MÓVIL EN VIVO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .overlay { position: absolute; z-index: 1000; width: 100%; display: flex; justify-content: center; padding: 10px; }
        .bottom { bottom: 20px; flex-direction: column; align-items: center; }
        .card-pax { background: rgba(0, 0, 0, 0.9); border: 2.5px solid #00d4ff; border-radius: 20px; padding: 15px; width: 95%; text-align: center; color: white; }
        .btn-as { width: 60px; height: 60px; border-radius: 12px; border: 2px solid #00d4ff; background: transparent; color: #00d4ff; font-weight: bold; margin: 5px; }
        .ocupado { background: #ff3b30 !important; border: none; color: white; opacity: 0.5; }
        .reserva { background: #00d4ff !important; color: black; }
        .btn-confirmar { background: #28a745; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; margin-top: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="overlay bottom">
        <div class="card-pax">
            <div id="grid">
                <button id="as1" class="btn-as" onclick="seleccionar(1)">1</button>
                <button id="as2" class="btn-as" onclick="seleccionar(2)">2</button>
                <button id="as3" class="btn-as" onclick="seleccionar(3)">3</button>
                <button id="as4" class="btn-as" onclick="seleccionar(4)">4</button>
            </div>
            <button class="btn-confirmar" onclick="reservar()">Confirmar Reserva ($1000)</button>
        </div>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    let miSeleccion = null;
    let miPos = null;

    // La misma ruta que el conductor
    const ruta = [/* Copiar aquí la misma lista de 25 paradas del código anterior */];

    const map = L.map('map', { zoomControl: false }).setView([-34.5612, -58.7705], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const busIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [35, 35] });
    let markerBus = L.marker([-34.5612, -58.7705], { icon: busIcon }).addTo(map);

    navigator.geolocation.watchPosition(p => { miPos = [p.coords.latitude, p.coords.longitude]; }, null, {enableHighAccuracy:true});

    function seleccionar(n) {
        const btn = document.getElementById('as'+n);
        if(btn.classList.contains('ocupado')) return;
        miSeleccion = n;
        for(let i=1; i<=4; i++) document.getElementById('as'+i).classList.remove('reserva');
        btn.classList.add('reserva');
    }

    async function reservar() {
        if(!miSeleccion || !miPos) return alert("Selecciona asiento y activa GPS");
        const { data } = await _s.from('estado_movil').select('asientos_libres').eq('id',1).single();
        if(data.asientos_libres > 0) {
            await _s.from('estado_movil').update({ 
                asientos_libres: data.asientos_libres - 1,
                pasa_lat_origen: miPos[0],
                pasa_lng_origen: miPos[1]
            }).eq('id',1);
            alert("Reserva Exitosa");
        }
    }

    _s.channel('cambios').on('postgres_changes', {event:'UPDATE', schema:'public', table:'estado_movil'}, r => {
        markerBus.setLatLng([r.new.latitud, r.new.longitud]);
        const ocupados = 4 - r.new.asientos_libres;
        for(let i=1; i<=4; i++) {
            document.getElementById('as'+i).className = i <= ocupados ? 'btn-as ocupado' : 'btn-as';
        }
    }).subscribe();
</script>
</body>
</html>
