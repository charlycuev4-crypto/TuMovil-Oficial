<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pasajero - Tu Móvil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #f0f0f0; height: 100vh; font-family: 'Arial', sans-serif; overflow: hidden; }

        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        /* PANEL SUPERIOR DINÁMICO */
        .overlay-top {
            position: absolute; top: 10px; left: 10px; right: 10px;
            z-index: 1000; display: flex; flex-direction: column; gap: 10px;
        }
        .card {
            background: rgba(0, 0, 0, 0.9); color: white; border-radius: 15px;
            padding: 12px; border: 2px solid #00d4ff; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .label { font-size: 10px; color: #00d4ff; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        select {
            width: 100%; padding: 10px; border-radius: 8px; border: none;
            background: #222; color: #fff; font-size: 14px; outline: none;
        }

        /* INFO DE DISTANCIA Y ASIENTOS */
        .overlay-bottom {
            position: absolute; bottom: 25px; left: 10px; right: 10px;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            pointer-events: none;
        }
        .badge {
            background: white; padding: 10px 15px; border-radius: 15px;
            border: 2px solid #00d4ff; font-weight: bold; color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); pointer-events: auto;
        }
        .dist-badge { background: #00d4ff; color: #000; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="overlay-top">
        <div class="card">
            <span class="label">TU DESTINO (DÓNDE BAJÁS)</span>
            <select id="select-destino" onchange="actualizarDestino()">
                <option value="">Selecciona una parada...</option>
            </select>
        </div>
    </div>

    <div class="overlay-bottom">
        <div class="badge dist-badge">A: <span id="txt-dist">--</span> m</div>
        <div class="badge">LUGARES: <span id="txt-asientos">-</span> / 4</div>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    // 26 PARADAS SINCRONIZADAS
    const paradas = [
        {n: 'M. Cané y Marchena', c: [-34.561128, -58.770586]}, {n: 'Cané y Los Aromos', c: [-34.562160, -58.771380]},
        {n: 'Los Aromos 11016', c: [-34.562494, -58.772133]}, {n: 'Los Aromos 10874', c: [-34.563541, -58.773244]},
        {n: 'Los Aromos y Murillo', c: [-34.564109, -58.773759]}, {n: 'Murillo 601', c: [-34.565342, -58.772061]},
        {n: 'Murillo y Güiraldes', c: [-34.567268, -58.769484]}, {n: 'Murillo y Watt', c: [-34.569090, -58.767095]},
        {n: 'A. Prado 2555', c: [-34.571016, -58.764443]}, {n: 'Prado y Payró', c: [-34.571956, -58.763201]},
        {n: 'Prado 1744', c: [-34.577371, -58.755909]}, {n: 'Bulevar Caveri 1', c: [-34.578528, -58.757064]},
        {n: 'Caveri y Azara', c: [-34.579296, -58.755864]}, {n: 'Caveri y Vedia', c: [-34.580020, -58.755063]},
        {n: 'Caveri y Tablada', c: [-34.580901, -58.753842]}, {n: 'Caveri y Echeverría', c: [-34.581998, -58.752441]},
        {n: 'Caveri y Gálvez', c: [-34.583319, -58.750710]}, {n: 'Caveri Final', c: [-34.584740, -58.748804]},
        {n: 'Libertador y Aeronáutica', c: [-34.585554, -58.749812]}, {n: 'Libertador 7300', c: [-34.586494, -58.750574]},
        {n: 'Libertador 7200', c: [-34.588041, -58.751542]}, {n: 'Giro Maza', c: [-34.588273, -58.751338]},
        {n: 'Maza y Albatros', c: [-34.588771, -58.750804]}, {n: 'Maternidad', c: [-34.588244, -58.749877]},
        {n: 'Esquina Albatros', c: [-34.588930, -58.750543]}, {n: 'Cruce Castelar', c: [-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Dibujar Ruta
    L.polyline(paradas.map(p => p.c), {color: '#00d4ff', weight: 4, opacity: 0.5}).addTo(map);

    // Llenar selector
    const sel = document.getElementById('select-destino');
    paradas.forEach((p, i) => {
        let opt = document.createElement('option');
        opt.value = i; opt.innerText = p.n;
        sel.appendChild(opt);
    });

    // Iconos
    const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [35, 35] });
    const userIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/2802/2802928.png', iconSize: [30, 30] });

    let markerAuto = L.marker(paradas[0].c, {icon: carIcon}).addTo(map);
    let markerUser = L.marker([0,0], {icon: userIcon}).addTo(map);
    let markerDest = L.marker([0,0]).addTo(map);

    // GPS Pasajero (Ubicación real)
    navigator.geolocation.watchPosition(p => {
        const pos = [p.coords.latitude, p.coords.longitude];
        markerUser.setLatLng(pos);
    }, null, { enableHighAccuracy: true });

    function actualizarDestino() {
        const p = paradas[sel.value];
        if(p) {
            markerDest.setLatLng(p.c).bindPopup("Bajás en: " + p.n).openPopup();
            map.flyTo(p.c, 16);
        }
    }

    // Escuchar cambios del Conductor
    _s.channel('movil').on('postgres_changes', {event:'UPDATE', schema:'public', table:'estado_movil'}, payload => {
        const d = payload.new;
        markerAuto.setLatLng([d.latitud, d.longitud]);
        document.getElementById('txt-asientos').innerText = d.asientos_libres;
        
        // Calcular distancia dinámica
        if(markerUser.getLatLng().lat !== 0) {
            const dist = map.distance(markerAuto.getLatLng(), markerUser.getLatLng());
            document.getElementById('txt-dist').innerText = Math.round(dist);
        }
    }).subscribe();
</script>
</body>
</html>
