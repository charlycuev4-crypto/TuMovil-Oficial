<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel del Chofer - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #FFD700; --dark: #050505; --card: #1a1a1a; --blue: #00d4ff; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        header { background: #111; padding: 20px; border-bottom: 2px solid var(--gold); text-align: center; }
        .container { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        /* Estado del Auto */
        .status-card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 15px; text-align: center; }
        .status-card h2 { margin: 0; color: var(--gold); font-size: 14px; letter-spacing: 1px; }
        .status-val { font-size: 28px; font-weight: bold; margin: 10px 0; display: block; }
        
        /* Botonera Principal */
        .btn { border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; width: 100%; text-transform: uppercase; }
        .btn-main { background: var(--gold); color: black; padding: 25px; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3); }
        .btn-regreso { background: var(--blue); color: black; padding: 20px; margin-top: 10px; }
        .btn:active { transform: scale(0.98); }

        /* Lista de pasajeros simple */
        .pax-list { background: #111; border-radius: 10px; padding: 15px; border-left: 4px solid var(--gold); }
        .pax-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding: 10px 0; }
        .pax-item:last-child { border: none; }
    </style>
</head>
<body>

<header>
    <h1 id="chofer-nombre">CHOFER: CARGANDO...</h1>
</header>

<div class="container">
    <div class="status-card">
        <h2>ASIENTOS OCUPADOS</h2>
        <span class="status-val" id="count-asientos">0 / 4</span>
        <div id="pax-container" class="pax-list">
            <div style="color: #666; font-size: 13px;">Esperando pasajeros...</div>
        </div>
    </div>

    <div style="margin-top: auto; display: flex; flex-direction: column; gap: 15px;">
        <button class="btn btn-main" onclick="liberarAsiento()">🪑 Liberar 1 Asiento</button>
        <button id="btn-sentido" class="btn btn-regreso" onclick="cambiarSentido()">🔄 Iniciar Sentido Regreso</button>
    </div>
</div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    // Configuración inicial (Esto lo traeremos del login luego)
    let nombreChofer = "Móvil 1"; 
    let sentidoActual = "ida";
    document.getElementById('chofer-nombre').innerText = "CHOFER: " + nombreChofer;

    // 1. Función para liberar asiento manualmente (Baja un pasajero)
    async function liberarAsiento() {
        const { data: actual } = await _s.from('conductores').select('pasajeros_actuales').eq('nombre', nombreChofer).single();
        
        if (actual.pasajeros_actuales > 0) {
            const nuevoTotal = actual.pasajeros_actuales - 1;
            await _s.from('conductores').update({ pasajeros_actuales: nuevoTotal }).eq('nombre', nombreChofer);
            actualizarInterfaz();
        } else {
            alert("El auto ya está vacío");
        }
    }

    // 2. Función de Cambio de Sentido (Manual)
    async function cambiarSentido() {
        const texto = sentidoActual === "ida" ? "VUELTA (Hacia M. Cané)" : "IDA (Hacia Maternidad)";
        const nuevoSentido = sentidoActual === "ida" ? "vuelta" : "ida";

        if (confirm(`¿Confirmas inicio de recorrido de ${texto}?`)) {
            const { error } = await _s.from('conductores')
                .update({ 
                    sentido: nuevoSentido,
                    pasajeros_actuales: 0 // Al cambiar de punta, el auto arranca vacío
                })
                .eq('nombre', nombreChofer);

            if (!error) {
                sentidoActual = nuevoSentido;
                document.getElementById('btn-sentido').innerText = `🔄 CAMBIAR A SENTIDO ${sentidoActual === "ida" ? 'VUELTA' : 'IDA'}`;
                actualizarInterfaz();
                alert("Ruta actualizada. El sistema ahora te enviará pasajeros del nuevo sentido.");
            }
        }
    }

    // 3. Refrescar la pantalla automáticamente
    async function actualizarInterfaz() {
        const { data: chofer } = await _s.from('conductores').select('*').eq('nombre', nombreChofer).single();
        if (chofer) {
            document.getElementById('count-asientos').innerText = `${chofer.pasajeros_actuales} / 4`;
            sentidoActual = chofer.sentido;
        }
    }

    // Escuchar cambios en tiempo real (Cuando un pasajero reserva, el contador sube solo)
    _s.channel('cambios').on('postgres_changes', { event: '*', table: 'conductores' }, payload => {
        actualizarInterfaz();
    }).subscribe();

    actualizarInterfaz();
</script>

</body>
</html>
