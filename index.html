<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - Conductor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin:0; background:#111; color:white; font-family:sans-serif; text-align:center; }
        .header { background:#FFD700; color:000; padding:15px; font-weight:900; }
        .btn { width:90%; padding:20px; margin:10px 0; border-radius:15px; border:none; font-weight:bold; font-size:18px; }
        .ida { background:#00d4ff; }
        .vuelta { background:#FFD700; }
        .status { padding:10px; font-size:14px; background:#222; }
    </style>
</head>
<body>
    <div class="header">CONTROL MÓVIL #1</div>
    <div class="status" id="gps-status">GPS: Buscando señal...</div>
    
    <button id="btn-sentido" class="btn ida" onclick="cambiarSentido()">SENTIDO: HACIA ABASTO</button>
    
    <div id="pax-lista" style="padding:20px;">
        <h3>Pasajeros en viaje:</h3>
        <div id="pax-items">Buscando pasajeros...</div>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    let idMovil = 1;
    let esIda = true;

    function cambiarSentido() {
        esIda = !esIda;
        const btn = document.getElementById('btn-sentido');
        btn.innerText = esIda ? "SENTIDO: HACIA ABASTO" : "SENTIDO: HACIA CANÉ";
        btn.className = esIda ? "btn ida" : "btn vuelta";
    }

    // SEGUIMIENTO GPS REAL
    navigator.geolocation.watchPosition(async p => {
        const { error } = await _s.from('estado_movil').update({
            latitud: p.coords.latitude,
            longitud: p.coords.longitude,
            en_servicio: true
        }).eq('id', idMovil);
        
        document.getElementById('gps-status').innerText = "GPS: Conectado (Lat: " + p.coords.latitude.toFixed(4) + ")";
    }, err => {
        document.getElementById('gps-status').innerText = "GPS: Error de señal";
    }, { enableHighAccuracy: true });

    async function cargarPasajeros() {
        const { data } = await _s.from('reservas_activas').select('*').eq('id_movil', idMovil).eq('estado', 'en_curso');
        const container = document.getElementById('pax-items');
        container.innerHTML = data.length > 0 ? "" : "Sin pasajeros asignados.";
        data.forEach(p => {
            container.innerHTML += `<div style="background:#333; margin:5px; padding:10px; border-radius:10px;">
                <b>${p.nombre_pasajero}</b> - Asiento ${p.asiento_num} <br>
                <button onclick="bajarPax(${p.id})">Finalizar Viaje</button>
            </div>`;
        });
    }

    async function bajarPax(id) {
        await _s.from('reservas_activas').delete().eq('id', id);
        cargarPasajeros();
    }

    setInterval(cargarPasajeros, 3000);
</script>
</body>
</html>
