<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANEL CONDUCTOR - PRUEBA REAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #1a1a1a; color: white; }
        .btn-asiento { width: 60px; height: 60px; margin: 10px; font-size: 20px; cursor: pointer; border-radius: 10px; border: none; }
        .libre { background: #28a745; color: white; }
        .ocupado { background: #dc3545; color: white; }
        #status { color: #ffc107; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <h2>CONTROL DE ASIENTOS</h2>
    <div id="controles-asientos">
        <button id="btn1" class="btn-asiento libre" onclick="toggleAsiento(1)">1</button>
        <button id="btn2" class="btn-asiento libre" onclick="toggleAsiento(2)">2</button>
        <button id="btn3" class="btn-asiento libre" onclick="toggleAsiento(3)">3</button>
        <button id="btn4" class="btn-asiento libre" onclick="toggleAsiento(4)">4</button>
    </div>
    <p>Asientos Libres: <b id="contador">4</b></p>
    <div id="status">🛰️ Esperando GPS...</div>

<script>
    const _supabase = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52dW1kbHhlcnZyZXdxaWlhaWNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTA4NTMsImV4cCI6MjA4OTg4Njg1M30.ejh7dtL2O6JHeoVq47cUK_hXAfRetJPyzks1yI-Lrhs');

    let asientos = [true, true, true, true]; // true = libre

    async function toggleAsiento(num) {
        asientos[num-1] = !asientos[num-1];
        const btn = document.getElementById('btn' + num);
        btn.className = asientos[num-1] ? 'btn-asiento libre' : 'btn-asiento ocupado';
        
        const libres = asientos.filter(a => a).length;
        document.getElementById('contador').innerText = libres;

        await _supabase.from('estado_movil').update({ asientos_libres: libres }).eq('id', 1);
    }

    // GPS REAL
    navigator.geolocation.watchPosition(async (pos) => {
        const { latitude, longitude } = pos.coords;
        document.getElementById('status').innerText = "📍 Transmitiendo: " + latitude.toFixed(4) + ", " + longitude.toFixed(4);
        
        await _supabase.from('estado_movil').update({ 
            latitud: latitude, 
            longitud: longitude,
            ultima_actualizacion: new Date().toISOString()
        }).eq('id', 1);
    }, null, { enableHighAccuracy: true });
</script>
</body>
</html>
