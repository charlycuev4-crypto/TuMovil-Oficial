<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONDUCTOR 01 - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        /* Splash Screen */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .logo-text { color: #00d2ff; font-size: 40px; font-weight: bold; letter-spacing: 5px; text-shadow: 0 0 20px #00d2ff; margin-bottom: 20px; }
        .loader { border: 4px solid #333; border-top: 4px solid #00d2ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .ui-overlay { position: absolute; width: 100%; z-index: 1000; pointer-events: none; }
        .top-stats { top: 10px; display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 0 10px; }
        .stat-row { display: flex; justify-content: space-around; width: 100%; }
        .stat-box { background: rgba(0,0,0,0.85); border: 2px solid #FFD700; border-radius: 12px; padding: 8px; width: 45%; text-align: center; color: white; pointer-events: auto; }
        
        .parada-panel { background: #222; border: 2px solid #00d2ff; color: #00d2ff; padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 18px; cursor: pointer; pointer-events: auto; display: flex; gap: 15px; align-items: center; }
        
        .connection-panel { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.9); padding: 8px 15px; border-radius: 30px; border: 1px solid #FFD700; pointer-events: auto; }
        .switch { position: relative; display: inline-block; width: 46px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4cd964; }
        input:checked + .slider:before { transform: translateX(24px); }
        #status-label { color: white; font-size: 11px; font-weight: bold; width: 85px; text-align: center; }

        .bottom-ui { bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        .btn-vaciar { background: #ff3b30; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; font-size: 16px; pointer-events: auto; }
        .asientos-pills { display: flex; gap: 8px; margin-bottom: 15px; pointer-events: auto; }
        .pill { width: 48px; height: 48px; border: 2px solid #FFD700; border-radius: 12px; color: #FFD700; display: flex; align-items: center; justify-content: center; font-weight: bold; background: rgba(0,0,0,0.85); }
        .pill.active { background: #4cd964; border-color: #4cd964; color: black; }
        .taxi-icon { font-size: 30px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-text">TUMOVIL</div>
        <div class="loader"></div>
    </div>

    <div class="ui-overlay top-stats">
        <div class="connection-panel">
            <span id="status-label">FUERA DE LÍNEA</span>
            <label class="switch">
                <input type="checkbox" id="online-toggle" onchange="gestionarConexion()">
                <span class="slider"></span>
            </label>
        </div>
        
        <div class="parada-panel">
            <button onclick="cambiarParada(-1)" style="background:none; border:none; color:white; font-size:20px;">◀</button>
            <span id="txt-parada">PARADA: 0</span>
            <button onclick="cambiarParada(1)" style="background:none; border:none; color:white; font-size:20px;">▶</button>
        </div>
        
        <div class="stat-row">
            <div class="stat-box"><small style="color:#FFD700">RECAUDACIÓN</small><div id="txt-plata" style="font-size:20px; font-weight:800; color:#4cd964;">$0</div></div>
            <div class="stat-box"><small style="color:#FFD700">PASAJEROS</small><div id="txt-pax" style="font-size:20px; font-weight:800;">0</div></div>
        </div>
    </div>

    <div id="map"></div>

    <div class="ui-overlay bottom-ui">
        <div class="asientos-pills">
            <div id="pill1" class="pill">1</div><div id="pill2" class="pill">2</div>
            <div id="pill3" class="pill">3</div><div id="pill4" class="pill">4</div>
        </div>
        <button class="btn-vaciar" onclick="vaciarTodo()">🏁 FINALIZAR / VACIAR COCHE 01</button>
    </div>

<script>
    const MI_ID_MOVIL = 1; 
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    let indice_parada = 0;
    const map = L.map('map', { zoomControl: false }).setView([-34.561264, -58.770506], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const marcadorConductor = L.marker([-34.561264, -58.770506], { icon: L.divIcon({ html: '🚕', className: 'taxi-icon', iconAnchor: [15, 15] }) }).addTo(map);

    // 1. CARGA INICIAL
    window.onload = async () => {
        const { data, error } = await _s.from('estado_movil').select('*').eq('id', MI_ID_MOVIL).single();
        if(data) {
            indice_parada = data.indice_parada || 0;
            document.getElementById('txt-parada').innerText = "PARADA: " + indice_parada;
            if(data.en_servicio) {
                document.getElementById('online-toggle').checked = true;
                document.getElementById('status-label').innerText = "EN LÍNEA";
            }
            if(data.latitud && data.longitud) marcadorConductor.setLatLng([data.latitud, data.longitud]);
        }
        await actualizarUI();
        setTimeout(() => document.getElementById('splash-screen').style.opacity = '0', 2000);
        setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 2500);
    };

    // 2. LOGICA POSICION
    async function cambiarParada(dir) {
        indice_parada += dir;
        if(indice_parada < 0) indice_parada = 49;
        if(indice_parada > 49) indice_parada = 0;
        document.getElementById('txt-parada').innerText = "PARADA: " + indice_parada;
        await _s.from('estado_movil').update({ indice_parada: indice_parada }).eq('id', MI_ID_MOVIL);
    }

    // 3. GESTION CONEXION (FIFO)
    async function gestionarConexion() {
        const estaOnline = document.getElementById('online-toggle').checked;
        const datosAActualizar = { en_servicio: estaOnline };
        
        if(estaOnline) datosAActualizar.fecha_online = new Date().toISOString();
        
        await _s.from('estado_movil').update(datosAActualizar).eq('id', MI_ID_MOVIL);
        document.getElementById('status-label').innerText = estaOnline ? "EN LÍNEA" : "FUERA DE LÍNEA";
    }

    // 4. ACTUALIZACION UI
    async function actualizarUI() {
        const { data: res } = await _s.from('reservas_activas').select('*').eq('estado', 'en_curso').eq('id_movil', MI_ID_MOVIL);
        if(res) {
            document.getElementById('txt-pax').innerText = res.length;
            document.getElementById('txt-plata').innerText = '$' + (res.length * 1000);
            for(let i=1; i<=4; i++) {
                const p = document.getElementById('pill'+i);
                p.className = res.find(r => r.asiento_num == i) ? 'pill active' : 'pill';
            }
        }
    }

    // 5. VACIAR
    async function vaciarTodo() {
        await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('estado', 'en_curso').eq('id_movil', MI_ID_MOVIL);
        actualizarUI();
    }

    // 6. LISTENERS REALTIME
    _s.channel('cambios_coche1').on('postgres_changes', { event: '*', schema: 'public', table: 'reservas_activas' }, actualizarUI).subscribe();
    
    // GPS REALTIME
    _s.channel('seguimiento_gps').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'estado_movil', filter: `id=eq.${MI_ID_MOVIL}` }, (p) => {
        if(p.new.latitud && p.new.longitud) marcadorConductor.setLatLng([p.new.latitud, p.new.longitud]);
    }).subscribe();

</script>
</body>
</html>
