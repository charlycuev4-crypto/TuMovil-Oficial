<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Chofer PRO - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #FFD700; --dark: #050505; --card: #121212; --blue: #00d4ff; --red: #ff3b30; --green: #4cd964; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: #111; padding: 12px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; px: 15px; }
        header h1 { margin: 0; font-size: 14px; color: var(--gold); text-transform: uppercase; }
        
        /* Switch de Ubicación */
        .switch-container { display: flex; align-items: center; gap: 8px; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--green); }
        input:checked + .slider:before { transform: translateX(20px); }

        #map { flex: 1; width: 100%; position: relative; }
        .controls { background: var(--card); padding: 15px; display: flex; flex-direction: column; gap: 8px; border-top: 2px solid var(--gold); }

        .ganancias-container { display: flex; gap: 8px; }
        .box { flex: 1; background: #1a1a1a; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .box span { display: block; font-size: 9px; color: #888; text-transform: uppercase; }
        .box strong { font-size: 18px; color: var(--blue); }

        .btn { padding: 16px; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; text-transform: uppercase; }
        .btn-liberar { background: var(--gold); color: black; }
        .btn-sentido { background: #222; color: white; border: 1px solid #444; }
        
        .status-bar { display: flex; justify-content: space-between; font-size: 11px; color: var(--gold); padding: 0 5px; }
        .offline-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; display: none; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>TuMovil Chofer</h1>
    <div class="switch-container">
        <span id="status-text" style="font-size: 10px; color: #888;">OFFLINE</span>
        <label class="switch">
            <input type="checkbox" id="gps-switch" onchange="toggleUbicacion()">
            <span class="slider"></span>
        </label>
    </div>
</header>

<div id="map">
    <div id="overlay" class="offline-overlay">
        <div>
            <h2 style="color: var(--red);">MODO OFFLINE</h2>
            <p>Tu ubicación no es visible para pasajeros.</p>
        </div>
    </div>
</div>

<div class="controls">
    <div class="ganancias-container">
        <div class="box"><span>Viajes</span><strong id="viajes-hoy">0</strong></div>
        <div class="box"><span>Caja</span><strong id="caja-hoy">$0</strong></div>
        <div class="box"><span>Asientos</span><strong id="pax-count" style="color: var(--gold);">0/4</strong></div>
    </div>
    <div class="status-bar">
        <span id="chofer-tag">MÓVIL 1</span>
        <span id="sentido-tag">SENTIDO: IDA</span>
    </div>
    <button class="btn btn-liberar" onclick="liberarAsiento()">🪑 Liberar 1 Asiento</button>
    <button id="btn-cambio" class="btn btn-sentido" onclick="cambiarSentido()">🔄 Iniciar Regreso</button>
</div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let nombreChofer = "Móvil 1"; 
    let map, carMarker, watchID;
    let isOnline = false;

    // Icono Taxi
    const carIcon = L.divIcon({ html: '<div style="font-size: 24px;">🚕</div>', className: 'car-icon', iconSize: [30, 30], iconAnchor: [15, 15] });

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([-34.572, -58.751], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        carMarker = L.marker([-34.572, -58.751], { icon: carIcon }).addTo(map);
    }

    // FUNCIÓN PARA APAGAR/ENCENDER UBICACIÓN
    async function toggleUbicacion() {
        isOnline = document.getElementById('gps-switch').checked;
        document.getElementById('status-text').innerText = isOnline ? "ONLINE" : "OFFLINE";
        document.getElementById('status-text').style.color = isOnline ? "var(--green)" : "#888";
        document.getElementById('overlay').style.display = isOnline ? "none" : "flex";

        if (isOnline) {
            // Activar GPS
            watchID = navigator.geolocation.watchPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                carMarker.setLatLng([latitude, longitude]);
                map.panTo([latitude, longitude]);
                
                // Actualizar Supabase
                await _s.from('conductores').update({ 
                    lat: latitude, 
                    lon: longitude,
                    online: true 
                }).eq('nombre', nombreChofer);
            }, null, { enableHighAccuracy: true });
        } else {
            // Apagar GPS
            navigator.geolocation.clearWatch(watchID);
            await _s.from('conductores').update({ online: false }).eq('nombre', nombreChofer);
        }
    }

    async function actualizar() {
        const { data } = await _s.from('conductores').select('*').eq('nombre', nombreChofer).single();
        if (data) {
            document.getElementById('pax-count').innerText = `${data.pasajeros_actuales}/4`;
            document.getElementById('viajes-hoy').innerText = data.viajes_realizados || 0;
            document.getElementById('caja-hoy').innerText = "$" + ((data.viajes_realizados || 0) * 1000);
            document.getElementById('sentido-tag').innerText = "SENTIDO: " + data.sentido.toUpperCase();
        }
    }

    async function liberarAsiento() {
        const { data } = await _s.from('conductores').select('*').eq('nombre', nombreChofer).single();
        if (data.pasajeros_actuales > 0) {
            await _s.from('conductores').update({ 
                pasajeros_actuales: data.pasajeros_actuales - 1,
                viajes_realizados: (data.viajes_realizados || 0) + 1 
            }).eq('nombre', nombreChofer);
        }
    }

    async function cambiarSentido() {
        const { data } = await _s.from('conductores').select('sentido').eq('nombre', nombreChofer).single();
        const nuevo = data.sentido === "ida" ? "vuelta" : "ida";
        if (confirm("¿Cambiar sentido? Se vaciarán asientos.")) {
            await _s.from('conductores').update({ sentido: nuevo, pasajeros_actuales: 0 }).eq('nombre', nombreChofer);
        }
    }

    initMap();
    actualizar();
    _s.channel('cambios-pro').on('postgres_changes', { event: '*', table: 'conductores' }, () => actualizar()).subscribe();
</script>

</body>
</html>
