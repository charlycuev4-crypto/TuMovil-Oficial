<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONDUCTOR - Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .overlay { position: absolute; z-index: 1000; width: 100%; display: flex; flex-direction: column; align-items: center; bottom: 20px; }
        .card { background: #000; border: 2.5px solid #00d4ff; border-radius: 20px; padding: 15px; width: 95%; text-align: center; }
        .asientos-grid { display: flex; gap: 12px; justify-content: center; margin-bottom: 10px; }
        .btn-as { width: 60px; height: 60px; border-radius: 15px; border: 2px solid #00d4ff; background: transparent; color: #00d4ff; font-weight: bold; font-size: 22px; }
        .ocupado { background: #ff3b30 !important; border-color: #ff3b30 !important; color: white !important; }
        .btn-reset { background: #ff3b30; color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="overlay">
        <div class="card">
            <div class="asientos-grid">
                <button id="as1" class="btn-as">1</button>
                <button id="as2" class="btn-as">2</button>
                <button id="as3" class="btn-as">3</button>
                <button id="as4" class="btn-as">4</button>
            </div>
            <button class="btn-reset" onclick="resetGlobal()">Resetear Todos los Asientos</button>
        </div>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-34.561264, -58.770506], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const busIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [40, 40] });
    let markerBus = L.marker([-34.561264, -58.770506], { icon: busIcon }).addTo(map);

    // GPS REAL
    navigator.geolocation.watchPosition(p => {
        const lat = p.coords.latitude;
        const lon = p.coords.longitude;
        markerBus.setLatLng([lat, lon]);
        map.panTo([lat, lon]);
        _s.from('estado_movil').update({ latitud: lat, longitud: lon }).eq('id', 1).then();
    }, null, { enableHighAccuracy: true });

    async function resetGlobal() {
        await _s.from('estado_movil').update({ asientos_libres: 4 }).eq('id', 1);
    }

    _s.channel('cambios_c').on('postgres_changes', {event:'UPDATE', schema:'public', table:'estado_movil'}, r => {
        const ocup = 4 - r.new.asientos_libres;
        for(let i=1; i<=4; i++) {
            document.getElementById('as'+i).className = 'btn-as ' + (i <= ocup ? 'ocupado' : '');
        }
    }).subscribe();
</script>
</body>
</html>
