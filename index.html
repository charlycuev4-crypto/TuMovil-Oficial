<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let activo = false;
    const PRECIO_ASIENTO = 1000;
    
    // Referencias globales para marcadores
    let markerPasajeroOrigen = null;
    let markerPasajeroDestino = null;
    let markerBus = null;
    let paradasRuta = [];

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-34.561128, -58.770586], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Iconos actualizados
    const busIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [40, 40] });
    const paxIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/2813/2813004.png', iconSize: [35, 35] }); // Origen
    const destIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/149/149060.png', iconSize: [35, 35] }); // Destino

    // 1. CARGAR RUTA Y PUNTOS DE PARADA
    async function cargarRuta() {
        const { data: paradas } = await _s.from('paradas').select('*').order('orden', { ascending: true });
        if(paradas) {
            paradasRuta = paradas.map(p => [p.latitud, p.longitud]);
            L.polyline(paradasRuta, {color: '#00d4ff', weight: 4, opacity: 0.5}).addTo(map);
            
            paradas.forEach(p => {
                L.circleMarker([p.latitud, p.longitud], {
                    radius: 5, fillColor: '#007AFF', color: '#FFF', weight: 2, fillOpacity: 0.8
                }).addTo(map);
            });
        }
    }

    // 2. SINCRONIZACIÓN EN TIEMPO REAL
    function sincronizarRealTime() {
        // Carga inicial
        _s.from('estado_movil').select('*').eq('id', 1).single().then(({data}) => {
            if(data) {
                actualizarInterfaz(data);
                // Inicializar marcador del bus en la última posición conocida
                if(!markerBus) markerBus = L.marker([data.latitud, data.longitud], { icon: busIcon }).addTo(map);
            }
        });

        // Suscripción a cambios
        _s.channel('cambios-chofer').on('postgres_changes', {event:'UPDATE', schema:'public', table:'estado_movil'}, payload => {
            actualizarInterfaz(payload.new);
        }).subscribe();
    }

    function actualizarInterfaz(data) {
        // Actualizar visualización de asientos y dinero
        const ocupados = 4 - data.asientos_libres;
        document.getElementById('v-pax').innerText = ocupados;
        document.getElementById('v-dinero').innerText = ocupados * PRECIO_ASIENTO;
        
        for(let i=1; i<=4; i++) {
            const btn = document.getElementById('b' + i);
            btn.className = i <= ocupados ? 'btn-as ocupado' : 'btn-as';
        }

        // LÓGICA DE DESTINO Y ORIGEN (ESTO ES LO FUNDAMENTAL)
        // Verificamos si hay coordenadas de destino activas
        if (data.pasa_lat_destino && data.pasa_lng_destino) {
            const posDest = [data.pasa_lat_destino, data.pasa_lng_destino];
            const posOri = [data.pasa_lat_origen, data.pasa_lng_origen];

            // Marcador de Recogida (Origen)
            if (markerPasajeroOrigen) {
                markerPasajeroOrigen.setLatLng(posOri);
            } else {
                markerPasajeroOrigen = L.marker(posOri, {icon: paxIcon}).addTo(map).bindPopup("RECOGER AQUÍ");
            }

            // Marcador de Destino
            if (markerPasajeroDestino) {
                markerPasajeroDestino.setLatLng(posDest);
            } else {
                markerPasajeroDestino = L.marker(posDest, {icon: destIcon}).addTo(map).bindPopup("DESTINO FINAL");
            }
        } else {
            // SI LAS COORDENADAS SON NULL, LIMPIAMOS EL MAPA
            if (markerPasajeroOrigen) { map.removeLayer(markerPasajeroOrigen); markerPasajeroOrigen = null; }
            if (markerPasajeroDestino) { map.removeLayer(markerPasajeroDestino); markerPasajeroDestino = null; }
        }
    }

    async function setEstado(v) {
        activo = v;
        document.getElementById('btn-on').className = v ? 'btn-control btn-start active' : 'btn-control btn-start';
        document.getElementById('btn-off').className = v ? 'btn-control btn-end' : 'btn-control btn-end active';
        
        // Actualizar estado de servicio y resetear si se apaga (opcional)
        await _s.from('estado_movil').update({ en_servicio: v }).eq('id', 1);
        if(v) alert("Modo Conductor Activado - Compartiendo ubicación");
    }

    // SEGUIMIENTO GPS DEL CONDUCTOR
    navigator.geolocation.watchPosition(p => { 
        if(!activo) return;
        const pos = [p.coords.latitude, p.coords.longitude];
        
        if(markerBus) markerBus.setLatLng(pos);
        map.panTo(pos);

        // Actualizar ubicación en Supabase para que el pasajero la vea
        _s.from('estado_movil').update({ 
            latitud: pos[0], 
            longitud: pos[1],
            ultima_actualizacion: new Date().toISOString()
        }).eq('id', 1);
    }, err => console.error(err), { enableHighAccuracy: true, maximumAge: 0 });

    window.onload = () => {
        cargarRuta();
        sincronizarRealTime();
        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; 
            setTimeout(() => document.getElementById('splash').style.display='none', 500); 
        }, 2000);
    };
</script>
