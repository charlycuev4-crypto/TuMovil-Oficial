<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONDUCTOR - TuMovil Oficial</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; overflow: hidden; }
        #map { height: 70vh; width: 100%; }
        .panel-conductor { height: 30vh; padding: 10px; background: #1e1e1e; border-top: 4px solid #ffd700; box-sizing: border-box; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 10px; }
        .stat-box { background: #2a2a2a; padding: 8px; border-radius: 10px; text-align: center; width: 45%; border: 1px solid #333; }
        .stat-box h3 { margin: 0; font-size: 12px; color: #ffd700; text-transform: uppercase; }
        .stat-box p { margin: 5px 0 0; font-size: 22px; font-weight: bold; }
        .btn-finalizar { width: 100%; padding: 15px; background: #ff4444; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 15px rgba(255,68,68,0.3); }
        .taxi-icon { font-size: 25px; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="map"></div>

<div class="panel-conductor">
    <div class="stats">
        <div class="stat-box">
            <h3>Recaudación</h3>
            <p id="recaudacion">$0</p>
        </div>
        <div class="stat-box">
            <h3>Asientos</h3>
            <p id="cant-pasajeros">0 / 4</p>
        </div>
    </div>
    <button class="btn-finalizar" onclick="if(confirm('¿Vaciar asientos y terminar viaje?')) location.reload();">
        FINALIZAR RECORRIDO
    </button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Configuración inicial del mapa
    const map = L.map('map').setView([-34.566, -58.742], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 📍 LAS 23 PARADAS (Asegurate de que estas sean tus coordenadas exactas)
    const paradasCoords = [
        [-34.56942, -58.73781], [-34.56900, -58.73850], [-34.56850, -58.73950],
        [-34.56800, -58.74050], [-34.56750, -58.74150], [-34.56700, -58.74250],
        [-34.56650, -58.74350], [-34.56600, -58.74450], [-34.56550, -58.74550],
        [-34.56500, -58.74650], [-34.56450, -58.74750], [-34.56400, -58.74850],
        [-34.56350, -58.74950], [-34.56300, -58.75050], [-34.56250, -58.75150],
        [-34.56200, -58.75250], [-34.56150, -58.75350], [-34.56100, -58.75450],
        [-34.56050, -58.75550], [-34.56000, -58.75650], [-34.55950, -58.75750],
        [-34.55900, -58.75850], [-34.55850, -58.75950]
    ];

    // Trazar la línea roja (Ruta Completa)
    const rutaRoja = L.polyline(paradasCoords, {
        color: '#ff0000',
        weight: 5,
        opacity: 0.8,
        lineCap: 'round'
    }).addTo(map);

    // Dibujar los puntitos de cada parada
    paradasCoords.forEach((coord, i) => {
        L.circleMarker(coord, {
            radius: 4,
            fillColor: "white",
            color: "red",
            weight: 2,
            fillOpacity: 1
        }).addTo(map);
    });

    // Marcador del Taxi (Tu posición)
    const iconTaxi = L.divIcon({ html: '🚕', className: 'taxi-icon', iconAnchor: [12, 12] });
    L.marker(paradasCoords[0], {icon: iconTaxi}).addTo(map);

    // Ajustar vista para ver todo el recorrido
    map.fitBounds(rutaRoja.getBounds());
</script>
</body>
</html>
