<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Conductor - Oficial</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #000; 
            color: #fff; 
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Ocupa todo el alto del celular */
            overflow: hidden;
        }

        /* Sección de Recaudación (Tus cuadraditos amarillos) */
        .header-stats {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            border-bottom: 2px solid #FFD700;
        }
        .stat-box { text-align: center; }
        .stat-label { color: #FFD700; font-size: 10px; text-transform: uppercase; font-weight: bold; }
        .stat-value { font-size: 22px; font-weight: bold; display: block; }

        /* Controles: Switch y Sentido */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: #111;
        }
        .btn-sentido {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        /* EL MAPA: Aquí estaba el error. Necesita altura flexible */
        #map { 
            flex-grow: 1; /* Esto obliga al mapa a ocupar todo el espacio central */
            width: 100%;
            background: #222; /* Fondo gris oscuro mientras carga */
        }

        /* Sección inferior: Asientos */
        .footer-cabin {
            padding: 10px;
            background: #000;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="header-stats">
        <div class="stat-box">
            <span class="stat-label">Recaudación</span>
            <span id="recaudacion-total" class="stat-value">$0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Pasajeros</span>
            <span id="pax-total" class="stat-value">0</span>
        </div>
    </div>

    <div class="controls">
        <div style="display:flex; align-items:center; gap:8px;">
            <input type="checkbox" id="check-linea" checked onchange="toggleMap()">
            <span style="color:#4cd964; font-size:12px; font-weight:bold;">EN LÍNEA</span>
        </div>
        <button class="btn-sentido">HACIA: IDA</button>
    </div>

    <div id="map"></div>

    <div class="footer-cabin">
        <div style="color:#FFD700; font-size:11px; margin-bottom:5px;">ESTADO DE CABINA:</div>
        <div id="grid-asientos" style="display:grid; grid-template-columns:repeat(4, 1fr); gap:10px;">
            </div>
    </div>

<script>
    // Inicializar el mapa con una vista por defecto
    var map = L.map('map', { 
        zoomControl: false,
        attributionControl: false 
    }).setView([-34.5612, -58.7705], 15);

    // CAPA DE MAPA (Tiles): Sin esto se ve negro
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    // Forzar re-render del mapa después de cargar
    setTimeout(function(){ map.invalidateSize(); }, 500);

    function toggleMap() {
        const isOnline = document.getElementById('check-linea').checked;
        const mapDiv = document.getElementById('map');
        mapDiv.style.opacity = isOnline ? "1" : "0.3";
        mapDiv.style.filter = isOnline ? "none" : "grayscale(100%)";
    }

    // Dibujar la ruta de IDA (Las 25 paradas)
    const puntosIda = [
        [-34.561264, -58.770506], [-34.562160, -58.771380], [-34.562494, -58.772133],
        [-34.563541, -58.773244], [-34.564109, -58.773759], [-34.565342, -58.772061],
        [-34.567268, -58.769484], [-34.569090, -58.767095], [-34.571016, -58.764443],
        [-34.571956, -58.763201], [-34.577371, -58.755909], [-34.578528, -58.757064],
        [-34.579296, -58.755864], [-34.580020, -58.755063], [-34.580901, -58.753842],
        [-34.581998, -58.752441], [-34.583319, -58.750710], [-34.584740, -58.748804],
        [-34.585554, -58.749812], [-34.586494, -58.750574], [-34.588041, -58.751542],
        [-34.588273, -58.751338], [-34.588771, -58.750804], [-34.588244, -58.749877],
        [-34.588930, -58.750543]
    ];

    L.polyline(puntosIda, {color: '#00d4ff', weight: 5}).addTo(map);
</script>
</body>
</html>
