<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; --success: #28a745; --danger: #dc3545; --azul-dest: #007AFF; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.8s ease; }
        .header { background: var(--panel); border-bottom: 2px solid var(--celeste); padding: 10px; text-align: center; }
        .header h1 { margin: 0; font-size: 18px; color: var(--celeste); }
        #map { flex-grow: 1; width: 100%; }
        .bottom-ui { background: var(--panel); border-top: 2px solid var(--celeste); padding: 15px; border-radius: 25px 25px 0 0; z-index: 100; box-shadow: 0 -10px 25px rgba(0,0,0,0.5); }
        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 8px; }
        .btn-pedir { background: var(--success); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; }
        .btn-cancelar { background: var(--danger); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; display: none; }
    </style>
</head>
<body>
    <div id="splash"><h2 style="color: var(--celeste);">TUMOVIL</h2></div>
    <div class="header"><h1>TU MOVIL - PASAJERO</h1></div>
    <div id="map"></div>
    <div class="bottom-ui">
        <input type="text" id="nombre-input" placeholder="Tu Nombre" maxlength="15">
        <select id="destino-select"><option value="" disabled selected>¿A qué parada vas?</option></select>
        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViaje()">RESERVAR ASIENTO</button>
        <button class="btn-cancelar" id="btn-cancelar" onclick="finalizarViaje()">TERMINAR VIAJE</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    // Las paradas deben coincidir exactamente con las del conductor
    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    paradas.forEach((p, i) => { 
        L.circleMarker(p.c, { radius: 5, color: '#00d2ff' }).addTo(map);
        document.getElementById('destino-select').add(new Option(p.n, i));
    });

    let miLat = 0, miLon = 0;
    navigator.geolocation.watchPosition(p => {
        miLat = p.coords.latitude; miLon = p.coords.longitude;
        document.getElementById('splash').style.display = 'none';
    }, null, { enableHighAccuracy: true });

    async function confirmarViaje() {
        const nom = document.getElementById('nombre-input').value;
        const dest = document.getElementById('destino-select').value;
        if(!nom || !dest) return alert("Completa tu nombre y destino");

        // Llamamos a la función V2 que ya tienes en Supabase
        const { data, error } = await _s.rpc('pasajero_realizar_reserva_v2', {
            p_id_movil: 1, // ID fijo para Coche 01
            p_asiento_num: 1, // Por ahora el 1
            p_nombre: nom,
            p_destino_idx: parseInt(dest),
            p_lat: miLat,
            p_lon: miLon
        });

        if (error) alert("Error: " + error.message);
        else {
            localStorage.setItem('p_nombre', nom);
            document.getElementById('btn-pedir').style.display = 'none';
            document.getElementById('btn-cancelar').style.display = 'block';
            alert("Reserva realizada");
        }
    }

    async function finalizarViaje() {
        const nom = localStorage.getItem('p_nombre');
        const { error } = await _s.rpc('finalizar_reserva_segura', { p_nombre: nom });
        if(!error) location.reload();
    }
</script>
</body>
</html>
