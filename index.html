<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASAJERO - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Estilos simplificados para asegurar que el botón sea visible y clickeable */
        body { margin: 0; background: #000; font-family: sans-serif; color: white; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .ui-overlay { position: absolute; bottom: 20px; width: 100%; z-index: 1000; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        .selector-sentido { background: rgba(0,0,0,0.9); padding: 15px; border-radius: 20px; border: 2px solid #FFD700; width: 90%; max-width: 400px; }
        select { width: 100%; padding: 12px; border-radius: 10px; background: #222; color: #FFD700; border: 1px solid #FFD700; font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        
        #btn-seleccionar { 
            background: #4cd964; color: black; border: none; padding: 18px; 
            border-radius: 15px; font-weight: 900; font-size: 18px; width: 100%; 
            cursor: pointer; box-shadow: 0 4px 15px rgba(76,217,100,0.4);
            transition: transform 0.1s;
        }
        #btn-seleccionar:active { transform: scale(0.95); }
        
        .toast { position: fixed; top: 50px; left: 50%; transform: translateX(-50%); background: #ff3b30; color: white; padding: 12px 20px; border-radius: 20px; z-index: 10001; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>
<div id="map"></div>

<div class="ui-overlay">
    <div class="selector-sentido">
        <label style="display:block; margin-bottom: 8px; font-size: 12px; font-weight: bold; color: #FFD700;">¿HACIA DÓNDE VAS?</label>
        <select id="select-trayecto">
            <option value="IDA">Hacia IDA (Abasto y Roca)</option>
            <option value="VUELTA">Hacia VUELTA (Miguel Cané)</option>
        </select>
        <button id="btn-seleccionar" onclick="buscarViaje()">SELECCIONAR VIAJE</button>
    </div>
</div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    const map = L.map('map', { zoomControl: false }).setView([-34.57, -58.76], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function mostrarError(txt) {
        const t = document.getElementById('toast');
        t.innerText = txt;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    async function buscarViaje() {
        const btn = document.getElementById('btn-seleccionar');
        const trayecto = document.getElementById('select-trayecto').value; // Retorna "IDA" o "VUELTA"
        
        btn.innerText = "BUSCANDO...";
        btn.style.opacity = "0.7";
        btn.disabled = true;

        try {
            console.log("Filtrando por sentido:", trayecto);

            // CORRECCIÓN CRÍTICA: Filtro exacto para coincidir con el conductor
            const { data: moviles, error } = await _s
                .from('estado_movil')
                .select('*')
                .eq('esta_online', true)
                .eq('en_servicio', true)
                .eq('sentido_flujo', trayecto) // Coincidencia exacta con el botón del conductor
                .gt('asientos_libres', 0);

            if (error) throw error;

            if (!moviles || moviles.length === 0) {
                mostrarError("No hay coches disponibles hacia " + trayecto);
            } else {
                // Aquí iría tu lógica para mostrar el coche en el mapa
                alert("¡Coche encontrado! Movil ID: " + moviles[0].id);
                // Dibujar marcador, etc.
            }

        } catch (err) {
            console.error(err);
            mostrarError("Error de conexión");
        } finally {
            btn.innerText = "SELECCIONAR VIAJE";
            btn.style.opacity = "1";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
