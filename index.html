<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chofer - Panel de Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .overlay { position: absolute; z-index: 1000; width: 100%; display: flex; flex-direction: column; align-items: center; padding: 10px; box-sizing: border-box; }
        .bottom { bottom: 20px; }
        .card { background: #000; border: 2px solid #00d4ff; border-radius: 20px; padding: 15px; width: 95%; box-shadow: 0 0 15px rgba(0,212,255,0.4); text-align: center; }
        .asientos-grid { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; }
        .btn-as { width: 55px; height: 55px; border-radius: 12px; border: 2px solid #00d4ff; background: transparent; color: #00d4ff; font-weight: bold; font-size: 20px; }
        .ocupado { background: #ff3b30 !important; border-color: #ff3b30 !important; color: white !important; }
        .btn-reset { background: #ff3b30; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 5px; text-transform: uppercase; cursor: pointer; }
        .label-chofer { color: #00d4ff; font-size: 10px; font-weight: bold; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="overlay bottom">
        <div class="card">
            <span class="label-chofer">CONTROL DE ASIENTOS</span>
            <div class="asientos-grid">
                <button id="as1" class="btn-as">1</button>
                <button id="as2" class="btn-as">2</button>
                <button id="as3" class="btn-as">3</button>
                <button id="as4" class="btn-as">4</button>
            </div>
            <button class="btn-reset" onclick="finalizarViaje()">Finalizar Viaje (Reset)</button>
        </div>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    // Tu ruta de 26 paradas
    const paradas = [{n:'M. Cané', c:[-34.561128, -58.770586]}, {n:'Cruce Castelar', c:[-34.586030, -58.747278]}]; // (Carga las 26 paradas aquí)

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Imagen del colectivo (Icono que se mueve)
    const busIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png',
        iconSize: [40, 40],
        iconAnchor: [20, 20]
    });

    let markerBus = L.marker(paradas[0].c, { icon: busIcon }).addTo(map);

    // GPS del Chofer
    navigator.geolocation.watchPosition(p => {
        const lat = p.coords.latitude;
        const lon = p.coords.longitude;
        markerBus.setLatLng([lat, lon]);
        map.panTo([lat, lon]);
        _s.from('estado_movil').update({ latitud: lat, longitud: lon }).eq('id', 1).then();
    }, null, { enableHighAccuracy: true });

    // Botón de Limpieza
    async function finalizarViaje() {
        if(confirm("¿Deseas resetear los asientos? Esto limpiará la app de todos los pasajeros.")) {
            await _s.from('estado_movil').update({ asientos_libres: 4 }).eq('id', 1);
            alert("Sistema Limpio");
        }
    }

    // Monitor de asientos
    _s.channel('cambios').on('postgres_changes', {event:'UPDATE', schema:'public', table:'estado_movil'}, r => {
        const ocup = 4 - r.new.asientos_libres;
        for(let i=1; i<=4; i++) {
            document.getElementById('as'+i).className = 'btn-as ' + (i <= ocup ? 'ocupado' : '');
        }
    }).subscribe();
</script>
</body>
</html>
