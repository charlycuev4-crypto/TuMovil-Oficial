<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conductor - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; }
        #map { height: 60vh; width: 100%; position: relative; }
        
        /* UI Flotante */
        .controls { position: absolute; bottom: 10px; left: 5%; width: 90%; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn-online { background: #4cd964; color: black; }
        .btn-offline { background: #ff3b30; color: white; }
        .btn-sentido { background: #FFD700; color: black; }

        .pax-list { background: #111; padding: 15px; max-height: 30vh; overflow-y: auto; border-top: 2px solid #FFD700; }
        .pax-item { background: #222; margin-bottom: 8px; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #4cd964; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="controls">
        <button id="btn-status" class="btn btn-online" onclick="toggleServicio()">ESTADO: EN LÍNEA</button>
        <button id="btn-sentido" class="btn btn-sentido" onclick="cambiarSentido()">HACIA: ABASTO (IDA)</button>
    </div>

    <div class="pax-list">
        <h3 style="margin-top:0; color:#FFD700">Pasajeros (0/4)</h3>
        <div id="lista-pax">Esperando pasajeros...</div>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    // 25 PARADAS (Misma lista del pasajero para efecto espejo)
    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]}, {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]}, {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]}, {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]}, {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]}, {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]}, {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]}, {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]}, {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]}, {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]}, {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]}, {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]}, {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    let idMovil = 1;
    let enServicio = true;
    let esIda = true;

    // Inicializar Mapa
    let map = L.map('map', {zoomControl: false}).setView(paradas[0].c, 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Dibujar la Ruta Celeste
    L.polyline(paradas.map(p => p.c), {color: '#00d4ff', weight: 6, opacity: 0.8}).addTo(map);

    // Dibujar Paradas con Borde Negro
    paradas.forEach(p => {
        L.circleMarker(p.c, { radius: 7, color: '#000', weight: 3, fillColor: '#fff', fillOpacity: 1 }).addTo(map);
    });

    // Icono del Taxi
    let markerAuto = L.marker(paradas[0].c, {
        icon: L.divIcon({ html: '<div style="font-size:30px;">🚕</div>', className: '' })
    }).addTo(map);

    // GPS REAL: Mueve el auto y actualiza Supabase
    navigator.geolocation.watchPosition(async p => {
        if (!enServicio) return;
        const pos = [p.coords.latitude, p.coords.longitude];
        markerAuto.setLatLng(pos);
        map.panTo(pos);

        await _s.from('estado_movil').update({ 
            latitud: pos[0], longitud: pos[1], en_servicio: true 
        }).eq('id', idMovil);
    }, null, { enableHighAccuracy: true });

    // Botón Fuera de Línea
    async function toggleServicio() {
        enServicio = !enServicio;
        const btn = document.getElementById('btn-status');
        btn.innerText = enServicio ? "ESTADO: EN LÍNEA" : "ESTADO: FUERA DE LÍNEA";
        btn.className = enServicio ? "btn btn-online" : "btn btn-offline";
        
        await _s.from('estado_movil').update({ en_servicio: enServicio }).eq('id', idMovil);
    }

    function cambiarSentido() {
        esIda = !esIda;
        document.getElementById('btn-sentido').innerText = esIda ? "HACIA: ABASTO (IDA)" : "HACIA: CANÉ (VUELTA)";
        cargarPasajeros();
    }

    async function cargarPasajeros() {
        const { data } = await _s.from('reservas_activas').select('*').eq('id_movil', idMovil).eq('estado', 'en_curso');
        const lista = document.getElementById('lista-pax');
        lista.innerHTML = "";
        data.forEach(p => {
            lista.innerHTML += `
                <div class="pax-item">
                    <span><b>${p.nombre_pasajero}</b> - Asiento ${p.asiento_num}</span>
                    <button onclick="finalizarViaje(${p.id})" style="padding:5px">OK</button>
                </div>`;
        });
    }

    async function finalizarViaje(id) {
        await _s.from('reservas_activas').delete().eq('id', id);
        cargarPasajeros();
    }

    setInterval(cargarPasajeros, 3000);
</script>
</body>
</html>
