<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - Control Conductor Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; color: white; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        /* Encabezado Principal */
        .header-conductor {
            position: absolute; top: 0; width: 100%; background: #111;
            padding: 12px 15px; z-index: 1000; display: flex; 
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid #FFD700; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .header-title { color: #FFD700; font-weight: 900; letter-spacing: 1px; font-size: 16px; }

        /* Switch Estilo iOS */
        .switch-container { display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: bold; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4cd964; }
        input:checked + .slider:before { transform: translateX(22px); }

        /* Cajas de Estadísticas */
        .stats-grid {
            position: absolute; top: 70px; width: 100%; display: flex;
            justify-content: space-around; padding: 0 10px; z-index: 1000;
        }
        .card-stat {
            background: rgba(20, 20, 20, 0.95); border: 2px solid #00d4ff;
            border-radius: 12px; padding: 12px; width: 46%; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .card-label { font-size: 10px; color: #aaa; text-transform: uppercase; margin-bottom: 4px; font-weight: bold; }
        .card-value { font-size: 22px; font-weight: 900; color: #4cd964; }

        /* Botón Inferior */
        .footer-action { position: absolute; bottom: 25px; width: 100%; padding: 0 20px; z-index: 1000; }
        .btn-main-action {
            width: 100%; padding: 18px; background: #ff3b30; color: white;
            border: none; border-radius: 15px; font-weight: 900; font-size: 16px;
            box-shadow: 0 6px 20px rgba(255, 59, 48, 0.4); text-transform: uppercase;
        }
        .taxi-marker { font-size: 30px; filter: drop-shadow(0 0 5px gold); }
    </style>
</head>
<body>

    <div class="header-conductor">
        <div class="header-title">CONTROL MÓVIL 1</div>
        <div class="switch-container">
            <span id="txt-status">FUERA DE LÍNEA</span>
            <label class="switch">
                <input type="checkbox" id="check-online" onchange="actualizarEstadoLinea()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="stats-grid">
        <div class="card-stat">
            <div class="card-label">Recaudado</div>
            <div id="val-recaudado" class="card-value">$0</div>
        </div>
        <div class="card-stat">
            <div class="card-label">Pasajeros</div>
            <div id="val-pax" class="card-value">0/4</div>
        </div>
    </div>

    <div id="map"></div>

    <div class="footer-action">
        <button class="btn-main-action" onclick="finalizarJornada()">Finalizar Viaje / Vaciar</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    // CONFIGURACIÓN DE RUTA (Paradas)
    const rutaOficial = [
        {n:'Miguel Cané', c:[-34.561128, -58.770586]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false }).setView([-34.577, -58.755], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // DIBUJAR PUNTOS DE PARADA (CIRCULOS AMARILLOS)
    L.polyline(rutaOficial.map(p => p.c), { color: '#FFD700', weight: 3, opacity: 0.3 }).addTo(map);
    rutaOficial.forEach(p => {
        L.circleMarker(p.c, { 
            radius: 5, color: '#FFD700', fillColor: '#000', fillOpacity: 1, weight: 2 
        }).addTo(map);
    });

    let markerTaxi = L.marker([0,0], { 
        icon: L.divIcon({ html: '🚕', className: 'taxi-marker', iconAnchor: [15, 15] }) 
    }).addTo(map);

    let marcadoresPax = {};

    // 1. GPS Y ESTADO ONLINE
    async function actualizarEstadoLinea() {
        const isOnline = document.getElementById('check-online').checked;
        document.getElementById('txt-status').innerText = isOnline ? "CONECTADO" : "FUERA DE LÍNEA";
        document.getElementById('txt-status').style.color = isOnline ? "#4cd964" : "#ff3b30";
        
        await _s.from('estado_movil').update({ online: isOnline }).eq('id', 1);
    }

    navigator.geolocation.watchPosition(async p => {
        const lat = p.coords.latitude;
        const lon = p.coords.longitude;
        markerTaxi.setLatLng([lat, lon]);
        
        // Solo actualiza posición si está online (opcional)
        await _s.from('estado_movil').update({ latitud: lat, longitud: lon }).eq('id', 1);
    }, null, { enableHighAccuracy: true });

    // 2. SINCRONIZACIÓN CON ADMIN Y RESERVAS
    async function loopSincro() {
        const { data: reservas } = await _s.from('reservas_activas').select('*').eq('estado', 'en_curso');
        
        if (reservas) {
            document.getElementById('val-pax').innerText = `${reservas.length}/4`;
            document.getElementById('val-recaudado').innerText = `$${reservas.length * 1000}`;

            // Limpiar marcadores viejos
            const idsNuevos = reservas.map(r => r.id);
            Object.keys(marcadoresPax).forEach(id => {
                if (!idsNuevos.includes(parseInt(id))) {
                    map.removeLayer(marcadoresPax[id]);
                    delete marcadoresPax[id];
                }
            });

            // Dibujar Pasajeros
            reservas.forEach(r => {
                if (!marcadoresPax[r.id]) {
                    marcadoresPax[r.id] = L.marker([r.lat_pax, r.lon_pax], {
                        icon: L.divIcon({ 
                            html: `<div style="background:#4cd964; border:2px solid #000; border-radius:50%; width:24px; height:24px; text-align:center; font-weight:bold; color:black; line-height:24px;">${r.asiento_num}</div>`,
                            className: ''
                        })
                    }).addTo(map);
                }
            });
        }
    }

    setInterval(loopSincro, 4000);

    async function finalizarJornada() {
        if (!confirm("¿Deseas vaciar todos los asientos y finalizar los viajes?")) return;
        await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('estado', 'en_curso');
        loopSincro();
    }
</script>
</body>
</html>
