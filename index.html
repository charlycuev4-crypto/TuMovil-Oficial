<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TU MÓVIL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .asiento { padding: 25px; border-radius: 12px; border: 2px solid #444; font-weight: bold; background: #2a2a2a; cursor: pointer; }
        .libre { background: #27ae60 !important; }
        .ocupado { background: #e74c3c !important; }
        #gps { margin-top: 30px; color: #00ff00; font-size: 14px; }
    </style>
</head>
<body>
    <div class="grid">
        <div id="a1" class="asiento" onclick="tocar(1)">A1<br><small id="t1">...</small></div>
        <div id="a2" class="asiento" onclick="tocar(2)">A2<br><small id="t2">...</small></div>
        <div id="a3" class="asiento" onclick="tocar(3)">A3<br><small id="t3">...</small></div>
        <div id="a4" class="asiento" onclick="tocar(4)">A4<br><small id="t4">...</small></div>
    </div>
    <div id="gps">🛰️ Buscando GPS...</div>

    <script>
        const URL = 'https://nvumdlxervrewqiiaicl.supabase.co';
        const KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52dW1kbHhlcnZyZXdxaWlhaWNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTA4NTMsImV4cCI6MjA4OTg4Njg1M30.ejh7dtL2O6JJeoVq47cUK_hXAfRetJPyzks1yI-Lrhs';
        const supabase = window.supabase.createClient(URL, KEY);

        async function cargar() {
            const { data, error } = await supabase.from('asientos').select('*').order('id_asiento');
            if (error) return;
            data.forEach(as => {
                const div = document.getElementById('a' + as.id_asiento);
                const txt = document.getElementById('t' + as.id_asiento);
                div.className = 'asiento ' + (as.estado === 'ocupado' ? 'ocupado' : 'libre');
                txt.innerText = as.estado.toUpperCase();
            });
        }

        async function tocar(id) {
            const div = document.getElementById('a' + id);
            const nuevo = div.classList.contains('libre') ? 'ocupado' : 'libre';
            await supabase.from('asientos').update({ estado: nuevo }).eq('id_asiento', id);
            cargar();
        }

        navigator.geolocation.watchPosition(p => {
            document.getElementById('gps').innerText = `🛰️ GPS: ${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}`;
        }, null, { enableHighAccuracy: true });

        cargar();
        setInterval(cargar, 3000);
    </script>
</body>
</html>
