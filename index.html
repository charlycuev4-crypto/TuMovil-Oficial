<script>
    // 1. DECLARACIÓN GLOBAL DE VARIABLES
    let _s, map, markerBus;
    let activo = false;
    let markerPasajeroOrigen = null;
    let markerPasajeroDestino = null;
    const PRECIO_ASIENTO = 1000;

    // 2. FUNCIÓN DE INICIO (Se ejecuta solo cuando el HTML está listo)
    function inicializarApp() {
        try {
            // Inicializar Supabase
            _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

            // Inicializar Mapa
            map = L.map('map', { 
                zoomControl: false, 
                attributionControl: false 
            }).setView([-34.561128, -58.770586], 15);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // Iconos
            const busIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [40, 40] });
            markerBus = L.marker([-34.561128, -58.770586], { icon: busIcon }).addTo(map);

            // Cargar datos iniciales
            cargarRuta();
            sincronizarRealTime();

            // Quitar pantalla de carga
            const splash = document.getElementById('splash');
            if(splash) splash.style.display = 'none';

            console.log("App Conductor iniciada correctamente");
        } catch (error) {
            console.error("Error crítico al iniciar:", error);
            alert("Error al cargar el mapa. Revisa la conexión.");
        }
    }

    // 3. CARGAR RUTA (PUNTOS AZULES)
    async function cargarRuta() {
        try {
            const { data: paradas } = await _s.from('paradas').select('*').order('orden', { ascending: true });
            if(paradas) {
                const puntos = paradas.map(p => [p.latitud, p.longitud]);
                L.polyline(puntos, {color: '#00d4ff', weight: 4, opacity: 0.5}).addTo(map);
                paradas.forEach(p => {
                    L.circleMarker([p.latitud, p.longitud], {
                        radius: 5, fillColor: '#007AFF', color: '#FFF', weight: 2, fillOpacity: 0.8
                    }).addTo(map);
                });
            }
        } catch (e) { console.warn("No se pudo cargar la ruta"); }
    }

    // 4. SINCRONIZACIÓN Y ACTUALIZACIÓN DE INTERFAZ
    function sincronizarRealTime() {
        // Carga inicial
        _s.from('estado_movil').select('*').eq('id', 1).single().then(({data}) => {
            if(data) actualizarInterfaz(data);
        });

        // Escucha cambios
        _s.channel('cambios-chofer').on('postgres_changes', {event:'UPDATE', schema:'public', table:'estado_movil'}, payload => {
            if (payload.new) actualizarInterfaz(payload.new);
        }).subscribe();
    }

    function actualizarInterfaz(data) {
        try {
            const ocupados = Math.max(0, 4 - (data.asientos_libres || 4));
            
            // Actualizar textos
            if(document.getElementById('v-pax')) document.getElementById('v-pax').innerText = ocupados;
            if(document.getElementById('v-dinero')) document.getElementById('v-dinero').innerText = ocupados * PRECIO_ASIENTO;
            
            // Actualizar botones de asientos
            for(let i=1; i<=4; i++) {
                const btn = document.getElementById('b' + i);
                if (btn) {
                    if (data.asientos_libres === 4 || !data.pasa_lat_origen) {
                        btn.className = 'btn-as';
                    } else {
                        btn.className = i <= ocupados ? 'btn-as ocupado' : 'btn-as';
                    }
                }
            }

            // Marcadores de Pasajero
            if (data.pasa_lat_origen && ocupados > 0) {
                const paxIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/2813/2813004.png', iconSize: [35, 35] });
                const destIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/149/149060.png', iconSize: [35, 35] });

                if (!markerPasajeroOrigen) markerPasajeroOrigen = L.marker([data.pasa_lat_origen, data.pasa_lng_origen], {icon: paxIcon}).addTo(map);
                else markerPasajeroOrigen.setLatLng([data.pasa_lat_origen, data.pasa_lng_origen]);

                if (data.pasa_lat_destino) {
                    if (!markerPasajeroDestino) markerPasajeroDestino = L.marker([data.pasa_lat_destino, data.pasa_lng_destino], {icon: destIcon}).addTo(map);
                    else markerPasajeroDestino.setLatLng([data.pasa_lat_destino, data.pasa_lng_destino]);
                }
            } else {
                if (markerPasajeroOrigen) { map.removeLayer(markerPasajeroOrigen); markerPasajeroOrigen = null; }
                if (markerPasajeroDestino) { map.removeLayer(markerPasajeroDestino); markerPasajeroDestino = null; }
            }
        } catch (err) { console.error("Error en interfaz:", err); }
    }

    // 5. BOTONES DE ESTADO (INICIAR/FINALIZAR)
    async function setEstado(v) {
        activo = v;
        document.getElementById('btn-on').className = v ? 'btn-control btn-start active' : 'btn-control btn-start';
        document.getElementById('btn-off').className = v ? 'btn-control btn-end' : 'btn-control btn-end active';
        await _s.from('estado_movil').update({ en_servicio: v }).eq('id', 1);
    }

    // 6. GPS
    navigator.geolocation.watchPosition(p => { 
        if(!activo || !markerBus) return;
        const pos = [p.coords.latitude, p.coords.longitude];
        markerBus.setLatLng(pos); 
        map.panTo(pos);
        _s.from('estado_movil').update({ latitud: pos[0], longitud: pos[1] }).eq('id', 1);
    }, null, { enableHighAccuracy: true });

    // EJECUTAR AL CARGAR
    window.onload = inicializarApp;
</script>
