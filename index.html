<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conductor - Tu Móvil Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; background: #0c101d; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* 1. PANTALLA DE PRESENTACIÓN (Splash) */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0c101d; z-index: 9999; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.6s;
        }
        #splash img { width: 100%; height: 100%; object-fit: contain; } /* 'contain' para que no se corte la imagen */

        /* 2. MAPA */
        #map { flex-grow: 1; width: 100%; }

        /* 3. PANEL DE CONTROL (Más compacto para que entre el botón) */
        .panel { 
            background: #1c1c1e; padding: 10px; border-radius: 20px 20px 0 0; 
            margin-top: -15px; position: relative; z-index: 100;
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
        }

        .visor { background: #2c2c2e; border: 1px solid #444; border-radius: 8px; padding: 6px; text-align: center; }
        .visor-label { font-size: 9px; color: #8e8e93; text-transform: uppercase; }
        .visor-num { font-size: 18px; font-weight: bold; display: block; }
        .oro { color: #f1c40f; }

        .asientos-box { grid-column: span 2; display: flex; justify-content: center; gap: 8px; margin: 5px 0; }
        .btn-as { width: 45px; height: 45px; border: 2px solid #fff; border-radius: 10px; font-size: 18px; font-weight: bold; color: #fff; cursor: pointer; }
        .v { background: #28a745; } /* Libre (Verde) */
        .r { background: #dc3545; } /* Ocupado (Rojo) */

        .btn-pwr { grid-column: span 2; padding: 12px; border-radius: 25px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; }
        .on { background: #34c759; color: #fff; }
        .off { background: #ff3b30; color: #fff; display: none; }
    </style>
</head>
<body>

    <div id="splash">
        <img src="1000251835.jpg" alt="Logo">
    </div>

    <div id="map"></div>

    <div class="panel">
        <div class="visor">
            <span class="visor-label">TARIFA HOY</span>
            <span class="visor-num oro">$ <span id="val-dinero">0</span></span>
        </div>
        <div class="visor">
            <span class="visor-label">PASAJEROS</span>
            <span class="visor-num" id="val-pax">0</span>
        </div>

        <div class="asientos-box">
            <button id="b1" class="btn-as v" onclick="t(0)">1</button>
            <button id="b2" class="btn-as v" onclick="t(1)">2</button>
            <button id="b3" class="btn-as v" onclick="t(2)">3</button>
            <button id="b4" class="btn-as v" onclick="t(3)">4</button>
        </div>

        <button id="p-on" class="btn-pwr on" onclick="power(true)">▶️ INICIAR TURNO</button>
        <button id="p-off" class="btn-pwr off" onclick="power(false)">🛑 TERMINAR TURNO</button>
    </div>

<script>
    // 1. QUITAR SPLASH AUTOMÁTICAMENTE
    window.onload = () => { setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => document.getElementById('splash').remove(), 600); }, 2500); };

    // 2. CONEXIÓN (Mantenemos tus credenciales intactas)
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let activo = false;
    let recaudado = 0;
    let pasajeros = 0;
    let est = [true, true, true, true];

    // 3. ENCENDIDO / APAGADO
    function power(v) {
        activo = v;
        document.getElementById('p-on').style.display = v ? 'none' : 'block';
        document.getElementById('p-off').style.display = v ? 'block' : 'none';
        if(v) alert("Turno Iniciado");
    }

    // 4. LÓGICA DE ASIENTOS Y TARIFA ($1000)
    async function t(i) {
        if(!activo) return alert("Iniciá el turno primero");
        
        if(est[i]) { // Si estaba libre, sumamos
            recaudado += 1000;
            pasajeros += 1;
            document.getElementById('val-dinero').innerText = recaudado;
            document.getElementById('val-pax').innerText = pasajeros;
        }

        est[i] = !est[i];
        document.getElementById('b'+(i+1)).className = 'btn-as ' + (est[i] ? 'v' : 'r');
        const libres = est.filter(x => x).length;

        // ACTUALIZACIÓN DE CONEXIÓN
        await _s.from('estado_movil').update({ asientos_libres: libres }).eq('id', 1);
    }

    // 5. MAPA Y GPS
    const map = L.map('map', { zoomControl: false }).setView([-34.575, -58.775], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [40, 40] });
    let marker = L.marker([-34.575, -58.775], {icon: carIcon}).addTo(map);

    navigator.geolocation.watchPosition(p => {
        if(!activo) return;
        const pos = [p.coords.latitude, p.coords.longitude];
        marker.setLatLng(pos); map.panTo(pos);
        _s.from('estado_movil').update({ latitud: pos[0], longitud: pos[1] }).eq('id', 1);
    }, null, { enableHighAccuracy: true });
</script>
</body>
</html>
