<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONDUCTOR - MÓVIL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .overlay { position: absolute; z-index: 1000; width: 100%; display: flex; justify-content: center; }
        .top { top: 10px; }
        .bottom { bottom: 20px; }
        .card-conductor { 
            background: rgba(0, 0, 0, 0.9); 
            border: 2px solid #ff3b30; 
            border-radius: 15px; 
            padding: 10px; 
            width: 90%; 
            display: flex; 
            justify-content: space-around; 
            color: white; 
            text-align: center; 
        }
        .stat-box { flex: 1; }
        .stat-label { font-size: 10px; color: #aaa; text-transform: uppercase; }
        .stat-value { font-size: 22px; font-weight: bold; display: block; color: #ff3b30; }
        .btn-finalizar { 
            background: #ff3b30; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 12px; 
            font-weight: bold; 
            width: 90vw; 
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="overlay top">
        <div class="card-conductor">
            <div class="stat-box">
                <span class="stat-label">Pasajeros</span>
                <span id="txt-pax" class="stat-value">0</span>
            </div>
            <div style="width: 1px; background: #444;"></div>
            <div class="stat-box">
                <span class="stat-label">Recaudación</span>
                <span id="txt-reca" class="stat-value" style="color: #28a745;">$0</span>
            </div>
        </div>
    </div>

    <div class="overlay bottom">
        <button class="btn-finalizar" onclick="resetUnidad()">FINALIZAR VIAJE / VACIAR MÓVIL</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    // Coordenadas de la ruta
    const ruta = [
        {c:[-34.561264, -58.770506]}, {c:[-34.562160, -58.771380]},
        {c:[-34.562494, -58.772133]}, {c:[-34.563541, -58.773244]},
        {c:[-34.564109, -58.773759]}, {c:[-34.565342, -58.772061]},
        {c:[-34.567268, -58.769484]}, {c:[-34.569090, -58.767095]},
        {c:[-34.571016, -58.764443]}, {c:[-34.571956, -58.763201]},
        {c:[-34.577371, -58.755909]}, {c:[-34.578528, -58.757064]},
        {c:[-34.579296, -58.755864]}, {c:[-34.580020, -58.755063]},
        {c:[-34.580901, -58.753842]}, {c:[-34.581998, -58.752441]},
        {c:[-34.583319, -58.750710]}, {c:[-34.584740, -58.748804]},
        {c:[-34.585554, -58.749812]}, {c:[-34.586494, -58.750574]},
        {c:[-34.588041, -58.751542]}, {c:[-34.588273, -58.751338]},
        {c:[-34.588771, -58.750804]}, {c:[-34.588244, -58.749877]},
        {c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(ruta[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Dibujar línea de ruta
    L.polyline(ruta.map(p=>p.c), {color:'#ff3b30', weight:4}).addTo(map);

    const busIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [35, 35] });
    let markerBus = L.marker(ruta[0].c, { icon: busIcon }).addTo(map);

    // GPS: Actualizar posición en la base de datos
    navigator.geolocation.watchPosition(pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        markerBus.setLatLng([lat, lng]);
        _s.from('estado_movil').update({ latitud: lat, longitud: lng }).eq('id', 1).then();
    }, null, { enableHighAccuracy: true });

    // Escuchar cambios en pasajeros (Realtime)
    _s.channel('pax_count').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'estado_movil' }, payload => {
        const libres = payload.new.asientos_libres;
        const ocupados = 4 - libres;
        document.getElementById('txt-pax').innerText = ocupados;
        document.getElementById('txt-reca').innerText = "$" + (ocupados * 1000);
    }).subscribe();

    async function resetUnidad() {
        if(confirm("¿Vaciar asientos?")) {
            await _s.from('estado_movil').update({ asientos_libres: 4 }).eq('id', 1);
        }
    }
</script>
</body>
</html>
