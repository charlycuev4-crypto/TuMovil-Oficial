<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MÓVIL EN VIVO - PANEL CONDUCTOR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; background: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; overflow: hidden; 
        }

        /* Pantalla Splash */
        #splash { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999; 
            transition: opacity 0.8s; 
        }
        .logo-m { 
            width: 85px; height: 85px; border: 3px solid #00d4ff; 
            border-radius: 20px; color: #00d4ff; font-size: 50px; 
            font-weight: bold; display: flex; align-items: center; 
            justify-content: center; box-shadow: 0 0 25px rgba(0, 212, 255, 0.6); 
            margin-bottom: 20px; 
        }

        /* Contenedor Principal */
        .container { width: 90%; max-width: 400px; text-align: center; }
        .title { color: white; letter-spacing: 3px; font-weight: 800; margin-bottom: 25px; font-size: 22px; }

        /* Card del Conductor (Como en tu imagen) */
        .card-conductor { 
            background: #0a0a0a; border: 2.5px solid #00d4ff; 
            border-radius: 25px; padding: 30px 20px; 
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.15); 
        }

        .label-asientos { color: #666; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .count-asientos { color: #00d4ff; font-size: 65px; font-weight: 900; margin: 10px 0 20px 0; display: block; }

        /* Botón de GPS */
        .btn-gps { 
            background: #00d4ff; color: #000; border: none; 
            padding: 18px; border-radius: 15px; font-weight: 900; 
            width: 100%; font-size: 16px; cursor: pointer; 
            text-transform: uppercase; margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0, 212, 255, 0.3);
        }
        .btn-gps.active { background: #ff3b30; color: white; }

        /* Estado */
        .status-box { color: white; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .dot { width: 10px; height: 10px; background: #444; border-radius: 50%; }
        .dot.live { background: #28a745; box-shadow: 0 0 8px #28a745; }
        .status-txt-live { color: #28a745; font-weight: bold; }

        /* Log de Actividad (Parte inferior de tu imagen) */
        .log-container { 
            margin-top: 20px; border-top: 1px solid #222; 
            padding-top: 15px; height: 100px; overflow-y: auto; 
            text-align: left; font-family: monospace; font-size: 11px; color: #444; 
        }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-m">M</div>
        <div style="color:white; font-weight:bold; letter-spacing: 2px;">MÓVIL EN VIVO</div>
    </div>

    <div class="container">
        <div class="logo-m" style="width:65px; height:65px; font-size:38px; margin: 0 auto 15px;">M</div>
        <div class="title">PANEL CONDUCTOR</div>

        <div class="card-conductor">
            <span class="label-asientos">Asientos Disponibles</span>
            <span class="count-asientos" id="num-as">4</span>

            <button id="btn-main" class="btn-gps" onclick="toggleServicio()">🛰️ Iniciar Transmisión GPS</button>

            <div class="status-box">
                <div id="indicador" class="dot"></div>
                <span>Estado: <span id="txt-estado">Desconectado</span></span>
            </div>

            <div class="log-container" id="log">
                [Sistema] Esperando inicio de jornada...
            </div>
        </div>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let activo = false;
    let watchID = null;

    // Actualización automática cuando el pasajero reserva
    _s.channel('cambios_driver').on('postgres_changes', {
        event: 'UPDATE', schema: 'public', table: 'estado_movil'
    }, payload => {
        document.getElementById('num-as').innerText = payload.new.asientos_libres;
        addLog("Asientos actualizados: " + payload.new.asientos_libres);
    }).subscribe();

    async function toggleServicio() {
        const btn = document.getElementById('btn-main');
        const dot = document.getElementById('indicador');
        const txt = document.getElementById('txt-estado');

        if (!activo) {
            // INICIAR
            if (navigator.geolocation) {
                activo = true;
                btn.innerText = "🛑 Detener Transmisión";
                btn.classList.add('active');
                dot.classList.add('live');
                txt.innerText = "Transmitiendo en vivo";
                txt.className = "status-txt-live";

                watchID = navigator.geolocation.watchPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    
                    const { error } = await _s.from('estado_movil').update({ 
                        latitud: lat, longitud: lon 
                    }).eq('id', 1);

                    if(!error) addLog(`Ubicación enviada: ${lat.toFixed(5)}, ${lon.toFixed(5)}`);
                }, null, { enableHighAccuracy: true });
            }
        } else {
            // DETENER
            activo = false;
            btn.innerText = "🛰️ Iniciar Transmisión GPS";
            btn.classList.remove('active');
            dot.classList.remove('live');
            txt.innerText = "Desconectado";
            txt.className = "";
            navigator.geolocation.clearWatch(watchID);
            addLog("Transmisión finalizada.");
        }
    }

    function addLog(msg) {
        const log = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        log.innerHTML = `[${time}] ${msg}<br>` + log.innerHTML;
    }

    // Datos iniciales
    async function cargaInicial() {
        const { data } = await _s.from('estado_movil').select('asientos_libres').eq('id', 1).single();
        if(data) document.getElementById('num-as').innerText = data.asientos_libres;
    }

    cargaInicial();

    // Quitar Splash
    setTimeout(() => { 
        document.getElementById('splash').style.opacity = '0'; 
        setTimeout(() => document.getElementById('splash').style.display='none', 800); 
    }, 2500);
</script>
</body>
</html>
