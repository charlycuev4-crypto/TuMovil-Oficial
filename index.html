<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PANEL DEL CONDUCTOR - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; color: white; height: 100vh; overflow: hidden; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.8s; }
        .logo-m { width: 85px; height: 85px; border: 3px solid #00d4ff; border-radius: 20px; color: #00d4ff; font-size: 50px; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px #00d4ff; margin-bottom: 15px; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .header-stats { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; z-index: 1000; padding: 0 10px; }
        .stat-card { background: rgba(20, 20, 20, 0.9); border: 2px solid #00d4ff; border-radius: 12px; padding: 10px; width: 45%; text-align: center; }
        .stat-label { font-size: 10px; color: #00d4ff; font-weight: bold; text-transform: uppercase; }
        .stat-value { font-size: 22px; font-weight: 800; display: block; }
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 1000; }
        .btn-main { width: 90%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; text-transform: uppercase; background: #ff3b30; color: white; }
        .asientos-indicator { background: rgba(0,0,0,0.8); border: 2px solid #00d4ff; border-radius: 15px; padding: 10px; margin-bottom: 10px; display: flex; gap: 8px; }
        .mini-as { width: 35px; height: 35px; border: 2px solid #00d4ff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .mini-as.busy { background: #ff3b30; border-color: #ff3b30; box-shadow: 0 0 10px #ff3b30; }
    </style>
</head>
<body>
    <div id="splash"><div class="logo-m">M</div><b>PANEL CONTROLADOR</b></div>
    <div class="header-stats">
        <div class="stat-card"><span class="stat-label">Recaudación</span><span class="stat-value" id="v-recaudacion">$0</span></div>
        <div class="stat-card"><span class="stat-label">Pasajeros</span><span class="stat-value" id="v-pax">0</span></div>
    </div>
    <div id="map"></div>
    <div class="controls">
        <div class="asientos-indicator" id="indicador-asientos">
            <div id="ma1" class="mini-as">1</div><div id="ma2" class="mini-as">2</div>
            <div id="ma3" class="mini-as">3</div><div id="ma4" class="mini-as">4</div>
        </div>
        <button class="btn-main" onclick="vaciarUnidad()">Finalizar Viaje / Vaciar</button>
    </div>
<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    const rutaOficial = [{n:'Inicio', c:[-34.561264,-58.770506]},{n:'Fin', c:[-34.586030,-58.747278]}]; // Simplificada para prueba

    const map = L.map('map', { zoomControl: false }).setView([-34.561264,-58.770506], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let marcadoresPasajeros = [];
    let ultimaActGps = 0;

    async function dibujarPasajeros() {
        marcadoresPasajeros.forEach(m => map.removeLayer(m));
        marcadoresPasajeros = [];
        for(let i=1; i<=4; i++) document.getElementById('ma'+i).className = 'mini-as';

        const { data: reservas } = await _s.from('reservas_activas').select('*').eq('estado', 'en_curso');

        if (reservas) {
            document.getElementById('v-pax').innerText = reservas.length;
            document.getElementById('v-recaudacion').innerText = '$' + (reservas.length * 1000);
            reservas.forEach(res => {
                const elAsiento = document.getElementById('ma' + res.asiento_num);
                if(elAsiento) elAsiento.className = 'mini-as busy';
                const pM = L.marker([res.pasajero_lat, res.pasajero_lon]).addTo(map);
                marcadoresPasajeros.push(pM);
            });
        }
    }

    navigator.geolocation.watchPosition(async p => {
        const ahora = Date.now();
        if(ahora - ultimaActGps > 4000) {
            await _s.from('estado_movil').update({latitud: p.coords.latitude, longitud: p.coords.longitude}).eq('id', 1);
            ultimaActGps = ahora;
        }
    }, null, { enableHighAccuracy: true });

    async function vaciarUnidad() {
        if(!confirm("¿Vaciar unidad?")) return;
        await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('estado', 'en_curso');
        dibujarPasajeros();
    }

    _s.channel('cambios').on('postgres_changes', { event: '*', schema: 'public', table: 'reservas_activas' }, dibujarPasajeros).subscribe();
    dibujarPasajeros();

    setTimeout(() => { document.getElementById('splash').style.display='none'; }, 2000);
</script>
</body>
</html>
