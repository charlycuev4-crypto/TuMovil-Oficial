<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONDUCTOR - Tu Móvil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Mantenemos tus estilos originales de Modo Día */
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #f0f0f0; height: 100vh; font-family: 'Arial', sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .overlay-top { position: absolute; top: 10px; left: 10px; right: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; z-index: 1000; }
        .visor { background: rgba(0, 0, 0, 0.85); border: 2px solid #00d4ff; border-radius: 12px; padding: 8px; text-align: center; color: white; }
        .visor-label { font-size: 10px; color: #00d4ff; font-weight: bold; text-transform: uppercase; display: block; }
        .visor-num { font-size: 22px; font-weight: bold; }
        .overlay-bottom { position: absolute; bottom: 25px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 1000; }
        .asientos-cont { display: flex; gap: 10px; background: rgba(0, 0, 0, 0.8); padding: 12px 15px; border-radius: 20px; border: 1px solid #00d4ff; }
        .btn-as { width: 52px; height: 52px; border-radius: 10px; border: 2px solid #00d4ff; background: transparent; color: #00d4ff; font-size: 20px; font-weight: bold; }
        .ocupado { background: #ff3b30; border-color: #ff3b30; color: white; }
        .btn-pwr { width: 60px; height: 60px; border-radius: 50%; border: 3px solid white; font-weight: bold; font-size: 12px; }
        .on { background: #00d4ff; color: black; }
        .off { background: #ff3b30; color: white; display: none; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="overlay-top">
        <div class="visor"><span class="visor-label">TARIFA HOY</span><div class="visor-num">$ <span id="v-dinero">0</span></div></div>
        <div class="visor"><span class="visor-label">PASAJEROS</span><div class="visor-num" id="v-pax">0</div></div>
    </div>
    <div class="overlay-bottom">
        <div class="asientos-cont">
            <button id="b1" class="btn-as">1</button>
            <button id="b2" class="btn-as">2</button>
            <button id="b3" class="btn-as">3</button>
            <button id="b4" class="btn-as">4</button>
        </div>
        <button id="p-on" class="btn-pwr on" onclick="power(true)">ON</button>
        <button id="p-off" class="btn-pwr off" onclick="power(false)">OFF</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    let activo = false, recaudado = 0, pasajeros = 0;

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-34.561128, -58.770586], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Iconos
    const iconBus = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [40, 40] });
    let markerConductor = L.marker([-34.561128, -58.770586], { icon: iconBus }).addTo(map);
    
    // MARCADOR DEL PASAJERO (Azul brillante)
    let markerPasajero = L.circleMarker([0,0], { radius: 10, color: 'white', fillColor: '#007bff', fillOpacity: 1, weight: 2 }).addTo(map);

    function power(v) {
        activo = v;
        document.getElementById('p-on').style.display = v ? 'none' : 'flex';
        document.getElementById('p-off').style.display = v ? 'flex' : 'none';
    }

    // 1. EL CONDUCTOR ENVÍA SU GPS
    navigator.geolocation.watchPosition(p => { 
        if(!activo) return;
        const pos = [p.coords.latitude, p.coords.longitude];
        markerConductor.setLatLng(pos);
        _s.from('estado_movil').update({ latitud: pos[0], longitud: pos[1] }).eq('id', 1);
    }, null, { enableHighAccuracy: true });

    // 2. EL CONDUCTOR "ESCUCHA" AL PASAJERO Y LOS ASIENTOS
    _s.channel('cambios_db').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'estado_movil' }, payload => {
        const d = payload.new;
        
        // Ver al pasajero en el mapa
        if(d.lat_p && d.lon_p) {
            markerPasajero.setLatLng([d.lat_p, d.lon_p]);
        }

        // Actualizar visual de asientos (si el pasajero reservó)
        const libres = d.asientos_libres;
        for(let i=1; i<=4; i++) {
            document.getElementById('b'+i).className = 'btn-as ' + (i > libres ? 'ocupado' : '');
        }
        
        // Actualizar contadores arriba
        document.getElementById('v-pax').innerText = 4 - libres;
        document.getElementById('v-dinero').innerText = (4 - libres) * 1000; 
    }).subscribe();
</script>
</body>
</html>
