<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .btn { padding: 30px; border-radius: 15px; font-weight: bold; background: #333; border: 2px solid #555; color: white; }
        .libre { background: #27ae60 !important; }
        .ocupado { background: #e74c3c !important; }
    </style>
</head>
<body>
    <h2>CONTROL DE UNIDAD</h2>
    <div class="grid">
        <div id="a1" class="btn" onclick="tocar(1)">A1<br><span id="s1">...</span></div>
        <div id="a2" class="btn" onclick="tocar(2)">A2<br><span id="s2">...</span></div>
        <div id="a3" class="btn" onclick="tocar(3)">A3<br><span id="s3">...</span></div>
        <div id="a4" class="btn" onclick="tocar(4)">A4<br><span id="s4">...</span></div>
    </div>
    <p id="gps">🛰️ Buscando señal...</p>

    <script>
        const URL = 'https://nvumdlxervrewqiiaicl.supabase.co';
        const KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52dW1kbHhlcnZyZXdxaWlhaWNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTA4NTMsImV4cCI6MjA4OTg4Njg1M30.ejh7dtL2O6JJeoVq47cUK_hXAfRetJPyzks1yI-Lrhs';
        const sb = supabase.createClient(URL, KEY);

        async function cargar() {
            const { data } = await sb.from('asientos').select('*').order('id_asiento');
            if (data) {
                data.forEach(a => {
                    const d = document.getElementById('a' + a.id_asiento);
                    const s = document.getElementById('s' + a.id_asiento);
                    d.className = 'btn ' + (a.estado === 'ocupado' ? 'ocupado' : 'libre');
                    s.innerText = a.estado.toUpperCase();
                });
            }
        }

        async function tocar(id) {
            const d = document.getElementById('a' + id);
            const n = d.classList.contains('libre') ? 'ocupado' : 'libre';
            await sb.from('asientos').update({ estado: n }).eq('id_asiento', id);
            cargar();
        }

        navigator.geolocation.watchPosition(p => {
            document.getElementById('gps').innerText = `🛰️ GPS: ${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}`;
        }, null, { enableHighAccuracy: true });

        cargar();
        setInterval(cargar, 3000);
    </script>
</body>
</html>
