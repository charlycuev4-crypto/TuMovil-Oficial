<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MÓVIL EN VIVO - CONDUCTOR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 20px; background: #000; 
            font-family: 'Segoe UI', sans-serif; color: white; 
            display: flex; flex-direction: column; align-items: center;
        }
        
        .header { text-align: center; margin-bottom: 20px; }
        .logo-m { 
            width: 70px; height: 70px; border: 3px solid #00d4ff; 
            border-radius: 18px; color: #00d4ff; font-size: 40px; 
            font-weight: bold; display: flex; align-items: center; 
            justify-content: center; box-shadow: 0 0 20px #00d4ff; 
            margin: 0 auto 10px;
        }

        .card {
            background: #111; border: 2px solid #00d4ff; 
            border-radius: 20px; padding: 20px; width: 100%; 
            max-width: 400px; text-align: center;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .stat-box { margin-bottom: 20px; }
        .stat-label { color: #888; font-size: 14px; text-transform: uppercase; }
        .stat-value { color: #00d4ff; font-size: 48px; font-weight: 800; display: block; }

        .btn-gps {
            background: #00d4ff; color: #000; border: none; 
            padding: 15px; border-radius: 12px; font-weight: bold; 
            width: 100%; font-size: 16px; cursor: pointer;
            margin-bottom: 15px; text-transform: uppercase;
        }
        
        .status-dot {
            height: 10px; width: 10px; background-color: #bbb;
            border-radius: 50%; display: inline-block; margin-right: 5px;
        }
        .active { background-color: #28a745; box-shadow: 0 0 10px #28a745; }

        .log {
            margin-top: 15px; font-size: 12px; color: #444;
            text-align: left; height: 60px; overflow-y: auto;
            border-top: 1px solid #222; padding-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-m">M</div>
        <h2 style="margin:0; letter-spacing: 2px;">PANEL CONDUCTOR</h2>
    </div>

    <div class="card">
        <div class="stat-box">
            <span class="stat-label">Asientos Disponibles</span>
            <span class="stat-value" id="count-asientos">4</span>
        </div>

        <button class="btn-gps" onclick="iniciarViaje()">🛰️ Iniciar Transmisión GPS</button>
        
        <div style="font-size: 14px;">
            <span id="dot" class="status-dot"></span>
            Estado: <span id="status-text" style="color:#888">Desconectado</span>
        </div>

        <div class="log" id="log">Esperando inicio...</div>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let watchID = null;

    // Escuchar cambios en la base de datos (por si el pasajero reserva)
    _s.channel('cambios_conductor').on('postgres_changes', {
        event: 'UPDATE', schema: 'public', table: 'estado_movil'
    }, payload => {
        document.getElementById('count-asientos').innerText = payload.new.asientos_libres;
        addLog("Asientos actualizados: " + payload.new.asientos_libres);
    }).subscribe();

    async function iniciarViaje() {
        if (!navigator.geolocation) {
            alert("Tu dispositivo no soporta GPS");
            return;
        }

        document.getElementById('dot').classList.add('active');
        document.getElementById('status-text').innerText = "Transmitiendo en vivo";
        document.getElementById('status-text').style.color = "#28a745";

        watchID = navigator.geolocation.watchPosition(async (pos) => {
            const { latitud, longitud } = { latitud: pos.coords.latitude, longitud: pos.coords.longitude };
            
            const { error } = await _s.from('estado_movil')
                .update({ latitud, longitud })
                .eq('id', 1);

            if (error) {
                addLog("Error GPS: " + error.message);
            } else {
                addLog("Ubicación enviada: " + latitud.toFixed(5) + ", " + longitud.toFixed(5));
            }
        }, (err) => {
            addLog("Error: " + err.message);
        }, {
            enableHighAccuracy: true,
            maximumAge: 0
        });
    }

    function addLog(msg) {
        const log = document.getElementById('log');
        const now = new Date().toLocaleTimeString();
        log.innerHTML = `[${now}] ${msg}<br>` + log.innerHTML;
    }

    // Carga inicial de asientos
    async function cargarEstado() {
        let { data } = await _s.from('estado_movil').select('asientos_libres').eq('id', 1).single();
        if(data) document.getElementById('count-asientos').innerText = data.asientos_libres;
    }
    
    cargarEstado();
</script>
</body>
</html>
