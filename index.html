<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TU MÓVIL OFICIAL - PANEL CHOFER</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: white; text-align: center; margin: 0; padding: 10px; }
        .header { background-color: #ff8c00; color: black; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .gps-status { color: #00ff00; font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        
        /* Contenedor de asientos arriba */
        .asientos-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .asiento { background-color: #333; padding: 25px; border-radius: 10px; border: 2px solid #444; font-size: 18px; font-weight: bold; cursor: pointer; }
        .asiento.ocupado { background-color: #ff4444; border-color: #cc0000; }
        .asiento.libre { background-color: #44bb44; border-color: #228822; }
        
        .paradas-container { background-color: #222; padding: 15px; border-radius: 10px; border: 1px solid #444; }
        select { width: 100%; padding: 12px; font-size: 16px; border-radius: 5px; background: #eee; color: black; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: #ff8c00; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0;">TU MÓVIL OFICIAL</h1>
        <small>PANEL CHOFER - JCP 478</small>
    </div>

    <div id="gps-info" class="gps-status">📡 Buscando señal GPS...</div>

    <div class="asientos-container">
        <div id="asiento1" class="asiento" onclick="toggleAsiento(1)">ASIENTO 1<br><small id="estado1">...</small></div>
        <div id="asiento2" class="asiento" onclick="toggleAsiento(2)">ASIENTO 2<br><small id="estado2">...</small></div>
        <div id="asiento3" class="asiento" onclick="toggleAsiento(3)">ASIENTO 3<br><small id="estado3">...</small></div>
        <div id="asiento4" class="asiento" onclick="toggleAsiento(4)">ASIENTO 4<br><small id="estado4">...</small></div>
    </div>

    <div class="paradas-container">
        <label>📍 MARCAR PARADA ACTUAL:</label>
        <select id="select-parada" onchange="actualizarParada()">
            <option value="1. Miguel Cané y Marchena">1. Miguel Cané y Marchena</option>
            <option value="2. Pringles y Paunero">2. Pringles y Paunero</option>
            <option value="3. Paunero y Las Delicias">3. Paunero y Las Delicias</option>
            <option value="4. Av. Balbín y Paunero">4. Av. Balbín y Paunero</option>
            <option value="5. Av. Balbín y Castelar">5. Av. Balbín y Castelar</option>
            <option value="6. Av. Balbín y Remigio López">6. Av. Balbín y Remigio López</option>
            <option value="7. Remigio López y Sarmiento">7. Remigio López y Sarmiento</option>
            <option value="8. Remigio López y Madariaga">8. Remigio López y Madariaga</option>
            <option value="9. Remigio López y Defensa">9. Remigio López y Defensa</option>
            <option value="10. Gaspar Campos y Remigio López">10. Gaspar Campos y Remigio López</option>
            <option value="11. Gaspar Campos y Senador Morón">11. Gaspar Campos y Senador Morón</option>
            <option value="12. Senador Morón y La Plata">12. Senador Morón y La Plata</option>
            <option value="13. Senador Morón y San Juan">13. Senador Morón y San Juan</option>
            <option value="14. Senador Morón y Corrientes">14. Senador Morón y Corrientes</option>
            <option value="15. Corrientes y Av. Balbín">15. Corrientes y Av. Balbín</option>
            <option value="16. Av. Balbín y Arricau">16. Av. Balbín y Arricau</option>
            <option value="17. Av. Balbín y Primera Junta">17. Av. Balbín y Primera Junta</option>
            <option value="18. Estación San Miguel">18. Estación San Miguel</option>
            <option value="19. Hospital Larcade">19. Hospital Larcade</option>
            <option value="20. Destino Final">20. Destino Final</option>
        </select>
    </div>

    <script>
        // Configuración de Supabase (Tus credenciales ya están aquí)
        const _supabase = supabase.createClient('https://vclonmiisreunidvshol.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZjbG9ubWlpc3JldW5pZHZzaG9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI5MzY1MTYsImV4cCI6MjA1ODUxMjUxNn0.8C654_C0yYIuVqR9BlyiI_DREH-Gg3mY-FayP_4D6gU');

        async function cargarEstado() {
            let { data } = await _supabase.from('estado_movil').select('*').eq('id', 1).single();
            if (data) {
                for (let i = 1; i <= 4; i++) {
                    const el = document.getElementById(`asiento${i}`);
                    const txt = document.getElementById(`estado${i}`);
                    if (data[`asiento${i}`]) {
                        el.className = 'asiento ocupado';
                        txt.innerText = 'OCUPADO';
                    } else {
                        el.className = 'asiento libre';
                        txt.innerText = 'LIBRE';
                    }
                }
                document.getElementById('select-parada').value = data.parada_actual;
            }
        }

        async function toggleAsiento(num) {
            const el = document.getElementById(`asiento${num}`);
            const nuevoEstado = !el.classList.contains('ocupado');
            const updateData = {};
            updateData[`asiento${num}`] = nuevoEstado;
            await _supabase.from('estado_movil').update(updateData).eq('id', 1);
            cargarEstado();
        }

        async function actualizarParada() {
            const nuevaParada = document.getElementById('select-parada').value;
            await _supabase.from('estado_movil').update({ parada_actual: nuevaParada }).eq('id', 1);
        }

        navigator.geolocation.watchPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            document.getElementById('gps-info').innerText = `📡 GPS TRANSMITIENDO`;
            await _supabase.from('estado_movil').update({ latitud: latitude, longitude: longitude }).eq('id', 1);
        }, () => {
            document.getElementById('gps-info').innerText = `❌ GPS APAGADO (Activalo)`;
        }, { enableHighAccuracy: true });

        setInterval(cargarEstado, 3000);
        cargarEstado();
    </script>
</body>
</html>
