<div style="display: flex; justify-content: space-around; background: #000; padding: 10px; border-bottom: 2px solid #FFD700;">
    <div style="text-align: center;">
        <span style="color: #FFD700; font-size: 10px; display: block;">RECAUDACIÓN VIAJE</span>
        <span id="total-viaje" style="font-size: 22px; font-weight: bold; color: #fff;">$0</span>
    </div>
    <div style="text-align: center;">
        <span style="color: #FFD700; font-size: 10px; display: block;">PASAJEROS A BORDO</span>
        <span id="pax-conteo" style="font-size: 22px; font-weight: bold; color: #fff;">0</span>
    </div>
</div>

<div style="padding: 10px; background: #111; display: flex; gap: 10px;">
    <button id="btn-status" class="btn-status online" style="flex: 2;" onclick="toggleServicio()">MÓVIL EN LÍNEA</button>
    <button id="btn-sentido" onclick="cambiarSentido()" style="flex: 1; background: #222; color: #FFD700; border: 1px solid #FFD700; border-radius: 8px; font-weight: bold;">HACIA: IDA</button>
</div>

<div id="map" style="height: 40vh; width: 100%; background: #000;"></div>

<div class="panel-cabina" style="padding: 15px; background: #111;">
    <div style="color: #888; font-size: 12px; margin-bottom: 8px;">ESTADO DE ASIENTOS Y TARIFAS:</div>
    <div id="grid-asientos" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
        </div>
</div>

<script>
    // CONFIGURACIÓN DE RUTAS (IDA: 0-24, VUELTA: 25-33)
    const paradasCoords = [ /* Pegar aquí las 34 coordenadas del SQL */ ];
    let sentido = 'ida';
    let recaudacion = 0;

    // INICIALIZACIÓN DEL MAPA PROFESIONAL
    let map = L.map('map', { zoomControl: false }).setView(paradasCoords[0], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function actualizarMapaRuta() {
        if(window.rutaLine) map.removeLayer(window.rutaLine);
        
        // Filtrar puntos para evitar triángulos
        const puntos = (sentido === 'ida') ? paradasCoords.slice(0, 25) : paradasCoords.slice(25);
        
        window.rutaLine = L.polyline(puntos, {
            color: '#00d4ff', 
            weight: 5, 
            opacity: 0.8,
            lineCap: 'round'
        }).addTo(map);
        
        map.fitBounds(window.rutaLine.getBounds());
    }

    // LÓGICA DE TARIFAS Y CABINA
    async function refrescarCabina() {
        const { data: reservas } = await _s.from('reservas_activas')
            .select('*')
            .eq('id_movil', 1)
            .eq('estado', 'en_curso');

        let totalSuma = 0;
        let ocupados = [false, false, false, false];
        const grid = document.getElementById('grid-asientos');
        grid.innerHTML = "";

        // Procesar reservas
        reservas.forEach(r => {
            totalSuma += r.tarifa || 1000;
            ocupados[r.asiento_num - 1] = true;
        });

        // Dibujar los 4 asientos con su precio
        for (let i = 1; i <= 4; i++) {
            const estaOcupado = ocupados[i-1];
            grid.innerHTML += `
                <div class="asiento ${estaOcupado ? 'ocupado' : ''}" 
                     style="border: 2px solid ${estaOcupado ? '#4cd964' : '#333'}; 
                            padding: 10px; border-radius: 8px; text-align: center;
                            background: ${estaOcupado ? 'rgba(76,217,100,0.1)' : 'transparent'}">
                    <div style="font-size: 10px; color: #888;">AS. ${i}</div>
                    <div style="color: ${estaOcupado ? '#4cd964' : '#555'}; font-weight: bold;">
                        ${estaOcupado ? '$' + (reservas.find(res => res.asiento_num == i).tarifa || 1000) : '---'}
                    </div>
                </div>
            `;
        }

        // Actualizar marcadores superiores
        document.getElementById('total-viaje').innerText = "$" + totalSuma;
        document.getElementById('pax-conteo').innerText = reservas.length;
    }

    function cambiarSentido() {
        sentido = (sentido === 'ida') ? 'vuelta' : 'ida';
        document.getElementById('btn-sentido').innerText = "HACIA: " + sentido.toUpperCase();
        actualizarMapaRuta();
    }

    // Iniciar
    actualizarMapaRuta();
    setInterval(refrescarCabina, 3000);
</script>
