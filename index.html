<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Chofer - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #FFD700; --dark: #050505; --card: #121212; --blue: #00d4ff; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { background: #111; padding: 15px; border-bottom: 2px solid var(--gold); text-align: center; }
        header h1 { margin: 0; font-size: 18px; color: var(--gold); }
        #map { flex: 1; width: 100%; border-bottom: 2px solid var(--gold); }
        .controls { background: var(--card); padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .stats { display: flex; justify-content: space-around; background: #1a1a1a; padding: 10px; border-radius: 10px; margin-bottom: 5px; }
        .stat-item { text-align: center; }
        .stat-item small { font-size: 10px; color: #888; display: block; }
        .stat-item strong { font-size: 20px; color: var(--gold); }
        .btn { padding: 18px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        .btn-liberar { background: var(--gold); color: black; }
        .btn-sentido { background: var(--blue); color: black; }
    </style>
</head>
<body>

<header>
    <h1 id="chofer-info">MOVIL 1 - EN RUTA</h1>
</header>

<div id="map"></div>

<div class="controls">
    <div class="stats">
        <div class="stat-item"><small>ASIENTOS</small><strong id="pax-count">0 / 4</strong></div>
        <div class="stat-item"><small>SENTIDO</small><strong id="sentido-txt">IDA</strong></div>
    </div>
    
    <button class="btn btn-liberar" onclick="liberarAsiento()">🪑 Liberar 1 Asiento (Baja)</button>
    <button id="btn-cambio" class="btn btn-sentido" onclick="cambiarSentido()">🔄 Iniciar Sentido Regreso</button>
</div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let nombreChofer = "Móvil 1"; 
    let sentidoActual = "ida";
    let map;

    // COORDENADAS DE TUS 26 PARADAS
    const paradas = [
        [-34.561128, -58.770586], [-34.562160, -58.771380], [-34.562494, -58.772133],
        [-34.563541, -58.773244], [-34.564109, -58.773759], [-34.565342, -58.772061],
        [-34.567268, -58.769484], [-34.569090, -58.767095], [-34.571016, -58.764443],
        [-34.571956, -58.763201], [-34.577371, -58.755909], [-34.578528, -58.757064],
        [-34.579296, -58.755864], [-34.580020, -58.755063], [-34.580901, -58.753842],
        [-34.581998, -58.752441], [-34.583319, -58.750710], [-34.584740, -58.748804],
        [-34.585554, -58.749812], [-34.586494, -58.750574], [-34.588041, -58.751542],
        [-34.588273, -58.751338], [-34.588771, -58.750804], [-34.588244, -58.749877],
        [-34.588930, -58.750543], [-34.586030, -58.747278]
    ];

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([-34.572, -58.751], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Dibujar la línea azul de la ruta
        L.polyline(paradas, { color: '#00d4ff', weight: 4, opacity: 0.6 }).addTo(map);

        // Dibujar los 26 puntos dorados
        paradas.forEach((pos, i) => {
            L.circleMarker(pos, {
                radius: 5,
                fillColor: "#FFD700",
                color: "#000",
                weight: 1,
                fillOpacity: 1
            }).addTo(map).bindPopup("Parada " + (i + 1));
        });
    }

    async function actualizar() {
        const { data } = await _s.from('conductores').select('*').eq('nombre', nombreChofer).single();
        if (data) {
            document.getElementById('pax-count').innerText = `${data.pasajeros_actuales} / 4`;
            document.getElementById('sentido-txt').innerText = data.sentido.toUpperCase();
            sentidoActual = data.sentido;
            document.getElementById('btn-cambio').innerText = sentidoActual === "ida" ? "🔄 Iniciar Regreso" : "🔄 Iniciar Ida";
        }
    }

    async function liberarAsiento() {
        const { data } = await _s.from('conductores').select('pasajeros_actuales').eq('nombre', nombreChofer).single();
        if (data.pasajeros_actuales > 0) {
            await _s.from('conductores').update({ pasajeros_actuales: data.pasajeros_actuales - 1 }).eq('nombre', nombreChofer);
            actualizar();
        }
    }

    async function cambiarSentido() {
        const nuevo = sentidoActual === "ida" ? "vuelta" : "ida";
        if (confirm("¿Confirmas cambio de sentido? Se vaciarán los asientos.")) {
            await _s.from('conductores').update({ sentido: nuevo, pasajeros_actuales: 0 }).eq('nombre', nombreChofer);
            actualizar();
        }
    }

    initMap();
    actualizar();
    
    // Escuchar cambios en tiempo real
    _s.channel('cambios-chofer').on('postgres_changes', { event: '*', table: 'conductores' }, () => actualizar()).subscribe();
</script>

</body>
</html>
