<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TU MÓVIL OFICIAL - Chofer</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; }
        .card { background: #1a1a1a; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-as { padding: 35px 5px; border-radius: 18px; border: none; font-weight: bold; font-size: 1.2rem; color: white; cursor: pointer; transition: 0.3s; }
        .verde { background: #00dc7d; box-shadow: 0 6px #008f51; }
        .rojo { background: #ff4b4b; box-shadow: 0 6px #b33333; }
        select { width: 100%; padding: 18px; border-radius: 12px; background: #222; color: #fb8500; font-size: 1.1rem; border: 2px solid #333; font-weight: bold; }
        h1 { color: #fb8500; margin: 0; }
    </style>
</head>
<body>

    <div class="card" style="border-top: 6px solid #fb8500;">
        <h1>TU MÓVIL OFICIAL</h1>
        <p style="color: #aaa; font-weight: bold;">PANEL CHOFER - JCP 478</p>
        <small id="gps-status" style="color: #00dc7d;">🛰️ Buscando señal GPS...</small>
    </div>

    <div class="grid" id="grid-asientos"></div>

    <div class="card">
        <label style="display: block; margin-bottom: 10px; font-weight: bold;">📍 PARADA ACTUAL:</label>
        <select id="sel-parada" onchange="updParada(this.value)">
            <option value="Miguel Cané y Marchena">1. Miguel Cané y Marchena</option>
            <option value="Los Aromos y Martín García">2. Los Aromos y Martín García</option>
            <option value="Los Aromos y Río De La Plata">3. Los Aromos y Río De La Plata</option>
            <option value="Murillo y Los Aromos">4. Murillo y Los Aromos</option>
            <option value="Murillo y Don Bosco">5. Murillo y Don Bosco</option>
            <option value="Murillo y Güiraldes">6. Murillo y Güiraldes</option>
            <option value="Murillo y Jacobo Watt">7. Murillo y Jacobo Watt</option>
            <option value="Álvarez Prado y Florencio Sánchez">8. Álvarez Prado y Florencio Sánchez</option>
            <option value="Álvarez Prado y Sastre">9. Álvarez Prado y Sastre</option>
            <option value="Álvarez Prado y Stefani">10. Álvarez Prado y Stefani</option>
            <option value="Álvarez Prado y Pericles">11. Álvarez Prado y Pericles</option>
            <option value="Carriego y Álvarez Prado">12. Carriego y Álvarez Prado</option>
            <option value="Aeronáutica Argentina y Carriego">13. Aeronáutica Argentina y Carriego</option>
            <option value="Aeronáutica Argentina y Doctor Jauretche">14. Aeronáutica Argentina y Doctor Jauretche</option>
            <option value="Roldán Y Aeronáutica Argentina">15. Roldán Y Aeronáutica Argentina</option>
            <option value="Boulevard Caveri y Roldán">16. Boulevard Caveri y Roldán</option>
            <option value="Boulevard Caveri y Mariano Vedia y Mitre">17. Boulevard Caveri y Mariano Vedia y Mitre</option>
            <option value="Boulevard Caveri y Tablada">18. Boulevard Caveri y Tablada</option>
            <option value="Boulevard Caveri y Esteban Echeverría">19. Boulevard Caveri y Esteban Echeverría</option>
            <option value="Boulevard Caveri Y Manuel Gálvez">20. Boulevard Caveri Y Manuel Gálvez</option>
        </select>
    </div>

    <script>
        const URL_SB = 'https://nvumdlxervrewqiiaicl.supabase.co';
        const KEY_SB = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52dW1kbHhlcnZyZXdxaWlhaWNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTA4NTMsImV4cCI6MjA4OTg4Njg1M30.ejh7dtL2O6JJeoVq47cUK_hXAfRetJPyzks1yI-Lrhs';
        const ID_V = 'jcp478';

        const _sb = supabase.createClient(URL_SB, KEY_SB);

        async function init() {
            const { data } = await _sb.from('viajes_activos').select('*').eq('id_viaje', ID_V).single();
            if (data) render(data);
        }

        function render(v) {
            const container = document.getElementById('grid-asientos');
            container.innerHTML = "";
            ['asiento1','asiento2','asiento3','asiento4'].forEach((col, i) => {
                const ocupado = v[col] !== 'disponible';
                container.innerHTML += `<button class="btn-as ${ocupado ? 'rojo' : 'verde'}" onclick="tgl('${col}', '${v[col]}')">Asiento ${i+1}<br><b>${ocupado ? 'OCUPADO' : 'LIBRE'}</b></button>`;
            });
            if(v.parada_actual) document.getElementById('sel-parada').value = v.parada_actual;
        }

        async function tgl(col, val) {
            const nVal = val === 'disponible' ? 'ocupado' : 'disponible';
            await _sb.from('viajes_activos').update({ [col]: nVal }).eq('id_viaje', ID_V);
            init();
        }

        async function updParada(p) {
            await _sb.from('viajes_activos').update({ parada_actual: p }).eq('id_viaje', ID_V);
        }

        _sb.channel('cambios').on('postgres_changes', { event:'UPDATE', schema:'public', table:'viajes_activos' }, payload => render(payload.new)).subscribe();

        navigator.geolocation.watchPosition(p => {
            _sb.from('viajes_activos').update({ latitud: p.coords.latitude, longitud: p.coords.longitude }).eq('id_viaje', ID_V);
            document.getElementById('gps-status').innerText = `🛰️ GPS TRANSMITIENDO`;
        }, null, { enableHighAccuracy: true });

        init();
    </script>
</body>
</html>
