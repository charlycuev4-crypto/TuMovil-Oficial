<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Conductor Pro - Tu Móvil</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0c101d; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 1. PRESENTACIÓN A PANTALLA COMPLETA */
        #splash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #0c101d; z-index: 9999; 
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s;
        }
        #splash img {
            width: 100%; height: 100%; object-fit: cover; /* Esto hace que se vea como fondo de pantalla */
        }

        #map { flex-grow: 1; width: 100%; filter: brightness(0.8); }

        .panel { 
            background: #1c1c1e; padding: 15px; border-radius: 20px 20px 0 0; 
            margin-top: -20px; position: relative; z-index: 100;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }

        .info-block { background: #2c2c2e; border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #333;}
        .info-label { font-size: 10px; text-transform: uppercase; color: #8e8e93; }
        .info-value { font-size: 20px; font-weight: bold; margin-top: 3px;}
        .money { color: #f1c40f; }
        
        .asientos-label { grid-column: span 2; font-size: 12px; color: #aaa; text-align: center; margin-top: 5px; }
        .grid-asientos { grid-column: span 2; display: flex; justify-content: center; gap: 8px; }
        .btn-asiento { width: 55px; height: 50px; font-size: 20px; border-radius: 12px; border: 2px solid white; cursor: pointer; color: white; background: #28a745; font-weight: bold;}
        .ocupado { background: #dc3545; }

        .btn-power { grid-column: span 2; padding: 15px; border-radius: 30px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 5px;}
        .power-on { background: #34c759; color: white; }
        .power-off { background: #ff3b30; color: white; display: none; }
    </style>
</head>
<body>

    <div id="splash">
        <img src="https://i.ibb.co/LzNfX9P/1000251835.jpg" alt="Logo">
    </div>

    <div id="map"></div>

    <div class="panel">
        <div class="info-block">
            <div class="info-label">TARIFA HOY</div>
            <div class="info-value money">$ <span id="monto-total">0</span></div>
        </div>
        
        <div class="info-block">
            <div class="info-label">PASAJEROS TOTALES</div>
            <div class="info-value"><span id="pax-total">0</span></div>
        </div>

        <div class="asientos-label">ASIENTOS ACTUALES (Tocá para ocupar)</div>
        <div class="grid-asientos">
            <button id="a1" class="btn-asiento" onclick="toggle(0)">1</button>
            <button id="a2" class="btn-asiento" onclick="toggle(1)">2</button>
            <button id="a3" class="btn-asiento" onclick="toggle(2)">3</button>
            <button id="a4" class="btn-asiento" onclick="toggle(3)">4</button>
        </div>

        <button id="btnPowerOn" class="btn-power power-on" onclick="turnPower(true)">▶️ INICIAR TURNO</button>
        <button id="btnPowerOff" class="btn-power power-off" onclick="turnPower(false)">🛑 TERMINAR TURNO</button>
    </div>

<script>
    // OCULTAR SPLASH
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => document.getElementById('splash').remove(), 800);
        }, 3000);
    });

    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let turnoActivo = false;
    let dineroAcumulado = 0;
    let pasajerosAcumulados = 0;

    // MAPA Y RECUPERACIÓN DE PARADAS
    const map = L.map('map', { zoomControl: false }).setView([-34.568, -58.770], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const rutaIda = [
        [-34.5612, -58.7705], [-34.5621, -58.7713], [-34.5641, -58.7737], 
        [-34.5672, -58.7694], [-34.5690, -58.7670], [-34.5710, -58.7644],
        [-34.5773, -58.7559], [-34.5800, -58.7550], [-34.5833, -58.7507],
        [-34.5887, -58.7508], [-34.5891, -58.7502]
    ];

    // Dibuja la línea azul y LOS PUNTOS (PARADAS)
    L.polyline(rutaIda, { color: '#3498db', weight: 5, opacity: 0.6 }).addTo(map);
    rutaIda.forEach(p => {
        L.circleMarker(p, { radius: 5, color: '#3498db', fillOpacity: 1 }).addTo(map);
    });

    const iconoAuto = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [40, 40], iconAnchor: [20, 20] });
    let car = L.marker(rutaIda[0], { icon: iconoAuto }).addTo(map);

    // FUNCIONES DE CONTROL
    function turnPower(val) {
        turnoActivo = val;
        document.getElementById('btnPowerOn').style.display = val ? 'none' : 'block';
        document.getElementById('btnPowerOff').style.display = val ? 'block' : 'none';
    }

    async function toggle(i) {
        if (!turnoActivo) return;
        let est = JSON.parse(localStorage.getItem('asientos') || '[true,true,true,true]');
        
        if (est[i]) { // Si pasa de libre a ocupado
            dineroAcumulado += 1000;
            pasajerosAcumulados += 1;
            document.getElementById('monto-total').innerText = dineroAcumulado;
            document.getElementById('pax-total').innerText = pasajerosAcumulados;
        }

        est[i] = !est[i];
        localStorage.setItem('asientos', JSON.stringify(est));
        document.getElementById('a'+(i+1)).className = 'btn-asiento ' + (est[i] ? '' : 'ocupado');
        
        const libres = est.filter(x => x).length;
        await _s.from('estado_movil').update({ asientos_libres: libres }).eq('id', 1);
    }

    navigator.geolocation.watchPosition(p => {
        if (!turnoActivo) return;
        const pos = [p.coords.latitude, p.coords.longitude];
        car.setLatLng(pos);
        map.panTo(pos);
        _s.from('estado_movil').update({ latitud: pos[0], longitud: pos[1] }).eq('id', 1);
    }, null, { enableHighAccuracy: true });
</script>
</body>
</html>
