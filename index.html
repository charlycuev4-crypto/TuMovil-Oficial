<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PASAJERO - TuMovil Digital</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0a0a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; color: #fff; }
        
        /* Contenedor dinámico del mapa */
        #map-wrapper { position: absolute; top: 0; left: 0; right: 0; bottom: 25vh; z-index: 1; transition: bottom 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); }
        #map { width: 100%; height: 100%; }

        /* HEADER FLOTANTE */
        .top-hud { position: absolute; top: env(safe-area-inset-top, 12px); left: 12px; right: 12px; z-index: 1000; pointer-events: none; }
        .info-card { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); padding: 12px 16px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); pointer-events: auto; }
        .status-text { font-size: 14px; font-weight: 800; color: #00d2ff; text-align: center; letter-spacing: 0.5px; }

        /* MENU INFERIOR (BOTTOM SHEET ADAPTABLE) */
        .passenger-sheet {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 1001;
            background: #11121a; border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px 28px 0 0; padding: 16px 20px env(safe-area-inset-bottom, 16px);
            box-shadow: 0 -8px 36px rgba(0,0,0,0.5);
            height: 25vh; transition: height 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* ESTADOS DE INTERFAZ INTELIGENTE */
        body.viaje-activo #map-wrapper { bottom: 15vh; }
        body.viaje-activo .passenger-sheet { height: 15vh; }

        .selector-zona { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); padding: 12px; border-radius: 16px; margin-bottom: 10px; }
        .selector-title { font-size: 10px; color: #888; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        select { width: 100%; background: transparent; border: none; color: #fff; font-size: 16px; font-weight: 700; outline: none; cursor: pointer; }
        select option { background: #11121a; color: #fff; }

        .btn-solicitar { width: 100%; background: #00d2ff; color: #000; border: none; padding: 14px; border-radius: 16px; font-weight: 800; font-size: 15px; cursor: pointer; text-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .btn-cancelar { width: 100%; background: rgba(255,59,48,0.1); color: #ff3b30; border: 1px solid rgba(255,59,48,0.2); padding: 12px; border-radius: 16px; font-weight: 800; font-size: 14px; cursor: pointer; }

        /* ICONOS CUSTOM EN MAPA */
        .pax-marker { background: #00d2ff; width: 14px !important; height: 14px !important; border: 2.5px solid white; border-radius: 50%; box-shadow: 0 0 10px #00d2ff; }
        .car-marker-pax { background: #ffcc00; width: 18px !important; height: 18px !important; border: 3px solid #000; border-radius: 50%; box-shadow: 0 0 12px #ffcc00; transition: all 0.5s ease; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="top-hud">
        <div class="info-card">
            <div class="status-text" id="hud-estado">📍 Seleccioná tu destino para cotizar</div>
        </div>
    </div>

    <div id="map-wrapper">
        <div id="map"></div>
    </div>

    <div class="passenger-sheet" id="pax-sheet">
        <div id="bloque-seleccion">
            <div class="selector-zona">
                <div class="selector-title">📍 Destino Solicitado</div>
                <select id="select-destino" onchange="dibujarPrevisualizacionRuta()">
                    <option value="" disabled selected>¿A dónde vas?</option>
                </select>
            </div>
            <button class="btn-solicitar" id="btn-pedir" onclick="enviarReservaSupabase()">SOLICITAR VIAJE ($1000)</button>
        </div>

        <div id="bloque-viaje-activo" class="hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <div>
                    <div style="font-size:11px; color:#888; font-weight:700;">MÓVIL ASIGNADO</div>
                    <div style="font-size:15px; font-weight:800; color:#fff;" id="txt-chofer-asignado">Buscando...</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:11px; color:#888; font-weight:700;">ASIENTO</div>
                    <div style="font-size:16px; font-weight:900; color:#ffcc00;">N° 1</div>
                </div>
            </div>
            <button class="btn-cancelar" onclick="cancelarViajePasajero()">CANCELAR SOLICITUD</button>
        </div>
    </div>

<script>
    // Conexión idéntica a tu Base de Datos actual
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    // Espejo de las paradas fijas del Conductor
    const paradas = [
        {n:'Universidad Tecnológica', c:[-34.549295, -58.783648]},
        {n:'Parque Tecnológico', c:[-34.551586, -58.781403]},
        {n:'Base Aérea', c:[-34.554132, -58.778927]},
        {n:'Miguel Cané', c:[-34.561264, -58.770506]},
        {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]},
        {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]},
        {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]},
        {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]},
        {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]},
        {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]},
        {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]},
        {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]},
        {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]},
        {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]},
        {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]},
        {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    let map, markerPasajero, markerAutoConductor, rutaLine;
    let miIdReservaActiva = null;

    function initPasajero() {
        // Mapa centrado en la primera parada
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView(paradas[0].c, 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Renderizar combo de selección
        const select = document.getElementById('select-destino');
        paradas.forEach((p, idx) => {
            let opt = document.createElement('option');
            opt.value = idx;
            opt.textContent = `${idx + 1}. ${p.n}`;
            select.appendChild(opt);
        });

        // Crear marcador estático para simular la ubicación del pasajero actual (Ubicación simulada de prueba)
        markerPasajero = L.marker([-34.561264, -58.770506], {
            icon: L.divIcon({ className: 'pax-marker' })
        }).addTo(map).bindTooltip("Tu Ubicación", { permanent: true, direction: 'top' });

        // Escuchar cambios de coordenadas de la base de datos en tiempo real
        conectarCanalRastreoConductor();
    }

    function dibujarPrevisualizacionRuta() {
        const idx = document.getElementById('select-destino').value;
        if (!idx) return;

        // Cambiar precio dinámico en el botón según la distancia de paradas
        const precio = idx > 10 ? 1500 : 1000;
        document.getElementById('btn-pedir').textContent = `SOLICITAR VIAJE ($${precio})`;

        // Trazar línea guía
        if (rutaLine) map.removeLayer(rutaLine);
        
        // Cortamos el tramo de paradas desde donde está el pax hasta su destino
        const tramoRuta = paradas.slice(0, parseInt(idx) + 1).map(p => p.c);
        rutaLine = L.polyline(tramoRuta, { color: '#00d2ff', weight: 5, opacity: 0.8, dashArray: '5, 10' }).addTo(map);
        map.fitBounds(rutaLine.getBounds(), { padding: [30, 30] });
    }

    async function enviarReservaSupabase() {
        const destIdx = document.getElementById('select-destino').value;
        if (!destIdx) { alert("Por favor, seleccioná una parada de destino."); return; }

        const precioFinal = destIdx > 10 ? 1500 : 1000;

        // Guardamos solicitud en Supabase
        const { data, error } = await _s.from('reservas_activas').insert({
            id_movil: 1,
            nombre_pasajero: "Pasajero Demo App",
            asiento_num: 1,
            destino_idx: parseInt(destIdx),
            pasajero_lat: -34.561264,
            pasajero_lon: -58.770506,
            estado_pasajero: 'esperando',
            estado: 'en_curso'
        }).select().single();

        if (error) { alert("Error al solicitar coche."); return; }

        miIdReservaActiva = data.id;
        activarModoViajeConfirmado("Esperando confirmación del conductor...");
    }

    function activarModoViajeConfirmado(mensajeEstado) {
        document.body.classList.add('viaje-activo');
        document.getElementById('bloque-seleccion').classList.add('hidden');
        document.getElementById('bloque-viaje-activo').classList.remove('hidden');
        document.getElementById('hud-estado').textContent = "🚗 " + mensajeEstado;
        map.invalidateSize(); // Reajusta el tamaño del mapa al estirarse al 80%
    }

    function conectarCanalRastreoConductor() {
        // Monitorea la tabla estado_movil de Supabase (donde tu app de chofer actualiza su lat y lon)
        _s.channel('posicion-chofer')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'estado_movil' }, payload => {
                if (payload.new.id === 1) {
                    const latChofer = payload.new.lat;
                    const lonChofer = payload.new.lon;
                    const sentido = payload.new.sentido_flujo;

                    // Mover coche en el mapa línea a línea
                    if (!markerAutoConductor) {
                        markerAutoConductor = L.marker([latChofer, lonChofer], {
                            icon: L.divIcon({ className: 'car-marker-pax' })
                        }).addTo(map).bindTooltip("Tu Móvil", { permanent: true, direction: 'bottom' });
                    } else {
                        markerAutoConductor.setLatLng([latChofer, lonChofer]);
                    }

                    // Si está en viaje activo, centramos la vista entre el chofer y el pasajero
                    if (miIdReservaActiva) {
                        activarModoViajeConfirmado(`Móvil en Camino (${sentido})`);
                        document.getElementById('txt-chofer-asignado').textContent = "Carlos - Ford Fiesta";
                    }
                }
            })
            .subscribe();
    }

    async function cancelarViajePasajero() {
        if (miIdReservaActiva) {
            await _s.from('reservas_activas').delete().eq('id', miIdReservaActiva);
        }
        location.reload();
    }

    window.addEventListener('DOMContentLoaded', initPasajero);
</script>
</body>
</html>
