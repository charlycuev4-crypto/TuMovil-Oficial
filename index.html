<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONDUCTOR - MÓVIL EN VIVO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        .overlay-top {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; z-index: 1000;
        }
        .visor {
            background: rgba(0, 0, 0, 0.9); border: 2px solid #00d4ff; border-radius: 12px;
            padding: 8px; text-align: center; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .visor-label { font-size: 10px; color: #00d4ff; font-weight: bold; text-transform: uppercase; display: block; }
        .visor-num { font-size: 22px; font-weight: bold; }

        .overlay-bottom {
            position: absolute; bottom: 25px; left: 0; right: 0;
            display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 1000;
        }
        .asientos-cont {
            display: flex; gap: 10px; background: rgba(0, 0, 0, 0.9);
            padding: 12px 15px; border-radius: 20px; border: 1px solid #00d4ff;
        }
        .btn-as {
            width: 55px; height: 55px; border-radius: 12px; border: 2.5px solid #00d4ff;
            background: transparent; color: #00d4ff; font-size: 22px; font-weight: bold;
        }
        .ocupado { background: #ff3b30 !important; border-color: #ff3b30 !important; color: white !important; box-shadow: 0 0 15px #ff3b30; }

        .btn-reset {
            background: #ff3b30; color: white; border: none; padding: 15px;
            border-radius: 12px; font-weight: bold; width: 90%; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="overlay-top">
        <div class="visor">
            <span class="visor-label">RECAUDACIÓN</span>
            <div class="visor-num">$ <span id="v-dinero">0</span></div>
        </div>
        <div class="visor">
            <span class="visor-label">PASAJEROS</span>
            <div class="visor-num" id="v-pax">0</div>
        </div>
    </div>

    <div class="overlay-bottom">
        <div class="asientos-cont">
            <div id="b1" class="btn-as" style="display:flex; align-items:center; justify-content:center;">1</div>
            <div id="b2" class="btn-as" style="display:flex; align-items:center; justify-content:center;">2</div>
            <div id="b3" class="btn-as" style="display:flex; align-items:center; justify-content:center;">3</div>
            <div id="b4" class="btn-as" style="display:flex; align-items:center; justify-content:center;">4</div>
        </div>
        <button class="btn-reset" onclick="finalizarViaje()">Finalizar Viaje / Vaciar</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    const rutaOficial = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(rutaOficial[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const pts = rutaOficial.map(p => p.c);
    L.polyline(pts, {color: '#00d4ff', weight: 5, opacity: 0.6}).addTo(map);
    rutaOficial.forEach(p => {
        L.circleMarker(p.c, {radius: 5, color: '#000', fillColor: '#00d4ff', weight: 1, fillOpacity: 1}).addTo(map);
    });

    const busIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [40, 40] });
    const paxIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/1946/1946429.png', iconSize: [35, 35] }); // Icono de persona
    const destIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png', iconSize: [30, 30] }); // Icono de pin

    let markerBus = L.marker(rutaOficial[0].c, { icon: busIcon }).addTo(map);
    let markerPax = null;
    let markerDest = null;

    navigator.geolocation.watchPosition(p => {
        const pos = [p.coords.latitude, p.coords.longitude];
        markerBus.setLatLng(pos);
        _s.from('estado_movil').update({ latitud: pos[0], longitud: pos[1] }).eq('id', 1).then();
    }, null, {enableHighAccuracy: true});

    function actualizarUI(data) {
        const libres = data.asientos_libres;
        const ocupados = 4 - libres;
        document.getElementById('v-pax').innerText = ocupados;
        document.getElementById('v-dinero').innerText = ocupados * 1000;
        
        for(let i=1; i<=4; i++) {
            const btn = document.getElementById('b'+i);
            if(i <= ocupados) btn.classList.add('ocupado');
            else btn.classList.remove('ocupado');
        }

        // Lógica para Personita (Pasajero) y Destino
        if (ocupados > 0 && data.pasajero_lat && data.pasajero_lon) {
            const posPax = [data.pasajero_lat, data.pasajero_lon];
            if (!markerPax) markerPax = L.marker(posPax, { icon: paxIcon }).addTo(map).bindPopup("Pasajero");
            else markerPax.setLatLng(posPax);

            const destIdx = data.pasajero_destino; // Suponiendo que guardas el índice
            if (destIdx !== null && rutaOficial[destIdx]) {
                const posDest = rutaOficial[destIdx].c;
                if (!markerDest) markerDest = L.marker(posDest, { icon: destIcon }).addTo(map).bindPopup("Baja en: " + rutaOficial[destIdx].n);
                else markerDest.setLatLng(posDest);
            }
        } else {
            if (markerPax) { map.removeLayer(markerPax); markerPax = null; }
            if (markerDest) { map.removeLayer(markerDest); markerDest = null; }
        }
    }

    _s.channel('c1').on('postgres_changes', {event:'UPDATE', schema:'public', table:'estado_movil'}, r => {
        actualizarUI(r.new);
    }).subscribe();

    async function finalizarViaje() {
        if(confirm("¿Vaciar unidad?")) {
            await _s.from('estado_movil').update({ 
                asientos_libres: 4, 
                pasajero_lat: null, 
                pasajero_lon: null, 
                pasajero_destino: null 
            }).eq('id', 1);
        }
    }

    _s.from('estado_movil').select('*').eq('id', 1).single().then(r => {
        if(r.data) actualizarUI(r.data);
    });
</script>
</body>
</html>
