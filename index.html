<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Control - Móvil 1</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 1. Recaudación y Pasajeros */
        .stats-header { display: flex; justify-content: space-around; padding: 15px; background: #000; border-bottom: 2px solid #FFD700; }
        .stat-box { text-align: center; }
        .stat-label { color: #FFD700; font-size: 10px; text-transform: uppercase; }
        .stat-value { font-size: 26px; font-weight: bold; display: block; }

        /* 2. Interruptor y Sentido */
        .control-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: #111; gap: 10px; }
        .btn-sentido { background: #222; color: #FFD700; border: 1px solid #FFD700; padding: 12px; border-radius: 8px; font-weight: bold; flex: 1; }
        
        /* Switch Estilo iOS */
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ff3b30; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4cd964; }
        input:checked + .slider:before { transform: translateX(26px); }

        /* 3. Mapa */
        #map { flex-grow: 1; width: 100%; transition: opacity 0.5s; background: #000; }

        /* 4. Asientos */
        .cabina { padding: 15px; background: #000; }
        .grid-asientos { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .asiento { background: #111; border: 2px solid #333; border-radius: 12px; padding: 15px 5px; text-align: center; transition: 0.3s; }
        .asiento.ocupado { border-color: #4cd964; background: rgba(76, 217, 100, 0.1); }
        .as-num { font-size: 10px; color: #888; }
        .as-precio { font-size: 18px; font-weight: bold; color: #4cd964; display: block; }
    </style>
</head>
<body>

    <div class="stats-header">
        <div class="stat-box">
            <span class="stat-label">Recaudación</span>
            <span id="total-dinero" class="stat-value">$0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Pasajeros</span>
            <span id="total-pax" class="stat-value">0</span>
        </div>
    </div>

    <div class="control-bar">
        <div style="display:flex; align-items:center; gap:8px;">
            <span style="font-size:10px; color:#888;">OFF</span>
            <label class="switch">
                <input type="checkbox" id="check-linea" onchange="gestionarConexion()" checked>
                <span class="slider"></span>
            </label>
            <span style="font-size:10px; color:#4cd964; font-weight:bold;">ON</span>
        </div>
        <button id="btn-sentido" class="btn-sentido" onclick="cambiarSentido()">HACIA: IDA</button>
    </div>

    <div id="map"></div>

    <div class="cabina">
        <div class="grid-asientos" id="grid-asientos">
            </div>
    </div>

<script>
    const _s = supabase.createClient('URL_DE_TU_SUPABASE', 'TU_KEY_PUBLICA');
    
    // 34 Coordenadas (Ida y Vuelta)
    const coordenadas = [ /* Pegá acá la lista de 34 puntos que me pasaste antes */ ];
    const paradasIda = coordenadas.slice(0, 25);
    const paradasVuelta = coordenadas.slice(25);
    
    let mapa = L.map('map', { zoomControl: false }).setView(paradasIda[0], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);

    let enLinea = true;
    let sentido = 'ida';
    let markerTaxi = L.marker(paradasIda[0], { icon: L.divIcon({html:'🚕', className:'', iconSize:[30,30]}) }).addTo(mapa);

    function gestionarConexion() {
        enLinea = document.getElementById('check-linea').checked;
        const mapaDiv = document.getElementById('map');
        const cabinaDiv = document.getElementById('grid-asientos');
        
        mapaDiv.style.opacity = enLinea ? "1" : "0.2";
        mapaDiv.style.pointerEvents = enLinea ? "auto" : "none";
        cabinaDiv.style.opacity = enLinea ? "1" : "0.3";
        
        if(!enLinea) {
            mapa.removeLayer(markerTaxi);
        } else {
            markerTaxi.addTo(mapa);
        }
    }

    function cambiarSentido() {
        sentido = (sentido === 'ida') ? 'vuelta' : 'ida';
        document.getElementById('btn-sentido').innerText = "HACIA: " + sentido.toUpperCase();
        dibujarRuta();
    }

    function dibujarRuta() {
        if(window.rutaL) mapa.removeLayer(window.rutaL);
        const puntos = (sentido === 'ida') ? paradasIda : paradasVuelta;
        window.rutaL = L.polyline(puntos, { color: '#00d4ff', weight: 6 }).addTo(mapa);
        mapa.fitBounds(window.rutaL.getBounds());
    }

    async function actualizarDatos() {
        if(!enLinea) return;

        const { data: reservas } = await _s.from('reservas_activas').select('*').eq('id_movil', 1);
        
        let total = 0;
        let ocupados = [false, false, false, false];
        const grid = document.getElementById('grid-asientos');
        grid.innerHTML = "";

        reservas?.forEach(r => {
            total += r.tarifa || 1000;
            ocupados[r.asiento_num - 1] = true;
        });

        for (let i = 1; i <= 4; i++) {
            const ocupado = ocupados[i-1];
            const p = ocupado ? (reservas.find(res => res.asiento_num == i).tarifa || 1000) : "---";
            grid.innerHTML += `
                <div class="asiento ${ocupado ? 'ocupado' : ''}">
                    <span class="as-num">AS. ${i}</span>
                    <span class="as-precio">${ocupado ? '$'+p : p}</span>
                </div>`;
        }

        document.getElementById('total-dinero').innerText = "$" + total;
        document.getElementById('total-pax').innerText = reservas ? reservas.length : 0;
    }

    dibujarRuta();
    setInterval(actualizarDatos, 3000);
</script>
</body>
</html>
