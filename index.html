<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conductor - Rastreo en Tiempo Real</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
            color: #ffffff;
        }

        /* Splash Screen */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1e1e2f 0%, #0f0f1a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00ffcc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #splash h2 {
            color: #00ffcc;
            letter-spacing: 2px;
            font-size: 24px;
            margin-bottom: 5px;
        }

        #splash p {
            color: #888899;
            font-size: 14px;
        }

        /* Contenedor Principal */
        #app-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Mapa */
        #map {
            flex: 1;
            width: 100%;
            z-index: 1;
        }

        /* Panel de Control Inferior */
        .control-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(15,15,26,0.95) 85%, rgba(15,15,26,0.8));
            padding: 20px;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Velocímetro e Información */
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .speed-box {
            display: flex;
            align-items: baseline;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid rgba(0,255,204,0.2);
        }

        .speed-value {
            font-size: 36px;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0,255,204,0.3);
        }

        .speed-unit {
            font-size: 14px;
            color: #888899;
            margin-left: 5px;
        }

        .status-badge {
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(255, 193, 7, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Botones de Acción */
        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #007bff, #0056b3);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745, #1e7e34);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Ajustes estéticos para Leaflet en Modo Oscuro */
        .leaflet-layer, .leaflet-control-zoom-in, .leaflet-control-zoom-out {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }
    </style>
</head>
<body>

    <div id="splash">
        <div class="spinner"></div>
        <h2>SISTEMA CHOFER</h2>
        <p>Inicializando mapa y telemetría GPS...</p>
    </div>

    <div id="app-container">
        <div id="map"></div>

        <div class="control-panel">
            <div class="info-row">
                <div class="speed-box">
                    <span id="txt-velocidad" class="speed-value">0</span>
                    <span class="speed-unit">km/h</span>
                </div>
                <div id="badge-estado" class="status-badge">
                    <i class="fas fa-circle-notch fa-spin"></i> En Camino
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" onclick="marcarPasajeroABordo()">
                    <i class="fas fa-user-check"></i> Pasajero a Bordo
                </button>
                <button class="btn btn-success" onclick="llegoADestino()">
                    <i class="fas fa-flag-checkered"></i> Fin de Viaje
                </button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // CONFIGURACIÓN DE SUPABASE (Reemplazá con tus credenciales reales)
        const SUPABASE_URL = "https://tu-proyecto.supabase.co"; 
        const SUPABASE_KEY = "tu-anon-key-de-supabase";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Identificador único de este coche/móvil en la base de datos
        const MI_ID_MOVIL = 1; 

        // Variables Globales de Control
        let map;
        let markerCoche;
        let watchId = null;
        let velocidadActual = 0;
        let puntosRastro = [];
        const MAX_PUNTOS_RASTRO = 10;
        let rastroPolyline;

        // Icono Personalizado para el Vehículo del Chofer
        const iconoCoche = L.divIcon({
            html: '<i class="fas fa-car" style="color: #00ffcc; font-size: 28px; text-shadow: 0 0 8px rgba(0,255,204,0.8);"></i>',
            iconSize: [30, 30],
            iconAnchor: [15, 15],
            className: 'custom-div-icon'
        });

        // Inicialización del Mapa Base (Centrado por defecto en Argentina)
        map = L.map('map', { zoomControl: false }).setView([-34.6037, -58.3816], 16);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Marcador del auto y línea de recorrido (Rastro)
        markerCoche = L.marker([-34.6037, -58.3816], { icon: iconoCoche }).addTo(map);
        rastroPolyline = L.polyline([], { color: '#00ffcc', weight: 4, opacity: 0.6, dashArray: '5, 10' }).addTo(map);

        // Función para actualizar la interfaz del velocímetro
        function actualizarVelocimetro(vel) {
            document.getElementById('txt-velocidad').innerText = vel;
        }

        // Función auxiliar vacía o de actualización local requerida por los botones
        function actualizar() {
            console.log("Estado de viaje refrescado localmente.");
        }

        // ACCIÓN 1: Pasajero a bordo
        async function marcarPasajeroABordo() {
            try {
                const { data, error } = await _supabase
                    .from('estado_movil')
                    .update({ estado_viaje: 'Pasajero a bordo' })
                    .eq('id', MI_ID_MOVIL);

                if (error) throw error;

                // Actualizar interfaz visual
                const badge = document.getElementById('badge-estado');
                badge.style.background = "rgba(0, 123, 255, 0.15)";
                badge.style.color = "#007bff";
                badge.style.borderColor = "rgba(0, 123, 255, 0.3)";
                badge.innerHTML = '<i class="fas fa-user-friends"></i> En Viaje';

                actualizar();
                alert("Estado actualizado: ¡Pasajero a bordo!");
            } catch (err) {
                console.error("Error al actualizar estado:", err.message);
                alert("Error de conexión al subir pasajero.");
            }
        }

        // ACCIÓN 2: Llegó a destino
        async function llegoADestino() {
            try {
                const { data, error } = await _supabase
                    .from('estado_movil')
                    .update({ estado_viaje: 'Libre' })
                    .eq('id', MI_ID_MOVIL);

                if (error) throw error;

                // Actualizar interfaz visual
                const badge = document.getElementById('badge-estado');
                badge.style.background = "rgba(40, 167, 69, 0.15)";
                badge.style.color = "#28a745";
                badge.style.borderColor = "rgba(40, 167, 69, 0.3)";
                badge.innerHTML = '<i class="fas fa-check-circle"></i> Disponible';

                actualizar();
                alert("¡Viaje finalizado con éxito!");
            } catch (err) {
                console.error("Error al finalizar viaje:", err.message);
                alert("Error de conexión al finalizar viaje.");
            }
        }

        // PROCESO DE ARRANQUE (Evita que quede tildado el Splash)
        window.onload = () => {
            // Simulamos 2 segundos de carga para mostrar el Splash correctamente
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';

                // Activamos el Rastreo en tiempo real mediante el GPS del dispositivo
                if (navigator.geolocation) {
                    watchId = navigator.geolocation.watchPosition(
                        async (pos) => {
                            const { latitude, longitude, speed } = pos.coords;
                            
                            // Convertir velocidad de m/s a km/h de manera segura
                            velocidadActual = speed && speed > 0 ? Math.round(speed * 3.6) : 0;
                            actualizarVelocimetro(velocidadActual);

                            // Mover el marcador y centrar el mapa suavemente hacia la nueva posición
                            const nuevaPos = [latitude, longitude];
                            markerCoche.setLatLng(nuevaPos);
                            map.panTo(nuevaPos);

                            // Dibujar la línea punteada de rastro
                            puntosRastro.push(nuevaPos);
                            if (puntosRastro.length > MAX_PUNTOS_RASTRO) {
                                puntosRastro.shift(); // Mantiene solo los últimos movimientos
                            }
                            rastroPolyline.setLatLngs(puntosRastro);

                            // ENVIAR COORDENADAS A SUPABASE
                            try {
                                await _supabase
                                    .from('estado_movil')
                                    .update({ 
                                        latitud: latitude, 
                                        longitud: longitude,
                                        velocidad: velocidadActual
                                    })
                                    .eq('id', MI_ID_MOVIL);
                            } catch (dbErr) {
                                console.error("Error enviando coordenadas a Supabase:", dbErr);
                            }
                        },
                        (err) => {
                            console.error("Error de Geolocalización: ", err);
                            // Avisar si los permisos están bloqueados
                            if(
