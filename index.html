<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONDUCTOR 01 - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; color: white; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .connection-panel { position: absolute; top: 95px; left: 50%; transform: translateX(-50%); z-index: 1001; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.9); padding: 8px 12px; border-radius: 30px; border: 1px solid #FFD700; pointer-events: auto; }
        .switch { position: relative; width: 46px; height: 22px; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #444; border-radius: 22px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: #4cd964; }
        input:checked + .slider:before { transform: translateX(24px); }
        #status-label { font-size: 11px; font-weight: bold; width: 85px; text-align: center; }
        .top-stats { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; z-index: 1000; padding: 0 10px; }
        .stat-box { background: rgba(0,0,0,0.85); border: 2px solid #FFD700; border-radius: 12px; padding: 8px; width: 45%; text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: #4cd964; }
        .bottom-ui { position: absolute; bottom: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 1000; }
        .btn-vaciar { background: #ff3b30; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; pointer-events: auto; }
        #net-indicator { position: absolute; top: 140px; left: 50%; transform: translateX(-50%); z-index: 1001; padding: 4px 10px; border-radius: 10px; font-size: 10px; background: #4cd964; color: black; font-weight: bold; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="net-indicator">CONEXIÓN OK</div>
    <div class="top-stats">
        <div class="stat-box"><div>RECAUDACIÓN</div><div id="txt-plata" class="stat-value">$0</div></div>
        <div class="stat-box"><div>PASAJEROS</div><div id="txt-pax" class="stat-value" style="color:white">0</div></div>
    </div>
    <div class="connection-panel">
        <span id="status-label">DESCONECTADO</span>
        <label class="switch"><input type="checkbox" id="online-toggle" onchange="alternarConexion()"><span class="slider"></span></label>
    </div>
    <div class="bottom-ui">
        <button class="btn-vaciar" onclick="confirmarVaciar()">🏁 FINALIZAR / VACIAR</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    let online = false, watchId = null;

    const map = L.map('map', { zoomControl: false }).setView([-34.5612, -58.7705], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const marker = L.marker([-34.5612, -58.7705], {icon: L.divIcon({html:'🚕', className:'icon'})}).addTo(map);

    async function alternarConexion() {
        const toggle = document.getElementById('online-toggle');
        const lbl = document.getElementById('status-label');
        online = toggle.checked;

        if (online) {
            lbl.innerText = "CONECTANDO...";
            navigator.geolocation.getCurrentPosition(async (p) => {
                // INTENTO 1: Con nombre_conductor
                let { error } = await _s.from('estado_movil').upsert({
                    id: 1, 
                    nombre_conductor: "Carlos", 
                    esta_online: true, 
                    latitud: p.coords.latitude, 
                    longitud: p.coords.longitude,
                    ultima_actualizacion: new Date().toISOString()
                });

                // Si falla por el nombre, lo mandamos sin nombre para que al menos conecte
                if (error) {
                    console.log("Fallo nombre, reintentando basico");
                    await _s.from('estado_movil').upsert({
                        id: 1, esta_online: true, 
                        latitud: p.coords.latitude, longitud: p.coords.longitude,
                        ultima_actualizacion: new Date().toISOString()
                    });
                }

                lbl.innerText = "EN LÍNEA"; lbl.style.color = "#4cd964";
                iniciarGPS();
            }, () => { toggle.checked = false; lbl.innerText = "ERROR GPS"; });
        } else {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            await _s.from('estado_movil').update({ esta_online: false }).eq('id', 1);
            lbl.innerText = "DESCONECTADO"; lbl.style.color = "white";
        }
    }

    function iniciarGPS() {
        watchId = navigator.geolocation.watchPosition(async (p) => {
            if (online) {
                const lat = p.coords.latitude, lon = p.coords.longitude;
                marker.setLatLng([lat, lon]);
                map.panTo([lat, lon]);
                await _s.from('estado_movil').update({ latitud: lat, longitud: lon, ultima_actualizacion: new Date().toISOString() }).eq('id', 1);
            }
        }, null, { enableHighAccuracy: true });
    }

    async function actualizar() {
        const { data } = await _s.from('reservas_activas').select('*').eq('id_movil', 1).eq('estado', 'en_curso');
        if (data) {
            document.getElementById('txt-pax').innerText = data.length;
            document.getElementById('txt-plata').innerText = "$" + (data.length * 1000);
        }
    }

    async function confirmarVaciar() {
        if (confirm("¿Vaciar coche?")) {
            await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('id_movil', 1);
            actualizar();
        }
    }

    setInterval(actualizar, 5000);
</script>
</body>
</html>
