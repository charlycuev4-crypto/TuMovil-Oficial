<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conductor - Tu Móvil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* 1. PRESENTACIÓN: TEXTO CELESTE SOBRE NEGRO */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.6s;
        }
        .splash-text {
            color: #00d4ff; font-size: 40px; font-weight: bold; letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
        }

        /* 2. GPS AL 70% */
        #map { height: 70vh; width: 100%; border-bottom: 2px solid #00d4ff; }

        /* 3. MENÚ AL 30% */
        .panel { 
            height: 30vh; background: #000; padding: 10px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            position: relative;
        }

        .visor { 
            background: #000; border: 1px solid #00d4ff; border-radius: 8px; 
            padding: 5px; text-align: center; display: flex; flex-direction: column; justify-content: center;
        }
        .visor-label { font-size: 10px; color: #00d4ff; text-transform: uppercase; }
        .visor-num { font-size: 22px; font-weight: bold; color: #fff; }

        .asientos-cont { grid-column: span 2; display: flex; justify-content: space-around; align-items: center; }
        .btn-as { 
            width: 55px; height: 45px; border: 2px solid #00d4ff; border-radius: 8px; 
            font-size: 20px; font-weight: bold; color: #fff; cursor: pointer; background: transparent;
        }
        .libre { border-color: #00d4ff; color: #00d4ff; }
        .ocupado { background: #ff3b30; border-color: #ff3b30; color: #fff; }

        /* BOTÓN DE PODER FLOTANTE PEQUEÑO */
        .btn-pwr {
            position: absolute; top: -25px; right: 15px; width: 50px; height: 50px;
            border-radius: 50%; border: 2px solid #00d4ff; font-weight: bold;
            font-size: 9px; cursor: pointer; z-index: 2000;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .on { background: #000; color: #00d4ff; }
        .off { background: #ff3b30; color: #fff; border-color: #fff; display: none; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-text">TU MÓVIL</div>
    </div>

    <div id="map"></div>

    <div class="panel">
        <button id="p-on" class="btn-pwr on" onclick="power(true)">ON</button>
        <button id="p-off" class="btn-pwr off" onclick="power(false)">OFF</button>

        <div class="visor">
            <span class="visor-label">TARIFA</span>
            <span class="visor-num">$ <span id="v-dinero">0</span></span>
        </div>
        <div class="visor">
            <span class="visor-label">PASAJEROS</span>
            <span class="visor-num" id="v-pax">0</span>
        </div>

        <div class="asientos-cont">
            <button id="b1" class="btn-as libre" onclick="t(0)">1</button>
            <button id="b2" class="btn-as libre" onclick="t(1)">2</button>
            <button id="b3" class="btn-as libre" onclick="t(2)">3</button>
            <button id="b4" class="btn-as libre" onclick="t(3)">4</button>
        </div>
    </div>

<script>
    // Splash logic
    window.onload = () => { setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => document.getElementById('splash').style.display = 'none', 600); }, 2000); };

    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let activo = false;
    let recaudado = 0;
    let pasajeros = 0;
    let est = [true, true, true, true];

    function power(v) {
        activo = v;
        document.getElementById('p-on').style.display = v ? 'none' : 'flex';
        document.getElementById('p-off').style.display = v ? 'flex' : 'none';
    }

    async function t(i) {
        if(!activo) return;
        if(est[i]) { recaudado += 1000; pasajeros += 1; }
        est[i] = !est[i];
        document.getElementById('b'+(i+1)).className = 'btn-as ' + (est[i] ? 'libre' : 'ocupado');
        document.getElementById('v-dinero').innerText = recaudado;
        document.getElementById('v-pax').innerText = pasajeros;
        await _s.from('estado_movil').update({ asientos_libres: est.filter(x=>x).length }).eq('id', 1);
    }

    // Mapa centrado
    const map = L.map('map', { zoomControl: false }).setView([-34.575, -58.775], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [35, 35] });
    let marker = L.marker([-34.575, -58.775], {icon: carIcon}).addTo(map);

    navigator.geolocation.watchPosition(p => {
        if(!activo) return;
        const pos = [p.coords.latitude, p.coords.longitude];
        marker.setLatLng(pos); map.panTo(pos);
        _s.from('estado_movil').update({ latitud: pos[0], longitud: pos[1] }).eq('id', 1);
    }, null, { enableHighAccuracy: true });
</script>
</body>
</html>
