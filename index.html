<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONDUCTOR 01 - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .ui-overlay { position: absolute; width: 100%; z-index: 1000; pointer-events: none; }

        /* ✅ TAMAÑO AGRANDADO 25-30% */
        .top-stats { top: 12px; display: flex; justify-content: space-around; padding: 0 12px; }
        .stat-box { 
            background: rgba(0,0,0,0.85); 
            border: 2px solid #FFD700; 
            border-radius: 14px; 
            padding: 10px; 
            width: 45%; 
            text-align: center; 
            color: white; 
            pointer-events: auto; 
        }
        .stat-label { color: #FFD700; font-size: 13px; font-weight: 700; }
        .stat-value { font-size: 30px; font-weight: 800; }
        .green { color: #4cd964; }

        .connection-panel { 
            position: absolute; 
            top: 110px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 1001; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            background: rgba(0,0,0,0.9); 
            padding: 10px 16px; 
            border-radius: 30px; 
            border: 1px solid #FFD700; 
            pointer-events: auto; 
        }
        .switch { position: relative; width: 52px; height: 26px; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #444; border-radius: 26px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: #4cd964; }
        input:checked + .slider:before { transform: translateX(26px); }
        #status-label { color: white; font-size: 13px; font-weight: bold; width: 100px; text-align: center; }
        #btn-sentido { background: #FFD700; border: none; padding: 8px 16px; border-radius: 18px; font-weight: 800; font-size: 14px; }

        #panel-parada { 
            position: absolute; 
            top: 165px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 1001; 
            background: rgba(0,0,0,0.9); 
            color: #FFD700; 
            padding: 8px 20px; 
            border-radius: 22px; 
            font-size: 14px; 
            font-weight: bold; 
            border: 1px solid #FFD700; 
            display:none; 
        }

        /* ✅ PANEL DE ANUNCIO DE PARADA - MÁS GRANDE */
        #panel-anuncio-parada {
            position: absolute;
            top: 215px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #00d2ff;
            padding: 14px 24px;
            border-radius: 18px;
            font-size: 15px;
            font-weight: bold;
            border: 2px solid #00d2ff;
            display: none;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.3);
            animation: pulseBorder 2s infinite;
            max-width: 92%;
            min-width: 280px;
        }
        #panel-anuncio-parada .anuncio-titulo { color: #FFD700; font-size: 13px; margin-bottom: 6px; }
        #panel-anuncio-parada .anuncio-nombre { color: white; font-size: 16px; }
        @keyframes pulseBorder {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); }
            50% { box-shadow: 0 0 35px rgba(0, 210, 255, 0.6); }
        }

        .leaflet-tooltip { background: #000 !important; color: #FFD700 !important; border: 1.5px solid #FFD700 !important; font-weight: bold !important; font-size: 14px !important; }

        /* ✅ ICONO DE AUTO DESDE ARRIBA CON ROTACIÓN SUAVE */
        .auto-icon-container {
            transition: transform 0.3s ease-out;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }
        .auto-icon-container.activo {
            animation: pulsoAuto 2s infinite;
        }
        @keyframes pulsoAuto {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(0, 210, 255, 0.5)); }
            50% { filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.9)); }
        }

        /* Rastro del auto (como Waze) */
        .rastro-auto {
            stroke: #00d2ff;
            stroke-width: 4;
            stroke-opacity: 0.6;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        /* Precisión GPS */
        .precision-gps {
            fill: rgba(0, 210, 255, 0.15);
            stroke: rgba(0, 210, 255, 0.4);
            stroke-width: 1;
        }

        .bottom-ui { 
            position: absolute; 
            bottom: 25px; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            z-index: 1000; 
        }

        /* ✅ BOTONES AGRANDADOS */
        .btn-subir-abordo { 
            background: #00d2ff; 
            color: black; 
            border: none; 
            padding: 14px 36px; 
            border-radius: 28px; 
            font-weight: bold; 
            pointer-events: auto; 
            margin-bottom: 10px; 
            display: none; 
            animation: pulseBtn 1.5s infinite;
            font-size: 16px;
        }
        .btn-llego-destino { 
            background: #28a745; 
            color: white; 
            border: none; 
            padding: 14px 36px; 
            border-radius: 28px; 
            font-weight: bold; 
            pointer-events: auto; 
            margin-bottom: 10px; 
            display: none;
            font-size: 16px;
        }
        .btn-vaciar { 
            background: #ff3b30; 
            color: white; 
            border: none; 
            padding: 14px 36px; 
            border-radius: 28px; 
            font-weight: bold; 
            pointer-events: auto; 
            font-size: 16px;
        }

        @keyframes pulseBtn {
            0%, 100% { transform: scale(1); box-shadow: 0 0 12px rgba(0, 210, 255, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 210, 255, 0.8); }
        }

        /* ✅ PILLS AGRANDADOS */
        .asientos-pills { display: flex; gap: 10px; margin-bottom: 18px; pointer-events: auto; }
        .pill { 
            width: 58px; 
            height: 58px; 
            border: 2px solid #FFD700; 
            border-radius: 14px; 
            color: #FFD700; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            background: rgba(0,0,0,0.85); 
            position: relative; 
            cursor: pointer; 
            transition: all 0.3s; 
            font-size: 18px;
        }
        .pill.active { background: #4cd964; border-color: #4cd964; color: black; }
        .pill.a-bordo { background: #00d2ff; border-color: #00d2ff; color: black; }
        .pill .nombre-pax { 
            position: absolute; 
            bottom: -20px; 
            font-size: 9px; 
            color: white; 
            white-space: nowrap; 
            background: rgba(0,0,0,0.8); 
            padding: 2px 5px; 
            border-radius: 5px; 
            display: none; 
        }
        .pill.active .nombre-pax, .pill.a-bordo .nombre-pax { display: block; }

        /* ✅ ALERTA DE RESERVA AGRANDADA */
        .alerta-reserva {
            position: fixed; top: 0; left: 0; right: 0;
            background: linear-gradient(180deg, #ff3b30 0%, #c0392b 100%);
            color: white; padding: 24px; text-align: center;
            z-index: 10000; transform: translateY(-100%); transition: transform 0.5s ease;
            box-shadow: 0 10px 30px rgba(255, 59, 48, 0.5);
        }
        .alerta-reserva.mostrar { transform: translateY(0); }
        .alerta-reserva h2 { margin: 0 0 10px 0; font-size: 26px; animation: pulseText 1s infinite; }
        .alerta-reserva p { margin: 0; font-size: 16px; opacity: 0.9; }
        .alerta-reserva .btn-atender { 
            background: white; 
            color: #ff3b30; 
            border: none; 
            padding: 14px 36px; 
            border-radius: 28px; 
            font-weight: bold; 
            font-size: 18px; 
            margin-top: 14px; 
            cursor: pointer; 
        }
        @keyframes pulseText { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* Panel de velocidad */
        #panel-velocidad {
            position: absolute;
            top: 165px;
            right: 12px;
            z-index: 1001;
            background: rgba(0,0,0,0.85);
            border: 2px solid #00d2ff;
            border-radius: 14px;
            padding: 8px 14px;
            text-align: center;
            color: white;
            pointer-events: auto;
            display: none;
        }
        #panel-velocidad .vel-label { color: #00d2ff; font-size: 10px; font-weight: 700; }
        #panel-velocidad .vel-value { font-size: 24px; font-weight: 800; color: #00d2ff; }
        #panel-velocidad .vel-unit { font-size: 10px; color: #888; }

        .wakelock-indicator { 
            position: absolute; 
            top: 290px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 1001; 
            background: rgba(0,0,0,0.8); 
            color: #4cd964; 
            padding: 5px 14px; 
            border-radius: 18px; 
            font-size: 11px; 
            display: none; 
            border: 1px solid #4cd964; 
        }
        .wakelock-indicator.activo { display: block; }
    </style>
</head>
<body>
    <div class="alerta-reserva" id="alerta-reserva">
        <h2>🔔 ¡NUEVA SOLICITUD!</h2>
        <p id="alerta-texto">Alguien quiere subir a tu coche</p>
        <button class="btn-atender" onclick="cerrarAlerta()">ATENDER</button>
    </div>

    <div id="map"></div>
    <div class="ui-overlay top-stats">
        <div class="stat-box"><div>RECAUDACIÓN</div><div id="txt-plata" class="stat-value green">$0</div></div>
        <div class="stat-box"><div>PASAJEROS</div><div id="txt-pax" class="stat-value">0</div></div>
    </div>
    <div class="connection-panel">
        <span id="status-label">DESCONECTADO</span>
        <label class="switch"><input type="checkbox" id="online-toggle" onchange="gestionarConexion()"><span class="slider"></span></label>
        <button id="btn-sentido" onclick="cambiarSentido()">IDA</button>
    </div>
    <div id="panel-parada">📍 Parada: <span id="txt-parada">--</span></div>
    <div id="panel-anuncio-parada">
        <div class="anuncio-titulo">🚏 PRÓXIMA PARADA</div>
        <div class="anuncio-nombre" id="anuncio-parada-nombre">--</div>
    </div>
    <div id="panel-velocidad">
        <div class="vel-label">VELOCIDAD</div>
        <div class="vel-value" id="txt-velocidad">0</div>
        <div class="vel-unit">km/h</div>
    </div>
    <div class="wakelock-indicator" id="wakelock-indicator">🔒 Pantalla bloqueada activa</div>
    <div class="bottom-ui">
        <div class="asientos-pills">
            <div id="pill1" class="pill" onclick="liberarAsiento(1)">1<span class="nombre-pax" id="nombre-pax-1"></span></div>
            <div id="pill2" class="pill" onclick="liberarAsiento(2)">2<span class="nombre-pax" id="nombre-pax-2"></span></div>
            <div id="pill3" class="pill" onclick="liberarAsiento(3)">3<span class="nombre-pax" id="nombre-pax-3"></span></div>
            <div id="pill4" class="pill" onclick="liberarAsiento(4)">4<span class="nombre-pax" id="nombre-pax-4"></span></div>
        </div>
        <button class="btn-subir-abordo" id="btn-subir-abordo" onclick="marcarPasajeroABordo()">✅ PASAJERO SUBIÓ</button>
        <button class="btn-llego-destino" id="btn-llego-destino" onclick="llegoADestino()">🏁 LLEGÓ A DESTINO</button>
        <button class="btn-vaciar" onclick="confirmarVaciar()">🧹 VACIAR TODO</button>
    </div>

<script>
    const MI_ID_MOVIL = 1;
    const MI_NOMBRE = "Carlos - Ford Fiesta JCP 478";
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    let estaOnline = false, watchId = null, sentidoActual = 'IDA';
    let ultimaVezEnviado = 0;
    let ultimaCantidadReservas = 0;
    let wakeLock = null;
    let audioContext = null;

    // ============================================
    // VARIABLES PARA NAVEGACIÓN POR PARADAS
    // ============================================
    let paradasAnunciadas = new Map();
    let ultimaParadaAnunciada = -1;
    let audioCtx = null;
    let ultimaPosicionGPS = { lat: 0, lon: 0 };
    let historialParadas = [];
    let direccionDetectada = 'IDA';

    // ============================================
    // VARIABLES GPS REALISTA - ROTACIÓN Y RASTRO
    // ============================================
    let historialPosiciones = [];
    let anguloActual = 0;
    let suavizadoAngulo = 0;
    let rastroPolyline = null;
    let precisionCircle = null;
    let velocidadActual = 0;
    const MAX_PUNTOS_RASTRO = 100;
    let puntosRastro = [];

    // ============================================
    // 28 PARADAS (mismo orden que el pasajero)
    // ============================================
    const paradas = [
        {n:'Universidad Tecnológica', c:[-34.549295, -58.783648]},
        {n:'Parque Tecnológico', c:[-34.551586, -58.781403]},
        {n:'Base Aérea', c:[-34.554132, -58.778927]},
        {n:'Miguel Cané', c:[-34.561264, -58.770506]},
        {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]},
        {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]},
        {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]},
        {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]},
        {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]},
        {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]},
        {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]},
        {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]},
        {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]},
        {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]},
        {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]},
        {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Ruta: IDA = ROJO, VUELTA = CELESTE
    const rutaLine = L.polyline(paradas.map(p => p.c), { color: '#FF0000', weight: 8, opacity: 0.7 }).addTo(map);

    // Paradas: Bolitas CELESTES con borde NEGRO
    paradas.forEach(p => L.circleMarker(p.c, { radius: 7, color: '#000000', weight: 2, fillColor: '#00BFFF', fillOpacity: 1 }).addTo(map));

    // ============================================
    // 🚗 ICONO DE AUTO DESDE ARRIBA (TECHO) CON ROTACIÓN
    // ============================================
    function crearIconoAuto(angulo) {
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" width="55" height="77">
            <defs>
                <filter id="sombra" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.5)"/>
                </filter>
                <linearGradient id="gradCarroceria" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#FFD700"/>
                    <stop offset="50%" style="stop-color:#FFC800"/>
                    <stop offset="100%" style="stop-color:#E6B800"/>
                </linearGradient>
                <linearGradient id="gradTecho" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#FFF2A8"/>
                    <stop offset="100%" style="stop-color:#E6C200"/>
                </linearGradient>
            </defs>
            <!-- Sombra del auto -->
            <ellipse cx="50" cy="115" rx="28" ry="18" fill="rgba(0,0,0,0.25)"/>

            <!-- Carrocería principal (vista desde arriba) -->
            <rect x="18" y="25" width="64" height="85" rx="20" fill="url(#gradCarroceria)" stroke="#1a1a1a" stroke-width="2.5" filter="url(#sombra)"/>

            <!-- Parabrisas delantero -->
            <path d="M 22 32 Q 50 18 78 32" fill="#1a2a3a" stroke="#333" stroke-width="1.5"/>

            <!-- Luneta trasera -->
            <path d="M 22 103 Q 50 117 78 103" fill="#1a2a3a" stroke="#333" stroke-width="1.5"/>

            <!-- Techo -->
            <rect x="26" y="42" width="48" height="52" rx="10" fill="url(#gradTecho)" stroke="#1a1a1a" stroke-width="1.2"/>

            <!-- Líneas de las puertas -->
            <line x1="18" y1="68" x2="82" y2="68" stroke="#1a1a1a" stroke-width="1" opacity="0.4"/>

            <!-- Luces delanteras -->
            <ellipse cx="24" cy="30" rx="7" ry="4" fill="#fff" opacity="0.95"/>
            <ellipse cx="76" cy="30" rx="7" ry="4" fill="#fff" opacity="0.95"/>
            <ellipse cx="24" cy="30" rx="4" ry="2" fill="#e6f7ff" opacity="0.8"/>
            <ellipse cx="76" cy="30" rx="4" ry="2" fill="#e6f7ff" opacity="0.8"/>

            <!-- Luces traseras -->
            <ellipse cx="24" cy="105" rx="7" ry="4" fill="#ff3b30" opacity="0.95"/>
            <ellipse cx="76" cy="105" rx="7" ry="4" fill="#ff3b30" opacity="0.95"/>
            <ellipse cx="24" cy="105" rx="4" ry="2" fill="#ff6b6b" opacity="0.8"/>
            <ellipse cx="76" cy="105" rx="4" ry="2" fill="#ff6b6b" opacity="0.8"/>

            <!-- Flecha de dirección (siempre apunta ARRIBA = adelante) -->
            <polygon points="50,5 38,22 62,22" fill="#00d2ff" stroke="#1a1a1a" stroke-width="1.5"/>
            <polygon points="50,10 42,20 58,20" fill="#80e5ff"/>

            <!-- Antena -->
            <line x1="50" y1="25" x2="50" y2="8" stroke="#444" stroke-width="2" stroke-linecap="round"/>
            <circle cx="50" cy="8" r="3" fill="#00d2ff" stroke="#1a1a1a" stroke-width="1"/>
            <circle cx="50" cy="8" r="1.5" fill="#fff"/>

            <!-- Espejos retrovisores -->
            <rect x="10" y="55" width="8" height="14" rx="3" fill="#FFD700" stroke="#1a1a1a" stroke-width="1.5"/>
            <rect x="82" y="55" width="8" height="14" rx="3" fill="#FFD700" stroke="#1a1a1a" stroke-width="1.5"/>

            <!-- Placa delantera -->
            <rect x="38" y="24" width="24" height="6" rx="2" fill="#fff" stroke="#1a1a1a" stroke-width="1"/>
            <text x="50" y="28.5" text-anchor="middle" font-size="4" font-weight="bold" fill="#1a1a1a">JCP 478</text>
        </svg>`;

        const svgBase64 = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));

        return L.icon({
            iconUrl: svgBase64,
            iconSize: [55, 77],
            iconAnchor: [27, 38],
            popupAnchor: [0, -38],
            className: 'auto-icon-container'
        });
    }

    // Crear marker con icono inicial
    let markerCoche = L.marker(paradas[0].c, { 
        icon: crearIconoAuto(0),
        zIndexOffset: 1000
    }).addTo(map);

    // Rastro del auto (como Waze)
    rastroPolyline = L.polyline([], {
        className: 'rastro-auto',
        smoothFactor: 1
    }).addTo(map);

    // Círculo de precisión GPS
    precisionCircle = L.circle(paradas[0].c, {
        className: 'precision-gps',
        radius: 10
    }).addTo(map);

    let markersPax = [], markersDest = [];

    // ============================================
    // WAKE LOCK
    // ============================================
    async function activarWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                document.getElementById('wakelock-indicator').classList.add('activo');
                wakeLock.addEventListener('release', () => {
                    document.getElementById('wakelock-indicator').classList.remove('activo');
                });
            }
        } catch (err) { console.error('Error Wake Lock:', err); }
    }

    async function liberarWakeLock() {
        if (wakeLock) { await wakeLock.release(); wakeLock = null; }
    }

    // ============================================
    // SONIDO DE ALARMA
    // ============================================
    function inicializarAudio() {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === 'suspended') audioContext.resume();
    }

    function reproducirAlarma() {
        inicializarAudio();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
        oscillator.frequency.setValueAtTime(1100, audioContext.currentTime + 0.1);
        oscillator.frequency.setValueAtTime(880, audioContext.currentTime + 0.2);
        oscillator.frequency.setValueAtTime(1100, audioContext.currentTime + 0.3);
        oscillator.frequency.setValueAtTime(880, audioContext.currentTime + 0.4);
        gainNode.gain.setValueAtTime(0.8, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.5);
        setTimeout(() => {
            const osc2 = audioContext.createOscillator();
            const gain2 = audioContext.createGain();
            osc2.connect(gain2); gain2.connect(audioContext.destination);
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(440, audioContext.currentTime);
            gain2.gain.setValueAtTime(0.6, audioContext.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.8);
            osc2.start(audioContext.currentTime); osc2.stop(audioContext.currentTime + 0.8);
        }, 200);
    }

    // ============================================
    // 🧭 GPS REALISTA - CÁLCULO DE DIRECCIÓN (HEADING)
    // ============================================
    function calcularAnguloDireccion(lat1, lon1, lat2, lon2) {
        const φ1 = lat1 * Math.PI / 180;
        const φ2 = lat2 * Math.PI / 180;
        const Δλ = (lon2 - lon1) * Math.PI / 180;

        const y = Math.sin(Δλ) * Math.cos(φ2);
        const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
        let θ = Math.atan2(y, x);

        let angulo = (θ * 180 / Math.PI + 360) % 360;
        return angulo;
    }

    function suavizarRotacion(anguloNuevo, anguloActual, factor = 0.15) {
        let diff = anguloNuevo - anguloActual;
        while (diff > 180) diff -= 360;
        while (diff < -180) diff += 360;
        return (anguloActual + diff * factor + 360) % 360;
    }

    function calcularDistanciaMetros(lat1, lon1, lat2, lon2) {
        const R = 111320;
        const dLat = (lat2 - lat1) * R;
        const dLon = (lon2 - lon1) * R * Math.cos(lat1 * Math.PI / 180);
        return Math.sqrt(dLat * dLat + dLon * dLon);
    }

    // ============================================
    // GPS INTELIGENTE: DETECTAR DIRECCIÓN POR SECUENCIA
    // ============================================
    function detectarDireccionPorSecuencia(paradaActualIdx) {
        historialParadas.push(paradaActualIdx);
        if (historialParadas.length > 5) historialParadas.shift();

        if (historialParadas.length < 2) return sentidoActual;

        let tendencia = 0;
        for (let i = 1; i < historialParadas.length; i++) {
            if (historialParadas[i] > historialParadas[i-1]) tendencia++;
            else if (historialParadas[i] < historialParadas[i-1]) tendencia--;
        }

        const nuevaDireccion = tendencia >= 0 ? 'IDA' : 'VUELTA';

        if (Math.abs(tendencia) >= 2 && nuevaDireccion !== direccionDetectada) {
            console.log('🧭 GPS Inteligente: dirección cambiada de', direccionDetectada, 'a', nuevaDireccion, '(tendencia:', tendencia, ')');
            direccionDetectada = nuevaDireccion;
            if (estaOnline) {
                _s.from('estado_movil').update({ sentido_flujo: direccionDetectada }).eq('id', MI_ID_MOVIL);
            }
            sentidoActual = direccionDetectada;
            document.getElementById('btn-sentido').innerText = sentidoActual;
            rutaLine.setStyle({ color: sentidoActual === 'IDA' ? '#FF0000' : '#00BFFF' });
        }

        return direccionDetectada;
    }

    // ============================================
    // NAVEGACIÓN POR PARADAS
    // ============================================
    function inicializarAudioNavegacion() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function obtenerPasajeroQueBaja(destinoIdx, reservasActivas) {
        const reserva = reservasActivas.find(r => r.destino_idx === destinoIdx && r.estado === 'en_curso' && r.estado_pasajero === 'a_bordo');
        return reserva ? reserva.nombre_pasajero : null;
    }

    function anunciarParadaNavegacion(nombreParada, nombrePasajero) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        let texto;
        if (nombrePasajero) texto = 'Próxima parada: ' + nombreParada + '. Baja ' + nombrePasajero + '.';
        else texto = 'Siguiente parada: ' + nombreParada + '.';
        const utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = 'es-AR'; utterance.rate = 0.9; utterance.pitch = 1; utterance.volume = 1;
        window.speechSynthesis.speak(utterance);
        reproducirCampanaSuave();
    }

    function reproducirCampanaSuave() {
        inicializarAudioNavegacion();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.4);
        setTimeout(() => {
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2); gain2.connect(audioCtx.destination);
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(1174.66, audioCtx.currentTime);
            gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc2.start(audioCtx.currentTime); osc2.stop(audioCtx.currentTime + 0.3);
        }, 150);
    }

    function obtenerSiguienteParadaDesdePosicion(paradaActualIdx) {
        const direccion = direccionDetectada;
        if (direccion === 'IDA') {
            for (let i = paradaActualIdx + 1; i < paradas.length; i++) return i;
            return -1;
        } else {
            for (let i = paradaActualIdx - 1; i >= 0; i--) return i;
            return -1;
        }
    }

    async function verificarNavegacionParadas(lat, lon, reservasActivas) {
        const paradaActual = calcularCercana(lat, lon);
        const paradaActualIdx = paradaActual.idx;

        detectarDireccionPorSecuencia(paradaActualIdx);

        const siguienteParadaIdx = obtenerSiguienteParadaDesdePosicion(paradaActualIdx);

        if (siguienteParadaIdx === -1) {
            document.getElementById('panel-anuncio-parada').style.display = 'none';
            return;
        }

        const siguienteParada = paradas[siguienteParadaIdx];
        const distanciaMetros = calcularDistanciaMetros(lat, lon, siguienteParada.c[0], siguienteParada.c[1]);

        const panelAnuncio = document.getElementById('panel-anuncio-parada');
        const nombreAnuncio = document.getElementById('anuncio-parada-nombre');
        const pasajeroBaja = obtenerPasajeroQueBaja(siguienteParadaIdx, reservasActivas);
        nombreAnuncio.innerText = siguienteParada.n + (pasajeroBaja ? ' — ' + pasajeroBaja : '');
        panelAnuncio.style.display = 'block';

        const ahora = Date.now();
        const ultimaVezAnunciada = paradasAnunciadas.get(siguienteParadaIdx) || 0;
        const tiempoDesdeUltimoAnuncio = ahora - ultimaVezAnunciada;
        const enRango = distanciaMetros >= 50 && distanciaMetros <= 400;
        const puedeAnunciar = tiempoDesdeUltimoAnuncio > 60000;

        if (enRango && puedeAnunciar) {
            const nombrePasajero = obtenerPasajeroQueBaja(siguienteParadaIdx, reservasActivas);
            anunciarParadaNavegacion(siguienteParada.n, nombrePasajero);
            paradasAnunciadas.set(siguienteParadaIdx, ahora);
            ultimaParadaAnunciada = siguienteParadaIdx;

            const mensajeDB = nombrePasajero
                ? '🚏 Próxima parada: ' + siguienteParada.n + '\n👤 ' + nombrePasajero + ', preparate para bajar'
                : '🚏 Próxima parada: ' + siguienteParada.n;

            try {
                const { data: reservasDestino } = await _s.from('reservas_activas')
                    .select('id, nombre_pasajero')
                    .eq('id_movil', MI_ID_MOVIL)
                    .eq('estado', 'en_curso')
                    .eq('destino_idx', siguienteParadaIdx);

                if (reservasDestino) {
                    for (const r of reservasDestino) {
                        await _s.from('reservas_activas')
                            .update({ anuncio_parada: mensajeDB, anuncio_visto: false })
                            .eq('id', r.id);
                    }
                }
                console.log('✅ Anuncio guardado en BD para parada', siguienteParadaIdx);
            } catch (err) {
                console.error('❌ Error guardando anuncio en BD:', err);
            }
        }

        paradasAnunciadas.forEach((timestamp, idx) => {
            if (ahora - timestamp > 300000) {
                paradasAnunciadas.delete(idx);
                console.log('🧹 Parada', idx, 'liberada por antigüedad');
            }
        });
    }

    function calcularCercana(lat, lon) {
        let min = Infinity, idx = -1, nombre = "";
        paradas.forEach((p, i) => {
            let d = Math.sqrt(Math.pow(p.c[0]-lat,2) + Math.pow(p.c[1]-lon,2));
            if(d < min) { min = d; idx = i; nombre = p.n; }
        });
        return { nombre, idx, min };
    }

    async function gestionarConexion() {
        const toggle = document.getElementById('online-toggle'), label = document.getElementById('status-label');
        estaOnline = toggle.checked;
        if (estaOnline) {
            label.innerText = "CONECTANDO...";
            inicializarAudio();

            if (cocheActual && cocheActual.sentido_flujo) {

                document.getElementById('btn-sentido').innerText = sentidoActual;
                rutaLine.setStyle({ color: sentidoActual === 'IDA' ? '#FF0000' : '#00BFFF' });
            }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude, lon = pos.coords.longitude;
                const paradaInfo = calcularCercana(lat, lon);
                const datos = { 
                    esta_online: true, 
                    latitud: lat, 
                    longitud: lon, 
                    sentido_flujo: sentidoActual, 
                    disponible_desde: paradaInfo.idx,
                    ultima_actualizacion: new Date().toISOString(), 
                    chofer: MI_NOMBRE 
                };

                let { error } = await _s.from('estado_movil').update(datos).eq('id', MI_ID_MOVIL);

                if (error) {
                    label.innerText = "ERROR DB";
                    toggle.checked = false;
                } else {

                    document.getElementById('panel-parada').style.display = 'block';
                    document.getElementById('panel-velocidad').style.display = 'block';
                    activarWakeLock();
                    iniciarGPS();
                }
            }, (err) => { 
                toggle.checked = false; 
                label.innerText = "ERROR GPS"; 
            }, { enableHighAccuracy: true, timeout: 10000 });
        } else {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            await _s.from('estado_movil').update({ esta_online: false }).eq('id', MI_ID_MOVIL);
            label.innerText = "DESCONECTADO"; 
            label.style.color = "white";
            document.getElementById('panel-parada').style.display = 'none';
            document.getElementById('panel-anuncio-parada').style.display = 'none';
            document.getElementById('panel-velocidad').style.display = 'none';
            liberarWakeLock();
            cerrarAlerta();
        }
    }

    // ============================================
    // 🚗 GPS CON ROTACIÓN REALISTA, RASTRO Y VELOCIDAD
    // ============================================
    function iniciarGPS() {
        const opcionesGPS = { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 };

        watchId = navigator.geolocation.watchPosition(async (p) => {
            const ahora = Date.now();
            const lat = p.coords.latitude;
            const lon = p.coords.longitude;
            const precision = p.coords.accuracy || 10;
            const velocidadMs = p.coords.speed || 0;
            const headingNativo = p.coords.heading;

            // Calcular velocidad en km/h
            velocidadActual = Math.round(velocidadMs * 3.6);
            document.getElementById('txt-velocidad').innerText = velocidadActual;

            // Guardar posición en historial para calcular dirección
            historialPosiciones.push({ lat, lon, tiempo: ahora });
            if (historialPosiciones.length > 8) historialPosiciones.shift();

            // Calcular dirección (heading)
            let anguloNuevo = null;

            // 1. Primero intentar usar heading nativo del GPS (más preciso)
            if (headingNativo !== null && !isNaN(headingNativo) && velocidadMs > 0.5) {
                anguloNuevo = headingNativo;
            }
            // 2. Si no hay heading nativo, calcular con las últimas posiciones
            else if (historialPosiciones.length >= 2) {
                const anterior = historialPosiciones[historialPosiciones.length - 2];
                const distancia = calcularDistanciaMetros(anterior.lat, anterior.lon, lat, lon);
                if (distancia > 2) { // Solo si nos movimos más de 2 metros
                    anguloNuevo = calcularAnguloDireccion(anterior.lat, anterior.lon, lat, lon);
                }
            }

            // Suavizar rotación
            if (anguloNuevo !== null) {
                suavizadoAngulo = suavizarRotacion(anguloNuevo, suavizadoAngulo, 0.2);
                anguloActual = suavizadoAngulo;
            }

            ultimaPosicionGPS = { lat, lon };

            // Actualizar marker con rotación
            markerCoche.setLatLng([lat, lon]);

            // Aplicar rotación al icono
            const iconoElement = markerCoche.getElement();
            if (iconoElement) {
                const img = iconoElement.querySelector('img');
                if (img) {
                    img.style.transform = `rotate(${anguloActual}deg)`;
                    img.style.transition = 'transform 0.3s ease-out';
                }
            }

            // Actualizar rastro (como Waze)
            puntosRastro.push([lat, lon]);
            if (puntosRastro.length > MAX_PUNTOS_RASTRO) puntosRastro.shift();
            rastroPolyline.setLatLngs(puntosRastro);

            // Actualizar círculo de precisión GPS
            precisionCircle.setLatLng([lat, lon]);
            precisionCircle.setRadius(precision);

            map.panTo([lat, lon]);

            const paradaInfo = calcularCercana(lat, lon);
            document.getElementById('txt-parada').innerText = paradaInfo.nombre;

            // FILTRO DE 5 SEGUNDOS PARA NO RECALENTAR EL CELULAR
            if (estaOnline && (ahora - ultimaVezEnviado > 5000)) { 
                ultimaVezEnviado = ahora;

                await _s.from('estado_movil').update({ 
                    latitud: lat, 
                    longitud: lon, 
                    disponible_desde: paradaInfo.idx,
                    sentido_flujo: direccionDetectada,
                    ultima_actualizacion: new Date().toISOString() 
                }).eq('id', MI_ID_MOVIL);
            }
        }, null, opcionesGPS);
    }

    // ============================================
    // ACTUALIZAR RESERVAS
    // ============================================
    async function actualizar() {
        const { data: reservas } = await _s.from('reservas_activas').select('*').eq('id_movil', MI_ID_MOVIL).eq('estado', 'en_curso');

        if (reservas) {
            if (reservas.length > ultimaCantidadReservas && estaOnline) {
                const nuevasReservas = reservas.slice(ultimaCantidadReservas);
                const nombresNuevos = nuevasReservas.map(r => r.nombre_pasajero).join(', ');
                const asientosNuevos = nuevasReservas.map(r => r.asiento_num);
                mostrarAlertaReserva(nombresNuevos, asientosNuevos);
            }
            ultimaCantidadReservas = reservas.length;

            markersPax.forEach(m => map.removeLayer(m));
            markersDest.forEach(m => map.removeLayer(m));
            markersPax = []; markersDest = [];

            document.getElementById('txt-pax').innerText = reservas.length;
            document.getElementById('txt-plata').innerText = "$" + (reservas.length * 1000);
            for(let i=1; i<=4; i++) { 
                document.getElementById('pill'+i).className = 'pill'; 
                document.getElementById('nombre-pax-'+i).innerText = ''; 
            }

            let pasajerosEsperando = 0;
            let pasajerosABordo = 0;

            reservas.forEach(r => {
                if(r.asiento_num <= 4) {
                    const pill = document.getElementById('pill'+r.asiento_num);
                    if (r.estado_pasajero === 'a_bordo') {
                        pill.className = 'pill a-bordo';
                        pasajerosABordo++;
                    } else {
                        pill.className = 'pill active';
                        pasajerosEsperando++;
                    }
                    document.getElementById('nombre-pax-'+r.asiento_num).innerText = r.nombre_pasajero;
                }
                if (r.pasajero_lat) {
                    const mp = L.circleMarker([r.pasajero_lat, r.pasajero_lon], { color: 'red', radius: 8 }).addTo(map).bindTooltip(r.nombre_pasajero);
                    markersPax.push(mp);
                }
                if (paradas[r.destino_idx]) {
                    const md = L.marker(paradas[r.destino_idx].c).addTo(map).bindTooltip('BAJA: ' + r.nombre_pasajero, { permanent: true, direction: 'top' });
                    markersDest.push(md);
                }
            });

            const btnSubir = document.getElementById('btn-subir-abordo');
            const btnLlego = document.getElementById('btn-llego-destino');

            if (pasajerosEsperando > 0) {
                btnSubir.style.display = 'block';
                btnSubir.innerText = '✅ PASAJERO SUBIÓ (' + pasajerosEsperando + ')';
            } else {
                btnSubir.style.display = 'none';
            }

            if (pasajerosABordo > 0) {
                btnLlego.style.display = 'block';
                btnLlego.innerText = '🏁 LLEGÓ A DESTINO (' + pasajerosABordo + ')';
            } else {
                btnLlego.style.display = 'none';
            }

            const latLng = markerCoche.getLatLng();
            if (latLng) verificarNavegacionParadas(latLng.lat, latLng.lng, reservas);
        } else {
            document.getElementById('btn-subir-abordo').style.display = 'none';
            document.getElementById('btn-llego-destino').style.display = 'none';
            document.getElementById('txt-pax').innerText = '0';
            document.getElementById('txt-plata').innerText = '$0';
        }
    }

                .eq('estado', 'en_curso');

            if (reservas) {
                for (const r of reservas) {
                    await _s.from('viajes').insert({
                        nombre_pasajero: r.nombre_pasajero,
                        id_movil: MI_ID_MOVIL,
                        asiento_num: r.asiento_num,
                        destino_idx: r.destino_idx,
                        pasajero_lat: r.pasajero_lat,
                        pasajero_lon: r.pasajero_lon,
                        precio: 1000,
                        estado: 'finalizado',
                        fecha: new Date().toISOString()
                    });
                    await _s.from('reservas_activas').delete().eq('id', r.id);
                }
            }

            paradasAnunciadas.clear();
            ultimaParadaAnunciada = -1;
            historialParadas = [];
            actualizar();
        }
    }

    document.addEventListener('visibilitychange', async () => {
        if (estaOnline && document.visibilityState === 'visible') { if (!wakeLock) await activarWakeLock(); }
    });

    async function sincronizarSentidoInicial() {
        try {
            const { data: coche, error } = await _s.from('estado_movil').select('sentido_flujo').eq('id', MI_ID_MOVIL).single();
            if (error) return;
            if (coche && coche.sentido_flujo) {
                sentidoActual = coche.sentido_flujo;
                direccionDetectada = sentidoActual;
                document.getElementById('btn-sentido').innerText = sentidoActual;
                rutaLine.setStyle({ color: sentidoActual === 'IDA' ? '#FF0000' : '#00BFFF' });
            }
        } catch (err) { console.error('Error sincronizando sentido:', err); }
    }

    sincronizarSentidoInicial();
    setInterval(actualizar, 4000);
</script>
</body>
</html>
