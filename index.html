<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conductor - Ruta de Ida</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; }
        #map { flex-grow: 1; width: 100%; }
        .panel { background: #121212; padding: 10px; text-align: center; border-top: 1px solid #333; }
        .grid { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .btn { width: 60px; height: 55px; font-size: 20px; font-weight: bold; border: 2px solid white; border-radius: 12px; cursor: pointer; color: white; }
        .libre { background: #28a745; } .ocupado { background: #dc3545; }
        .status { color: #2ecc71; font-size: 11px; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="panel">
        <div class="status">🛰️ TRANSMITIENDO RUTA DE IDA</div>
        <div class="grid">
            <button id="a1" class="btn libre" onclick="toggle(0)">1</button>
            <button id="a2" class="btn libre" onclick="toggle(1)">2</button>
            <button id="a3" class="btn libre" onclick="toggle(2)">3</button>
            <button id="a4" class="btn libre" onclick="toggle(3)">4</button>
        </div>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    // 1. INICIAR MAPA
    const map = L.map('map', { zoomControl: false }).setView([-34.5612, -58.7705], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. RUTA DE IDA CORREGIDA (Puntos clave)
    const puntosRuta = [
        [-34.561264, -58.770506], [-34.562160, -58.771380], [-34.563541, -58.773244],
        [-34.564109, -58.773759], [-34.569090, -58.767095], [-34.571016, -58.764443],
        [-34.588273, -58.751338], [-34.588930, -58.750543]
    ];

    // Dibujar línea azul y puntos de parada
    L.polyline(puntosRuta, { color: '#3498db', weight: 5, opacity: 0.7 }).addTo(map);
    puntosRuta.forEach(p => L.circleMarker(p, { radius: 4, color: '#3498db', fillOpacity: 1 }).addTo(map));

    // 3. ICONO AUTO ROJO 🚗
    const iconoAuto = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png',
        iconSize: [38, 38], iconAnchor: [19, 19]
    });
    let marker = L.marker(puntosRuta[0], { icon: iconoAuto }).addTo(map);

    // 4. GPS REAL
    navigator.geolocation.watchPosition(async (pos) => {
        const { latitude, longitude } = pos.coords;
        marker.setLatLng([latitude, longitude]);
        map.panTo([latitude, longitude]);
        await _s.from('estado_movil').update({ latitud: latitude, longitud: longitude }).eq('id', 1);
    }, null, { enableHighAccuracy: true });

    // 5. BOTONES ASIENTOS
    let est = [true, true, true, true];
    async function toggle(i) {
        est[i] = !est[i];
        document.getElementById('a'+(i+1)).className = 'btn ' + (est[i] ? 'libre' : 'ocupado');
        const libres = est.filter(x => x).length;
        await _s.from('estado_movil').update({ asientos_libres: libres }).eq('id', 1);
    }
</script>
</body>
</html>
