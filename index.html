<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tu Móvil - Ruta Oficial</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #mapa-osm { height: 100vh; width: 100%; background: #f0f0f0; }
        body { margin: 0; padding: 0; overflow: hidden; }
    </style>
</head>
<body>
    <div id="mapa-osm"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 1. DATOS DE CONEXIÓN (Verificados de tus capturas)
        const SB_URL = "https://nvumdlxervrewqiiaicl.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52dW1kbHhlcnZyZXdxaWlhaWNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTA4NTMsImV4cCI6MjA4OTg4Njg1M30.ejh7dtL2O6JJeoVq47cUK_hXAfRetJPyzks1yI-Lrhs";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        // 2. INICIALIZAR MAPA CENTRADO EN SANTA BRÍGIDA
        // Coordenadas de la primera parada: Miguel Cané y Marchena
        var map = L.map('mapa-osm', { zoomControl: false }).setView([-34.561264, -58.770506], 15);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 3. CARGAR LAS 20 PARADAS DESDE LA TABLA
        async function cargarPuntos() {
            const { data: paradas, error } = await sb
                .from('paradas')
                .select('*')
                .order('orden', { ascending: true });

            if (error) {
                console.error("Error conectando a Supabase:", error.message);
                return;
            }

            const rutaCoordenadas = [];

            paradas.forEach(p => {
                if (p.latitud && p.longitud) {
                    const posicion = [p.latitud, p.longitud];
                    
                    // Dibujar el circulito de la parada
                    L.circleMarker(posicion, {
                        radius: 8,
                        color: '#007bff',
                        fillColor: '#ffffff',
                        fillOpacity: 1,
                        weight: 3
                    }).addTo(map).bindPopup("<b>Parada " + p.orden + "</b><br>" + p.nombre);

                    rutaCoordenadas.push(posicion);
                }
            });

            // 4. DIBUJAR LA LÍNEA DE RECORRIDO
            if (rutaCoordenadas.length > 1) {
                L.polyline(rutaCoordenadas, {
                    color: '#007bff',
                    weight: 5,
                    opacity: 0.7
                }).addTo(map);

                // Ajustar el zoom para que se vean todas las paradas juntas
                map.fitBounds(rutaCoordenadas, { padding: [40, 40] });
            }
        }

        cargarPuntos();
    </script>
</body>
</html>
