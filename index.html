<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONDUCTOR PRO - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #f0f0f0; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        /* UI Estilo Premium */
        .ui-overlay { position: absolute; width: 100%; z-index: 1000; pointer-events: none; }
        
        header { background: #111; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #FFD700; pointer-events: auto; }
        header h1 { color: #FFD700; margin: 0; font-size: 14px; text-transform: uppercase; }

        .top-stats { top: 70px; display: flex; justify-content: space-around; padding: 0 10px; }
        .stat-box { background: rgba(0,0,0,0.9); border: 2px solid #00d4ff; border-radius: 12px; padding: 8px; width: 46%; text-align: center; color: white; pointer-events: auto; }
        
        .bottom-ui { bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        .btn-vaciar { background: #ff3b30; color: white; border: none; padding: 16px 30px; border-radius: 15px; font-weight: bold; font-size: 14px; pointer-events: auto; box-shadow: 0 4px 15px rgba(255,59,48,0.4); text-transform: uppercase; }
        
        /* Switch Online/Offline */
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4cd964; }
        input:checked + .slider:before { transform: translateX(22px); }

        /* Asientos (Pills) */
        .asientos-pills { display: flex; gap: 8px; margin-bottom: 12px; pointer-events: auto; flex-wrap: wrap; justify-content: center; }
        .pill { min-width: 45px; height: 45px; border: 2px solid #00d4ff; border-radius: 12px; color: #00d4ff; display: flex; align-items: center; justify-content: center; font-weight: bold; background: rgba(0,0,0,0.8); font-size: 13px; padding: 0 8px; }
        .pill.active { background: #FFD700; border-color: #FFD700; color: black; box-shadow: 0 0 10px #FFD700; }
        
        .taxi-icon { font-size: 30px; }
        .offline-overlay { position: absolute; top: 60px; left: 0; width: 100%; height: calc(100% - 60px); background: rgba(0,0,0,0.8); z-index: 2000; display: flex; justify-content: center; align-items: center; text-align: center; color: white; display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Móvil 1 - Chofer</h1>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span id="txt-status" style="color: #888; font-size: 11px;">OFFLINE</span>
            <label class="switch">
                <input type="checkbox" id="gps-switch" onchange="toggleServicio()">
                <span class="slider"></span>
            </label>
        </div>
    </header>

    <div id="map"></div>
    <div id="offline-screen" class="offline-overlay">
        <div>
            <h2 style="color: #ff3b30;">MODO PRIVADO</h2>
            <p>Tu ubicación está oculta.</p>
        </div>
    </div>

    <div class="ui-overlay top-stats">
        <div class="stat-box"><small>CAJA HOY</small><div id="txt-plata" style="font-size:20px; font-weight:800; color:#4cd964;">$0</div></div>
        <div class="stat-box"><small>EN VIAJE</small><div id="txt-pax" style="font-size:20px; font-weight:800;">0/4</div></div>
    </div>

    <div class="ui-overlay bottom-ui">
        <div class="asientos-pills">
            <div id="pill1" class="pill">1</div>
            <div id="pill2" class="pill">2</div>
            <div id="pill3" class="pill">3</div>
            <div id="pill4" class="pill">4</div>
        </div>
        <button class="btn-vaciar" onclick="vaciarTodo()">Finalizar Recorrido / Vaciar</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    const paradas = [
        {n:'M. Cané y Marchena', c:[-34.561128, -58.770586]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 15);
    // GPS MODO DÍA
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.polyline(paradas.map(p => p.c), { color: '#00d4ff', weight: 5, opacity: 0.5 }).addTo(map);

    const iconTaxi = L.divIcon({ html: '🚕', className: 'taxi-icon', iconAnchor: [15, 15] });
    const marcadorConductor = L.marker(paradas[0].c, { icon: iconTaxi }).addTo(map);

    let markersPax = [];
    let watchID = null;

    async function toggleServicio() {
        const online = document.getElementById('gps-switch').checked;
        document.getElementById('txt-status').innerText = online ? "ONLINE" : "OFFLINE";
        document.getElementById('txt-status').style.color = online ? "#4cd964" : "#888";
        document.getElementById('offline-screen').style.display = online ? "none" : "flex";

        if (online) {
            watchID = navigator.geolocation.watchPosition(async p => {
                const { latitude, longitude } = p.coords;
                marcadorConductor.setLatLng([latitude, longitude]);
                map.panTo([latitude, longitude]);
                await _s.from('conductores').update({ lat: latitude, lon: longitude, online: true }).eq('nombre', 'Móvil 1');
            }, null, { enableHighAccuracy: true });
        } else {
            navigator.geolocation.clearWatch(watchID);
            await _s.from('conductores').update({ online: false }).eq('nombre', 'Móvil 1');
        }
    }

    async function actualizarMapa() {
        markersPax.forEach(m => map.removeLayer(m));
        markersPax = [];
        
        for(let i=1; i<=4; i++) {
            const p = document.getElementById('pill'+i);
            p.className = 'pill'; p.innerText = i;
        }

        const { data: reservas } = await _s.from('reservas_activas').select('*').eq('estado', 'en_curso');

        if (reservas) {
            document.getElementById('txt-pax').innerText = reservas.length + "/4";
            document.getElementById('txt-plata').innerText = '$' + (reservas.length * 1000);

            reservas.forEach(res => {
                const pill = document.getElementById('pill' + res.asiento_num);
                if(pill) {
                    pill.className = 'pill active';
                    pill.innerText = res.nombre_pasajero.substring(0, 6);
                }
                
                const pM = L.circleMarker([res.lat_pax, res.lon_pax], { color: 'red', radius: 10, fillOpacity: 0.8 }).addTo(map)
                    .bindTooltip(res.nombre_pasajero + " (Sube)", { permanent: true, direction: 'top' });
                markersPax.push(pM);
            });
        }
    }

    async function vaciarTodo() {
        if(!confirm("¿Vaciar todos los asientos?")) return;
        await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('estado', 'en_curso');
        await _s.from('conductores').update({ pasajeros_actuales: 0 }).eq('nombre', 'Móvil 1');
        actualizarMapa();
    }

    setInterval(actualizarMapa, 5000);
    actualizarMapa();
</script>
</body>
</html>
