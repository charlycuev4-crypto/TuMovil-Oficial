<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tu Móvil Santa Brígida - Panel</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 400px; width: 100%; border-radius: 10px; }
        .btn-asiento {
            width: 50px; height: 50px; margin: 5px;
            border: 2px solid #007bff; background: white;
            color: #007bff; font-weight: bold; cursor: pointer; border-radius: 8px;
        }
        .btn-asiento.seleccionado { background: #007bff; color: white; }
        .panel-control { padding: 15px; font-family: sans-serif; background: #f8f9fa; }
        .btn-gps {
            padding: 15px; background: #28a745; color: white;
            font-weight: bold; width: 100%; border: none; border-radius: 5px; margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="panel-control">
        <button class="btn-gps" onclick="iniciarGpsCarlos()">📍 INICIAR RECORRIDO (GPS EN VIVO)</button>

        <hr>

        <h3>Reservar Asiento</h3>
        <div id="contenedor-asientos">
            <button class="btn-asiento" onclick="seleccionarAsiento(1, this)">1</button>
            <button class="btn-asiento" onclick="seleccionarAsiento(2, this)">2</button>
            <button class="btn-asiento" onclick="seleccionarAsiento(3, this)">3</button>
            <button class="btn-asiento" onclick="seleccionarAsiento(4, this)">4</button>
        </div>

        <div style="margin-top: 15px;">
            <label><b>¿Hacia qué parada vas?</b></label><br>
            <select id="select-destino" style="width: 100%; padding: 10px; margin-top: 5px;">
                <option value="">Cargando paradas...</option>
            </select>
        </div>

        <button onclick="confirmarViaje()" style="margin-top: 15px; width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold;">
            CONFIRMAR MI VIAJE
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 1. CONFIGURACIÓN DE SUPABASE (Carlos: Asegurate que estos datos sean los tuyos)
        const _supabase = supabase.createClient('TU_URL_DE_SUPABASE', 'TU_ANON_KEY');

        // 2. INICIALIZAR MAPA
        var map = L.map('map').setView([-34.561128, -58.770586], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // Marcador del Auto de Carlos
        var marcadorAuto = L.marker([-34.561128, -58.770586]).addTo(map).bindPopup("Tu Móvil Oficial");

        let asientoElegido = null;

        // --- FUNCIONES DEL CONDUCTOR (CARLOS) ---
        function iniciarGpsCarlos() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    
                    // Actualizar Supabase
                    await _supabase.from('estado_movil').update({ 
                        latitud: latitude, 
                        longitud: longitude,
                        ultima_actualizacion: new Date().toISOString()
                    }).eq('id', 1);
                }, null, { enableHighAccuracy: true });
                alert("GPS Iniciado. ¡Buen viaje Carlos!");
            }
        }

        // --- FUNCIONES DEL PASAJERO ---
        function seleccionarAsiento(num, btn) {
            asientoElegido = num;
            document.querySelectorAll('.btn-asiento').forEach(b => b.classList.remove('seleccionado'));
            btn.classList.add('seleccionado');
        }

        async function cargarParadas() {
            const { data: paradas } = await _supabase.from('paradas').select('*').order('orden');
            const selector = document.getElementById('select-destino');
            selector.innerHTML = '<option value="">Selecciona tu destino...</option>';
            paradas.forEach(p => {
                let opt = document.createElement('option');
                opt.value = p.id;
                opt.text = p.nombre;
                selector.appendChild(opt);
            });
        }

        async function confirmarViaje() {
            const destinoId = document.getElementById('select-destino').value;
            if (!asientoElegido || !destinoId) return alert("Elegí asiento y destino");

            // Aquí restamos un asiento en la base de datos
            await _supabase.from('estado_movil').update({ asientos_libres: 3 }).eq('id', 1);
            alert("Viaje confirmado. ¡Nos vemos en la parada!");
        }

        // --- REALTIME (EL PUENTE) ---
        _supabase.channel('movimiento').on('postgres_changes', { 
            event: 'UPDATE', schema: 'public', table: 'estado_movil' 
        }, payload => {
            const { latitud, longitud } = payload.new;
            if (latitud && longitud) {
                marcadorAuto.setLatLng([latitud, longitud]);
            }
        }).subscribe();

        // Cargar datos al iniciar
        cargarParadas();
    </script>
</body>
</html>
