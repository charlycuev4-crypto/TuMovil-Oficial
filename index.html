<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - Pasajero PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; color: white; height: 100vh; overflow: hidden; }
        
        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.8s ease-out;
        }
        .splash-logo { font-size: 80px; margin-bottom: 20px; animation: pulse 2s infinite; }
        .splash-title { color: #FFD700; font-size: 32px; font-weight: 900; letter-spacing: 4px; margin: 0; }
        .loader { width: 40px; height: 40px; border: 3px solid rgba(255,215,0,0.2); border-top: 3px solid #FFD700; border-radius: 50%; margin-top: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* App UI */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .top-ui { position: absolute; top: 10px; width: 100%; padding: 0 15px; z-index: 1000; }
        .dest-card { background: rgba(25, 25, 25, 0.95); border: 2px solid #00d4ff; border-radius: 15px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        input#nombre-pax { width: 100%; background: rgba(255,255,255,0.1); color: #4cd964; border: 1px solid #4cd964; border-radius: 8px; padding: 10px; font-weight: bold; font-size: 16px; outline: none; }
        select { width: 100%; background: #222; color: white; border: 1px solid #333; border-radius: 8px; padding: 10px; font-size: 16px; }
        
        .bottom-panel { position: absolute; bottom: 15px; width: 92%; left: 4%; background: rgba(15, 15, 15, 0.95); border: 2px solid #00d4ff; border-radius: 25px; padding: 15px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        #resumen-viaje { background: rgba(76, 217, 100, 0.15); border: 1px dashed #4cd964; border-radius: 12px; padding: 8px; text-align: center; display: none; }
        .resaltado { color: #4cd964; font-weight: 800; font-size: 18px; }
        
        .asientos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn-as { aspect-ratio: 1; border: 2px solid #00d4ff; border-radius: 12px; background: transparent; color: #00d4ff; font-size: 18px; font-weight: bold; }
        .btn-as.selected { background: #4cd964 !important; color: #000 !important; border-color: #4cd964 !important; }
        .btn-as.occupied { background: #333 !important; color: #555 !important; border-color: #444 !important; pointer-events: none; }
        
        .btn-confirm { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; font-size: 15px; background: #333; color: #666; pointer-events: none; transition: 0.3s; }
        .btn-confirm.ready { background: #00d4ff !important; color: black !important; pointer-events: auto !important; }
        .btn-cancel { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; font-size: 15px; background: #ff3b30; color: white; display: none; }
        
        .taxi-icon { font-size: 28px; }
        .user-icon { font-size: 22px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-logo">🚕</div>
        <h1 class="splash-title">TU MÓVIL</h1>
        <p class="splash-sub">BIENVENIDO PASAJERO</p>
        <div class="loader"></div>
    </div>

    <div class="top-ui">
        <div class="dest-card">
            <input type="text" id="nombre-pax" placeholder="TU NOMBRE" oninput="validarFormulario()">
            <select id="select-destino" onchange="validarFormulario()">
                <option value="" disabled selected>--- ¿A DÓNDE VAS? ---</option>
            </select>
        </div>
    </div>
    
    <div id="map"></div>

    <div class="bottom-panel">
        <div id="resumen-viaje"><p style="margin:0; font-size:13px;">Asientos: <span class="resaltado" id="cant-resumen">0</span> | Total: <span class="resaltado" id="precio-resumen">$0</span></p></div>
        <div class="asientos-grid" id="grid-asientos">
            <button class="btn-as" id="b1" onclick="toggleAsiento(1)">1</button>
            <button class="btn-as" id="b2" onclick="toggleAsiento(2)">2</button>
            <button class="btn-as" id="b3" onclick="toggleAsiento(3)">3</button>
            <button class="btn-as" id="b4" onclick="toggleAsiento(4)">4</button>
        </div>
        <button id="btn-accion" class="btn-confirm" onclick="confirmarReserva()">Confirmar Reserva</button>
        <button id="btn-finalizar" class="btn-cancel" onclick="finalizarViaje()">Finalizar Mi Viaje</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    const rutaOficial = [
        {n:'Miguel Cané', c:[-34.561128, -58.770586]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const sel = document.getElementById('select-destino');
    rutaOficial.forEach((p,i) => { sel.innerHTML += `<option value="${i}">${p.n}</option>`; });

    const map = L.map('map', { zoomControl: false }).setView(rutaOficial[10].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const iconTaxi = L.divIcon({ html: '🚕', className: 'taxi-icon', iconAnchor: [15, 15] });
    const iconUser = L.divIcon({ html: '👤', className: 'user-icon', iconAnchor: [12, 12] });
    let mTaxi = L.marker([0,0], { icon: iconTaxi }).addTo(map);
    let mYo = L.marker([0,0], { icon: iconUser }).addTo(map);
    const mDest = L.marker([0,0]).addTo(map); mDest.setOpacity(0);

    let miLat, miLon, asientosElegidos = [];

    // BLOQUEO: Obtener ocupación real para deshabilitar botones
    async function chequearAsientosOcupados() {
        const { data } = await _s.from('reservas_activas').select('asiento_num').eq('estado', 'en_curso');
        const ocupados = data ? data.map(r => r.asiento_num) : [];
        
        for(let i=1; i<=4; i++) {
            const btn = document.getElementById('b'+i);
            // Si el asiento está ocupado y NO es de los que yo elegí ahora
            if(ocupados.includes(i) && !asientosElegidos.includes(i)) {
                btn.classList.add('occupied');
            } else {
                btn.classList.remove('occupied');
            }
        }
    }

    async function tickConductor() {
        const { data } = await _s.from('conductores').select('*').eq('nombre', 'Móvil 1').single();
        if (data && data.online) mTaxi.setLatLng([data.lat, data.lon]);
        chequearAsientosOcupados();
    }
    setInterval(tickConductor, 5000);

    navigator.geolocation.watchPosition(p => {
        miLat = p.coords.latitude; miLon = p.coords.longitude;
        mYo.setLatLng([miLat, miLon]);
    }, null, { enableHighAccuracy: true });

    function toggleAsiento(n) {
        if(localStorage.getItem('viaje_en_curso')) return;
        const idx = asientosElegidos.indexOf(n);
        if (idx > -1) {
            asientosElegidos.splice(idx, 1);
            document.getElementById('b'+n).classList.remove('selected');
        } else {
            asientosElegidos.push(n);
            document.getElementById('b'+n).classList.add('selected');
        }
        actualizarResumen(); validarFormulario();
    }

    function actualizarResumen() {
        document.getElementById('cant-resumen').innerText = asientosElegidos.length;
        document.getElementById('precio-resumen').innerText = '$' + (asientosElegidos.length * 1000);
        document.getElementById('resumen-viaje').style.display = asientosElegidos.length > 0 ? 'block' : 'none';
    }

    function validarFormulario() {
        const d = document.getElementById('select-destino').value;
        const n = document.getElementById('nombre-pax').value.trim();
        if (d !== "" && rutaOficial[d]) mDest.setLatLng(rutaOficial[d].c).setOpacity(1);
        if(asientosElegidos.length > 0 && d !== "" && n !== "") document.getElementById('btn-accion').classList.add('ready');
        else document.getElementById('btn-accion').classList.remove('ready');
    }

    async function confirmarReserva() {
        const btn = document.getElementById('btn-accion');
        btn.innerText = "RESERVANDO...";
        btn.classList.remove('ready');

        const n = document.getElementById('nombre-pax').value.trim();
        const d = document.getElementById('select-destino').value;

        const reservas = asientosElegidos.map(num => ({
            asiento_num: num, 
            lat_pax: miLat, // Nombre corregido
            lon_pax: miLon, // Nombre corregido
            destino_idx: d, 
            nombre_pasajero: n, 
            estado: 'en_curso'
        }));

        const { error } = await _s.from('reservas_activas').insert(reservas);
        
        if(!error) { 
            localStorage.setItem('viaje_en_curso', 'true'); 
            localStorage.setItem('mi_nombre', n); 
            // CAMBIO: No hacemos reload, solo cambiamos la UI
            recuperarEstado();
        } else {
            alert("Error al reservar. Intenta de nuevo.");
            btn.innerText = "Confirmar Reserva";
            btn.classList.add('ready');
        }
    }

    async function finalizarViaje() {
        if(!confirm("¿Ya bajaste?")) return;
        const nom = localStorage.getItem('mi_nombre');
        await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('estado', 'en_curso').eq('nombre_pasajero', nom);
        localStorage.clear(); 
        location.reload(); // Para resetear la app limpia
    }

    async function recuperarEstado() {
        if(localStorage.getItem('viaje_en_curso')) {
            const nom = localStorage.getItem('mi_nombre');
            const { data } = await _s.from('reservas_activas').select('*').eq('estado', 'en_curso').eq('nombre_pasajero', nom);
            
            if(data && data.length > 0) {
                document.getElementById('nombre-pax').value = nom; 
                document.getElementById('nombre-pax').disabled = true;
                const dIdx = data[0].destino_idx; 
                document.getElementById('select-destino').value = dIdx; 
                document.getElementById('select-destino').disabled = true;
                
                if(rutaOficial[dIdx]) mDest.setLatLng(rutaOficial[dIdx].c).setOpacity(1);
                
                document.getElementById('btn-accion').style.display = 'none'; 
                document.getElementById('btn-finalizar').style.display = 'block';
                
                asientosElegidos = data.map(r => r.asiento_num);
                // Limpiar botones antes de marcar
                for(let i=1; i<=4; i++) document.getElementById('b'+i).classList.remove('selected');
                asientosElegidos.forEach(n => document.getElementById('b' + n).classList.add('selected'));
                actualizarResumen();
            } else { 
                localStorage.clear(); 
                location.reload();
            }
        }
        // Ocultar Splash
        const spl = document.getElementById('splash');
        if(spl) { spl.style.opacity = '0'; setTimeout(() => spl.style.display = 'none', 800); }
    }

    // Inicio
    setTimeout(recuperarEstado, 1000);
    tickConductor();
</script>
</body>
</html>
