<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Conductor - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; text-align: center; }
        .header { background: #FFD700; color: black; padding: 15px; font-weight: bold; font-size: 20px; }
        
        /* BOTONES DE ESTADO */
        .status-bar { display: flex; justify-content: space-around; padding: 15px; background: #222; }
        .btn-status { padding: 10px 20px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .online { background: #4cd964; color: black; }
        .offline { background: #ff3b30; color: white; }

        /* SWITCH DE SENTIDO */
        .sentido-container { margin: 20px; padding: 20px; border: 2px solid #FFD700; border-radius: 15px; }
        .btn-sentido { width: 100%; padding: 15px; font-size: 18px; border-radius: 10px; border: none; font-weight: bold; margin-top: 10px; }
        .ida { background: #00d4ff; color: black; }
        .vuelta { background: #FFD700; color: black; }

        /* LISTA DE PASAJEROS */
        #lista-pax { margin: 20px; text-align: left; }
        .pax-item { background: #333; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #4cd964; }
    </style>
</head>
<body>

    <div class="header">MÓVIL #1 - PANEL DE CONTROL</div>

    <div class="status-bar">
        <button id="btn-conectar" class="btn-status online" onclick="cambiarEstado(true)">EN LÍNEA</button>
        <button id="btn-desconectar" class="btn-status offline" onclick="cambiarEstado(false)">SALIR DE LÍNEA</button>
    </div>

    <div class="sentido-container">
        <p>SENTIDO ACTUAL:</p>
        <button id="btn-sentido" class="btn-sentido ida" onclick="toggleSentido()">HACIA ABASTO (IDA)</button>
    </div>

    <div id="lista-pax">
        <h3 style="text-align: center;">Pasajeros Asignados (0/4)</h3>
        </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let idMovil = 1; 
    let enLinea = true;
    let sentidoIda = true; // true = Ida, false = Vuelta

    // 1. Cambiar estado (Online/Offline)
    async function cambiarEstado(estado) {
        enLinea = estado;
        document.getElementById('btn-conectar').style.opacity = estado ? "1" : "0.3";
        document.getElementById('btn-desconectar').style.opacity = estado ? "0.3" : "1";
        
        await _s.from('estado_movil').update({ en_servicio: estado }).eq('id', idMovil);
        if(!estado) alert("Ya no eres visible para los pasajeros.");
    }

    // 2. Cambiar Sentido (El botón inteligente)
    function toggleSentido() {
        sentidoIda = !sentidoIda;
        const btn = document.getElementById('btn-sentido');
        if(sentidoIda) {
            btn.innerText = "HACIA ABASTO (IDA)";
            btn.className = "btn-sentido ida";
        } else {
            btn.innerText = "HACIA CANÉ (VUELTA)";
            btn.className = "btn-sentido vuelta";
        }
        actualizarPasajeros();
    }

    // 3. Ver pasajeros que el sistema le asignó
    async function actualizarPasajeros() {
        if(!enLinea) return;

        const { data } = await _s.from('reservas_activas')
            .select('*')
            .eq('id_movil', idMovil)
            .eq('estado', 'en_curso');

        const lista = document.getElementById('lista-pax');
        lista.innerHTML = `<h3 style="text-align:center">Pasajeros: ${data.length}/4</h3>`;
        
        data.forEach(p => {
            lista.innerHTML += `
                <div class="pax-item">
                    <b>${p.nombre_pasajero}</b> - Asiento: ${p.asiento_num}<br>
                    <small>Destino: Parada ${p.destino_idx}</small>
                    <button onclick="finalizarViaje(${p.id})" style="float:right">Llegó</button>
                </div>`;
        });
    }

    async function finalizarViaje(idReserva) {
        await _s.from('reservas_activas').delete().eq('id', idReserva);
        actualizarPasajeros();
    }

    // GPS: Solo envía si está En Línea
    navigator.geolocation.watchPosition(async p => {
        if(enLinea) {
            await _s.from('estado_movil').update({ 
                latitud: p.coords.latitude, 
                longitud: p.coords.longitude 
            }).eq('id', idMovil);
        }
    });

    setInterval(actualizarPasajeros, 3000);
</script>
</body>
</html>
