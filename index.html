<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - Pasajero</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; color: white; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        /* UI Superior */
        .top-ui { position: absolute; top: 10px; width: 100%; padding: 0 15px; z-index: 1000; }
        .dest-card { background: rgba(15, 15, 15, 0.95); border: 2px solid #00d4ff; border-radius: 15px; padding: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input#nombre-pax { width: 100%; background: rgba(255,255,255,0.05); color: #FFD700; border: 1px solid #444; border-radius: 8px; padding: 12px; font-weight: bold; font-size: 16px; margin-bottom: 8px; }
        select { width: 100%; background: #222; color: white; border: 1px solid #444; border-radius: 8px; padding: 10px; font-size: 15px; }

        /* Panel Inferior */
        .bottom-panel { position: absolute; bottom: 20px; width: 92%; left: 4%; background: rgba(10, 10, 10, 0.98); border: 2px solid #FFD700; border-radius: 20px; padding: 15px; z-index: 1000; }
        #resumen-viaje { background: rgba(255, 215, 0, 0.1); border: 1px dashed #FFD700; border-radius: 10px; padding: 8px; text-align: center; margin-bottom: 10px; display: none; }
        .resaltado { color: #FFD700; font-weight: bold; font-size: 18px; }
        
        .asientos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
        .btn-as { aspect-ratio: 1; border: 2px solid #444; border-radius: 12px; background: #1a1a1a; color: #888; font-size: 18px; font-weight: bold; }
        .btn-as.selected { background: #FFD700 !important; color: #000 !important; border-color: #FFD700 !important; }
        .btn-as.occupied { background: #333 !important; color: #555 !important; border-color: #222 !important; pointer-events: none; }

        .btn-confirm { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; background: #333; color: #666; pointer-events: none; text-transform: uppercase; }
        .btn-confirm.ready { background: #FFD700 !important; color: black !important; pointer-events: auto !important; box-shadow: 0 4px 15px rgba(255,215,0,0.3); }
        .btn-cancel { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; background: #ff3b30; color: white; display: none; }
    </style>
</head>
<body>
    <div class="top-ui">
        <div class="dest-card">
            <input type="text" id="nombre-pax" placeholder="TU NOMBRE (Ej: Carlos)" oninput="validarFormulario()">
            <select id="select-destino" onchange="validarFormulario()">
                <option value="" disabled selected>--- ¿A DÓNDE VAS? ---</option>
            </select>
        </div>
    </div>
    
    <div id="map"></div>

    <div class="bottom-panel">
        <div id="resumen-viaje"><p style="margin:0; font-size:13px;">Reserva: <span class="resaltado" id="cant-resumen">0</span> | Total: <span class="resaltado" id="precio-resumen">$0</span></p></div>
        <div class="asientos-grid" id="grid-asientos">
            <button class="btn-as" id="b1" onclick="toggleAsiento(1)">1</button>
            <button class="btn-as" id="b2" onclick="toggleAsiento(2)">2</button>
            <button class="btn-as" id="b3" onclick="toggleAsiento(3)">3</button>
            <button class="btn-as" id="b4" onclick="toggleAsiento(4)">4</button>
        </div>
        <button id="btn-accion" class="btn-confirm" onclick="confirmarReserva()">Confirmar Reserva</button>
        <button id="btn-finalizar" class="btn-cancel" onclick="finalizarViaje()">Finalizar Mi Viaje</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    // TUS 26 PARADAS OFICIALES
    const rutaOficial = [
        {n:'M. Cané y Marchena', c:[-34.561128, -58.770586]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const sel = document.getElementById('select-destino');
    rutaOficial.forEach((p,i) => { sel.innerHTML += `<option value="${i}">${p.n}</option>`; });

    const map = L.map('map', { zoomControl: false }).setView(rutaOficial[0].c, 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // Dibujar Ruta y Paradas (Estilo TuMovil)
    L.polyline(rutaOficial.map(p => p.c), {color: '#00d4ff', weight: 4, opacity: 0.5}).addTo(map);
    rutaOficial.forEach(p => L.circleMarker(p.c, { radius: 5, color: '#FFD700', fillColor: '#000', fillOpacity: 1 }).addTo(map));

    const iconTaxi = L.divIcon({ html: '🚕', className: 'taxi-icon', iconAnchor: [15, 15] });
    let mTaxi = L.marker([0,0], { icon: iconTaxi }).addTo(map);
    const mDest = L.marker([0,0]).addTo(map); mDest.setOpacity(0);

    let miLat, miLon, asientosElegidos = [];

    async function actualizarAuto() {
        const { data } = await _s.from('conductores').select('*').eq('nombre', 'Móvil 1').single();
        if (data) {
            mTaxi.setLatLng([data.lat, data.lon]);
            // Bloquear asientos que el chofer ya tiene ocupados
            for(let i=1; i<=4; i++) {
                const btn = document.getElementById('b'+i);
                if(i <= data.pasajeros_actuales) {
                    btn.classList.add('occupied');
                    btn.innerText = "X";
                } else {
                    btn.classList.remove('occupied');
                    btn.innerText = i;
                }
            }
        }
    }
    setInterval(actualizarAuto, 4000);

    navigator.geolocation.watchPosition(p => {
        miLat = p.coords.latitude; miLon = p.coords.longitude;
    }, null, { enableHighAccuracy: true });

    function toggleAsiento(n) {
        if(localStorage.getItem('viaje_en_curso')) return;
        const idx = asientosElegidos.indexOf(n);
        if (idx > -1) {
            asientosElegidos.splice(idx, 1);
            document.getElementById('b'+n).classList.remove('selected');
        } else {
            asientosElegidos.push(n);
            document.getElementById('b'+n).classList.add('selected');
        }
        actualizarResumen();
        validarFormulario();
    }

    function actualizarResumen() {
        document.getElementById('cant-resumen').innerText = asientosElegidos.length;
        document.getElementById('precio-resumen').innerText = '$' + (asientosElegidos.length * 1000);
        document.getElementById('resumen-viaje').style.display = asientosElegidos.length > 0 ? 'block' : 'none';
    }

    function validarFormulario() {
        const d = document.getElementById('select-destino').value;
        const n = document.getElementById('nombre-pax').value.trim();
        const b = document.getElementById('btn-accion');
        if (d !== "") mDest.setLatLng(rutaOficial[d].c).setOpacity(1);
        if(asientosElegidos.length > 0 && d !== "" && n !== "") b.classList.add('ready');
        else b.classList.remove('ready');
    }

    async function confirmarReserva() {
        const n = document.getElementById('nombre-pax').value.trim();
        const d = document.getElementById('select-destino').value;
        const btn = document.getElementById('btn-accion');
        
        btn.disabled = true; btn.innerText = "PROCESANDO...";

        // 1. Obtener asientos actuales del chofer
        const { data: chofer } = await _s.from('conductores').select('pasajeros_actuales').eq('nombre', 'Móvil 1').single();
        const nuevoTotal = chofer.pasajeros_actuales + asientosElegidos.length;

        // 2. Actualizar chofer y guardar reserva
        await _s.from('conductores').update({ pasajeros_actuales: nuevoTotal }).eq('nombre', 'Móvil 1');
        await _s.from('reservas_activas').insert({
            nombre_pasajero: n,
            asientos_reservados: asientosElegidos.length,
            destino_idx: d,
            estado: 'en_curso'
        });

        localStorage.setItem('viaje_en_curso', 'true');
        localStorage.setItem('mi_nombre', n);
        location.reload();
    }

    async function finalizarViaje() {
        if(!confirm("¿Llegaste a destino?")) return;
        localStorage.clear();
        location.reload();
    }

    if(localStorage.getItem('viaje_en_curso')) {
        document.getElementById('nombre-pax').value = localStorage.getItem('mi_nombre');
        document.getElementById('nombre-pax').disabled = true;
        document.getElementById('select-destino').disabled = true;
        document.getElementById('btn-accion').style.display = 'none';
        document.getElementById('btn-finalizar').style.display = 'block';
    }
    actualizarAuto();
</script>
</body>
</html>
