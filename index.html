<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Conductor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .grid-asientos { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 320px; margin: 20px auto; }
        .btn-asiento { height: 100px; font-size: 32px; font-weight: bold; border: none; border-radius: 20px; cursor: pointer; color: white; }
        .libre { background: #28a745; } .ocupado { background: #dc3545; }
        #gps-status { color: #ffc107; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>CONTROL CONDUCTOR</h2>
    <div class="grid-asientos">
        <button id="a1" class="libre" onclick="toggle(0)">1</button>
        <button id="a2" class="libre" onclick="toggle(1)">2</button>
        <button id="a3" class="libre" onclick="toggle(2)">3</button>
        <button id="a4" class="libre" onclick="toggle(3)">4</button>
    </div>
    <div id="gps-status">📍 Sincronizando GPS...</div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    let est = [true, true, true, true];
    async function toggle(i) {
        est[i] = !est[i];
        document.getElementById('a' + (i + 1)).className = est[i] ? 'libre' : 'ocupado';
        const libres = est.filter(a => a).length;
        await _s.from('estado_movil').update({ asientos_libres: libres }).eq('id', 1);
    }
    navigator.geolocation.watchPosition(async (pos) => {
        const { latitude, longitude } = pos.coords;
        document.getElementById('gps-status').innerText = `📍 Enviando: ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
        await _s.from('estado_movil').update({ latitud: latitude, longitud: longitude }).eq('id', 1);
    }, null, { enableHighAccuracy: true });
</script>
</body>
</html>
