<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuMovil - Admin Control Total</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 350px; background: var(--panel); border-right: 2px solid var(--celeste); display: flex; flex-direction: column; padding: 15px; overflow-y: auto; z-index: 1000; }
        #map { flex-grow: 1; height: 100vh; }
        .stat-card { background: rgba(0, 210, 255, 0.1); border: 1px solid var(--celeste); border-radius: 12px; padding: 12px; margin-bottom: 10px; text-align: center; }
        .stat-card p { margin: 5px 0; font-size: 26px; color: var(--amarillo); font-weight: bold; }
        .admin-section { border-top: 1px solid #333; margin-top: 15px; padding-top: 15px; }
        h4 { color: var(--celeste); margin-bottom: 10px; font-size: 14px; }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; width: 100%; margin-bottom: 8px; box-sizing: border-box; }
        .btn-add { background: var(--celeste); color: #000; border: none; padding: 10px; border-radius: 5px; font-weight: bold; width: 100%; cursor: pointer; width: 100%; }
        .item-list { background: #252525; padding: 10px; border-radius: 8px; margin-top: 8px; font-size: 13px; border-left: 4px solid #444; position: relative; }
        .pasajero-card { border-left-color: var(--amarillo); }
        .btn-finalizar { background: #dc3545; color: white; border: none; padding: 3px 7px; border-radius: 4px; font-size: 10px; cursor: pointer; position: absolute; right: 10px; top: 10px; }
        .map-tiles { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: var(--celeste); margin-top: 0;">TuMovil Admin 🛰️</h2>
    
    <div class="stat-card">
        <small>RECAUDACIÓN HOY</small>
        <p id="caja-total">$0</p>
    </div>

    <div class="admin-section">
        <h4>👥 PASAJEROS ACTIVOS</h4>
        <div id="lista-pasajeros">Buscando...</div>
    </div>

    <div class="admin-section">
        <h4>⚙️ GESTIONAR CHOFERES</h4>
        <input type="number" id="new-id" placeholder="N° de Coche">
        <input type="text" id="new-driver" placeholder="Nombre del Chofer">
        <input type="text" id="new-car" placeholder="Vehículo">
        <input type="text" id="new-plate" placeholder="Patente">
        <button class="btn-add" onclick="guardarCambiosChofer()">ACTUALIZAR DATOS</button>
    </div>

    <div id="flota-list" class="admin-section">
        <h4>🚗 ESTADO DE FLOTA</h4>
    </div>
</div>

<div id="map"></div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    const map = L.map('map', { zoomControl: false }).setView([-34.588, -58.750], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { className: 'map-tiles' }).addTo(map);

    let markersChoferes = {};
    const iconT = L.divIcon({ html: '<span style="font-size:25px;">🚕</span>', iconAnchor: [12, 12] });

    async function guardarCambiosChofer() {
        const id = document.getElementById('new-id').value;
        const nombre = document.getElementById('new-driver').value;
        const marca = document.getElementById('new-car').value;
        const patente = document.getElementById('new-plate').value;
        if(!id || !nombre) return alert("N° de Coche y Nombre son obligatorios");

        const { error } = await _s.from('estado_movil').upsert({
            id: parseInt(id), chofer: nombre, vehiculo: marca, patente: patente
        });
        if (error) alert(error.message); else { alert("¡Chofer actualizado!"); refrescarTodo(); }
    }

    async function eliminarPasajero(id) {
        if(!confirm("¿Borrar este registro?")) return;
        await _s.from('reservas_activas').delete().eq('id', id);
        refrescarTodo();
    }

    async function refrescarTodo() {
        try {
            const { data: moviles } = await _s.from('estado_movil').select('*').order('id', {ascending: true});
            const { data: reservas } = await _s.from('reservas_activas').select('*');

            // Actualizar Lista de Pasajeros
            const pDiv = document.getElementById('lista-pasajeros');
            pDiv.innerHTML = '';
            if(reservas.length === 0) pDiv.innerHTML = '<small style="color:#666;">Sin pasajeros por ahora.</small>';
            reservas.forEach(r => {
                const div = document.createElement('div');
                div.className = 'item-list pasajero-card';
                div.innerHTML = `
                    <button class="btn-finalizar" onclick="eliminarPasajero(${r.id})">X</button>
                    <b>${r.nombre_pasajero}</b><br>
                    <small>Coche ${r.id_movil} | Asiento ${r.asiento}</small>
                `;
                pDiv.appendChild(div);
            });

            // Actualizar Mapa y Flota
            const fDiv = document.getElementById('flota-list');
            fDiv.innerHTML = '<h4>🚗 ESTADO DE FLOTA</h4>';
            let totalCaja = 0;

            moviles.forEach(m => {
                if(m.latitud) {
                    const info = `Coche ${m.id}: ${m.chofer}`;
                    if(markersChoferes[m.id]) {
                        markersChoferes[m.id].setLatLng([m.latitud, m.longitud]).setTooltipContent(info);
                    } else {
                        markersChoferes[m.id] = L.marker([m.latitud, m.longitud], { icon: iconT }).addTo(map).bindTooltip(info);
                    }
                }
                const ganancia = reservas.filter(r => r.id_movil == m.id).length * 1000;
                totalCaja += ganancia;

                const item = document.createElement('div');
                item.className = 'item-list';
                item.innerHTML = `<b>COCHE ${m.id}</b>: $${ganancia}<br><small>${m.chofer || 'S/N'}</small>`;
                fDiv.appendChild(item);
            });
            document.getElementById('caja-total').innerText = "$" + totalCaja;
        } catch (e) { console.log("Reconectando..."); }
    }
    
    setInterval(refrescarTodo, 5000);
    refrescarTodo();
</script>
</body>
</html>
