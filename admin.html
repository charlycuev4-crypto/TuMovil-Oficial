<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TuMovil | Consola Maestra</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --bg: #121212; --panel: #1e1e1e; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* LOGIN */
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* HEADER Y TABS */
        header { height: 60px; background: var(--panel); display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--celeste); }
        .nav-tab { padding: 10px 20px; cursor: pointer; color: #888; font-weight: bold; }
        .nav-tab.active { color: var(--celeste); border-bottom: 2px solid var(--celeste); }
        
        /* CONTENIDO */
        .page { display: none; height: calc(100vh - 60px); }
        .page.active { display: block; }
        #map-container { height: 100%; width: 100%; }
        
        /* FLOTA */
        #fleet-container { padding: 20px; display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .card { background: var(--panel); padding: 20px; border-radius: 10px; border: 1px solid #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { background: var(--celeste); color: black; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        .flota-item { background: #252525; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--celeste); }
        .btn-ruta { padding: 5px 10px; font-size: 12px; margin-right: 5px; border-radius: 4px; border: none; cursor: pointer; background: #333; color: white; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>🔑 ACCESO RESTRINGIDO</h2>
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="checkPass()" style="width: 200px;">INGRESAR</button>
</div>

<header>
    <h2 style="color: var(--celeste); margin-right: 30px;">TuMovil Admin</h2>
    <div class="nav-tab active" onclick="switchTab('map-view', this)">📍 MAPA</div>
    <div class="nav-tab" onclick="switchTab('fleet-view', this)">🚗 FLOTA</div>
</header>

<div id="map-view" class="page active">
    <div id="map-container"></div>
</div>

<div id="fleet-view" class="page">
    <div id="fleet-container">
        <div class="card">
            <h3>⚙️ GESTIÓN CONDUCTOR</h3>
            <input type="number" id="c-id" placeholder="N° Coche">
            <input type="text" id="c-chofer" placeholder="Nombre Chofer">
            <input type="text" id="c-vehiculo" placeholder="Modelo">
            <input type="text" id="c-patente" placeholder="Patente">
            <button onclick="upsertCoche()">GUARDAR CAMBIOS</button>
        </div>
        <div id="listado-flota"><h3>CARGANDO...</h3></div>
    </div>
</div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    function checkPass() {
        if(document.getElementById('pass').value === "1234") {
            document.getElementById('login-screen').style.display = 'none';
        } else alert("Clave incorrecta");
    }

    function switchTab(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    async function upsertCoche() {
        const id = document.getElementById('c-id').value;
        const { error } = await _s.from('estado_movil').upsert({
            id: parseInt(id),
            chofer: document.getElementById('c-chofer').value,
            vehiculo: document.getElementById('c-vehiculo').value,
            patente: document.getElementById('c-patente').value
        });
        if(error) alert("Error: " + error.message);
        else { alert("Actualizado"); cargarFlota(); }
    }

    async function cambiarSentido(id, sentido) {
        await _s.from('estado_movil').update({ hacia_adelante: sentido }).eq('id', id);
        cargarFlota();
    }

    async function cargarFlota() {
        const { data } = await _s.from('estado_movil').select('*').order('id');
        const list = document.getElementById('listado-flota');
        list.innerHTML = "<h3>ESTADO ACTUAL</h3>";
        data.forEach(m => {
            list.innerHTML += `
                <div class="flota-item">
                    <b>COCHE ${m.id}</b> - ${m.chofer}<br>
                    <small>Ruta actual: <b>${m.hacia_adelante ? 'IDA' : 'REGRESO'}</b></small><br>
                    <button class="btn-ruta" onclick="cambiarSentido(${m.id}, true)">IDA</button>
                    <button class="btn-ruta" onclick="cambiarSentido(${m.id}, false)">REGRESO</button>
                </div>
            `;
        });
    }

    const map = L.map('map-container').setView([-34.588, -58.750], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    setInterval(cargarFlota, 5000);
    cargarFlota();
</script>
</body>
</html>
