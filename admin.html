<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuMovil - Administrador</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; height: 100vh; }
        
        /* Sidebar de datos */
        #sidebar { width: 300px; background: var(--panel); border-right: 2px solid var(--celeste); display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        #map { flex-grow: 1; }

        .stat-card { background: rgba(0, 210, 255, 0.1); border: 1px solid var(--celeste); border-radius: 10px; padding: 15px; margin-bottom: 15px; text-align: center; }
        .stat-card h3 { margin: 0; font-size: 14px; color: var(--celeste); text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; color: var(--amarillo); }

        .lista-viajes { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .viaje-item { background: #2a2a2a; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; border-left: 4px solid var(--amarillo); }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="color: var(--celeste); margin-bottom: 20px;">TuMovil Admin</h2>
        
        <div class="stat-card">
            <h3>Recaudación Estimada</h3>
            <p id="total-dinero">$0</p>
        </div>

        <div class="stat-card">
            <h3>Pasajeros en Curso</h3>
            <p id="total-pasajeros">0</p>
        </div>

        <div class="lista-viajes" id="lista-viajes">
            <h4 style="border-bottom: 1px solid #444; padding-bottom: 5px;">Viajes Activos</h4>
            </div>
    </div>

    <div id="map"></div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    // Configuración inicial del Mapa
    const map = L.map('map').setView([-34.588, -58.750], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        className: 'map-tiles'
    }).addTo(map);

    let markersChoferes = {};
    const iconT = L.divIcon({ html: '<span style="font-size:25px;">🚕</span>', iconAnchor: [12, 12] });

    async function refrescarAdmin() {
        // 1. Obtener ubicación de todos los móviles
        const { data: moviles } = await _s.from('estado_movil').select('*');
        
        moviles.forEach(m => {
            if(m.latitud !== 0) {
                if(markersChoferes[m.id]) {
                    markersChoferes[m.id].setLatLng([m.latitud, m.longitud]);
                } else {
                    markersChoferes[m.id] = L.marker([m.latitud, m.longitud], { icon: iconT }).addTo(map).bindTooltip("Coche 0"+m.id);
                }
            }
        });

        // 2. Obtener todas las reservas activas
        const { data: reservas } = await _s.from('reservas_activas').select('*').eq('estado', 'en_curso');
        
        if(reservas) {
            document.getElementById('total-pasajeros').innerText = reservas.length;
            document.getElementById('total-dinero').innerText = "$" + (reservas.length * 1000);
            
            const lista = document.getElementById('lista-viajes');
            lista.innerHTML = '<h4 style="border-bottom: 1px solid #444; padding-bottom: 5px;">Viajes Activos</h4>';
            
            reservas.forEach(r => {
                const item = document.createElement('div');
                item.className = 'viaje-item';
                item.innerHTML = `<b>${r.nombre_pasajero}</b><br>Coche 0${r.id_movil} - Asiento ${r.asiento_num}`;
                lista.appendChild(item);
            });
        }
    }

    // Actualizar cada 5 segundos para no gastar de más pero estar al día
    setInterval(refrescarAdmin, 5000);
    refrescarAdmin();
</script>

<style>
    /* Filtro oscuro para el mapa para que haga juego con tu diseño */
    .map-tiles { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
</style>

</body>
</html>
