<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuMovil - Centro de Comando</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #0a0a0a; --panel: #161616; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar mejorada */
        #sidebar { width: 360px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 1000; }
        #map { flex-grow: 1; height: 100vh; }

        /* Botonera Principal */
        .tabs { display: flex; background: #222; padding: 5px; gap: 5px; }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; background: #333; color: #888; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.3s; text-transform: uppercase; }
        .tab-btn.active { background: var(--celeste); color: black; }

        /* Contenedores de contenido */
        .content-area { flex-grow: 1; padding: 15px; overflow-y: auto; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Tarjetas y Estilos */
        .card { background: #222; border-radius: 10px; padding: 12px; margin-bottom: 10px; border-left: 4px solid var(--celeste); }
        .card-pax { border-left-color: var(--amarillo); }
        .card-money { border-left-color: #28a745; }
        
        .stat-box { background: rgba(0, 210, 255, 0.1); padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; border: 1px solid var(--celeste); }
        .stat-box p { font-size: 28px; font-weight: bold; color: var(--amarillo); margin: 5px 0; }

        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        .btn-main { background: var(--celeste); color: black; border: none; padding: 12px; border-radius: 5px; font-weight: bold; width: 100%; cursor: pointer; }
        
        .map-tiles { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
    </style>
</head>
<body>

<script>
    let pass = localStorage.getItem("adminPass") || "1234";
    if (prompt("Contraseña:") !== pass) {
        document.body.innerHTML = "❌ Acceso Denegado";
        window.stop();
    }
</script>

<div id="sidebar">
    <div class="tabs">
        <button class="tab-btn active" onclick="ver('radar')">👥 Radar</button>
        <button class="tab-btn" onclick="ver('flota')">🚗 Flota</button>
        <button class="tab-btn" onclick="ver('caja')">💰 Caja</button>
        <button class="tab-btn" onclick="ver('ajustes')">⚙️ Ajustes</button>
    </div>

    <div class="content-area">
        <div id="view-radar" class="view-section active">
            <h4>PASAJEROS EN VIVO</h4>
            <div id="lista-radar">Buscando...</div>
        </div>

        <div id="view-flota" class="view-section">
            <h4>ESTADO DE CONDUCTORES</h4>
            <div id="lista-flota"></div>
        </div>

        <div id="view-caja" class="view-section">
            <div class="stat-box">
                <small>RECAUDACIÓN TOTAL</small>
                <p id="total-general">$0</p>
            </div>
            <h4>DESGLOSE POR COCHE</h4>
            <div id="lista-caja"></div>
        </div>

        <div id="view-ajustes" class="view-section">
            <h4>GESTIONAR CHOFER</h4>
            <input type="number" id="c-id" placeholder="N° de Coche">
            <input type="text" id="c-nom" placeholder="Nombre Chofer">
            <input type="text" id="c-veh" placeholder="Marca/Modelo">
            <input type="text" id="c-pat" placeholder="Patente">
            <button class="btn-main" onclick="actualizarChofer()">GUARDAR CAMBIOS</button>
            
            <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
            <button class="btn-main" style="background:#444; color:white;" onclick="nuevaPass()">CAMBIAR CONTRASEÑA</button>
        </div>
    </div>
</div>

<div id="map"></div>

<script>
    function ver(seccion) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + seccion).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    const map = L.map('map', { zoomControl: false }).setView([-34.588, -58.750], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { className: 'map-tiles' }).addTo(map);

    let markers = {};
    const iconT = L.divIcon({ html: '🚕', iconSize: [25, 25] });

    async function actualizarChofer() {
        await _s.from('estado_movil').upsert({
            id: document.getElementById('c-id').value,
            chofer: document.getElementById('c-nom').value,
            vehiculo: document.getElementById('c-veh').value,
            patente: document.getElementById('c-pat').value
        });
        alert("¡Datos Guardados!");
    }

    function nuevaPass() {
        let n = prompt("Nueva Clave:");
        if(n) { localStorage.setItem("adminPass", n); alert("Cambiada."); }
    }

    async function refrescar() {
        const { data: moviles } = await _s.from('estado_movil').select('*').order('id', {ascending: true});
        const { data: reservas } = await _s.from('reservas_activas').select('*');

        // Radar
        const radar = document.getElementById('lista-radar');
        radar.innerHTML = '';
        reservas.forEach(r => {
            radar.innerHTML += `<div class="card card-pax"><b>${r.nombre_pasajero}</b><br><small>Coche ${r.id_movil} | Asiento ${r.asiento}</small></div>`;
        });

        // Flota y Caja
        const fLista = document.getElementById('lista-flota');
        const cLista = document.getElementById('lista-caja');
        fLista.innerHTML = ''; cLista.innerHTML = '';
        let total = 0;

        moviles.forEach(m => {
            const g = reservas.filter(r => r.id_movil == m.id).length * 1000;
            total += g;

            if(m.latitud) {
                if(markers[m.id]) markers[m.id].setLatLng([m.latitud, m.longitud]);
                else markers[m.id] = L.marker([m.latitud, m.longitud], { icon: iconT }).addTo(map);
            }

            fLista.innerHTML += `<div class="card" style="border-left-color:${m.latitud ? '#28a745':'#dc3545'}"><b>COCHE ${m.id}</b><br><small>${m.chofer || 'Vacante'}</small></div>`;
            cLista.innerHTML += `<div class="card card-money"><b>COCHE ${m.id}</b>: $${g}<br><small>${m.chofer}</small></div>`;
        });

        document.getElementById('total-general').innerText = "$" + total;
    }

    setInterval(refrescar, 5000);
    refrescar();
</script>
</body>
</html>
