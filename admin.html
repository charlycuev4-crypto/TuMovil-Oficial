<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuMovil - Admin Profesional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 350px; background: var(--panel); border-right: 2px solid var(--celeste); display: flex; flex-direction: column; padding: 15px; overflow-y: auto; z-index: 1000; }
        #map { flex-grow: 1; height: 100vh; }
        .stat-card { background: rgba(0, 210, 255, 0.05); border: 1px solid var(--celeste); border-radius: 12px; padding: 12px; margin-bottom: 10px; text-align: center; }
        .stat-card p { margin: 5px 0; font-size: 26px; color: var(--amarillo); font-weight: bold; }
        .admin-section { border-top: 1px solid #333; margin-top: 15px; padding-top: 15px; }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; width: 100%; margin-bottom: 8px; box-sizing: border-box; }
        .btn-add { background: var(--celeste); color: #000; border: none; padding: 12px; border-radius: 5px; font-weight: bold; width: 100%; cursor: pointer; }
        .flota-item { background: #252525; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 13px; line-height: 1.5; }
        .money-tag { color: #28a745; font-weight: bold; float: right; font-size: 16px; }
        .btn-ruta { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color: var(--celeste); margin-top: 0;">TuMovil Admin 🛰️</h2>
    
    <div class="stat-card">
        <small>TOTAL RECAUDADO HOY</small>
        <p id="caja-total">$0</p>
    </div>

    <div class="admin-section">
        <h4>📝 GESTIONAR CHOFER</h4>
        <input type="number" id="new-id" placeholder="N° de Coche">
        <input type="text" id="new-driver" placeholder="Nombre del Chofer">
        <input type="text" id="new-car" placeholder="Vehículo">
        <input type="text" id="new-plate" placeholder="Patente">
        <button class="btn-add" onclick="guardarCambiosChofer()">ACTUALIZAR DATOS</button>
    </div>

    <div id="flota-list" class="admin-section">
        <h4>🚗 ESTADO DE FLOTA ACTUAL</h4>
    </div>
</div>

<div id="map"></div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    const map = L.map('map', { zoomControl: false }).setView([-34.588, -58.750], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { className: 'map-tiles' }).addTo(map);

    let markersChoferes = {};
    const iconT = L.divIcon({ html: '<span style="font-size:25px;">🚕</span>', iconAnchor: [12, 12] });

    // --- NUEVA FUNCIÓN PARA CAMBIAR SENTIDO ---
    async function cambiarSentido(idMovil, nuevoSentido) {
        const { error } = await _s
            .from('estado_movil')
            .update({ sentido_ruta: nuevoSentido })
            .eq('id', idMovil);

        if (error) alert("Error: " + error.message);
        else refrescarTodo(); // Recargar para mostrar cambios visuales
    }

    async function guardarCambiosChofer() {
        const id = document.getElementById('new-id').value;
        const { error } = await _s.from('estado_movil').upsert({
            id: parseInt(id),
            chofer: document.getElementById('new-driver').value,
            vehiculo: document.getElementById('new-car').value,
            patente: document.getElementById('new-plate').value
        });
        if (error) alert("Error: " + error.message);
        else { alert("¡Datos actualizados!"); refrescarTodo(); }
    }

    async function refrescarTodo() {
        try {
            const { data: moviles } = await _s.from('estado_movil').select('*').order('id', {ascending: true});
            const { data: reservas } = await _s.from('reservas_activas').select('*');

            const flotaDiv = document.getElementById('flota-list');
            flotaDiv.innerHTML = '<h4>🚗 ESTADO DE FLOTA ACTUAL</h4>';
            let totalCajaGral = 0;

            moviles.forEach(m => {
                // Dibujar en mapa
                if(m.latitud && m.latitud !== 0) {
                    if(markersChoferes[m.id]) markersChoferes[m.id].setLatLng([m.latitud, m.longitud]);
                    else markersChoferes[m.id] = L.marker([m.latitud, m.longitud], { icon: iconT }).addTo(map);
                }

                const gananciaCoche = reservas.filter(r => r.id_movil == m.id && r.estado == 'finalizado').length * 1000;
                totalCajaGral += gananciaCoche;

                // Crear elemento de lista con botones de control
                const item = document.createElement('div');
                item.className = 'flota-item';
                item.innerHTML = `
                    <b>COCHE ${m.id}</b> <span class="money-tag">$${gananciaCoche}</span><br>
                    👤 ${m.chofer || '---'} | 🚘 ${m.vehiculo || '---'}<br>
                    <div style="margin-top:8px;">
                        <button class="btn-ruta" style="background:${m.sentido_ruta ? '#00d2ff' : '#333'}" onclick="cambiarSentido(${m.id}, true)">IDA (1→20)</button>
                        <button class="btn-ruta" style="background:${!m.sentido_ruta ? '#ffcc00' : '#333'}" onclick="cambiarSentido(${m.id}, false)">REGRESO (20→1)</button>
                    </div>
                `;
                flotaDiv.appendChild(item);
            });
            document.getElementById('caja-total').innerText = "$" + totalCajaGral;
        } catch (e) { console.log("Esperando datos..."); }
    }
    
    setInterval(refrescarTodo, 5000);
    refrescarTodo();
</script>
</body>
</html>
