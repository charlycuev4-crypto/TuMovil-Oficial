<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comando Central - TuMovil Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --gold: #FFD700;
            --cyan: #00d4ff;
            --dark: #050505;
            --card: #121212;
            --success: #4cd964;
            --danger: #ff3b30;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        header {
            background: linear-gradient(90deg, #111, #1a1a1a);
            padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            z-index: 1001;
        }

        .brand { display: flex; align-items: center; gap: 15px; }
        .logo-icon { font-size: 24px; background: var(--gold); color: black; padding: 5px; border-radius: 8px; }
        .brand h1 { margin: 0; font-size: 22px; font-weight: 900; letter-spacing: 2px; color: var(--gold); }
        
        .driver-indicator {
            display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 30px;
            border: 1px solid #333; font-size: 13px; font-weight: bold;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; transition: all 0.5s; }
        .dot.online { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .dot.offline { background: var(--danger); box-shadow: 0 0 10px var(--danger); }

        main { display: flex; flex: 1; overflow: hidden; }

        #map-container { flex: 1; position: relative; border-right: 1px solid #222; }
        #map { width: 100%; height: 100%; }

        #controls {
            width: 380px; background: var(--card);
            display: flex; flex-direction: column;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .dashboard-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px;
            background: rgba(255,255,255,0.02);
        }
        .widget {
            background: #1a1a1a; padding: 15px; border-radius: 12px;
            text-align: center; border: 1px solid #333;
        }
        .widget span { display: block; font-size: 11px; opacity: 0.6; margin-bottom: 5px; text-transform: uppercase; }
        .widget strong { font-size: 22px; color: var(--cyan); }

        .list-section { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
        .list-section h2 { font-size: 14px; opacity: 0.7; margin: 20px 0 10px; letter-spacing: 1px; text-transform: uppercase; }
        
        .trip-card {
            background: #1a1a1a; border-radius: 10px; padding: 12px;
            margin-bottom: 10px; border-left: 4px solid var(--cyan);
            position: relative; transition: all 0.3s;
        }
        .trip-card:hover { transform: scale(1.02); background: #222; }
        .trip-card.finalizado { border-left-color: #444; opacity: 0.6; }
        
        .trip-info { display: flex; justify-content: space-between; align-items: flex-start; }
        .pax-name { font-weight: bold; color: white; font-size: 15px; }
        .asiento-badge { font-size: 10px; background: var(--cyan); color: black; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        
        .trip-details { font-size: 12px; color: #aaa; margin-top: 5px; }
        .btn-cancel-admin {
            margin-top: 10px; width: 100%; background: rgba(255,59,48,0.1);
            border: 1px solid var(--danger); color: var(--danger);
            padding: 8px; border-radius: 8px; font-size: 11px; cursor: pointer;
            font-weight: bold; transition: 0.2s;
        }
        .btn-cancel-admin:hover { background: var(--danger); color: white; }

        /* Estilos para el Formulario de Choferes */
        .admin-form {
            padding: 20px;
            border-top: 2px solid var(--gold);
            background: #0a0a0a;
        }
        .admin-form input {
            width: 100%; padding: 10px; margin-bottom: 10px;
            background: #1a1a1a; border: 1px solid #333;
            color: white; border-radius: 5px; box-sizing: border-box;
        }
        .btn-save-driver {
            width: 100%; background: var(--gold); color: black;
            border: none; padding: 12px; border-radius: 5px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        .btn-save-driver:hover { background: #e6c200; }

        .leaflet-tooltip-own {
            background: rgba(0,0,0,0.8); border: 1px solid var(--gold);
            color: white; border-radius: 5px; font-weight: bold; padding: 5px 10px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <div class="logo-icon">🚕</div>
        <h1>TU MÓVIL <small style="font-size: 9px; vertical-align: middle; opacity: 0.6;">ADMIN</small></h1>
    </div>
    <div class="driver-indicator">
        <div id="status-dot" class="dot offline"></div>
        <span id="status-text">SIN CONEXIÓN</span>
    </div>
</header>

<main>
    <div id="map-container">
        <div id="map"></div>
    </div>

    <aside id="controls">
        <div class="dashboard-grid">
            <div class="widget">
                <span>RECAUDACIÓN</span>
                <strong id="total-money">$0</strong>
            </div>
            <div class="widget">
                <span>VIAJES HOY</span>
                <strong id="total-trips">0</strong>
            </div>
        </div>

        <div class="list-section">
            <h2>Pasajeros en Viaje</h2>
            <div id="active-list"></div>

            <h2>Historial del Turno</h2>
            <div id="history-list"></div>
        </div>

        <div class="admin-form">
            <h2 style="font-size: 14px; margin-top: 0; color: var(--gold);">REGISTRAR CHOFER</h2>
            <input type="text" id="driver-name" placeholder="Nombre completo">
            <input type="text" id="driver-patente" placeholder="Patente (Ej: ABC 123)">
            <input type="text" id="driver-model" placeholder="Vehículo (Ej: Fiat Cronos)">
            <button class="btn-save-driver" onclick="registrarChofer()">Guardar Chofer</button>
        </div>
    </aside>
</main>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    const paradasRef = ["Cané", "Los Aromos", "Aromos 11k", "Aromos 10k", "Murillo", "Murillo 601", "Güiraldes", "Watt", "Prado 2555", "Payró", "Prado 1744", "Caveri", "Azara", "Vedia", "Tablada", "Echeverría", "Gálvez", "Caveri Final", "Aero", "Lib. 7300", "Lib. 7200", "Maza", "Albatros", "Maternidad", "Abasto"];

    const map = L.map('map', { zoomControl: false }).setView([-34.57, -58.75], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const taxiIcon = L.divIcon({ 
        html: '<div style="font-size:28px; filter: drop-shadow(0 0 8px gold);">🚕</div>', 
        className: 'custom-taxi', iconSize: [30, 30], iconAnchor: [15, 15] 
    });
    
    const mTaxis = L.marker([0,0], { icon: taxiIcon }).addTo(map);
    let markersPax = [];

    async function updateDashboard() {
        const { data: movil } = await _s.from('estado_movil').select('*').eq('id', 1).single();
        const dot = document.getElementById('status-dot');
        const txt = document.getElementById('status-text');

        if (movil && movil.latitud !== 0) {
            dot.className = "dot online";
            txt.innerText = "CONDUCTOR EN LÍNEA";
            mTaxis.setLatLng([movil.latitud, movil.longitud]).setOpacity(1);
        } else {
            dot.className = "dot offline";
            txt.innerText = "CONDUCTOR FUERA DE LÍNEA";
            mTaxis.setOpacity(0);
        }

        const { data: viajes } = await _s.from('reservas_activas').select('*');
        
        if (viajes) {
            const activos = viajes.filter(v => v.estado === 'en_curso');
            const finalizados = viajes.filter(v => v.estado === 'finalizado');

            document.getElementById('total-money').innerText = '$' + (finalizados.length * 1000);
            document.getElementById('total-trips').innerText = finalizados.length;

            const activeCont = document.getElementById('active-list');
            const historyCont = document.getElementById('history-list');
            activeCont.innerHTML = "";
            historyCont.innerHTML = "";

            markersPax.forEach(m => map.removeLayer(m));
            markersPax = [];

            viajes.sort((a,b) => b.id - a.id).forEach(v => {
                const card = document.createElement('div');
                card.className = `trip-card ${v.estado}`;
                const destinoTxt = paradasRef[v.destino_idx] || "Destino";

                card.innerHTML = `
                    <div class="trip-info">
                        <span class="pax-name">${v.nombre_pasajero}</span>
                        <span class="asiento-badge">ASIENTO ${v.asiento_num}</span>
                    </div>
                    <div class="trip-details">Destino: ${destinoTxt}</div>
                    ${v.estado === 'en_curso' ? `<button class="btn-cancel-admin" onclick="forzarFinalizar(${v.id})">LIBERAR ASIENTO (ADMIN)</button>` : ''}
                `;

                if (v.estado === 'en_curso') {
                    activeCont.appendChild(card);
                    const mP = L.circleMarker([v.pasajero_lat, v.pasajero_lon], {
                        color: '#FFD700', fillColor: '#00d4ff', fillOpacity: 0.8, radius: 8, weight: 2
                    }).addTo(map).bindTooltip(v.nombre_pasajero, { className: 'leaflet-tooltip-own', permanent: false });
                    markersPax.push(mP);
                } else {
                    historyCont.appendChild(card);
                }
            });
        }
    }

    async function forzarFinalizar(id) {
        if(!confirm("¿Deseas finalizar este viaje manualmente? Esto liberará el asiento.")) return;
        await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('id', id);
        updateDashboard();
    }

    // NUEVA FUNCIÓN: Guardar chofer en la base de datos
    async function registrarChofer() {
        const nombre = document.getElementById('driver-name').value;
        const patente = document.getElementById('driver-patente').value;
        const modelo = document.getElementById('driver-model').value;

        if (!nombre || !patente) {
            alert("Por favor completa al menos el nombre y la patente.");
            return;
        }

        const { error } = await _s.from('conductores').insert([
            { nombre: nombre, patente: patente, modelo_auto: modelo }
        ]);

        if (error) {
            alert("Error: " + error.message);
        } else {
            alert("¡Chofer registrado exitosamente!");
            document.getElementById('driver-name').value = "";
            document.getElementById('driver-patente').value = "";
            document.getElementById('driver-model').value = "";
        }
    }

    _s.channel('admin_realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'reservas_activas' }, updateDashboard).subscribe();
    _s.channel('admin_gps_realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'estado_movil' }, updateDashboard).subscribe();

    setInterval(updateDashboard, 20000);
    updateDashboard();

</script>
</body>
</html>
