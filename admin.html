<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuMovil - Centro de Comando Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #0a0a0a; --panel: #161616; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* PANTALLA DE BIENVENIDA (LA HOJA QUE PEDISTE) */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .login-box { text-align: center; background: #111; padding: 40px; border-radius: 20px; border: 1px solid var(--celeste); box-shadow: 0 0 20px rgba(0,210,255,0.2); }
        .login-box h1 { color: var(--celeste); margin-bottom: 20px; }

        /* ESTRUCTURA PRINCIPAL */
        #sidebar { width: 340px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 1000; transition: 0.3s; }
        #sidebar.hidden { margin-left: -340px; } /* Para esconder el menú */
        #map { flex-grow: 1; height: 100vh; position: relative; }

        /* BOTON FLOTANTE PARA VOLVER A VER EL MENÚ */
        #btn-menu-float { position: absolute; top: 15px; left: 15px; z-index: 2000; background: var(--celeste); border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; display: none; }

        /* TABS Y CONTENIDO */
        .tabs { display: flex; background: #222; padding: 5px; }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; background: #333; color: #888; font-size: 10px; cursor: pointer; border-radius: 4px; margin: 2px; }
        .tab-btn.active { background: var(--celeste); color: black; font-weight: bold; }
        .content-area { flex-grow: 1; padding: 15px; overflow-y: auto; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* ESTILOS DE TARJETAS */
        .card { background: #222; border-radius: 8px; padding: 10px; margin-bottom: 8px; border-left: 4px solid var(--celeste); }
        .stat-box { background: rgba(0, 210, 255, 0.1); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--celeste); margin-bottom: 15px; }
        .stat-box p { font-size: 24px; color: var(--amarillo); margin: 5px 0; }
        
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        .btn-main { background: var(--celeste); color: black; border: none; padding: 12px; border-radius: 5px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 5px; }
        .btn-gps-full { background: var(--amarillo) !important; color: black !important; margin-top: 15px; }

        .map-tiles { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1>TuMovil 🛰️</h1>
        <p>Panel de Administración</p>
        <input type="password" id="pass-input" placeholder="Ingrese su contraseña">
        <button class="btn-main" onclick="entrar()">ENTRAR AL PANEL</button>
        <p id="error-msg" style="color: red; display: none; margin-top: 10px;">Clave incorrecta</p>
    </div>
</div>

<button id="btn-menu-float" onclick="toggleMenu()">☰ ABRIR MENÚ</button>

<div id="sidebar">
    <div class="tabs">
        <button class="tab-btn active" onclick="ver('radar')">RADAR</button>
        <button class="tab-btn" onclick="ver('flota')">FLOTA</button>
        <button class="tab-btn" onclick="ver('caja')">CAJA</button>
        <button class="tab-btn" onclick="ver('ajustes')">AJUSTES</button>
    </div>

    <div class="content-area">
        <div id="view-radar" class="view-section active">
            <h4>PASAJEROS EN VIVO</h4>
            <div id="lista-radar">Esperando...</div>
        </div>

        <div id="view-flota" class="view-section">
            <h4>CONDUCTORES GPS</h4>
            <div id="lista-flota"></div>
            <button class="btn-main btn-gps-full" onclick="toggleMenu()">📍 TODO EL GPS</button>
        </div>

        <div id="view-caja" class="view-section">
            <div class="stat-box"><small>CAJA TOTAL</small><p id="total-general">$0</p></div>
            <div id="lista-caja"></div>
        </div>

        <div id="view-ajustes" class="view-section">
            <h4>GESTIONAR CHOFER</h4>
            <input type="number" id="c-id" placeholder="Coche N°">
            <input type="text" id="c-nom" placeholder="Nombre">
            <button class="btn-main" onclick="actualizarChofer()">GUARDAR</button>
            <br><br>
            <button class="btn-main" style="background:#444; color:white;" onclick="nuevaPass()">CAMBIAR CLAVE</button>
        </div>
    </div>
</div>

<div id="map"></div>

<script>
    // SISTEMA DE ENTRADA
    function entrar() {
        let passCorrecta = localStorage.getItem("adminPass") || "1234";
        let intento = document.getElementById("pass-input").value;
        if (intento === passCorrecta) {
            document.getElementById("login-screen").style.display = "none";
        } else {
            document.getElementById("error-msg").style.display = "block";
        }
    }

    // BOTÓN GPS FULL
    function toggleMenu() {
        let side = document.getElementById("sidebar");
        let btnFloat = document.getElementById("btn-menu-float");
        if (side.classList.contains("hidden")) {
            side.classList.remove("hidden");
            btnFloat.style.display = "none";
        } else {
            side.classList.add("hidden");
            btnFloat.style.display = "block";
        }
    }

    function ver(seccion) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + seccion).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // CONEXIÓN Y DATOS
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    const map = L.map('map', { zoomControl: false }).setView([-34.588, -58.750], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { className: 'map-tiles' }).addTo(map);

    let markers = {};
    const iconT = L.divIcon({ html: '🚕', iconSize: [25, 25] });

    async function actualizarChofer() {
        await _s.from('estado_movil').upsert({
            id: document.getElementById('c-id').value,
            chofer: document.getElementById('c-nom').value
        });
        alert("¡Guardado!");
    }

    function nuevaPass() {
        let n = prompt("Nueva Clave:");
        if(n) { localStorage.setItem("adminPass", n); alert("Clave cambiada."); location.reload(); }
    }

    async function refrescar() {
        const { data: moviles } = await _s.from('estado_movil').select('*').order('id', {ascending: true});
        const { data: reservas } = await _s.from('reservas_activas').select('*');

        const radar = document.getElementById('lista-radar');
        radar.innerHTML = '';
        reservas.forEach(r => {
            radar.innerHTML += `<div class="card" style="border-left-color:var(--amarillo)">👤 <b>${r.nombre_pasajero}</b><br><small>Coche ${r.id_movil} | Asiento ${r.asiento}</small></div>`;
        });

        const fLista = document.getElementById('lista-flota');
        const cLista = document.getElementById('lista-caja');
        fLista.innerHTML = ''; cLista.innerHTML = '';
        let total = 0;

        moviles.forEach(m => {
            const g = reservas.filter(r => r.id_movil == m.id).length * 1000;
            total += g;
            if(m.latitud) {
                if(markers[m.id]) markers[m.id].setLatLng([m.latitud, m.longitud]);
                else markers[m.id] = L.marker([m.latitud, m.longitud], { icon: iconT }).addTo(map);
            }
            fLista.innerHTML += `<div class="card" style="border-left-color:${m.latitud ? '#28a745':'#dc3545'}">🚗 <b>COCHE ${m.id}</b><br><small>${m.chofer || 'Vacante'}</small></div>`;
            cLista.innerHTML += `<div class="card">💰 <b>COCHE ${m.id}</b>: $${g}</div>`;
        });
        document.getElementById('total-general').innerText = "$" + total;
    }

    setInterval(refrescar, 5000);
    refrescar();
</script>
</body>
</html>
