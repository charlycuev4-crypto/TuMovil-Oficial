<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #121212; padding: 30px; border-radius: 15px; border: 2px solid #FFD700; text-align: center; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        button { background: #FFD700; color: black; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        #panel-real { display: none; width: 100%; height: 100vh; flex-direction: column; }
    </style>
</head>
<body>

    <div id="login-screen" class="login-box">
        <h2 style="color: #FFD700;">ACCESO SEGURO</h2>
        <input type="password" id="pass-input" placeholder="Introduce el PIN">
        <button onclick="entrar()">ENTRAR</button>
    </div>

    <div id="panel-real">
        <div style="background: #111; padding: 20px; border-bottom: 2px solid #FFD700; text-align: center;">
            <h1 style="color: #FFD700; margin: 0;">PANEL ACTIVO</h1>
        </div>
        <div style="padding: 20px; text-align: center;">
            <p>Bienvenido al cerebro de Santa Brígida.</p>
            <button onclick="location.reload()" style="background: #333; color: white; width: auto;">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        const PIN_CORRECTO = "1234"; // <--- CAMBIA TU CLAVE AQUÍ

        function entrar() {
            const pass = document.getElementById('pass-input').value;
            if(pass === PIN_CORRECTO) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('panel-real').style.display = 'flex';
                alert("Acceso concedido");
            } else {
                alert("PIN incorrecto");
            }
        }
    </script>
</body>
</html>
