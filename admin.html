<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuMovil - Admin Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #FFD700; --cyan: #00d4ff; --dark: #050505; --card: #121212; --success: #4cd964; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 350px; background: #111; border-right: 2px solid var(--gold); display: flex; flex-direction: column; padding: 15px; overflow-y: auto; z-index: 1000; }
        #map { flex-grow: 1; height: 100vh; }
        .stat-card { background: rgba(255, 215, 0, 0.1); border: 1px solid var(--gold); border-radius: 12px; padding: 12px; margin-bottom: 10px; text-align: center; }
        .stat-card p { margin: 5px 0; font-size: 26px; color: var(--gold); font-weight: bold; }
        .section { border-top: 1px solid #333; margin-top: 15px; padding-top: 15px; }
        input { background: #222; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; width: 100%; margin-bottom: 8px; box-sizing: border-box; }
        .btn { background: var(--gold); color: black; border: none; padding: 10px; border-radius: 5px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 5px; }
        .btn-sec { background: #333; color: white; font-size: 10px; padding: 5px; }
        .pax-item { background: #1a1a1a; padding: 10px; border-radius: 8px; margin-top: 8px; border-left: 4px solid var(--cyan); font-size: 13px; }
        .map-tiles { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
    </style>
</head>
<body>

<script>
    // --- LÓGICA DE CONTRASEÑA ---
    let passGuardada = localStorage.getItem("adminPass") || "1234"; 
    const ingreso = prompt("Acceso de Administrador. Ingrese su clave:");

    if (ingreso !== passGuardada) {
        document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:100px;'>❌ Acceso Denegado</h1>";
        window.stop();
    }

    function cambiarPass() {
        const nueva = prompt("Ingrese su NUEVA contraseña:");
        if (nueva && nueva.length > 0) {
            localStorage.setItem("adminPass", nueva);
            alert("¡Contraseña actualizada! Se pedirá en el próximo ingreso.");
        }
    }
</script>

<div id="sidebar">
    <h2 style="color: var(--gold); margin-top: 0;">TuMovil Admin 🛰️</h2>
    
    <div class="stat-card">
        <small>RECAUDACIÓN ESTIMADA</small>
        <p id="caja-total">$0</p>
    </div>

    <div class="section">
        <h4 style="color: var(--cyan);">👥 RADAR DE PASAJEROS</h4>
        <div id="lista-pax"><small>Buscando movimientos...</small></div>
    </div>

    <div class="section">
        <h4>⚙️ GESTIÓN DE CONDUCTORES</h4>
        <input type="number" id="c-id" placeholder="N° de Coche">
        <input type="text" id="c-nom" placeholder="Nombre Chofer">
        <input type="text" id="c-veh" placeholder="Vehículo">
        <input type="text" id="c-pat" placeholder="Patente">
        <button class="btn" onclick="actualizarChofer()">ACTUALIZAR CONDUCTOR</button>
    </div>

    <div id="flota" class="section">
        <h4>🚗 ESTADO DE FLOTA</h4>
    </div>

    <div class="section" style="margin-top: auto;">
        <button class="btn btn-sec" onclick="cambiarPass()">⚙️ CAMBIAR MI CONTRASEÑA</button>
    </div>
</div>

<div id="map"></div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    const map = L.map('map', { zoomControl: false }).setView([-34.588, -58.750], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { className: 'map-tiles' }).addTo(map);
    
    let markers = {};
    const taxiIcon = L.divIcon({ html: '🚕', className: 'taxi-icon', iconSize: [25, 25] });

    async function actualizarChofer() {
        const id = document.getElementById('c-id').value;
        const { error } = await _s.from('estado_movil').upsert({
            id: id, 
            chofer: document.getElementById('c-nom').value,
            vehiculo: document.getElementById('c-veh').value,
            patente: document.getElementById('c-pat').value
        });
        if (error) alert("Error al guardar"); else alert("¡Chofer actualizado con éxito!");
    }

    async function refrescar() {
        try {
            const { data: moviles } = await _s.from('estado_movil').select('*');
            const { data: reservas } = await _s.from('reservas_activas').select('*');

            // Radar de Pasajeros
            const pList = document.getElementById('lista-pax');
            pList.innerHTML = '';
            if(reservas.length === 0) pList.innerHTML = '<small style="color:#666;">Sin actividad reciente.</small>';
            reservas.forEach(r => {
                pList.innerHTML += `<div class='pax-item'><b>👤 ${r.nombre_pasajero}</b><br>Asiento ${r.asiento} | Coche ${r.id_movil}</div>`;
            });

            // Flota y Mapa
            const fList = document.getElementById('flota');
            fList.innerHTML = '<h4>🚗 ESTADO DE FLOTA</h4>';
            let total = 0;

            moviles.forEach(m => {
                const ganancia = reservas.filter(r => r.id_movil == m.id).length * 1000;
                total += ganancia;
                if(m.latitud) {
                    if(markers[m.id]) markers[m.id].setLatLng([m.latitud, m.longitud]);
                    else markers[m.id] = L.marker([m.latitud, m.longitud], {icon: taxiIcon}).addTo(map);
                }
                fList.innerHTML += `<div class='pax-item' style='border-color:var(--gold)'><b>COCHE ${m.id}</b>: $${ganancia}<br><small>${m.chofer}</small></div>`;
            });
            document.getElementById('caja-total').innerText = "$" + total;
        } catch (e) { console.log("Reconectando..."); }
    }

    setInterval(refrescar, 5000);
    refrescar();
</script>
</body>
</html>
