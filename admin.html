<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TuMovil | CONSOLA ADMIN</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --main: #00d2ff; --bg: #0a0a0a; --panel: #161616; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* BLOQUEO DE SEGURIDAD */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: var(--panel); padding: 30px; border: 1px solid var(--main); border-radius: 15px; text-align: center; }
        
        /* NAV Y LAYOUT */
        #navbar { height: 60px; background: var(--panel); display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--main); }
        .nav-btn { color: white; padding: 10px 20px; cursor: pointer; border: none; background: none; font-weight: bold; }
        .nav-btn:hover { color: var(--main); }
        
        #content { display: flex; height: calc(100vh - 60px); }
        #sidebar { width: 350px; background: var(--panel); padding: 20px; overflow-y: auto; }
        #map { flex-grow: 1; }

        input { width: 100%; padding: 12px; margin: 5px 0 15px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-action { background: var(--main); color: black; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>ACCESO RESTRINGIDO</h2>
        <input type="password" id="pass-input" placeholder="Ingrese contraseña">
        <button class="btn-action" onclick="validarLogin()">INGRESAR</button>
    </div>
</div>

<div id="navbar">
    <h2 style="margin: 0; color: var(--main); margin-right: 40px;">TuMovil 🛰️</h2>
    <button class="nav-btn" onclick="showView('map')">📍 VISTA MAPA</button>
    <button class="nav-btn" onclick="showView('fleet')">⚙️ GESTIÓN FLOTA</button>
</div>

<div id="content">
    <div id="map"></div>
    <div id="sidebar" style="display:none;">
        <h3>AGREGAR/EDITAR COCHE</h3>
        <input type="number" id="c-id" placeholder="N° Coche (Ej: 3)">
        <input type="text" id="c-nombre" placeholder="Nombre Chofer">
        <input type="text" id="c-vehiculo" placeholder="Modelo">
        <input type="text" id="c-patente" placeholder="Patente">
        <button class="btn-action" onclick="upsertCoche()">GUARDAR CAMBIOS</button>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #444;">
        <div id="flota-list"></div>
    </div>
</div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    const map = L.map('map').setView([-34.588, -58.750], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function validarLogin() {
        if(document.getElementById('pass-input').value === "1234") { // Cambia esto por tu clave
            document.getElementById('login-overlay').style.display = 'none';
        } else { alert("Clave incorrecta"); }
    }

    function showView(view) {
        document.getElementById('map').style.display = (view === 'map') ? 'block' : 'none';
        document.getElementById('sidebar').style.display = (view === 'fleet') ? 'block' : 'none';
    }

    async function upsertCoche() {
        const id = document.getElementById('c-id').value;
        const { error } = await _s.from('estado_movil').upsert({
            id: parseInt(id),
            chofer: document.getElementById('c-nombre').value,
            vehiculo: document.getElementById('c-vehiculo').value,
            patente: document.getElementById('c-patente').value
        });
        if(error) alert("Error: " + error.message);
        else alert("Operación exitosa: Coche creado/actualizado.");
    }

    async function cargarFlota() {
        const { data } = await _s.from('estado_movil').select('*').order('id');
        const list = document.getElementById('flota-list');
        list.innerHTML = "";
        data.forEach(m => {
            list.innerHTML += `<div style="background:#222; padding:10px; margin-bottom:10px; border-radius:5px;">
                <strong>Coche ${m.id}</strong> - ${m.chofer || 'Sin chofer'}<br>
                <small>${m.vehiculo || ''}</small>
            </div>`;
        });
    }

    setInterval(cargarFlota, 5000);
    cargarFlota();
</script>
</body>
</html>
