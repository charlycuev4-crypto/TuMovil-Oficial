<div id="sidebar">
    <h2 style="color: var(--celeste); margin-top: 0;">TuMovil Admin 🛰️</h2>
    
    <div class="stat-card">
        <small>TOTAL RECAUDADO HOY</small>
        <p id="caja-total">$0</p>
    </div>

    <div class="admin-section">
        <h4>📝 GESTIONAR CHOFER / AUTO</h4>
        <input type="number" id="new-id" placeholder="N° de Coche (Ej: 1 o 2)">
        <input type="text" id="new-driver" placeholder="Nombre del Chofer">
        <input type="text" id="new-car" placeholder="Marca y Modelo">
        <input type="text" id="new-plate" placeholder="Patente del vehículo">
        <button class="btn-add" onclick="guardarCambiosChofer()">ACTUALIZAR DATOS</button>
        <p style="font-size: 10px; color: #888; margin-top: 5px;">*Si el coche ya existe, se cambiarán los datos.</p>
    </div>

    <div class="admin-section" id="flota-list">
        <h4>🚗 ESTADO DE FLOTA ACTUAL</h4>
        </div>
</div>

<script>
    // ... (Tu configuración de Supabase arriba) ...

    async function guardarCambiosChofer() {
        const id = document.getElementById('new-id').value;
        const nombre = document.getElementById('new-driver').value;
        const marca = document.getElementById('new-car').value;
        const patente = document.getElementById('new-plate').value;

        if(!id || !nombre) {
            alert("Por favor, pon al menos el Número de Coche y el Nombre del Chofer.");
            return;
        }

        // Usamos UPSERT: Si el ID existe, lo cambia. Si no, lo crea.
        const { error } = await _s.from('estado_movil').upsert({
            id: parseInt(id),
            chofer: nombre,
            vehiculo: marca,
            patente: patente
        });

        if (error) {
            alert("Error al guardar: " + error.message);
        } else {
            alert("¡Datos del Coche " + id + " actualizados!");
            // Limpiamos los campos
            document.getElementById('new-id').value = "";
            document.getElementById('new-driver').value = "";
            document.getElementById('new-car').value = "";
            document.getElementById('new-plate').value = "";
            refrescarTodo(); // Recargamos la lista
        }
    }

    async function refrescarTodo() {
        const { data: moviles } = await _s.from('estado_movil').select('*').order('id', {ascending: true});
        const { data: reservas } = await _s.from('reservas_activas').select('*');

        const flotaDiv = document.getElementById('flota-list');
        flotaDiv.innerHTML = '<h4>🚗 ESTADO DE FLOTA ACTUAL</h4>';
        
        let totalCajaGral = 0;

        moviles.forEach(m => {
            // Actualizar Marcadores en el Mapa
            if(m.latitud !== 0) {
                const infoTooltip = `<b>Coche ${m.id}</b><br>Chofer: ${m.chofer || 'S/N'}<br>Auto: ${m.vehiculo || 'S/D'}`;
                if(markersChoferes[m.id]) {
                    markersChoferes[m.id].setLatLng([m.latitud, m.longitud]).setTooltipContent(infoTooltip);
                } else {
                    markersChoferes[m.id] = L.marker([m.latitud, m.longitud], { icon: iconT })
                        .addTo(map)
                        .bindTooltip(infoTooltip);
                }
            }

            // Calcular dinero solo de este coche (viajes finalizados)
            const gananciaCoche = reservas.filter(r => r.id_movil == m.id && r.estado == 'finalizado').length * 1000;
            totalCajaGral += gananciaCoche;

            // Mostrar en la lista lateral con los nombres que guardaste
            const item = document.createElement('div');
            item.className = 'flota-item';
            item.style.borderLeft = (m.latitud !== 0) ? "4px solid #28a745" : "4px solid #dc3545"; // Verde si está online, rojo si no
            item.innerHTML = `
                <b>COCHE ${m.id}</b> <span class="money-tag">$${gananciaCoche}</span><br>
                <span>👤 Chofer: ${m.chofer || '<span style="color:gray">Sin asignar</span>'}</span><br>
                <span>🚘 ${m.vehiculo || 'Vehículo no registrado'}</span><br>
                <small>🆔 Patente: ${m.patente || '---'}</small>
            `;
            flotaDiv.appendChild(item);
        });

        document.getElementById('caja-total').innerText = "$" + totalCajaGral;
    }
    
    setInterval(refrescarTodo, 5000);
    refrescarTodo();
</script>
