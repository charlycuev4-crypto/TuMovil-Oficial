<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuMovil - Admin Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* BLOQUEO DE SEGURIDAD */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        #sidebar { width: 320px; background: var(--panel); border-right: 2px solid var(--celeste); display: flex; flex-direction: column; padding: 15px; overflow-y: auto; z-index: 1000; }
        #map { flex-grow: 1; height: 100vh; }
        .stat-card { background: rgba(0, 210, 255, 0.05); border: 1px solid var(--celeste); border-radius: 12px; padding: 12px; margin-bottom: 10px; text-align: center; }
        .stat-card p { margin: 5px 0; font-size: 26px; color: var(--amarillo); font-weight: bold; }
        .admin-section { border-top: 1px solid #333; margin-top: 15px; padding-top: 15px; }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; width: 100%; margin-bottom: 8px; box-sizing: border-box; }
        .btn-add { background: var(--celeste); color: #000; border: none; padding: 12px; border-radius: 5px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-ruta { font-size: 10px; padding: 4px; margin-right: 5px; cursor: pointer; border: 1px solid var(--celeste); background: transparent; color: white; border-radius: 3px; }
        .flota-item { background: #252525; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 13px; line-height: 1.5; }
        .money-tag { color: #28a745; font-weight: bold; float: right; font-size: 16px; }
        .map-tiles { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
    </style>
</head>
<body>

<div id="login-overlay">
    <h2>🔑 ACCESO RESTRINGIDO</h2>
    <input type="password" id="pass-code" placeholder="Contraseña">
    <button class="btn-add" style="width: 200px;" onclick="validar()">INGRESAR</button>
</div>

<div id="sidebar">
    <h2 style="color: var(--celeste); margin-top: 0;">TuMovil Admin 🛰️</h2>
    <div class="stat-card">
        <small>TOTAL RECAUDADO HOY</small>
        <p id="caja-total">$0</p>
    </div>
    <div class="admin-section">
        <h4>📝 GESTIONAR CHOFER / AUTO</h4>
        <input type="number" id="new-id" placeholder="N° de Coche">
        <input type="text" id="new-driver" placeholder="Nombre del Chofer">
        <input type="text" id="new-car" placeholder="Marca y Modelo">
        <input type="text" id="new-plate" placeholder="Patente">
        <button class="btn-add" onclick="guardarCambiosChofer()">ACTUALIZAR DATOS</button>
    </div>
    <div id="flota-list" class="admin-section">
        <h4>🚗 ESTADO DE FLOTA ACTUAL</h4>
    </div>
</div>

<div id="map"></div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    const map = L.map('map', { zoomControl: false }).setView([-34.588, -58.750], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { className: 'map-tiles' }).addTo(map);

    // Seguridad
    function validar() {
        if(document.getElementById('pass-code').value === "1234") {
            document.getElementById('login-overlay').style.display = 'none';
        } else { alert("Contraseña incorrecta"); }
    }

    async function cambiarSentido(id, valor) {
        await _s.from('estado_movil').update({ hacia_adelante: valor }).eq('id', id);
        refrescarTodo();
    }

    // Funciones principales (Upsert + Carga)
    async function guardarCambiosChofer() {
        const id = document.getElementById('new-id').value;
        const { error } = await _s.from('estado_movil').upsert({
            id: parseInt(id),
            chofer: document.getElementById('new-driver').value,
            vehiculo: document.getElementById('new-car').value,
            patente: document.getElementById('new-plate').value
        });
        if(error) alert("Error: " + error.message);
        else refrescarTodo();
    }

    async function refrescarTodo() {
        const { data: moviles } = await _s.from('estado_movil').select('*').order('id');
        const { data: reservas } = await _s.from('reservas_activas').select('*');
        const flotaDiv = document.getElementById('flota-list');
        flotaDiv.innerHTML = '<h4>🚗 ESTADO DE FLOTA ACTUAL</h4>';
        
        moviles.forEach(m => {
            const gananciaCoche = reservas.filter(r => r.id_movil == m.id && r.estado == 'finalizado').length * 1000;
            const item = document.createElement('div');
            item.className = 'flota-item';
            item.innerHTML = `
                <b>COCHE ${m.id}</b> | ${m.hacia_adelante ? 'IDA' : 'REGRESO'}<br>
                👤 ${m.chofer || 'S/A'}<br>
                <button class="btn-ruta" onclick="cambiarSentido(${m.id}, true)">IDA</button>
                <button class="btn-ruta" onclick="cambiarSentido(${m.id}, false)">REGRESO</button>
                <span class="money-tag">$${gananciaCoche}</span>
            `;
            flotaDiv.appendChild(item);
        });
    }

    setInterval(refrescarTodo, 5000);
    refrescarTodo();
</script>
</body>
</html>
