<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Conductor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; --success: #28a745; --danger: #dc3545; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.8s ease, visibility 0.8s; }
        .anillo { width: 140px; height: 140px; border: 4px solid var(--celeste); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px var(--celeste); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .header { background: var(--panel); border-bottom: 2px solid var(--celeste); padding: 10px; text-align: center; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 16px; color: var(--celeste); letter-spacing: 2px; }
        
        #map { flex-grow: 1; width: 100%; }
        
        .bottom-ui { background: var(--panel); border-top: 2px solid var(--celeste); padding: 15px 15px env(safe-area-inset-bottom); display: flex; flex-direction: column; gap: 10px; border-radius: 25px 25px 0 0; z-index: 100; box-shadow: 0 -10px 25px rgba(0,0,0,0.5); max-height: 55vh; overflow-y: auto; }
        
        .status-card { background: rgba(0, 210, 255, 0.05); border: 1px solid var(--celeste); border-radius: 12px; padding: 12px; text-align: center; }
        .status-online { background: rgba(40, 167, 69, 0.1); border-color: var(--success); }
        .status-offline { background: rgba(220, 53, 69, 0.1); border-color: var(--danger); }
        
        .btn-toggle { padding: 16px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.3s; }
        .btn-online { background: var(--success); color: white; }
        .btn-offline { background: var(--danger); color: white; }
        .btn-sentido { background: var(--amarillo); color: black; padding: 12px; border: none; border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer; }
        
        .info-box { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .info-item { background: #2a2a2a; border-radius: 8px; padding: 10px; text-align: center; }
        .info-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .info-valor { font-size: 16px; color: var(--celeste); font-weight: bold; margin-top: 4px; }
        
        .pasajeros-list { max-height: 150px; overflow-y: auto; }
        .pasajero-item { background: #2a2a2a; border-radius: 8px; padding: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .pasajero-nombre { font-size: 13px; }
        .pasajero-asiento { font-size: 12px; color: var(--amarillo); }
        
        .sin-pasajeros { text-align: center; padding: 15px; color: #666; font-size: 12px; }
        
        .fila-info { font-size: 12px; color: #888; text-align: center; margin-top: 4px; }
        
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splash">
        <div class="anillo"><span style="font-size: 50px;">🚕</span></div>
        <h2 style="color: var(--celeste); margin-top: 20px;">TUMOVIL</h2>
        <p style="color: white; font-size: 12px;">Cargando conductor...</p>
    </div>

    <div class="header">
        <span style="font-size: 20px;">☰</span>
        <h1>CONDUCTOR <span id="coche-num">--</span></h1>
        <span id="online-indicator" style="width: 12px; height: 12px; border-radius: 50%; background: #666;"></span>
    </div>
    <div id="map"></div>

    <div class="bottom-ui">
        <div class="status-card" id="status-card">
            <b style="color: var(--celeste); font-size: 14px;" id="status-text">CONECTANDO...</b>
            <div class="fila-info" id="fila-info"></div>
        </div>
        
        <div class="info-box">
            <div class="info-item">
                <div class="info-label">PASAJEROS</div>
                <div class="info-valor" id="info-pasajeros">0/4</div>
            </div>
            <div class="info-item">
                <div class="info-label">RECAUDACIÓN</div>
                <div class="info-valor" id="info-plata">$0</div>
            </div>
        </div>
        
        <h4 style="margin: 0; font-size: 12px; color: #888;">🪑 ASIENTOS</h4>
        <div class="pasajeros-list" id="pasajeros-list">
            <div class="sin-pasajeros">Sin pasajeros</div>
        </div>
        
        <button class="btn-sentido" id="btn-sentido" onclick="cambiarSentido()">🔄 SENTIDO: IDA</button>
        <button class="btn-toggle btn-online" id="btn-toggle" onclick="toggleOnline()">⌛ CARGANDO...</button>
    </div>

<script>
    // ============================================
    // SUPABASE - CON APP SECRET
    // ============================================
    const _s = supabase.createClient(
        'https://nvumdlxervrewqiiaicl.supabase.co',
        'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE',
        {
            global: {
                headers: {
                    'x-app-secret': '2Awy7XGP0SBmBRprB3PBzfvz9VcbDd04'
                }
            }
        }
    );

    // ============================================
    // OBTENER ID DEL CONDUCTOR DESDE URL
    // ============================================
    // Uso: conductor.html?id=2
    const urlParams = new URLSearchParams(window.location.search);
    const MI_ID = parseInt(urlParams.get('id')) || 1;
    
    document.getElementById('coche-num').innerText = MI_ID;

    // ============================================
    // VARIABLES
    // ============================================
    let miLat = 0, miLon = 0;
    let estoyOnline = false;
    let miSentido = 'IDA';
    let misPasajeros = [];
    let watchId = null;

    // ============================================
    // MAPA
    // ============================================
    const map = L.map('map', { zoomControl: false }).setView([-34.588, -58.750], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    const iconYo = L.divIcon({ html: '<div style="font-size:30px; filter: drop-shadow(0 0 8px #00d2ff);">🚕</div>', iconAnchor: [15, 15] });
    let markerYo = null;

    // ============================================
    // INICIAR
    // ============================================
    async function iniciar() {
        try {
            // Verificar que el conductor existe
            const { data: yo, error } = await _s.from('estado_movil')
                .select('*')
                .eq('id', MI_ID)
                .single();
            
            if (error || !yo) {
                alert(`❌ El conductor ${MI_ID} no existe. Contactá al administrador.`);
                return;
            }
            
            estoyOnline = yo.esta_online || false;
            miSentido = yo.sentido_flujo || 'IDA';
            
            // Actualizar UI
            actualizarUI();
            
            // Iniciar GPS
            iniciarGPS();
            
            // Escuchar cambios
            escucharCambios();
            
            // Cargar pasajeros
            cargarPasajeros();
            
            // Ocultar splash
            setTimeout(() => {
                const s = document.getElementById('splash');
                s.style.opacity = '0';
                setTimeout(() => s.style.visibility = 'hidden', 800);
            }, 1000);
            
        } catch (err) {
            console.error("Error iniciando:", err);
            alert("Error de conexión. Reintentando...");
            setTimeout(iniciar, 3000);
        }
    }

    // ============================================
    // GPS
    // ============================================
    function iniciarGPS() {
        if (!navigator.geolocation) {
            alert("GPS no disponible");
            return;
        }
        
        watchId = navigator.geolocation.watchPosition(
            async (pos) => {
                miLat = pos.coords.latitude;
                miLon = pos.coords.longitude;
                
                // Actualizar marcador
                if (markerYo) {
                    markerYo.setLatLng([miLat, miLon]);
                } else {
                    markerYo = L.marker([miLat, miLon], { icon: iconYo }).addTo(map);
                }
                
                map.setView([miLat, miLon], 15);
                
                // Si estoy online, actualizar posición en BD
                if (estoyOnline) {
                    await _s.from('estado_movil').update({
                        latitud: miLat,
                        longitud: miLon,
                        ultima_actualizacion: new Date().toISOString()
                    }).eq('id', MI_ID);
                }
            },
            (err) => console.error("GPS error:", err),
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }

    // ============================================
    // TOGGLE ONLINE/OFFLINE
    // ============================================
    async function toggleOnline() {
        const btn = document.getElementById('btn-toggle');
        btn.disabled = true;
        
        try {
            if (estoyOnline) {
                // PASAR A OFFLINE
                await _s.from('estado_movil').update({
                    esta_online: false,
                    latitud: 0,
                    longitud: 0,
                    ultima_actualizacion: new Date().toISOString()
                }).eq('id', MI_ID);
                
                estoyOnline = false;
                
            } else {
                // PASAR A ONLINE
                await _s.from('estado_movil').update({
                    esta_online: true,
                    latitud: miLat,
                    longitud: miLon,
                    ultima_actualizacion: new Date().toISOString()
                }).eq('id', MI_ID);
                
                estoyOnline = true;
            }
            
            actualizarUI();
            
        } catch (err) {
            console.error("Error toggle:", err);
            alert("Error de conexión");
        } finally {
            btn.disabled = false;
        }
    }

    // ============================================
    // CAMBIAR SENTIDO
    // ============================================
    async function cambiarSentido() {
        const nuevo = miSentido === 'IDA' ? 'VUELTA' : 'IDA';
        
        try {
            await _s.from('estado_movil').update({
                sentido_flujo: nuevo
            }).eq('id', MI_ID);
            
            miSentido = nuevo;
            actualizarUI();
            
        } catch (err) {
            alert("Error cambiando sentido");
        }
    }

    // ============================================
    // ACTUALIZAR UI
    // ============================================
    function actualizarUI() {
        const statusCard = document.getElementById('status-card');
        const statusText = document.getElementById('status-text');
        const btnToggle = document.getElementById('btn-toggle');
        const btnSentido = document.getElementById('btn-sentido');
        const indicator = document.getElementById('online-indicator');
        
        btnSentido.innerText = `🔄 SENTIDO: ${miSentido}`;
        
        if (estoyOnline) {
            statusCard.className = 'status-card status-online';
            statusText.innerText = '🟢 EN LÍNEA';
            statusText.style.color = 'var(--success)';
            btnToggle.innerText = '🔴 BAJARME DE LA LÍNEA';
            btnToggle.className = 'btn-toggle btn-offline';
            indicator.style.background = 'var(--success)';
            indicator.style.boxShadow = '0 0 10px var(--success)';
        } else {
            statusCard.className = 'status-card status-offline';
            statusText.innerText = '🔴 FUERA DE LÍNEA';
            statusText.style.color = 'var(--danger)';
            btnToggle.innerText = '🟢 PONERME EN LÍNEA';
            btnToggle.className = 'btn-toggle btn-online';
            indicator.style.background = '#666';
            indicator.style.boxShadow = 'none';
        }
    }

    // ============================================
    // CARGAR PASAJEROS
    // ============================================
    async function cargarPasajeros() {
        try {
            const { data: reservas } = await _s.from('reservas_activas')
                .select('*')
                .eq('id_movil', MI_ID)
                .eq('estado', 'en_curso');
            
            misPasajeros = reservas || [];
            
            // Actualizar contadores
            document.getElementById('info-pasajeros').innerText = `${misPasajeros.length}/4`;
            document.getElementById('info-plata').innerText = `$${misPasajeros.length * 1000}`;
            
            // Renderizar lista
            const box = document.getElementById('pasajeros-list');
            
            if (misPasajeros.length === 0) {
                box.innerHTML = '<div class="sin-pasajeros">Sin pasajeros</div>';
                return;
            }
            
            box.innerHTML = misPasajeros.map(p => `
                <div class="pasajero-item">
                    <span class="pasajero-nombre">👤 ${p.nombre_pasajero}</span>
                    <span class="pasajero-asiento">🪑 ${p.asiento_num}</span>
                </div>
            `).join('');
            
        } catch (err) {
            console.error("Error cargando pasajeros:", err);
        }
    }

    // ============================================
    // ESCUCHAR CAMBIOS EN TIEMPO REAL
    // ============================================
    function escucharCambios() {
        // Escuchar cambios en mis reservas
        _s.channel('conductor_reservas_' + MI_ID)
            .on('postgres_changes', { 
                event: '*', 
                schema: 'public', 
                table: 'reservas_activas',
                filter: `id_movil=eq.${MI_ID}`
            }, () => {
                cargarPasajeros();
            })
            .subscribe();
        
        // Escuchar cambios en mi estado
        _s.channel('conductor_estado_' + MI_ID)
            .on('postgres_changes', {
                event: 'UPDATE',
                schema: 'public',
                table: 'estado_movil',
                filter: `id=eq.${MI_ID}`
            }, (payload) => {
                if (payload.new.sentido_flujo !== miSentido) {
                    miSentido = payload.new.sentido_flujo;
                    actualizarUI();
                }
            })
            .subscribe();
    }

    // ============================================
    // VER POSICIÓN EN FILA (opcional)
    // ============================================
    async function verPosicionFila() {
        try {
            const { data: online } = await _s.from('estado_movil')
                .select('id, ultima_actualizacion')
                .eq('esta_online', true)
                .eq('sentido_flujo', miSentido)
                .order('ultima_actualizacion', { ascending: true });
            
            if (!online) return;
            
            const miPos = online.findIndex(c => c.id === MI_ID);
            const total = online.length;
            
            const filaInfo = document.getElementById('fila-info');
            if (miPos >= 0) {
                filaInfo.innerText = `Posición en fila: ${miPos + 1} de ${total}`;
            } else {
                filaInfo.innerText = 'No estás en la fila';
            }
            
        } catch (err) {
            console.error("Error fila:", err);
        }
    }

    // ============================================
    // INICIAR
    // ============================================
    window.onload = iniciar;
</script>
</body>
</html>
