<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - Master Panel Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #0a0a0a; --panel: #161616; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--dark); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; width: 100vw; overflow: hidden; }

        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { text-align: center; width: 90%; max-width: 360px; background: #111; padding: 35px 25px; border-radius: 20px; border: 1px solid var(--celeste); }
        .login-box h1 { color: var(--celeste); margin: 0 0 25px 0; font-size: 28px; }
        .login-box input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 15px; border-radius: 12px; width: 100%; font-size: 16px; margin-bottom: 15px; }
        .login-box input:focus { outline: none; border-color: var(--celeste); }
        .btn-main { background: var(--celeste); color: black; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; }
        .btn-main:active { transform: scale(0.98); }
        .btn-danger { background: #dc3545; color: white; }
        .btn-warning { background: var(--amarillo); color: black; }
        .btn-success { background: #28a745; color: white; }

        /* LAYOUT */
        #app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        #sidebar { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 85%; 
            max-width: 380px; 
            height: 100vh; 
            background: var(--panel); 
            border-right: 1px solid #333; 
            display: flex; 
            flex-direction: column; 
            z-index: 1000; 
            transition: transform 0.3s ease;
        }
        #sidebar.hidden { transform: translateX(-100%); }
        
        #overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.6); 
            z-index: 999; 
            display: none; 
        }
        #overlay.active { display: block; }

        #map { 
            flex-grow: 1; 
            height: 100vh; 
            width: 100vw; 
            position: relative; 
        }

        #btn-menu { 
            position: fixed; 
            top: 15px; 
            left: 15px; 
            z-index: 500; 
            background: var(--celeste); 
            border: none; 
            padding: 12px 14px; 
            border-radius: 12px; 
            font-size: 20px; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* TABS */
        .tabs { 
            display: flex; 
            background: #222; 
            overflow-x: auto; 
            scrollbar-width: none; 
            flex-shrink: 0;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { 
            flex: 1; 
            padding: 14px 8px; 
            border: none; 
            background: #333; 
            color: #888; 
            font-size: 11px; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-weight: 600; 
            min-width: 65px;
        }
        .tab-btn.active { background: var(--celeste); color: black; }

        /* CONTENT */
        .content { 
            padding: 15px; 
            overflow-y: auto; 
            flex-grow: 1; 
            -webkit-overflow-scrolling: touch;
        }
        .section { display: none; }
        .section.active { display: block; }

        /* CARDS */
        .card { 
            background: #222; 
            border-radius: 12px; 
            padding: 14px; 
            margin-bottom: 10px; 
            border-left: 4px solid var(--celeste);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .card-title { font-weight: bold; font-size: 15px; }
        .card-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: bold; }
        .badge-zona1 { background: #00d2ff33; color: #00d2ff; }
        .badge-zona2 { background: #ffcc0033; color: #ffcc00; }
        .badge-zona3 { background: #ff444433; color: #ff4444; }
        .card-info { font-size: 13px; color: #aaa; line-height: 1.5; }
        .card-price { font-size: 18px; color: var(--amarillo); font-weight: bold; }

        /* FORMS */
        .form-section { 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
        }
        .form-title { 
            font-size: 12px; 
            color: #888; 
            margin-bottom: 12px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        input, select { 
            background: #2a2a2a; 
            border: 1px solid #444; 
            color: white; 
            padding: 12px; 
            border-radius: 10px; 
            width: 100%; 
            font-size: 15px; 
            margin-bottom: 10px; 
        }
        input:focus, select:focus { outline: none; border-color: var(--celeste); }

        /* ACTION BAR */
        .action-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .action-bar button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; }

        /* TOTAL BOX */
        .total-box { 
            background: linear-gradient(135deg, rgba(0,210,255,0.15), rgba(0,210,255,0.05)); 
            padding: 20px; 
            border-radius: 16px; 
            text-align: center; 
            border: 1px solid var(--celeste); 
            margin-bottom: 20px;
        }
        .total-box .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .total-box .amount { font-size: 36px; color: var(--amarillo); margin: 8px 0; font-weight: bold; }
        .total-box .detail { font-size: 13px; color: #aaa; }

        /* EMPTY STATE */
        .empty-state { text-align: center; padding: 40px 20px; color: #555; }
        .empty-state .icon { font-size: 48px; margin-bottom: 10px; }

        /* MAP */
        .map-tiles { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        /* MINI BUTTONS */
        .mini-btn { 
            padding: 6px 10px; 
            border: none; 
            border-radius: 6px; 
            font-size: 11px; 
            cursor: pointer; 
            flex: 1;
        }

        /* RESPONSIVE DESKTOP */
        @media (min-width: 768px) {
            #app-container { flex-direction: row; }
            #sidebar { position: relative; width: 400px; transform: none !important; }
            #sidebar.hidden { transform: none !important; }
            #btn-menu { display: none !important; }
            #overlay { display: none !important; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-box">
        <h1>🛰️ TuMovil</h1>
        <input type="password" id="pass-field" placeholder="Contraseña de administrador" onkeypress="if(event.key==='Enter')validar()">
        <button class="btn-main" onclick="validar()">INGRESAR AL PANEL</button>
        <p id="error" style="color: #ff4444; font-size: 13px; margin-top: 12px; display: none;">❌ Clave incorrecta</p>
    </div>
</div>

<!-- OVERLAY -->
<div id="overlay" onclick="toggleSidebar(false)"></div>

<!-- BOTÓN MENÚ -->
<button id="btn-menu" onclick="toggleSidebar(true)">☰</button>

<div id="app-container">
    <div id="sidebar" class="hidden">
        <div class="tabs">
            <button class="tab-btn active" onclick="ver('radar')">RADAR</button>
            <button class="tab-btn" onclick="ver('flota')">FLOTA</button>
            <button class="tab-btn" onclick="ver('caja')">CAJA</button>
            <button class="tab-btn" onclick="ver('ajustes')">AJUSTES</button>
        </div>

        <div class="content">
            <!-- RADAR -->
            <div id="view-radar" class="section active">
                <div class="action-bar">
                    <button class="btn-warning" onclick="finalizarTodos(false)">🧹 FINALIZAR TODO</button>
                    <button class="btn-danger" onclick="finalizarTodos(true)">🗑️ BORRAR TODO</button>
                </div>
                <h4 style="color: var(--celeste); margin: 0 0 12px 0; font-size: 14px;">📡 PASAJEROS EN VIVO</h4>
                <div id="pax-list"></div>
            </div>

            <!-- FLOTA -->
            <div id="view-flota" class="section">
                <h4 style="margin: 0 0 12px 0; font-size: 14px;">🚗 ESTADO DE CONDUCTORES</h4>
                <div id="flota-list"></div>
            </div>

            <!-- CAJA -->
            <div id="view-caja" class="section">
                <div class="total-box">
                    <div class="label">RECAUDACIÓN ESTIMADA</div>
                    <div class="amount" id="total-general">$0</div>
                    <div class="detail" id="total-detail">0 viajes activos</div>
                </div>
                <h4 style="margin: 0 0 12px 0; font-size: 14px;">💰 DETALLE POR COCHE</h4>
                <div id="caja-list"></div>
            </div>

            <!-- AJUSTES -->
            <div id="view-ajustes" class="section">
                
                <!-- CHOFER -->
                <div class="form-section">
                    <div class="form-title">👤 Datos del Chofer</div>
                    <input type="number" id="c-id" placeholder="N° de Coche">
                    <input type="text" id="c-nom" placeholder="Nombre del Chofer">
                    <button class="btn-main" onclick="guardarChofer()">ACTUALIZAR CHOFER</button>
                </div>

                <!-- VEHÍCULO -->
                <div class="form-section">
                    <div class="form-title">🚗 Datos del Vehículo</div>
                    <input type="number" id="auto-id" placeholder="N° de Coche">
                    <input type="text" id="auto-marca" placeholder="Marca (ej: Renault)">
                    <input type="text" id="auto-modelo" placeholder="Modelo (ej: Clio)">
                    <input type="text" id="auto-color" placeholder="Color (ej: Azul)">
                    <input type="text" id="auto-patente" placeholder="Patente (ej: ABC123)" style="text-transform: uppercase;">
                    <button class="btn-main" onclick="guardarAuto()" style="background: var(--amarillo);">💾 GUARDAR VEHÍCULO</button>
                </div>

                <!-- LISTA DE COCHES -->
                <div class="form-section">
                    <div class="form-title">📋 Coches Registrados</div>
                    <div id="lista-autos" style="max-height: 250px; overflow-y: auto;"></div>
                </div>

                <button class="btn-main" style="background: #444; color: white;" onclick="cambiarClave()">🔐 CAMBIAR CONTRASEÑA</button>
            </div>
        </div>
    </div>

    <div id="map"></div>
</div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    // ============================================
    // LOGIN
    // ============================================
    function validar() {
        const correcta = localStorage.getItem("adminPass") || "1234";
        if(document.getElementById("pass-field").value === correcta) {
            document.getElementById("login-screen").style.display = "none";
            localStorage.setItem("adminLogueado", "true");
            initMap();
            cargarInicial();
            activarRealtime();
        } else {
            document.getElementById("error").style.display = "block";
            setTimeout(() => document.getElementById("error").style.display = "none", 3000);
        }
    }

    // ============================================
    // SIDEBAR
    // ============================================
    function toggleSidebar(show) {
        const side = document.getElementById("sidebar");
        const over = document.getElementById("overlay");
        const btn = document.getElementById("btn-menu");
        
        if(show) {
            side.classList.remove("hidden");
            over.classList.add("active");
            btn.style.display = "none";
        } else {
            side.classList.add("hidden");
            over.classList.remove("active");
            btn.style.display = "block";
        }
    }

    function ver(s) {
        document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('view-'+s).classList.add('active');
        event.currentTarget.classList.add('active');
        
        if(s === 'ajustes') cargarListaAutos();
        if(window.innerWidth < 768) toggleSidebar(false);
    }

    // ============================================
    // MAPA
    // ============================================
    let map;
    let markers = {};
    const iconT = L.divIcon({ html: '<div style="font-size:28px;">🚕</div>', iconSize: [30, 30], iconAnchor: [15, 15] });
    const iconPax = L.divIcon({ html: '<div style="font-size:20px;">🚶</div>', iconSize: [20, 20], iconAnchor: [10, 20] });

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([-34.588, -58.750], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { className: 'map-tiles' }).addTo(map);
        setTimeout(() => map.invalidateSize(), 100);
    }

    // ============================================
    // ZONAS
    // ============================================
    const ZONAS = {
        1: { nombre: 'Barrio', color: '#00d2ff', precio: 1000 },
        2: { nombre: 'Cruce', color: '#ffcc00', precio: 1500 },
        3: { nombre: 'Moreno', color: '#ff4444', precio: 2500 }
    };

    const PARADAS = [
        'Miguel Cané','Cané y Los Aromos','Los Aromos 11016','Los Aromos 10874',
        'Los Aromos y Murillo','Murillo 601','Murillo y Güiraldes','Murillo y Watt',
        'A. Prado 2555','Prado y Payró','Prado 1744','Boulevard Caveri',
        'Caveri y Azara','Caveri y Vedia','Caveri y Tablada','Caveri y Echeverría',
        'Caveri y Gálvez','Caveri (Final)','Libertador y Aero','Libertador 7300',
        'Libertador 7200','Libertador y Maza','Maza y Albatros','Maternidad',
        'Abasto y Roca','Cruce Castelar','N. Kirchner y Maza','N. Kirchner y Albatros',
        'Libertador y Gaona','Libertador (Italia)','Córdoba 2879','Nemesio Álvarez',
        'España 171','Merlo / Mr. Tasty','Estación Moreno'
    ];

    // ============================================
    // REALTIME + CACHE
    // ============================================
    let datosCache = { moviles: [], reservas: [] };

    async function cargarInicial() {
        try {
            const [{ data: moviles }, { data: reservas }] = await Promise.all([
                _s.from('estado_movil').select('*').order('id'),
                _s.from('reservas_activas').select('*').eq('estado', 'en_curso')
            ]);
            
            datosCache.moviles = moviles || [];
            datosCache.reservas = reservas || [];
            renderizarTodo();
        } catch(e) {
            console.error("Error carga inicial:", e);
        }
    }

    function activarRealtime() {
        _s.channel('admin_moviles')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'estado_movil' }, (payload) => {
                if(payload.eventType === 'DELETE') {
                    datosCache.moviles = datosCache.moviles.filter(m => m.id !== payload.old.id);
                } else {
                    const idx = datosCache.moviles.findIndex(m => m.id === payload.new.id);
                    if(idx >= 0) datosCache.moviles[idx] = { ...datosCache.moviles[idx], ...payload.new };
                    else datosCache.moviles.push(payload.new);
                }
                renderizarTodo();
            })
            .subscribe();

        _s.channel('admin_reservas')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'reservas_activas', filter: 'estado=eq.en_curso' }, (payload) => {
                if(payload.eventType === 'DELETE') {
                    datosCache.reservas = datosCache.reservas.filter(r => r.id !== payload.old.id);
                } else {
                    const idx = datosCache.reservas.findIndex(r => r.id === payload.new.id);
                    if(idx >= 0) datosCache.reservas[idx] = payload.new;
                    else datosCache.reservas.push(payload.new);
                }
                renderizarTodo();
            })
            .subscribe();
    }

    function renderizarTodo() {
        renderPasajeros(datosCache.reservas);
        renderFlota(datosCache.moviles, datosCache.reservas);
        renderCaja(datosCache.moviles, datosCache.reservas);
        actualizarMapa(datosCache.moviles, datosCache.reservas);
    }

    // ============================================
    // RADAR - PASAJEROS
    // ============================================
    function renderPasajeros(reservas) {
        const box = document.getElementById('pax-list');
        
        if(!reservas || reservas.length === 0) {
            box.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div>No hay pasajeros activos</div></div>`;
            return;
        }

        const porCoche = {};
        reservas.forEach(r => {
            if(!porCoche[r.id_movil]) porCoche[r.id_movil] = [];
            porCoche[r.id_movil].push(r);
        });

        let html = '';
        Object.entries(porCoche).forEach(([cocheId, lista]) => {
            html += `<div style="margin-bottom: 15px;">`;
            html += `<div style="font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase;">🚗 Coche ${cocheId} — ${lista.length} pasajero(s)</div>`;
            
            lista.forEach(r => {
                const zona = ZONAS[r.zona_bajada] || ZONAS[1];
                const destino = PARADAS[r.destino_idx] || `Parada ${r.destino_idx}`;
                
                html += `
                <div class="card" style="border-left-color: ${zona.color}">
                    <div class="card-header">
                        <span class="card-title">👤 ${r.nombre_pasajero}</span>
                        <span class="card-badge badge-zona${r.zona_bajada || 1}">${zona.nombre}</span>
                    </div>
                    <div class="card-info">
                        🪑 Asiento <b>${r.asiento_num}</b> | 💰 <span class="card-price">$${r.precio_pagado || 1000}</span><br>
                        📍 Destino: <b>${destino}</b>
                    </div>
                </div>`;
            });
            html += `</div>`;
        });
        
        box.innerHTML = html;
    }

    // ============================================
    // FLOTA
    // ============================================
    function renderFlota(moviles, reservas) {
        const box = document.getElementById('flota-list');
        if(!moviles || moviles.length === 0) {
            box.innerHTML = `<div class="empty-state"><div class="icon">🚗</div><div>Sin coches registrados</div></div>`;
            return;
        }

        box.innerHTML = moviles.map(m => {
            const pasajeros = reservas.filter(r => r.id_movil == m.id).length;
            const online = m.esta_online && m.latitud;
            const color = online ? '#28a745' : '#dc3545';
            const autoInfo = m.patente ? `🚙 ${m.marca || ''} ${m.modelo || ''} · ${m.patente}` : '';
            
            return `
            <div class="card" style="border-left-color: ${color}">
                <div class="card-header">
                    <span class="card-title">🚗 Coche ${m.id}</span>
                    <span class="card-badge" style="background: ${color}33; color: ${color};">
                        ${online ? '🟢 Online' : '🔴 Offline'}
                    </span>
                </div>
                <div class="card-info">
                    👤 ${m.chofer || 'Sin chofer'}<br>
                    ${autoInfo ? autoInfo + '<br>' : ''}
                    🪑 ${pasajeros}/4 asientos ocupados
                </div>
            </div>`;
        }).join('');
    }

    // ============================================
    // CAJA
    // ============================================
    function renderCaja(moviles, reservas) {
        const box = document.getElementById('caja-list');
        let totalGeneral = 0;

        if(!moviles || moviles.length === 0) {
            box.innerHTML = `<div class="empty-state">Sin datos</div>`;
            document.getElementById('total-general').innerText = '$0';
            document.getElementById('total-detail').innerText = '0 viajes';
            return;
        }

        const html = moviles.map(m => {
            const delCoche = reservas.filter(r => r.id_movil == m.id);
            const subtotal = delCoche.reduce((sum, r) => sum + (r.precio_pagado || 1000), 0);
            totalGeneral += subtotal;
            
            return `
            <div class="card">
                <div class="card-header">
                    <span class="card-title">💰 Coche ${m.id} ${m.patente ? '('+m.patente+')' : ''}</span>
                    <span class="card-price">$${subtotal.toLocaleString()}</span>
                </div>
                <div class="card-info">${delCoche.length} viaje(s) activo(s)</div>
            </div>`;
        }).join('');

        box.innerHTML = html;
        document.getElementById('total-general').innerText = '$' + totalGeneral.toLocaleString();
        document.getElementById('total-detail').innerText = `${reservas.length} viaje(s) · ${moviles.filter(m=>m.esta_online).length} coche(s) online`;
    }

    // ============================================
    // MAPA
    // ============================================
    function actualizarMapa(moviles, reservas) {
        if(!map) return;

        moviles.forEach(m => {
            if(m.latitud && m.longitud) {
                const key = 'coche_'+m.id;
                const popup = `🚗 Coche ${m.id}<br>👤 ${m.chofer || 'Sin chofer'}<br>${m.patente ? '🚙 '+m.patente : ''}`;
                
                if(markers[key]) {
                    markers[key].setLatLng([m.latitud, m.longitud]);
                    markers[key].setPopupContent(popup);
                } else {
                    markers[key] = L.marker([m.latitud, m.longitud], {icon: iconT})
                        .addTo(map).bindPopup(popup);
                }
            }
        });

        reservas.forEach(r => {
            if(r.pasajero_lat && r.pasajero_lon) {
                const key = 'pax_'+r.id;
                const popup = `👤 ${r.nombre_pasajero}<br>🚗 Coche ${r.id_movil}<br>🪑 Asiento ${r.asiento_num}`;
                
                if(markers[key]) {
                    markers[key].setLatLng([r.pasajero_lat, r.pasajero_lon]);
                } else {
                    markers[key] = L.marker([r.pasajero_lat, r.pasajero_lon], {icon: iconPax})
                        .addTo(map).bindPopup(popup);
                }
            }
        });

        // Limpiar pasajeros que ya no están
        Object.keys(markers).forEach(key => {
            if(key.startsWith('pax_')) {
                const id = parseInt(key.replace('pax_', ''));
                if(!reservas.find(r => r.id === id)) {
                    map.removeLayer(markers[key]);
                    delete markers[key];
                }
            }
        });
    }

    // ============================================
    // ACCIONES MASIVAS
    // ============================================
    async function finalizarTodos(borrar) {
        if(!confirm(borrar ? '¿Borrar TODOS los viajes permanentemente?' : '¿Finalizar TODOS los viajes activos?')) return;
        
        try {
            if(borrar) {
                await _s.from('reservas_activas').delete().eq('estado', 'en_curso');
                alert('🗑️ Todos los viajes fueron eliminados');
            } else {
                await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('estado', 'en_curso');
                alert('✅ Todos los viajes fueron finalizados');
            }
            datosCache.reservas = [];
            renderizarTodo();
        } catch(e) {
            alert('❌ Error: ' + e.message);
        }
    }

    // ============================================
    // GUARDAR CHOFER
    // ============================================
    async function guardarChofer() {
        const id = document.getElementById('c-id').value;
        const nom = document.getElementById('c-nom').value.trim();
        if(!id || !nom) { alert('Completá N° de coche y nombre'); return; }
        
        try {
            await _s.from('estado_movil').upsert({ id: parseInt(id), chofer: nom });
            alert('✅ Chofer actualizado');
            document.getElementById('c-id').value = '';
            document.getElementById('c-nom').value = '';
        } catch(e) {
            alert('❌ Error: ' + e.message);
        }
    }

    // ============================================
    // GUARDAR AUTO (NUEVO)
    // ============================================
    async function guardarAuto() {
        const id = document.getElementById('auto-id').value;
        const marca = document.getElementById('auto-marca').value.trim();
        const modelo = document.getElementById('auto-modelo').value.trim();
        const color = document.getElementById('auto-color').value.trim();
        const patente = document.getElementById('auto-patente').value.trim().toUpperCase();
        
        if(!id) { alert('Ingresá el N° de coche'); return; }
        if(!marca || !modelo || !color || !patente) { 
            alert('Completá todos los datos del vehículo'); return; 
        }
        
        try {
            await _s.from('estado_movil').upsert({ 
                id: parseInt(id),
                marca: marca,
                modelo: modelo,
                color: color,
                patente: patente
            });
            
            alert('✅ Vehículo guardado');
            
            // Limpiar
            document.getElementById('auto-id').value = '';
            document.getElementById('auto-marca').value = '';
            document.getElementById('auto-modelo').value = '';
            document.getElementById('auto-color').value = '';
            document.getElementById('auto-patente').value = '';
            
            cargarListaAutos();
            
        } catch(e) {
            alert('❌ Error: ' + e.message);
        }
    }

    // ============================================
    // LISTA DE AUTOS (NUEVO)
    // ============================================
    async function cargarListaAutos() {
        try {
            const { data: moviles } = await _s.from('estado_movil').select('*').order('id');
            const box = document.getElementById('lista-autos');
            
            if(!moviles || moviles.length === 0) {
                box.innerHTML = '<div style="color: #555; text-align: center; padding: 20px;">Sin coches registrados</div>';
                return;
            }
            
            box.innerHTML = moviles.map(m => `
                <div class="card" style="border-left-color: ${m.patente ? '#28a745' : '#666'}; padding: 10px;">
                    <div class="card-header">
                        <span class="card-title" style="font-size: 14px;">🚗 Coche ${m.id}</span>
                        ${m.patente ? `<span class="card-badge" style="background: #28a74533; color: #28a745;">${m.patente}</span>` : '<span style="color:#666;font-size:11px;">Sin datos</span>'}
                    </div>
                    <div class="card-info" style="font-size: 12px;">
                        ${m.marca ? `📌 ${m.marca} ${m.modelo}` : ''}
                        ${m.color ? `· 🎨 ${m.color}` : ''}
                        ${m.chofer ? `<br>👤 ${m.chofer}` : ''}
                    </div>
                    <div style="display: flex; gap: 5px; margin-top: 8px;">
                        <button onclick="editarAuto(${m.id})" class="mini-btn" style="background: #333; color: white;">✏️ Editar</button>
                        <button onclick="eliminarAuto(${m.id})" class="mini-btn" style="background: #dc3545; color: white;">🗑️ Eliminar</button>
                    </div>
                </div>
            `).join('');
            
        } catch(e) {
            console.error("Error cargando autos:", e);
        }
    }

    async function editarAuto(id) {
        try {
            const { data: m } = await _s.from('estado_movil').select('*').eq('id', id).single();
            if(!m) return;
            
            document.getElementById('auto-id').value = m.id;
            document.getElementById('auto-marca').value = m.marca || '';
            document.getElementById('auto-modelo').value = m.modelo || '';
            document.getElementById('auto-color').value = m.color || '';
            document.getElementById('auto-patente').value = m.patente || '';
            
            document.getElementById('auto-id').scrollIntoView({ behavior: 'smooth' });
        } catch(e) {
            console.error("Error:", e);
        }
    }

    async function eliminarAuto(id) {
        if(!confirm(`¿Eliminar el coche ${id}?`)) return;
        try {
            await _s.from('estado_movil').delete().eq('id', id);
            alert('🗑️ Coche eliminado');
            cargarListaAutos();
        } catch(e) {
            alert('❌ Error: ' + e.message);
        }
    }

    // ============================================
    // CAMBIAR CLAVE
    // ============================================
    function cambiarClave() {
        const actual = prompt("Contraseña actual:");
        const correcta = localStorage.getItem("adminPass") || "1234";
        if(actual !== correcta) { alert('❌ Incorrecta'); return; }
        
        const nueva = prompt("Nueva contraseña (mínimo 4 caracteres):");
        if(nueva && nueva.length >= 4) {
            localStorage.setItem("adminPass", nueva);
            alert('🔐 Contraseña actualizada. Volvé a ingresar.');
            localStorage.removeItem("adminLogueado");
            location.reload();
        }
    }

    // ============================================
    // INICIAR
    // ============================================
    if(localStorage.getItem("adminLogueado")) {
        document.getElementById("login-screen").style.display = "none";
        initMap();
        cargarInicial();
        activarRealtime();
    }
</script>
</body>
</html>
