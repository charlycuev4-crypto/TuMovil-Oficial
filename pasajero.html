<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuMovil - Versión Estable</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #121212; }
        #map { height: 60%; width: 100%; }
        .ui { height: 40%; padding: 20px; color: white; display: flex; flex-direction: column; gap: 10px; }
        .btn-main { padding: 15px; border-radius: 10px; border: none; font-weight: bold; background: #28a745; color: white; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="ui">
    <select id="sentido-select">
        <option value="IDA">IDA</option>
        <option value="VUELTA">VUELTA</option>
    </select>
    <input type="text" id="nombre" placeholder="Nombre">
    <button class="btn-main" onclick="solicitar()">SOLICITAR VIAJE</button>
</div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    // Mapa base
    const map = L.map('map').setView([-34.57, -58.76], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Iconos (Recreación de la versión vieja)
    const iconP = L.divIcon({ html: '🚶', className: 'p-mark', iconSize: [30, 30] });
    const iconT = L.divIcon({ html: '🚕', className: 't-mark', iconSize: [30, 30] });
    
    let markerP = L.marker([0,0], {icon: iconP}).addTo(map);
    let guia = L.polyline([], {color: '#ffcc00', dashArray: '8,8'}).addTo(map);
    let taxis = {};

    // Geolocalización simple
    navigator.geolocation.watchPosition(pos => {
        let lat = pos.coords.latitude;
        let lon = pos.coords.longitude;
        markerP.setLatLng([lat, lon]);
        map.setView([lat, lon], 15);
    });

    // Cargar taxis (Lógica básica de la versión vieja)
    async function actualizarTaxis() {
        const { data } = await _s.from('estado_movil').select('*').eq('esta_online', true);
        if(!data) return;
        
        data.forEach(t => {
            if(taxis[t.id]) {
                taxis[t.id].setLatLng([t.latitud, t.longitud]);
            } else {
                taxis[t.id] = L.marker([t.latitud, t.longitud], {icon: iconT}).addTo(map);
            }
        });
    }

    // Suscripción a cambios
    _s.channel('any').on('postgres_changes', {event: '*', schema: 'public', table: 'estado_movil'}, actualizarTaxis).subscribe();
    
    actualizarTaxis();
</script>
</body>
</html>
