<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pasajero - Reserva</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .overlay { position: absolute; z-index: 1000; width: 100%; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .bottom { bottom: 20px; }
        .card { background: #000; border: 2px solid #00d4ff; border-radius: 20px; padding: 15px; width: 95%; box-shadow: 0 0 15px rgba(0,212,255,0.4); text-align: center; color: white; }
        .asientos-grid { display: flex; gap: 10px; justify-content: center; margin-bottom: 8px; }
        .btn-as { width: 55px; height: 55px; border-radius: 12px; border: 2px solid #00d4ff; background: transparent; color: #00d4ff; font-weight: bold; font-size: 20px; }
        .ocupado { background: #ff3b30 !important; border-color: #ff3b30 !important; color: white !important; }
        .desactivado { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        .instruccion { font-size: 12px; font-weight: bold; margin-top: 5px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="overlay bottom">
        <div class="card">
            <div class="asientos-grid">
                <button id="as1" class="btn-as" onclick="reservar(1)">1</button>
                <button id="as2" class="btn-as" onclick="reservar(2)">2</button>
                <button id="as3" class="btn-as" onclick="reservar(3)">3</button>
                <button id="as4" class="btn-as" onclick="reservar(4)">4</button>
            </div>
            <div class="instruccion">Presione un asiento para confirmar viaje</div>
        </div>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    let yaReservo = false;

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-34.561, -58.770], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const busIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png',
        iconSize: [35, 35]
    });
    let markerBus = L.marker([-34.561, -58.770], { icon: busIcon }).addTo(map);

    async function reservar(n) {
        if (yaReservo) return;
        if (navigator.vibrate) navigator.vibrate(80);

        // RPC es la función segura que creamos en Supabase
        const { error } = await _s.rpc('reservar_asiento_seguro', { row_id: 1 });

        if (!error) {
            yaReservo = true;
            bloquearInterfaz();
            alert("¡Asiento " + n + " reservado! Buen viaje.");
        }
    }

    function bloquearInterfaz() {
        for(let i=1; i<=4; i++) document.getElementById('as'+i).classList.add('desactivado');
        document.querySelector('.instruccion').innerText = "TENÉS UNA RESERVA ACTIVA";
        document.querySelector('.instruccion').style.color = "#00ff88";
    }

    function desbloquearInterfaz() {
        yaReservo = false;
        for(let i=1; i<=4; i++) document.getElementById('as'+i).classList.remove('desactivado');
        document.querySelector('.instruccion').innerText = "Presione un asiento para confirmar viaje";
        document.querySelector('.instruccion').style.color = "#fff";
    }

    _s.channel('cambios_p').on('postgres_changes', {event:'UPDATE', schema:'public', table:'estado_movil'}, r => {
        markerBus.setLatLng([r.new.latitud, r.new.longitud]);
        
        // Si el chofer resetea a 4, liberamos al pasajero
        if (r.new.asientos_libres === 4) desbloquearInterfaz();

        const ocup = 4 - r.new.asientos_libres;
        for(let i=1; i<=4; i++) {
            const btn = document.getElementById('as'+i);
            if (i <= ocup) btn.classList.add('ocupado');
            else btn.classList.remove('ocupado');
        }
    }).subscribe();
</script>
</body>
</html>
