    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - Pasajero</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }
        
        #map { height: 60%; width: 100%; }
        .bottom-ui { height: 40%; background: var(--panel); border-top: 2px solid var(--celeste); padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; }
        .asientos-grid { display: flex; justify-content: space-around; }
        .asiento-btn { width: 50px; height: 50px; border: 2px solid var(--celeste); border-radius: 10px; background: transparent; color: var(--celeste); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .asiento-btn.selected { background: var(--amarillo); color: black; border-color: var(--amarillo); }
        .asiento-btn.occupied { border-color: #555; color: #555; opacity: 0.4; pointer-events: none; }
        
        button { padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-pedir { background: #28a745; color: white; }
        .btn-cancelar { background: #dc3545; color: white; display: none; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="bottom-ui">
        <input type="text" id="nombre-input" placeholder="Tu Nombre">
        <select id="destino-select"><option value="">Selecciona una parada</option></select>
        <div class="asientos-grid" id="grid-asientos">
            <div class="asiento-btn" onclick="toggleAsiento(1)" id="as-1">1</div>
            <div class="asiento-btn" onclick="toggleAsiento(2)" id="as-2">2</div>
            <div class="asiento-btn" onclick="toggleAsiento(3)" id="as-3">3</div>
            <div class="asiento-btn" onclick="toggleAsiento(4)" id="as-4">4</div>
        </div>
        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViaje()">SOLICITAR VIAJE</button>
        <button class="btn-cancelar" id="btn-cancelar" onclick="finalizarViaje()">TERMINAR VIAJE</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map').setView([-34.57, -58.76], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    let asientosElegidos = [];
    let miLat = 0, miLon = 0;

    // Rellenar select
    const sel = document.getElementById('destino-select');
    paradas.forEach((p, i) => { const o = document.createElement('option'); o.value = i; o.innerText = p.n; sel.appendChild(o); });

    function toggleAsiento(num) {
        const idx = asientosElegidos.indexOf(num);
        if(idx > -1) { 
            asientosElegidos.splice(idx, 1); 
            document.getElementById('as-'+num).classList.remove('selected'); 
        } else { 
            asientosElegidos.push(num); 
            document.getElementById('as-'+num).classList.add('selected'); 
        }
    }

    async function confirmarViaje() {
        const nom = document.getElementById('nombre-input').value;
        const dest = document.getElementById('destino-select').value;
        if(!nom || !dest || asientosElegidos.length === 0) { alert("Completa nombre, destino y asiento"); return; }
        
        // Verificar si hay chofer activo
        const { data: movil } = await _s.from('estado_movil').select('id').eq('en_linea', true).limit(1);
        if(!movil || movil.length === 0) { alert("No hay choferes en línea en este momento."); return; }

        const rows = asientosElegidos.map(a => ({ 
            nombre_pasajero: nom, destino_idx: parseInt(dest), asiento_num: a, estado: 'en_curso', id_movil: movil[0].id 
        }));
        await _s.from('reservas_activas').insert(rows);
        location.reload();
    }

    async function finalizarViaje() {
        await _s.from('reservas_activas').update({estado: 'finalizado'}).eq('nombre_pasajero', document.getElementById('nombre-input').value);
        location.reload();
    }

    // Intervalo para actualizar asientos ocupados
    setInterval(async () => {
        const { data: ocupados } = await _s.from('reservas_activas').select('asiento_num').eq('estado', 'en_curso');
        document.querySelectorAll('.asiento-btn').forEach(b => b.classList.remove('occupied'));
        if(ocupados) {
            ocupados.forEach(o => {
                const btn = document.getElementById('as-'+o.asiento_num);
                if(btn && !asientosElegidos.includes(o.asiento_num)) btn.classList.add('occupied');
            });
        }
    }, 3000);

    navigator.geolocation.watchPosition(p => { 
        miLat = p.coords.latitude; miLon = p.coords.longitude; 
        L.marker([miLat, miLon]).addTo(map).bindPopup("Estás aquí").openPopup();
    });

</script>
</body>
</html>
