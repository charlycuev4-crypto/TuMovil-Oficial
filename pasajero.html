
    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MÓVIL EN VIVO - PASAJERO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.8s; }
        .logo-m { width: 85px; height: 85px; border: 3px solid #00d4ff; border-radius: 20px; color: #00d4ff; font-size: 50px; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px #00d4ff; margin-bottom: 15px; }
        .overlay { position: absolute; z-index: 1000; width: 100%; display: flex; justify-content: center; padding: 10px; }
        .top { top: 10px; }
        .bottom { bottom: 20px; flex-direction: column; align-items: center; }
        .card-destino { background: rgba(17, 17, 17, 0.95); border: 2px solid #00d4ff; border-radius: 15px; padding: 12px; width: 95%; box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }
        select { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #222; color: #fff; font-size: 18px; outline: none; }
        .card-asientos { background: rgba(0, 0, 0, 0.9); border: 2.5px solid #00d4ff; border-radius: 22px; padding: 20px; width: 95%; text-align: center; }
        .price-display { background: rgba(0, 212, 255, 0.1); border-radius: 12px; padding: 10px; margin-bottom: 15px; border: 1px solid rgba(0, 212, 255, 0.2); }
        .price-label { color: #aaa; font-size: 12px; text-transform: uppercase; font-weight: bold; display: block; }
        .price-value { color: #00d4ff; font-size: 28px; font-weight: 800; transition: color 0.3s; }
        .asientos-grid { display: flex; gap: 12px; margin-bottom: 15px; justify-content: center; }
        .btn-as { width: 65px; height: 65px; border-radius: 15px; border: 2.5px solid #00d4ff; background: transparent; color: #00d4ff; font-weight: bold; font-size: 24px; transition: 0.3s; }
        .ocupado { background: #ff3b30 !important; border-color: #ff3b30 !important; color: white !important; opacity: 0.6; }
        .seleccionado-local { background: #00d4ff !important; color: #000 !important; box-shadow: 0 0 15px #00d4ff; }
        .btn-action { color: white; border: none; padding: 16px; border-radius: 14px; font-weight: bold; width: 100%; text-transform: uppercase; cursor: pointer; }
        .btn-confirmar { background: #28a745; display: none; }
        .btn-finalizar { background: #ff3b30; display: none; }
        .dist-tag { background: #00d4ff; color: #000; padding: 6px 16px; border-radius: 12px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="splash"><div class="logo-m">M</div><div style="color:white; font-weight:bold;">MÓVIL EN VIVO</div></div>
    <div id="map"></div>
    
    <div class="overlay top">
        <div class="card-destino">
            <span style="color:#00d4ff; font-size:11px; font-weight:bold; display:block; margin-bottom:5px;">📍 TU DESTINO</span>
            <select id="sel-p" onchange="marcarDestino()"></select>
        </div>
    </div>

    <div class="overlay bottom">
        <div id="ui-dist" class="dist-tag" style="display:none;">EL MÓVIL ESTÁ A: <span id="v-dist">0</span>m</div>
        <div class="card-asientos">
            <div class="price-display">
                <span class="price-label">Importe a pagar</span>
                <span class="price-value" id="monto">$0</span>
            </div>
            <div class="asientos-grid" id="grid-asientos">
                <button id="as1" class="btn-as" onclick="toggleSeleccion(1)">1</button>
                <button id="as2" class="btn-as" onclick="toggleSeleccion(2)">2</button>
                <button id="as3" class="btn-as" onclick="toggleSeleccion(3)">3</button>
                <button id="as4" class="btn-as" onclick="toggleSeleccion(4)">4</button>
            </div>
            <button id="btn-confirmar" class="btn-action btn-confirmar" onclick="confirmarReserva()">Confirmar Reserva</button>
            <button id="btn-finalizar" class="btn-action btn-finalizar" onclick="liberarAsiento()">Finalizar mi viaje</button>
        </div>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let misAsientosLocal = [];
    let viajeConfirmado = false; 
    const PRECIO_ASIENTO = 1000;
    let miPos = null;
    let rutaCompleta = [];
    let markerDest = null;

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-34.561128, -58.770586], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    const busIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [38, 38] });
    let markerBus = L.marker([-34.561128, -58.770586], { icon: busIcon }).addTo(map);

    // 1. CARGAR PARADAS DINÁMICAMENTE (PUNTOS AZULES)
    async function cargarParadas() {
        const { data: paradas } = await _s.from('paradas').select('*').order('orden', { ascending: true });
        if(paradas) {
            rutaCompleta = paradas.map(p => ({ n: p.nombre, c: [p.latitud, p.longitud] }));
            
            // Dibujar la línea de ruta
            L.polyline(rutaCompleta.map(p => p.c), {color: '#00d4ff', weight: 5, opacity: 0.6}).addTo(map);
            
            // Dibujar los círculos azules (Dots)
            rutaCompleta.forEach(p => {
                L.circleMarker(p.c, {
                    radius: 5, fillColor: '#007AFF', color: '#FFF', weight: 2, fillOpacity: 0.8
                }).addTo(map);

                // Llenar el selector de destinos
                let o = document.createElement('option');
                o.value = rutaCompleta.indexOf(p);
                o.text = p.n;
                document.getElementById('sel-p').add(o);
            });
        }
    }

    navigator.geolocation.watchPosition(p => { 
        miPos = [p.coords.latitude, p.coords.longitude]; 
    }, null, {enableHighAccuracy:true});

    function marcarDestino() {
        const p = rutaCompleta[document.getElementById('sel-p').value];
        if(markerDest) map.removeLayer(markerDest);
        markerDest = L.marker(p.c).addTo(map).bindPopup(p.n).openPopup();
        map.flyTo(p.c, 16);
    }

    function toggleSeleccion(n) {
        if (viajeConfirmado) return;
        const btn = document.getElementById('as' + n);
        if (btn.classList.contains('ocupado')) return;
        if (misAsientosLocal.includes(n)) {
            misAsientosLocal = misAsientosLocal.filter(id => id !== n);
            btn.classList.remove('seleccionado-local');
        } else {
            misAsientosLocal.push(n);
            btn.classList.add('seleccionado-local');
        }
        actualizarUI();
    }

    function actualizarUI() {
        const total = misAsientosLocal.length * PRECIO_ASIENTO;
        document.getElementById('monto').innerText = total > 0 ? `$${total}` : (viajeConfirmado ? `$${PRECIO_ASIENTO}` : "$0");
        document.getElementById('btn-confirmar').style.display = (misAsientosLocal.length > 0 && !viajeConfirmado) ? 'block' : 'none';
        document.getElementById('btn-finalizar').style.display = viajeConfirmado ? 'block' : 'none';
        document.getElementById('grid-asientos').style.opacity = viajeConfirmado ? "0.5" : "1";
    }

    async function confirmarReserva() {
        if (!miPos) { alert("Esperando señal de GPS..."); return; }
        const destino = rutaCompleta[document.getElementById('sel-p').value];
        const { data: movil } = await _s.from('estado_movil').select('asientos_libres').eq('id', 1).single();
        const cant = misAsientosLocal.length;

        if(movil && movil.asientos_libres >= cant) {
            // ENVIAMOS TODO AL CONDUCTOR: ASIENTOS + ORIGEN REAL + DESTINO ELEGIDO
            await _s.from('estado_movil').update({ 
                asientos_libres: movil.asientos_libres - cant,
                pasa_lat_origen: miPos[0],
                pasa_lng_origen: miPos[1],
                pasa_lat_destino: destino.c[0],
                pasa_lng_destino: destino.c[1]
            }).eq('id', 1);
            
            viajeConfirmado = true;
            misAsientosLocal = []; 
            alert("¡Reserva confirmada!");
            actualizarUI();
        }
    }

    async function liberarAsiento() {
        await _s.from('estado_movil').update({ 
            asientos_libres: 4,
            pasa_lat_origen: null, pasa_lng_origen: null,
            pasa_lat_destino: null, pasa_lng_destino: null
        }).eq('id', 1);
        viajeConfirmado = false;
        location.reload();
    }

    _s.channel('cambios').on('postgres_changes', {event:'UPDATE', schema:'public', table:'estado_movil'}, r => {
        markerBus.setLatLng([r.new.latitud, r.new.longitud]);
        if(miPos) {
            const d = map.distance(markerBus.getLatLng(), miPos);
            document.getElementById('ui-dist').style.display = 'block';
            document.getElementById('v-dist').innerText = Math.round(d);
        }
        const ocupadosDB = 4 - r.new.asientos_libres;
        for(let i=1; i<=4; i++) {
            const btn = document.getElementById('as'+i);
            btn.className = i <= ocupadosDB ? 'btn-as ocupado' : 'btn-as' + (misAsientosLocal.includes(i) ? ' seleccionado-local' : '');
        }
    }).subscribe();

    window.onload = () => {
        cargarParadas();
        setTimeout(() => { 
            document.getElementById('splash').style.opacity = '0'; 
            setTimeout(() => document.getElementById('splash').style.display='none', 800); 
        }, 2000);
    };
</script>
</body>
</html>
