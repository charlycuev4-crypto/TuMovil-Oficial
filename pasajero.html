<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MÓVIL EN VIVO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        /* Splash Logo Original */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.8s;
        }
        .logo-m {
            width: 85px; height: 85px; border: 3px solid #00d4ff;
            border-radius: 20px; color: #00d4ff; font-size: 50px;
            font-weight: bold; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 0 20px #00d4ff;
            margin-bottom: 15px;
        }

        /* Interfaz según capturas */
        .overlay { position: absolute; z-index: 1000; width: 100%; display: flex; justify-content: center; padding: 10px; }
        .top { top: 10px; }
        .bottom { bottom: 20px; flex-direction: column; align-items: center; }

        .card-destino {
            background: rgba(17, 17, 17, 0.95); border: 2px solid #00d4ff; 
            border-radius: 15px; padding: 12px; width: 95%;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        select {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: #222; color: #fff; font-size: 18px; outline: none;
        }

        .card-asientos { 
            background: #000; border: 2.5px solid #00d4ff; 
            border-radius: 22px; padding: 18px; width: 95%;
            text-align: center;
        }

        .asientos-grid { display: flex; gap: 12px; margin-bottom: 12px; justify-content: center; }
        .btn-as { 
            width: 65px; height: 65px; border-radius: 15px; border: 2.5px solid #00d4ff; 
            background: transparent; color: #00d4ff; font-weight: bold; font-size: 24px; 
        }
        .ocupado { background: #ff3b30 !important; border-color: #ff3b30 !important; color: white !important; }
        
        .btn-finalizar {
            background: #ff3b30; color: white; border: none; padding: 14px;
            border-radius: 12px; font-weight: bold; width: 100%;
            margin-top: 10px; text-transform: uppercase; display: none;
            box-shadow: 0 0 10px rgba(255, 59, 48, 0.4);
        }

        .dist-tag { background: #00d4ff; color: #000; padding: 6px 16px; border-radius: 10px; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="splash"><div class="logo-m">M</div><div style="color:white; font-weight:bold;">MÓVIL EN VIVO</div></div>
    
    <div id="map"></div>

    <div class="overlay top">
        <div class="card-destino">
            <span style="color:#00d4ff; font-size:11px; font-weight:bold; display:block; margin-bottom:5px;">📍 TU DESTINO</span>
            <select id="sel-p" onchange="marcarDestino()">
                <option value="0">M. Cané y Marchena</option>
                <option value="1">Murillo 601</option>
                <option value="2">Murillo y Watt</option>
                <option value="3">Cruce Castelar</option>
            </select>
        </div>
    </div>

    <div class="overlay bottom">
        <div id="ui-dist" class="dist-tag" style="display:none;">MÓVIL A: <span id="v-dist">0</span>m</div>
        <div class="card-asientos">
            <div class="asientos-grid">
                <button id="as1" class="btn-as" onclick="reservar(1)">1</button>
                <button id="as2" class="btn-as" onclick="reservar(2)">2</button>
                <button id="as3" class="btn-as" onclick="reservar(3)">3</button>
                <button id="as4" class="btn-as" onclick="reservar(4)">4</button>
            </div>
            <div id="txt-inst" style="color:white; font-size:11px; font-weight:bold;">PRESIONE UN ASIENTO PARA VIAJAR</div>
            <button id="btn-finalizar" class="btn-finalizar" onclick="finalizarViaje()">Finalizar mi viaje</button>
        </div>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    let miAsiento = null;

    // Ruta real siguiendo las calles (no cruza casas)
    const paradas = [
        {n:'M. Cané y Marchena', c:[-34.561128, -58.770586]},
        {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'Cruce Castelar', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Dibujamos la línea azul de la ruta real
    L.polyline(paradas.map(p => p.c), { color: '#00d4ff', weight: 5, opacity: 0.7 }).addTo(map);

    const busIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [38, 38] });
    let markerBus = L.marker(paradas[0].c, { icon: busIcon }).addTo(map);
    let markerDest = null;
    let miPos = null;

    navigator.geolocation.watchPosition(p => { miPos = [p.coords.latitude, p.coords.longitude]; }, null, {enableHighAccuracy:true});

    function marcarDestino() {
        const p = paradas[document.getElementById('sel-p').value];
        if(markerDest) map.removeLayer(markerDest);
        markerDest = L.marker(p.c).addTo(map).bindPopup("Tu Destino").openPopup();
        map.flyTo(p.c, 16);
    }

    async function reservar(n) {
        if (miAsiento) return;
        if (navigator.vibrate) navigator.vibrate(80);
        
        const { data } = await _s.from('estado_movil').select('asientos_libres').eq('id', 1).single();
        if(data && data.asientos_libres > 0) {
            await _s.from('estado_movil').update({ asientos_libres: data.asientos_libres - 1 }).eq('id', 1);
            miAsiento = n;
            document.getElementById('btn-finalizar').style.display = 'block';
            document.getElementById('txt-inst').innerText = "VIAJANDO EN ASIENTO " + n;
        }
    }

    async function finalizarViaje() {
        const { data } = await _s.from('estado_movil').select('asientos_libres').eq('id', 1).single();
        if(data) {
            await _s.from('estado_movil').update({ asientos_libres: data.asientos_libres + 1 }).eq('id', 1);
            miAsiento = null;
            document.getElementById('btn-finalizar').style.display = 'none';
            document.getElementById('txt-inst').innerText = "PRESIONE UN ASIENTO PARA VIAJAR";
        }
    }

    _s.channel('cambios').on('postgres_changes', {event:'UPDATE', schema:'public', table:'estado_movil'}, r => {
        markerBus.setLatLng([r.new.latitud, r.new.longitud]);
        
        // Sincronización con el conductor: si él resetea, nosotros también
        if(r.new.asientos_libres === 4) {
            miAsiento = null;
            document.getElementById('btn-finalizar').style.display = 'none';
            document.getElementById('txt-inst').innerText = "PRESIONE UN ASIENTO PARA VIAJAR";
        }

        if(miPos) {
            const d = map.distance(markerBus.getLatLng(), miPos);
            document.getElementById('ui-dist').style.display = 'block';
            document.getElementById('v-dist').innerText = Math.round(d);
        }
        
        const ocup = 4 - r.new.asientos_libres;
        for(let i=1; i<=4; i++) {
            document.getElementById('as'+i).className = 'btn-as ' + (i <= ocup ? 'ocupado' : '');
        }
    }).subscribe();

    setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => document.getElementById('splash').style.display = 'none', 800); }, 2500);
</script>
</body>
</html>
