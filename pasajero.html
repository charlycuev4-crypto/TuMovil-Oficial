<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasajero Vivo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; text-align: center; }
        #map { height: 50vh; width: 100%; background: #eee; }
        .info { padding: 20px; }
        #res-asientos { font-size: 100px; color: #28a745; font-weight: bold; margin: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="info">
        <p>ASIENTOS DISPONIBLES</p>
        <h1 id="res-asientos">?</h1>
        <p id="debug" style="font-size: 10px; color: #ccc;">Esperando señal...</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const _supabase = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52dW1kbHhlcnZyZXdxaWlhaWNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTA4NTMsImV4cCI6MjA4OTg4Njg1M30.ejh7dtL2O6JHeoVq47cUK_hXAfRetJPyzks1yI-Lrhs');

        const map = L.map('map').setView([-34.5747, -58.7744], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const marker = L.marker([-34.5747, -58.7744]).addTo(map);

        async function actualizar() {
            const { data } = await _supabase.from('estado_movil').select('*').eq('id', 1).single();
            if (data) {
                document.getElementById('res-asientos').innerText = data.asientos_libres;
                marker.setLatLng([data.latitud, data.longitud]);
                map.panTo([data.latitud, data.longitud]);
                document.getElementById('debug').innerText = "Última actualización: " + new Date().toLocaleTimeString();
            }
        }

        // 1. Pedir datos apenas carga
        actualizar();

        // 2. Pedir datos cada 5 segundos (por si el tiempo real falla)
        setInterval(actualizar, 5000);

        // 3. Tiempo real activado
        _supabase.channel('cambios').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'estado_movil' }, payload => {
            actualizar();
        }).subscribe();
    </script>
</body>
</html>
