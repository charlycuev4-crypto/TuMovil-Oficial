<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero Seguro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; --success: #28a745; --danger: #dc3545; --azul-dest: #007AFF; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.8s ease, visibility 0.8s; }
        .anillo { width: 160px; height: 160px; border: 4px solid var(--celeste); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px var(--celeste); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .header { background: var(--panel); border-bottom: 2px solid var(--celeste); padding: 10px; text-align: center; flex-shrink: 0; }
        .header h1 { margin: 0; font-size: 18px; color: var(--celeste); letter-spacing: 2px; }

        #map { flex-grow: 1; width: 100%; }
        
        .bottom-ui { background: var(--panel); border-top: 2px solid var(--celeste); padding: 15px 15px env(safe-area-inset-bottom); display: flex; flex-direction: column; gap: 8px; border-radius: 25px 25px 0 0; z-index: 100; box-shadow: 0 -10px 25px rgba(0,0,0,0.5); max-height: 50vh; overflow-y: auto; }
        .promo-card { background: rgba(0, 210, 255, 0.05); border: 1px solid var(--celeste); border-radius: 12px; padding: 8px; text-align: center; }
        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }
        
        .flota-container { max-height: 220px; overflow-y: auto; }
        .coche-card { background: #1a1a1a; border-radius: 12px; padding: 10px; margin-bottom: 8px; border: 1px solid #333; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .coche-card.seleccionado { border-color: var(--celeste); box-shadow: 0 0 8px rgba(0,210,255,0.3); }
        .coche-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .coche-num { font-weight: bold; font-size: 13px; color: white; }
        
        .asientos-row { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }
        .asiento-box { width: 65px; height: 55px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; transition: all 0.2s; position: relative; }
        .asiento-libre { background: #2a2a2a; border: 2px solid var(--celeste); color: var(--celeste); cursor: pointer; }
        .asiento-libre.seleccionado { background: var(--amarillo); border-color: var(--amarillo); color: black; }
        .asiento-ocupado { background: #1a1a1a; border: 2px solid #333; color: #555; }
        .asiento-num { font-size: 11px; font-weight: bold; }
        .asiento-nombre { font-size: 9px; text-align: center; line-height: 1; width: 90%; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; margin-top: 2px; }
        
        .btn-pedir { background: #28a745; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 5px; }
        .btn-pedir:disabled { background: #333; color: #666; }
        .btn-cancelar { background: #dc3545; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; display: none; margin-top: 5px; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splash">
        <div class="anillo"><span style="font-size: 60px;">🚕</span></div>
        <h2 style="color: var(--celeste); margin-top: 20px;">TUMOVIL</h2>
        <p style="color: white; font-size: 12px;">Cargando mapa seguro...</p>
    </div>

    <div class="header"><h1>TU MOVIL</h1></div>
    <div id="map"></div>

    <div class="bottom-ui">
        <div class="promo-card"><b style="color:var(--amarillo);">VIAJE SEGURO Y PROTEGIDO</b></div>
        <select id="sentido-select">
            <option value="IDA">Hacia IDA</option>
            <option value="VUELTA">Hacia VUELTA</option>
        </select>
        <input type="text" id="nombre-input" placeholder="Tu Nombre para el Chofer" maxlength="15">
        <select id="destino-select">
            <option value="" disabled selected>¿A qué parada vas?</option>
        </select>
        <div class="flota-container" id="flota-container">
            <div style="text-align:center; padding:20px; color:#666;">📍 Seleccioná tu destino para ver coches</div>
        </div>
        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajePasajero()" disabled>ESPERANDO GPS...</button>
        <button class="btn-cancelar" id="btn-cancelar" onclick="finalizarViaje()">TERMINAR MI VIAJE</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // DIBUJAR PARADAS: Círculos Celestes con BORDE NEGRO (Corrección solicitada)
    paradas.forEach(p => L.circleMarker(p.c, { radius: 6, color: '#000000', weight: 2, fillColor: '#00d2ff', fillOpacity: 0.9 }).addTo(map));

    let miLat = 0, miLon = 0, miViajeActivo = false, asientosElegidos = [], cocheSeleccionado = null;
    let markerPasajero = L.marker([0,0], { icon: L.divIcon({html:'🚶', className:'p-icon', iconSize:[24,24]}) }).addTo(map);

    // Restaurar Gráficos de Destino
    const iconDestArrow = L.divIcon({ html: `<div style="width:0; height:0; border-left:12px solid transparent; border-right:12px solid transparent; border-bottom:24px solid var(--azul-dest); filter: drop-shadow(0 0 10px var(--azul-dest));"></div>`, className: 'dest-arrow', iconAnchor: [12, 12] });
    let markerDestinoFlecha = L.marker([0,0], { icon: iconDestArrow });
    let guiaDestino = L.polyline([], { color: 'var(--amarillo)', dashArray: '10, 10', weight: 3 }).addTo(map);

    const selDest = document.getElementById('destino-select');
    paradas.forEach((p, i) => { const opt = new Option(p.n, i); selDest.add(opt); });

    function ocultarSplash() {
        const s = document.getElementById('splash');
        if(s) { s.style.opacity = '0'; setTimeout(() => s.style.visibility = 'hidden', 800); }
    }

    window.onload = async () => {
        const nombreGuardado = localStorage.getItem('usuario_nombre');
        if(nombreGuardado) {
            document.getElementById('nombre-input').value = nombreGuardado;
            const { data } = await _s.from('reservas_activas').select('*').eq('nombre_pasajero', nombreGuardado).eq('estado', 'en_curso');
            if (data?.length > 0) { 
                miViajeActivo = true; 
                bloquearUI(); 
            }
        }
        setTimeout(ocultarSplash, 5000); // Fail-safe
    };

    function bloquearUI() {
        document.getElementById('btn-pedir').style.display = 'none';
        document.getElementById('btn-cancelar').style.display = 'block';
        document.getElementById('nombre-input').disabled = true;
        document.getElementById('destino-select').disabled = true;
        document.getElementById('flota-container').innerHTML = '<div style="text-align:center;color:var(--success);padding:10px;">Viaje Reservado Exitosamente</div>';
    }

    navigator.geolocation.watchPosition(p => {
        miLat = p.coords.latitude; miLon = p.coords.longitude;
        markerPasajero.setLatLng([miLat, miLon]);
        document.getElementById('btn-pedir').disabled = false;
        if(!miViajeActivo) document.getElementById('btn-pedir').innerText = "SELECCIONÁ TU DESTINO";
        ocultarSplash();
    }, () => ocultarSplash(), { enableHighAccuracy: true });

    // Lógica para Trazar Ruta a Destino (Restaurada y Ajustada)
    function actualizarGuiaDestino() {
        const destIdx = document.getElementById('destino-select').value;
        if (destIdx !== "" && miLat !== 0) {
            const destCoord = paradas[destIdx].c;
            guiaDestino.setLatLngs([[miLat, miLon], destCoord]); // Línea discontinua
            markerDestinoFlecha.setLatLng(destCoord).addTo(map); // Flecha Azul
            map.fitBounds(L.latLngBounds([miLat, miLon], destCoord), { padding: [100, 100] }); // Auto-zoom
        }
    }

    async function renderizarFlotaDisponible() {
        if (miViajeActivo) return;
        const container = document.getElementById('flota-container');
        const sentido = document.getElementById('sentido-select').value;
        const destIdx = document.getElementById('destino-select').value;
        
        // Ejecutar gráficos de destino antes de buscar coches
        actualizarGuiaDestino();

        const { data: moviles } = await _s.from('estado_movil').select('*').eq('esta_online', true).eq('sentido_flujo', sentido);
        
        if (!moviles || moviles.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:10px;color:var(--danger);">🚫 No hay coches disponibles</div>';
            return;
        }

        let html = '';
        for (const m of moviles) {
            const { data: ocupados } = await _s.from('reservas_activas').select('asiento_num, nombre_pasajero').eq('id_movil', m.id).eq('estado', 'en_curso');
            const mapOcupados = {}; 
            if(ocupados) ocupados.forEach(r => mapOcupados[r.asiento_num] = r.nombre_pasajero);

            html += `<div class="coche-card" id="c-card-${m.id}">
                <div class="coche-header"><span class="coche-num">Coche ${m.id} - ${m.chofer || 'Conductor'}</span></div>
                <div class="asientos-row">`;
            
            [1,2,3,4].forEach(num => {
                if(mapOcupados[num]) {
                    // BLINDAJE ANTI-VIRUS: El nombre se inyecta por ID después para que sea texto plano
                    html += `<div class="asiento-box asiento-ocupado">
                        <div class="asiento-num">${num}</div>
                        <div class="asiento-nombre" id="name-tag-${m.id}-${num}"></div>
                        <div class="asiento-lock">🔒</div>
                    </div>`;
                } else {
                    html += `<div class="asiento-box asiento-libre" id="as-${m.id}-${num}" onclick="seleccionarAsiento(${m.id}, ${num})">
                        <div class="asiento-num">${num}</div>
                        <div class="asiento-nombre">Libre</div>
                    </div>`;
                }
            });
            html += `</div></div>`;
        }
        container.innerHTML = html;

        // SEGUNDA FASE DEL BLINDAJE: Insertar nombres como Texto Plano (Inhackeable)
        moviles.forEach(m => {
            _s.from('reservas_activas').select('asiento_num, nombre_pasajero').eq('id_movil', m.id).eq('estado', 'en_curso')
            .then(({data}) => {
                data?.forEach(r => {
                    const el = document.getElementById(`name-tag-${m.id}-${r.asiento_num}`);
                    if(el) el.innerText = r.nombre_pasajero; // .innerText mata cualquier script malicioso
                });
            });
        });
    }

    function seleccionarAsiento(idCoche, num) {
        if(cocheSeleccionado && cocheSeleccionado !== idCoche) {
            asientosElegidos = [];
            document.querySelectorAll('.asiento-libre').forEach(e => e.classList.remove('seleccionado'));
        }
        cocheSeleccionado = idCoche;
        const el = document.getElementById(`as-${idCoche}-${num}`);
        const pos = asientosElegidos.indexOf(num);
        if(pos > -1) {
            asientosElegidos.splice(pos, 1);
            el.classList.remove('seleccionado');
        } else {
            if(asientosElegidos.length >= 2) return alert("Máximo 2 asientos");
            asientosElegidos.push(num);
            el.classList.add('seleccionado');
        }
        actualizarBoton();
    }

    function actualizarBoton() {
        const btn = document.getElementById('btn-pedir');
        if(asientosElegidos.length > 0) {
            btn.innerText = `RESERVAR ${asientosElegidos.length} ASIENTOS`;
            btn.disabled = false;
        } else {
            btn.innerText = "SELECCIONÁ UN ASIENTO";
            btn.disabled = true;
        }
    }

    document.getElementById('destino-select').onchange = renderizarFlotaDisponible;
    document.getElementById('sentido-select').onchange = renderizarFlotaDisponible;

    async function confirmarViajePasajero() {
        const nom = document.getElementById('nombre-input').value.trim();
        const dest = document.getElementById('destino-select').value;
        if(!nom || !dest || asientosElegidos.length === 0) return alert("Completa todos los datos");

        const { error } = await _s.from('reservas_activas').insert(asientosElegidos.map(a => ({
            id_movil: cocheSeleccionado,
            asiento_num: a,
            nombre_pasajero: nom,
            destino_idx: parseInt(dest),
            estado: 'en_curso',
            pasajero_lat: miLat,
            pasajero_lon: miLon
        })));

        if(!error) {
            localStorage.setItem('usuario_nombre', nom);
            location.reload();
        } else {
            alert("Error al reservar: " + error.message);
        }
    }

    async function finalizarViaje() {
        const nom = localStorage.getItem('usuario_nombre');
        await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('nombre_pasajero', nom).eq('estado', 'en_curso');
        location.reload();
    }
</script>
</body>
</html>
