<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero Inteligente</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
        #map { flex-grow: 1; width: 100%; z-index: 1; }
        .bottom-ui { background: var(--panel); border-top: 2px solid var(--celeste); padding: 15px; display: flex; flex-direction: column; gap: 8px; border-radius: 25px 25px 0 0; z-index: 1000; box-shadow: 0 -10px 25px rgba(0,0,0,0.5); }
        .selector-sentido { display: flex; gap: 10px; margin-bottom: 5px; }
        .btn-sentido { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid #444; background: #2a2a2a; color: white; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn-sentido.active { border-color: var(--celeste); background: rgba(0,210,255,0.2); box-shadow: 0 0 10px var(--celeste); }
        .promo-card { background: rgba(0, 210, 255, 0.05); border: 1px solid var(--celeste); border-radius: 12px; padding: 8px; text-align: center; }
        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .asientos-grid { display: flex; justify-content: space-around; margin: 5px 0; }
        .asiento-btn { width: 50px; height: 50px; border: 2px solid var(--celeste); border-radius: 12px; background: transparent; color: var(--celeste); font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .asiento-btn.selected { background: var(--amarillo); border-color: var(--amarillo); color: #000; box-shadow: 0 0 15px var(--amarillo); }
        .asiento-btn.occupied { border-color: #333; color: #333; pointer-events: none; opacity: 0.3; }
        .btn-pedir { background: #28a745; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-cancelar { background: #dc3545; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; display: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="bottom-ui">
        <div class="selector-sentido">
            <button id="btn-ida" class="btn-sentido" onclick="seleccionarSentido(true)">IDA</button>
            <button id="btn-vuelta" class="btn-sentido" onclick="seleccionarSentido(false)">VUELTA</button>
        </div>

        <div class="promo-card"><b style="color:var(--amarillo);">TARIFA: $1000 x ASIENTO</b></div>
        
        <input type="text" id="nombre-input" placeholder="Tu Nombre">
        <select id="destino-select">
            <option value="" disabled selected>¿A qué parada vas?</option>
        </select>

        <div class="asientos-grid">
            <div class="asiento-btn" onclick="toggleAsiento(1)" id="as-1">1</div>
            <div class="asiento-btn" onclick="toggleAsiento(2)" id="as-2">2</div>
            <div class="asiento-btn" onclick="toggleAsiento(3)" id="as-3">3</div>
            <div class="asiento-btn" onclick="toggleAsiento(4)" id="as-4">4</div>
        </div>

        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajePasajero()">SOLICITAR VIAJE</button>
        <button class="btn-cancelar" id="btn-cancelar" onclick="finalizarViaje()">TERMINAR MI VIAJE</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    let sentidoSeleccionado = null;
    let asientosElegidos = [];
    let miLat = 0, miLon = 0, miViajeActivo = false;
    let map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    paradas.forEach(p => L.circleMarker(p.c, { radius: 5, color: '#00d2ff' }).addTo(map));

    window.onload = async () => {
        const sel = document.getElementById('destino-select');
        paradas.forEach((p, i) => { const o = document.createElement('option'); o.value = i; o.innerText = p.n; sel.appendChild(o); });
        const nombreGuardado = localStorage.getItem('usuario_nombre');
        if(nombreGuardado) {
            document.getElementById('nombre-input').value = nombreGuardado;
            const { data } = await _s.from('reservas_activas').select('*').eq('nombre_pasajero', nombreGuardado).eq('estado', 'en_curso');
            if(data && data.length > 0) {
                miViajeActivo = true;
                asientosElegidos = data.map(r => r.asiento_num);
                sel.value = data[0].destino_idx;
                bloquearPanel();
            }
        }
    };

    function bloquearPanel() {
        document.getElementById('btn-pedir').style.display = 'none';
        document.getElementById('btn-cancelar').style.display = 'block';
        document.getElementById('destino-select').disabled = true;
        asientosElegidos.forEach(n => document.getElementById('as-'+n).classList.add('selected'));
    }

    function seleccionarSentido(esIda) {
        sentidoSeleccionado = esIda;
        document.getElementById('btn-ida').className = esIda ? 'btn-sentido active' : 'btn-sentido';
        document.getElementById('btn-vuelta').className = !esIda ? 'btn-sentido active' : 'btn-sentido';
    }

    async function confirmarViajePasajero() {
        console.log("Debug: Iniciando confirmación...");
        if (sentidoSeleccionado === null) { alert("¡Selecciona IDA o VUELTA!"); return; }
        const nom = document.getElementById('nombre-input').value;
        const dest = parseInt(document.getElementById('destino-select').value);
        if (!nom || isNaN(dest) || asientosElegidos.length === 0) { alert("Completa tus datos."); return; }

        console.log("Consultando Supabase para sentido:", sentidoSeleccionado);
        const { data: moviles, error } = await _s.from('estado_movil')
            .select('id').eq('en_servicio', true).eq('hacia_adelante', sentidoSeleccionado).gt('asientos_libres', 0);

        if (error) { console.error("Error Supabase:", error); alert("Error en conexión."); return; }
        if (!moviles || moviles.length === 0) { alert("No hay móviles en este sentido."); return; }

        const res = asientosElegidos.map(n => ({ 
            asiento_num: n, id_movil: moviles[0].id, estado: 'en_curso', 
            nombre_pasajero: nom, pasajero_lat: miLat, pasajero_lon: miLon, destino_idx: dest 
        }));

        const { error: insertError } = await _s.from('reservas_activas').insert(res);
        if(!insertError) { localStorage.setItem('usuario_nombre', nom); location.reload(); }
        else { console.error("Error al insertar:", insertError); alert("Error al guardar reserva."); }
    }

    function toggleAsiento(n) {
        if(miViajeActivo) return;
        const i = asientosElegidos.indexOf(n);
        if(i > -1) { asientosElegidos.splice(i, 1); document.getElementById('as-'+n).classList.remove('selected'); }
        else { asientosElegidos.push(n); document.getElementById('as-'+n).classList.add('selected'); }
    }

    navigator.geolocation.watchPosition(p => { miLat = p.coords.latitude; miLon = p.coords.longitude; }, null, { enableHighAccuracy: true });
</script>
</body>
</html>
