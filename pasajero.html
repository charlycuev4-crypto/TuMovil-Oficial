<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; --success: #28a745; --danger: #dc3545; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.8s ease, visibility 0.8s; }
        .anillo { width: 160px; height: 160px; border: 4px solid var(--celeste); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px var(--celeste); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .header { background: var(--panel); border-bottom: 2px solid var(--celeste); padding: 10px; text-align: center; flex-shrink: 0; }
        .header h1 { margin: 0; font-size: 18px; color: var(--celeste); letter-spacing: 2px; }

        #map { flex-grow: 1; width: 100%; }

        .bottom-ui { background: var(--panel); border-top: 2px solid var(--celeste); padding: 15px 15px env(safe-area-inset-bottom); display: flex; flex-direction: column; gap: 8px; border-radius: 25px 25px 0 0; z-index: 100; box-shadow: 0 -10px 25px rgba(0,0,0,0.5); max-height: 50vh; overflow-y: auto; }
        .promo-card { background: rgba(0, 210, 255, 0.05); border: 1px solid var(--celeste); border-radius: 12px; padding: 8px; text-align: center; }
        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }

        .viaje-activo-panel {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid var(--celeste);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
            animation: slideIn 0.5s ease;
            transition: border-color 0.5s ease;
        }
        .viaje-activo-panel.alerta-pasado {
            border-color: var(--danger);
            animation: shake 0.5s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .viaje-activo-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
        }
        .viaje-activo-icono {
            width: 50px;
            height: 50px;
            background: var(--celeste);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            transition: background 0.3s ease;
        }
        .viaje-activo-panel.alerta-pasado .viaje-activo-icono {
            background: var(--danger);
            animation: pulseDanger 1s infinite;
        }
        @keyframes pulseDanger {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .viaje-activo-titulo {
            flex: 1;
        }
        .viaje-activo-titulo .coche-numero {
            font-size: 20px;
            font-weight: bold;
            color: var(--amarillo);
            margin: 0;
        }
        .viaje-activo-titulo .conductor-nombre {
            font-size: 14px;
            color: white;
            margin: 2px 0 0 0;
        }
        .viaje-activo-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        .info-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }
        .info-box-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-box-valor {
            font-size: 14px;
            color: var(--celeste);
            font-weight: bold;
            margin-top: 2px;
        }
        .viaje-activo-destino {
            background: rgba(255, 204, 0, 0.1);
            border: 1px solid var(--amarillo);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            font-size: 13px;
            color: var(--amarillo);
            margin-bottom: 12px;
        }
        .viaje-activo-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 12px;
            color: var(--success);
            padding: 8px;
            border-radius: 8px;
            background: rgba(40, 167, 69, 0.1);
        }
        .viaje-activo-status.alerta {
            color: var(--danger);
            background: rgba(220, 53, 69, 0.1);
            font-weight: bold;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }
        .status-dot.alerta {
            background: var(--danger);
            animation: blinkFast 0.5s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes blinkFast {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        .alerta-parada {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
        }
        .alerta-parada-texto {
            color: #ff6b6b;
            font-size: 13px;
            font-weight: bold;
        }
        .alerta-parada-sub {
            color: #ff9999;
            font-size: 11px;
            margin-top: 4px;
        }

        .flota-container { max-height: 220px; overflow-y: auto; }
        .coche-card { background: #1a1a1a; border-radius: 12px; padding: 10px; margin-bottom: 8px; border: 1px solid #333; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .coche-card.seleccionado { border-color: var(--celeste); box-shadow: 0 0 8px rgba(0,210,255,0.3); }
        .coche-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .coche-num { font-weight: bold; font-size: 13px; color: white; }
        .coche-info { font-size: 10px; color: #888; }
        .coche-dist { font-size: 10px; color: var(--amarillo); }

        .asientos-row { display: flex; gap: 5px; justify-content: center; }
        .asiento-box { 
            width: 52px; height: 48px; border-radius: 8px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; transition: all 0.2s;
        }
        .asiento-libre { 
            background: #2a2a2a; border: 2px solid var(--celeste); color: var(--celeste); cursor: pointer;
        }
        .asiento-libre:hover { background: var(--celeste); color: black; }
        .asiento-libre.seleccionado { background: var(--amarillo); border-color: var(--amarillo); color: black; }
        .asiento-ocupado { 
            background: #1a1a1a; border: 2px solid #333; color: #555; cursor: not-allowed;
        }
        .asiento-num { font-size: 12px; font-weight: bold; }
        .asiento-nombre { font-size: 9px; text-align: center; line-height: 1.1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 44px; }
        .asiento-lock { font-size: 9px; }

        .sin-coches { text-align: center; padding: 15px; color: #666; font-size: 12px; }
        .sin-coches b { color: #ff4444; display: block; margin-bottom: 4px; }

        .btn-pedir { background: #28a745; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; transition: all 0.3s; }
        .btn-pedir:disabled { background: #333; color: #666; }
        .btn-cancelar { background: #dc3545; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; display: none; margin-top: 5px; }
        .btn-cancelar:disabled { background: #661a22; color: #999; }

        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splash">
        <div class="anillo"><span style="font-size: 60px;">🚕</span></div>
        <h2 style="color: var(--celeste); margin-top: 20px;">TUMOVIL</h2>
        <p style="color: white; font-size: 12px;">Conectando al sistema...</p>
    </div>

    <div class="header"><h1>SOLICITAR VIAJE</h1></div>
    <div id="map"></div>

    <div class="bottom-ui">
        <div class="promo-card"><b style="color:var(--amarillo);">TARIFA PLANA: $1000 POR ASIENTO</b></div>

        <select id="sentido-select">
            <option value="IDA">Hacia IDA</option>
            <option value="VUELTA">Hacia VUELTA</option>
        </select>

        <input type="text" id="nombre-input" placeholder="Tu Nombre" maxlength="20">
        <select id="destino-select">
            <option value="" disabled selected>¿A qué parada vas?</option>
        </select>

        <div class="flota-container" id="flota-container">
            <div class="sin-coches">📍 Seleccioná tu destino para ver coches</div>
        </div>

        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajePasajero()" disabled>⌛ BUSCANDO GPS...</button>
        <button class="btn-cancelar" id="btn-cancelar" onclick="finalizarViaje()">TERMINAR MI VIAJE</button>
    </div>

<script>
    // ============================================
    // SUPABASE - SOLO RPC, NUNCA .from() DIRECTO
    // ============================================
    const _s = supabase.createClient(
        'https://nvumdlxervrewqiiaicl.supabase.co',
        'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE',
        {
            global: {
                headers: {
                    'x-app-secret': '2Awy7XGP0SBmBRprB3PBzfvz9VcbDd04'
                }
            }
        }
    );

    // ============================================
    // ✅ FUNCIONES DE SEGURIDAD - ANTI XSS
    // ============================================

    function sanitizarInput(texto) {
        if (!texto || typeof texto !== 'string') return '';
        return texto
            .replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑüÜ\s\-]/g, '')
            .trim()
            .substring(0, 20);
    }

    function escaparHTML(texto) {
        if (!texto || typeof texto !== 'string') return '';
        const div = document.createElement('div');
        div.textContent = texto;
        return div.innerHTML;
    }

    // ============================================
    // PARADAS
    // ============================================
    const paradas = [
        {n:'Universidad Tecnológica', c:[-34.549295, -58.783648]},
        {n:'Parque Tecnológico', c:[-34.551586, -58.781403]},
        {n:'Base Aérea', c:[-34.554132, -58.778927]},
        {n:'Miguel Cané', c:[-34.561264, -58.770506]},
        {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]},
        {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]},
        {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]},
        {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]},
        {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]},
        {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]},
        {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]},
        {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]},
        {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]},
        {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]},
        {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]},
        {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    // ============================================
    // MAPA
    // ============================================
    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    paradas.forEach(p => L.circleMarker(p.c, { 
        radius: 6, 
        color: '#000000', 
        weight: 2, 
        fillColor: '#00d2ff', 
        fillOpacity: 0.9 
    }).addTo(map));

    const iconP = L.divIcon({ html: '<div style="font-size:30px;">🚶</div>', className: 'p-mark', iconAnchor: [15, 30] });
    const iconDest = L.divIcon({ html: '<div style="width:0; height:0; border-left:10px solid transparent; border-right:10px solid transparent; border-bottom:22px solid #007AFF; filter: drop-shadow(0 0 8px #007AFF);"></div>', className: 'dest-arrow', iconAnchor: [10, 11] });
    const iconT = L.divIcon({ html: '<span style="font-size:25px;">🚕</span>', iconAnchor: [12, 12] });
    const iconTPasado = L.divIcon({ html: '<span style="font-size:25px; opacity:0.4; filter: grayscale(1);">🚕</span>', iconAnchor: [12, 12] });
    const iconMiCoche = L.divIcon({ html: '<div style="font-size:30px; filter: drop-shadow(0 0 8px #00d2ff);">🚕</div>', iconAnchor: [15, 15] });

    let markerPasajero = L.marker([0,0], { icon: iconP }).addTo(map);
    let markerDestinoFlecha = L.marker([0,0], { icon: iconDest });
    let guiaDestino = L.polyline([], { color: '#ffcc00', dashArray: '8, 8', weight: 4 }).addTo(map);
    let markerTaxis = {};
    let markerMiCoche = null;

    let miLat = 0, miLon = 0;
    let asientosElegidos = [];
    let miViajeActivo = false;
    let cocheSeleccionado = null;
    let ultimaFlotaHTML = '';
    let ultimoEstadoBoton = '';
    let gpsListo = false;
    let datosViajeActivo = null;
    let cocheYaPaso = false;
    let intervaloViajeActivo = null;

    // ============================================
    // SELECT DE PARADAS
    // ============================================
    const selDest = document.getElementById('destino-select');
    paradas.forEach((p, i) => { 
        const opt = document.createElement('option'); 
        opt.value = i; 
        opt.innerText = p.n; 
        selDest.appendChild(opt); 
    });

    function calcularParadaMasCerca(lat, lon) {
        let minDist = Infinity, paradaIdx = -1;
        paradas.forEach((p, i) => {
            const dist = Math.sqrt(Math.pow(lat - p.c[0], 2) + Math.pow(lon - p.c[1], 2));
            if (dist < minDist) { minDist = dist; paradaIdx = i; }
        });
        return paradaIdx;
    }

    function movilPuedeRecoger(movilParada, paradaPasajero, sentido) {
        if (sentido === 'IDA') return movilParada <= paradaPasajero;
        return movilParada >= paradaPasajero;
    }

    // ============================================
    // CARGAR VIAJE ACTIVO (RPC)
    // ============================================
    window.onload = async () => {
        const nombreGuardado = localStorage.getItem('usuario_nombre');
        if(nombreGuardado) {
            document.getElementById('nombre-input').value = nombreGuardado;
            await cargarDatosViajeActivo(nombreGuardado);
        }
    };

    async function cargarDatosViajeActivo(nombre) {
        try {
            const { data: rpcData, error } = await _s.rpc('obtener_viaje_activo', {
                p_nombre: nombre
            });

            if (error) throw error;

            const data = (rpcData && rpcData.viaje && Array.isArray(rpcData.viaje)) ? rpcData.viaje : [];

            if(data.length > 0) {
                miViajeActivo = true;
                datosViajeActivo = data;
                asientosElegidos = data.map(r => r.asiento_num);

                const primerViaje = data[0];
                if(primerViaje.destino_idx !== undefined) {
                    document.getElementById('destino-select').value = primerViaje.destino_idx;
                }
                if(primerViaje.estado_movil && primerViaje.estado_movil.sentido_flujo) {
                    document.getElementById('sentido-select').value = primerViaje.estado_movil.sentido_flujo;
                }

                if(primerViaje.destino_idx !== undefined && miLat !== 0) {
                    actualizarMapaRuta();
                }

                bloquearPanelParaViajeActivo();
                iniciarMonitoreoViajeActivo();
            }
        } catch (err) { 
            console.error("Error al cargar viaje activo:", err); 
        }
    }

    function iniciarMonitoreoViajeActivo() {
        verificarPosicionCoche();
        intervaloViajeActivo = setInterval(verificarPosicionCoche, 10000);
    }

    // ============================================
    // VERIFICAR POSICIÓN DEL COCHE (RPC)
    // ============================================
    async function verificarPosicionCoche() {
        if (!miViajeActivo || !datosViajeActivo || datosViajeActivo.length === 0) return;

        const viaje = datosViajeActivo[0];
        const idMovil = viaje.id_movil;
        const sentido = (viaje.estado_movil && viaje.estado_movil.sentido_flujo) 
            ? viaje.estado_movil.sentido_flujo 
            : document.getElementById('sentido-select').value;

        const paradaPasajero = calcularParadaMasCerca(viaje.pasajero_lat || miLat, viaje.pasajero_lon || miLon);

        try {
            const { data: rpcData, error } = await _s.rpc('verificar_posicion_coche', {
                p_id_movil: idMovil
            });

            if (error || !rpcData || !rpcData.encontrado) {
                console.log("No se pudo obtener posición del coche");
                return;
            }

            const movil = rpcData;
            const paradaCoche = calcularParadaMasCerca(movil.lat, movil.lon);
            const puedeRecoger = movilPuedeRecoger(paradaCoche, paradaPasajero, sentido);

            if (!puedeRecoger && !cocheYaPaso) {
                cocheYaPaso = true;
                mostrarAlertaCochePasado();
            } else if (puedeRecoger && cocheYaPaso) {
                cocheYaPaso = false;
                actualizarPanelViajeActivo(false);
            }

            actualizarMarcadorMiCoche(movil.lat, movil.lon, cocheYaPaso);

        } catch (err) {
            console.error("Error verificando posición:", err);
        }
    }

    function mostrarAlertaCochePasado() {
        actualizarPanelViajeActivo(true);

        const container = document.getElementById('flota-container');
        const alertaExistente = container.querySelector('.alerta-parada');

        if (!alertaExistente) {
            const panel = container.querySelector('.viaje-activo-panel');
            if (panel) {
                const alerta = document.createElement('div');
                alerta.className = 'alerta-parada';

                const texto1 = document.createElement('div');
                texto1.className = 'alerta-parada-texto';
                texto1.textContent = '⚠️ EL COCHE YA PASÓ TU PARADA';

                const texto2 = document.createElement('div');
                texto2.className = 'alerta-parada-sub';
                texto2.textContent = 'El conductor no puede retroceder. Finalizá el viaje para liberar tu asiento.';

                alerta.appendChild(texto1);
                alerta.appendChild(texto2);

                const statusElement = panel.querySelector('.viaje-activo-status');
                if (statusElement) {
                    panel.insertBefore(alerta, statusElement);
                }
            }
        }

        const btn = document.getElementById('btn-cancelar');
        btn.innerText = "🚨 FINALIZAR VIAJE (COCHE PASÓ)";
        btn.style.background = "#ff4444";
    }

    function actualizarPanelViajeActivo(alerta) {
        const container = document.getElementById('flota-container');
        const panel = container.querySelector('.viaje-activo-panel');
        if (!panel) return;

        if (alerta) {
            panel.classList.add('alerta-pasado');
            const status = panel.querySelector('.viaje-activo-status');
            if (status) {
                status.classList.add('alerta');
                status.innerHTML = '';
                const dot = document.createElement('div');
                dot.className = 'status-dot alerta';
                const span = document.createElement('span');
                span.textContent = '⚠️ COCHE YA PASÓ - NO PUEDE RETROCEDER';
                status.appendChild(dot);
                status.appendChild(span);
            }
        } else {
            panel.classList.remove('alerta-pasado');
