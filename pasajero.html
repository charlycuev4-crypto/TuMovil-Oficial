<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuMovil - Pasajero</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #121212; }
        /* SOLUCIÓN PANTALLA NEGRA: Altura fija obligatoria */
        #map { height: 300px !important; width: 100%; z-index: 1; }
        .bottom-ui { height: calc(100% - 300px); overflow-y: auto; background: #1e1e1e; color: white; padding: 20px; }
        .asiento-btn { width: 50px; height: 50px; border: 2px solid #00d2ff; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; margin: 5px; cursor: pointer; }
        .asiento-btn.selected { background: #ffcc00; color: black; }
        button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px; border: none; font-weight: bold; }
        .btn-pedir { background: #28a745; color: white; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="bottom-ui">
        <select id="sentido-select"><option value="IDA">Hacia IDA</option><option value="VUELTA">Hacia VUELTA</option></select>
        <input type="text" id="nombre-input" placeholder="Tu Nombre">
        <select id="destino-select"></select>
        <div id="grid-asientos">
            <div class="asiento-btn" onclick="toggleAsiento(1)" id="as-1">1</div>
            <div class="asiento-btn" onclick="toggleAsiento(2)" id="as-2">2</div>
            <div class="asiento-btn" onclick="toggleAsiento(3)" id="as-3">3</div>
            <div class="asiento-btn" onclick="toggleAsiento(4)" id="as-4">4</div>
        </div>
        <button class="btn-pedir" onclick="confirmarViaje()">SOLICITAR MI VIAJE</button>
    </div>

<script>
    // 1. CONFIGURACIÓN E INICIALIZACIÓN
    const _s = supabase.createClient('TU_URL', 'TU_KEY');
    const map = L.map('map').setView([-34.5612, -58.7705], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. TUS PARADAS (Coordenadas reales)
    const paradas = [
        {n:'Miguel Cané', lat:-34.561264, lon:-58.770506}, {n:'Cané y Los Aromos', lat:-34.562160, lon:-58.771380},
        {n:'Los Aromos 11016', lat:-34.562494, lon:-58.772133}, {n:'Los Aromos 10874', lat:-34.563541, lon:-58.773244},
        {n:'Los Aromos y Murillo', lat:-34.564109, -58.773759}, {n:'Murillo 601', lat:-34.565342, lon:-58.772061}
        // ... (Agrega aquí el resto de tus paradas siguiendo este formato)
    ];

    // Cargar paradas al select
    const sel = document.getElementById('destino-select');
    paradas.forEach((p, i) => sel.innerHTML += `<option value="${i}">${p.n}</option>`);

    // 3. LÓGICA DE GEOLOCALIZACIÓN Y CÁLCULO
    let miParadaActual = 0;
    
    function calcularDistancia(lat1, lon1, lat2, lon2) {
        return Math.sqrt(Math.pow(lat2-lat1, 2) + Math.pow(lon2-lon1, 2));
    }

    navigator.geolocation.watchPosition(pos => {
        let min = 999;
        paradas.forEach((p, i) => {
            const d = calcularDistancia(pos.coords.latitude, pos.coords.longitude, p.lat, p.lon);
            if(d < min) { min = d; miParadaActual = i; }
        });
    });

    // 4. CONFIRMAR VIAJE (Con la lógica de paradas integrada)
    async function confirmarViaje() {
        const nom = document.getElementById('nombre-input').value;
        const sentido = document.getElementById('sentido-select').value;
        
        // Buscamos móviles que: estén online, tengan cupo Y que su posición lógica sea mayor o igual a nuestra parada
        const { data: moviles } = await _s.from('estado_movil')
            .select('*')
            .eq('esta_online', true)
            .eq('sentido_flujo', sentido)
            .gte('asientos_libres', 1);

        // Aquí usamos la lógica del "Código Maestro"
        const movilValido = moviles.find(m => m.disponible_desde <= miParadaActual);

        if (!movilValido) {
            alert("No hay móviles disponibles que aún no hayan pasado tu parada.");
            return;
        }

        // Si pasa, insertamos (simplificado)
        const { error } = await _s.from('reservas_activas').insert({
            id_movil: movilValido.id,
            nombre_pasajero: nom,
            destino_idx: document.getElementById('destino-select').value
        });

        if(!error) alert("¡Viaje solicitado!");
    }

    // Corregir tamaño del mapa tras renderizado
    setTimeout(() => { map.invalidateSize(); }, 500);

    // Helpers
    let asientosElegidos = [];
    function toggleAsiento(num) {
        const el = document.getElementById('as-'+num);
        el.classList.toggle('selected');
        // lógica para array...
    }
</script>
</body>
</html>
