<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.8s ease, visibility 0.8s; }
        .anillo { width: 160px; height: 160px; border: 4px solid var(--celeste); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px var(--celeste); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .header { background: var(--panel); border-bottom: 2px solid var(--celeste); padding: 10px; text-align: center; }
        .header h1 { margin: 0; font-size: 18px; color: var(--celeste); letter-spacing: 2px; }
        #map { flex-grow: 1; width: 100%; }
        .bottom-ui { background: var(--panel); border-top: 2px solid var(--celeste); padding: 15px; display: flex; flex-direction: column; gap: 8px; border-radius: 25px 25px 0 0; }
        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; font-size: 16px; width: 100%; }
        .asientos-grid { display: flex; justify-content: space-around; margin: 5px 0; }
        .asiento-btn { width: 50px; height: 50px; border: 2px solid var(--celeste); border-radius: 12px; color: var(--celeste); display: flex; align-items: center; justify-content: center; }
        .asiento-btn.selected { background: var(--amarillo); color: #000; }
        .btn-pedir { background: #28a745; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="splash"><div class="anillo"><span style="font-size: 60px;">🚕</span></div></div>
    <div class="header"><h1>SOLICITAR VIAJE</h1></div>
    <div id="map"></div>
    <div class="bottom-ui">
        <select id="sentido-select" onchange="actualizarFlota()">
            <option value="1">Hacia IDA</option>
            <option value="2">Hacia VUELTA</option>
        </select>
        <input type="text" id="nombre-input" placeholder="Tu Nombre">
        <select id="destino-select" onchange="actualizarMapaRuta()"><option value="" disabled selected>¿A qué parada vas?</option></select>
        <div class="asientos-grid">
            <div class="asiento-btn" onclick="toggleAsiento(1)" id="as-1">1</div>
            <div class="asiento-btn" onclick="toggleAsiento(2)" id="as-2">2</div>
            <div class="asiento-btn" onclick="toggleAsiento(3)" id="as-3">3</div>
            <div class="asiento-btn" onclick="toggleAsiento(4)" id="as-4">4</div>
        </div>
        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajePasajero()">SOLICITAR MI VIAJE</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    // AQUÍ ESTÁ LA LISTA COMPLETA
    const paradas = [{n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]}, {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]}, {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]}, {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]}, {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]}, {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]}, {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]}, {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]}, {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]}, {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]}, {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]}, {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]}, {n:'Abasto y Roca', c:[-34.586030, -58.747278]}];

    const map = L.map('map').setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    // Poblamos el select de destinos
    const selDest = document.getElementById('destino-select');
    paradas.forEach((p, i) => { const opt = document.createElement('option'); opt.value = i; opt.innerText = p.n; selDest.appendChild(opt); });

    async function actualizarFlota() {
        const sentidoNum = parseInt(document.getElementById('sentido-select').value);
        const sentidoTexto = (sentidoNum === 1) ? 'IDA' : 'VUELTA';
        
        const { data: moviles } = await _s.from('estado_movil')
            .select('*')
            .eq('esta_online', true)
            .eq('sentido_flujo', sentidoTexto)
            .neq('latitud', 0);
        
        // (El resto de la lógica de marcadores...)
        console.log("Flota actualizada:", moviles);
    }

    // Ocultar splash al cargar
    window.onload = () => {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
        actualizarFlota();
    };

    function confirmarViajePasajero() { alert("Probando..."); }
    function toggleAsiento(n) { document.getElementById('as-'+n).classList.toggle('selected'); }
    function actualizarMapaRuta() { console.log("Ruta actualizada"); }
</script>
</body>
</html>
