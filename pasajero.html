// AGREGAR ESTO DENTRO DEL <script> DEL PASAJERO
async function verificarViajeActivo() {
    const { data, error } = await _s.from('reservas_activas')
        .select('*')
        .eq('nombre_pasajero', "Carlos")
        .eq('estado', 'en_curso');

    if (data && data.length > 0) {
        // Bloquear UI porque ya hay un viaje
        asientos = data.map(r => r.asiento_num);
        asientos.forEach(num => {
            const btn = document.getElementById('as-' + num);
            if(btn) {
                btn.classList.add('selected');
                btn.style.backgroundColor = "#555"; // Color de bloqueado
            }
        });
        
        const btnConfirmar = document.getElementById('btn-confirmar');
        btnConfirmar.innerText = "VIAJE EN CURSO...";
        btnConfirmar.disabled = true;
        btnConfirmar.style.background = "#333";
        
        // Marcar el destino que ya estaba elegido
        marcarDestino(data[0].destino_idx);
    }
}

// Llamar a la función al cargar
window.onload = verificarViajeActivo;
