<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
        #map { flex-grow: 1; width: 100%; z-index: 1; }
        .bottom-ui { background: var(--panel); border-top: 2px solid var(--celeste); padding: 20px; display: flex; flex-direction: column; gap: 12px; border-radius: 25px 25px 0 0; z-index: 1000; box-shadow: 0 -10px 25px rgba(0,0,0,0.5); }
        
        .promo-card { background: rgba(0, 210, 255, 0.05); border: 1px solid var(--celeste); border-radius: 12px; padding: 10px; text-align: center; }
        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .asientos-grid { display: flex; justify-content: space-around; margin: 10px 0; }
        .asiento-btn { width: 50px; height: 50px; border: 2px solid var(--celeste); border-radius: 12px; background: transparent; color: var(--celeste); font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .asiento-btn.selected { background: var(--amarillo); border-color: var(--amarillo); color: #000; }
        .btn-pedir { background: #28a745; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-cancelar { background: #dc3545; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; display: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="bottom-ui">
        <div class="promo-card"><b style="color:var(--amarillo);">TARIFA: $1000 x ASIENTO</b></div>
        <input type="text" id="nombre-input" placeholder="Tu Nombre">
        <select id="destino-select" onchange="actualizarMapaRuta()">
            <option value="" disabled selected>¿A qué parada vas?</option>
        </select>
        <div class="asientos-grid">
            <div class="asiento-btn" onclick="toggleAsiento(1)" id="as-1">1</div>
            <div class="asiento-btn" onclick="toggleAsiento(2)" id="as-2">2</div>
            <div class="asiento-btn" onclick="toggleAsiento(3)" id="as-3">3</div>
            <div class="asiento-btn" onclick="toggleAsiento(4)" id="as-4">4</div>
        </div>
        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajePasajero()">SOLICITAR VIAJE</button>
        <button class="btn-cancelar" id="btn-cancelar" onclick="finalizarViaje()">TERMINAR MI VIAJE</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    let miLat = 0, miLon = 0, asientosElegidos = [], miViajeActivo = false;
    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    paradas.forEach(p => L.circleMarker(p.c, { radius: 6, color: '#000', fillColor: '#00d2ff', fillOpacity: 1, weight: 2 }).addTo(map));

    let markerPasajero = L.marker([0,0], { icon: L.divIcon({ html: '<div style="font-size:30px;">🚶</div>', className: 'p-mark', iconAnchor: [15, 30] }) }).addTo(map);
    let markerDest = L.marker([0,0], { icon: L.divIcon({ html: '<div style="width:0; height:0; border-left:10px solid transparent; border-right:10px solid transparent; border-bottom:22px solid #007AFF; filter: drop-shadow(0 0 8px #007AFF);"></div>', className: 'dest-arrow', iconAnchor: [10, 11] }) }).addTo(map);
    let lineaRuta = L.polyline([], { color: '#ffcc00', dashArray: '8, 8', weight: 4 }).addTo(map);

    window.onload = async () => {
        const sel = document.getElementById('destino-select');
        paradas.forEach((p, i) => { const o = document.createElement('option'); o.value = i; o.innerText = p.n; sel.appendChild(o); });
        
        const nom = localStorage.getItem('usuario_nombre');
        if(nom) {
            document.getElementById('nombre-input').value = nom;
            const { data } = await _s.from('reservas_activas').select('*').eq('nombre_pasajero', nom).eq('estado', 'en_curso');
            if(data && data.length > 0) {
                miViajeActivo = true;
                asientosElegidos = data.map(r => r.asiento_num);
                sel.value = data[0].destino_idx;
                document.getElementById('btn-pedir').style.display = 'none';
                document.getElementById('btn-cancelar').style.display = 'block';
                asientosElegidos.forEach(n => document.getElementById('as-'+n).classList.add('selected'));
            }
        }
    };

    navigator.geolocation.watchPosition(p => { 
        miLat = p.coords.latitude; miLon = p.coords.longitude; 
        markerPasajero.setLatLng([miLat, miLon]);
    }, null, { enableHighAccuracy: true });

    function actualizarMapaRuta() {
        const idx = document.getElementById('destino-select').value;
        if(idx !== "" && miLat !== 0) {
            const dest = paradas[idx].c;
            markerDest.setLatLng(dest);
            lineaRuta.setLatLngs([[miLat, miLon], dest]);
            map.fitBounds([ [miLat, miLon], dest ], { padding: [50, 50] });
        }
    }

    async function confirmarViajePasajero() {
        const nom = document.getElementById('nombre-input').value;
        const idx = parseInt(document.getElementById('destino-select').value);
        if (!nom || isNaN(idx) || asientosElegidos.length === 0) { alert("Completa tus datos."); return; }
        
        // CASCADA FIFO: Obtenemos el líder (el que lleva más tiempo online)
        const { data: choferes, error } = await _s.from('estado_movil')
            .select('id')
            .eq('en_servicio', true)
            .gt('asientos_libres', 0)
            .order('fecha_online', { ascending: true }) // El más antiguo primero
            .limit(1);

        if (error || !choferes || choferes.length === 0) { alert("No hay unidades disponibles. Intenta nuevamente."); return; }
        
        const lider = choferes[0];
        const res = asientosElegidos.map(n => ({ 
            asiento_num: n, 
            id_movil: lider.id, 
            estado: 'en_curso', 
            nombre_pasajero: nom, 
            destino_idx: idx 
        }));
        
        const { error: insertErr } = await _s.from('reservas_activas').insert(res);
        if(!insertErr) { localStorage.setItem('usuario_nombre', nom); location.reload(); }
        else { alert("Error al asignar el viaje: " + insertErr.message); }
    }

    async function finalizarViaje() {
        const nom = document.getElementById('nombre-input').value;
        await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('nombre_pasajero', nom);
        localStorage.removeItem('usuario_nombre');
        location.reload();
    }

    function toggleAsiento(n) {
        if(miViajeActivo) return;
        const i = asientosElegidos.indexOf(n);
        if(i > -1) { asientosElegidos.splice(i, 1); document.getElementById('as-'+n).classList.remove('selected'); }
        else { asientosElegidos.push(n); document.getElementById('as-'+n).classList.add('selected'); }
    }
</script>
</body>
</html>
