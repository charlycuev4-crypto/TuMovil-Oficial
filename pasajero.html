<!DOCTYPE html>
<html lang="es">
<head>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-elevated: #242424;
            --surface-hover: #2a2a2a;
            --border: rgba(255,255,255,0.06);
            --border-strong: rgba(255,255,255,0.12);
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.55);
            --text-muted: rgba(255,255,255,0.35);
            --accent: #2563eb;
            --accent-light: #3b82f6;
            --accent-glow: rgba(37, 99, 235, 0.15);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            background: var(--bg); height: 100%; width: 100%; overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-primary); -webkit-font-smoothing: antialiased;
        }
        #splash {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000;
            transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1), visibility 0.6s;
        }
        .splash-logo {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--accent), #1d4ed8);
            border-radius: var(--radius-lg);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 32px rgba(37,99,235,0.3); margin-bottom: 24px;
        }
        .splash-logo svg { width: 36px; height: 36px; }
        .splash-title {
            font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .splash-sub { font-size: 13px; color: var(--text-muted); margin-top: 8px; }
        .header {
            background: rgba(15,15,15,0.85); backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border); padding: 14px 20px;
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 50;
        }
        .header h1 { font-size: 16px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.3px; }
        .header-badge {
            position: absolute; right: 16px; font-size: 10px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 10px;
            border-radius: 20px; background: rgba(16,185,129,0.15); color: var(--success);
            border: 1px solid rgba(16,185,129,0.2);
        }
        #map { flex-grow: 1; width: 100%; z-index: 1; }
        .leaflet-control-attribution { display: none !important; }
        .bottom-sheet {
            background: var(--surface); border-top: 1px solid var(--border-strong);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 0 0 env(safe-area-inset-bottom); z-index: 100;
            box-shadow: var(--shadow-lg); max-height: 58vh;
            display: flex; flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .bottom-sheet-handle {
            width: 36px; height: 4px; background: var(--border-strong);
            border-radius: 2px; margin: 10px auto 6px; flex-shrink: 0;
        }
        .bottom-sheet-content {
            overflow-y: auto; padding: 0 16px 16px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .bottom-sheet-content::-webkit-scrollbar { display: none; }
        .promo-pill {
            background: linear-gradient(135deg, rgba(37,99,235,0.12), rgba(29,78,216,0.08));
            border: 1px solid rgba(37,99,235,0.2); border-radius: var(--radius-md);
            padding: 10px 14px; text-align: center; font-size: 13px; font-weight: 600;
            color: var(--accent-light); letter-spacing: -0.2px;
        }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-label {
            font-size: 11px; font-weight: 500; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.8px; padding-left: 4px;

        input, select {
            background: var(--surface-elevated); border: 1px solid var(--border);
            color: var(--text-primary); padding: 12px 14px; border-radius: var(--radius-sm);
            font-size: 15px; font-weight: 400; width: 100%; font-family: inherit;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s; -webkit-appearance: none;
        }
        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

        select option { background: var(--surface-elevated); color: var(--text-primary); }
        .flota-container { max-height: 240px; overflow-y: auto; }
        .flota-container::-webkit-scrollbar { display: none; }
        .coche-card {
            background: var(--surface-elevated); border-radius: var(--radius-md);
            padding: 14px; margin-bottom: 8px; border: 1px solid var(--border);
            transition: all 0.2s ease; cursor: pointer;
        }
        .coche-card:hover { background: var(--surface-hover); }
        .coche-card.seleccionado {
            border-color: var(--accent); background: rgba(37,99,235,0.08);
            box-shadow: 0 0 0 1px var(--accent);
        }
        .coche-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .coche-info-main { display: flex; align-items: center; gap: 10px; }
        .coche-avatar {
            width: 40px; height: 40px;

            border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;

        .coche-titulo { font-weight: 600; font-size: 15px; color: var(--text-primary); }
        .coche-sub { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
        .coche-dist {
            font-size: 12px; font-weight: 500; color: var(--text-secondary);
            background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px;

        .asientos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .asiento-box {
            aspect-ratio: 1; border-radius: var(--radius-sm); display: flex; flex-direction: column;

        .asiento-libre {
            background: rgba(255,255,255,0.04); border: 1.5px solid var(--border-strong);

        .asiento-libre:hover { background: rgba(37,99,235,0.1); border-color: var(--accent); color: var(--accent-light); }
        .asiento-libre.seleccionado {
            background: var(--accent); border-color: var(--accent); color: white;
            box-shadow: 0 2px 8px rgba(37,99,235,0.3);
        }
        .asiento-ocupado {
            background: rgba(255,255,255,0.02); border: 1.5px solid var(--border);
            color: var(--text-muted); cursor: not-allowed;

        .asiento-num { font-size: 14px; font-weight: 700; }

        .coche-footer { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .coche-status { font-size: 11px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; }
        .status-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
        .status-dot.lleno { background: var(--danger); }
        .empty-state { text-align: center; padding: 24px 16px; color: var(--text-muted); }
        .empty-state-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }
        .empty-state-title { font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
        .empty-state-desc { font-size: 12px; }
        .btn {
            border: none; padding: 14px 20px; border-radius: var(--radius-md);
            font-weight: 600; font-size: 15px; font-family: inherit; cursor: pointer;
            transition: all 0.2s ease; display: flex; align-items: center; justify-content: center;
            gap: 8px; width: 100%; letter-spacing: -0.2px;
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
        .btn:active:not(:disabled) { transform: scale(0.98); }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #1d4ed8); color: white;
            box-shadow: 0 4px 16px rgba(37,99,235,0.25);

        .btn-primary:hover:not(:disabled) { box-shadow: 0 6px 20px rgba(37,99,235,0.35); transform: translateY(-1px); }
        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #dc2626); color: white;
            box-shadow: 0 4px 16px rgba(239,68,68,0.2);
        }
        .btn-danger:hover:not(:disabled) { box-shadow: 0 6px 20px rgba(239,68,68,0.3); }
        .viaje-activo-panel {
            background: var(--surface-elevated); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 18px;
            animation: slideUp 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .viaje-activo-panel.alerta-pasado { border-color: rgba(239,68,68,0.4); animation: shake 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .viaje-activo-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
        .viaje-activo-avatar {
            width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent), #1d4ed8);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0; transition: all 0.3s ease;
        }
        .viaje-activo-panel.alerta-pasado .viaje-activo-avatar {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            animation: pulseDanger 1.2s infinite;
        }
        @keyframes pulseDanger {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(239,68,68,0); }
        }
        .viaje-activo-titulo { flex: 1; }
        .viaje-activo-titulo .coche-numero { font-size: 18px; font-weight: 700; color: var(--text-primary); margin: 0; letter-spacing: -0.3px; }
        .viaje-activo-titulo .conductor-nombre { font-size: 13px; color: var(--text-secondary); margin: 2px 0 0 0; }
        .viaje-activo-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .info-box { background: rgba(255,255,255,0.03); border-radius: var(--radius-sm); padding: 10px; text-align: center; border: 1px solid var(--border); }
        .info-box-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
        .info-box-valor { font-size: 15px; color: var(--text-primary); font-weight: 700; margin-top: 3px; }
        .viaje-activo-destino { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); border-radius: var(--radius-sm); padding: 10px; text-align: center; font-size: 13px; color: var(--warning); font-weight: 500; margin-bottom: 12px; }
        .viaje-activo-status { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--success); padding: 8px; border-radius: var(--radius-sm); background: rgba(16,185,129,0.08); }
        .viaje-activo-status.alerta { color: var(--danger); background: rgba(239,68,68,0.08); font-weight: 600; }
        .status-dot-blink { width: 7px; height: 7px; background: var(--success); border-radius: 50%; animation: blink 2s infinite; }
        .status-dot-blink.alerta { background: var(--danger); animation: blinkFast 0.6s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes blinkFast { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .alerta-parada { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: var(--radius-sm); padding: 12px; text-align: center; margin-bottom: 12px; animation: slideUp 0.3s ease; }
        .alerta-parada-texto { color: #fca5a5; font-size: 13px; font-weight: 600; }
        .alerta-parada-sub { color: rgba(252,165,165,0.7); font-size: 11px; margin-top: 4px; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            background: var(--surface-elevated); border: 1px solid var(--border-strong);
            border-radius: var(--radius-md); padding: 10px 18px; font-size: 13px; font-weight: 500;
            color: var(--text-primary); box-shadow: var(--shadow-lg); z-index: 10001;
            opacity: 0; transform: translateX(-50%) translateY(-10px);
            transition: all 0.3s ease; pointer-events: none;
        }
        .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: rgba(16,185,129,0.3); color: var(--success); }
        .toast.error { border-color: rgba(239,68,68,0.3); color: var(--danger); }
        @media (min-width: 768px) { .bottom-sheet { max-height: 45vh; } }
    </style>
</head>

    function calcularParadaMasCerca(lat, lon) {
        let minDist = Infinity, paradaIdx = -1;
        paradas.forEach(function(p, i) { const dist = Math.sqrt(Math.pow(lat - p.c[0], 2) + Math.pow(lon - p.c[1], 2)); if (dist < minDist) { minDist = dist; paradaIdx = i; } });
        return paradaIdx;
    }

    function movilPuedeRecoger(movilParada, paradaPasajero, sentido) {
        if (sentido === 'IDA') return movilParada <= paradaPasajero;
        return movilParada >= paradaPasajero;
    }

    window.onload = async function() {

    async function cargarDatosViajeActivo(nombre) {
        try {
            const { data: rpcData, error } = await _s.rpc('obtener_viaje_activo', { p_nombre: nombre });
            if (error) throw error;
            const data = (rpcData && rpcData.viaje && Array.isArray(rpcData.viaje)) ? rpcData.viaje : [];
            if(data.length > 0) {
                miViajeActivo = true; datosViajeActivo = data;
                asientosElegidos = data.map(function(r) { return r.asiento_num; });
                const primerViaje = data[0];
                if(primerViaje.destino_idx !== undefined) { document.getElementById('destino-select').value = primerViaje.destino_idx; }
                if(primerViaje.estado_movil && primerViaje.estado_movil.sentido_flujo) { document.getElementById('sentido-select').value = primerViaje.estado_movil.sentido_flujo; }
                if(primerViaje.destino_idx !== undefined && miLat !== 0) { actualizarMapaRuta(); }
                bloquearPanelParaViajeActivo(); iniciarMonitoreoViajeActivo();
            }
        } catch (err) { console.error("Error al cargar viaje activo:", err); }
    }

    function iniciarMonitoreoViajeActivo() { verificarPosicionCoche(); intervaloViajeActivo = setInterval(verificarPosicionCoche, 10000); }

    async function verificarPosicionCoche() {
        if (!miViajeActivo || !datosViajeActivo || datosViajeActivo.length === 0) return;
        const viaje = datosViajeActivo[0];
        const idMovil = viaje.id_movil;
        const sentido = (viaje.estado_movil && viaje.estado_movil.sentido_flujo) ? viaje.estado_movil.sentido_flujo : document.getElementById('sentido-select').value;
        const paradaPasajero = calcularParadaMasCerca(viaje.pasajero_lat || miLat, viaje.pasajero_lon || miLon);
        try {
            const { data: rpcData, error } = await _s.rpc('verificar_posicion_coche', { p_id_movil: idMovil });
            if (error || !rpcData || !rpcData.encontrado) { console.log("No se pudo obtener posicion del coche"); return; }
            const movil = rpcData;
            const paradaCoche = calcularParadaMasCerca(movil.lat, movil.lon);
            const puedeRecoger = movilPuedeRecoger(paradaCoche, paradaPasajero, sentido);
            if (!puedeRecoger && !cocheYaPaso) { cocheYaPaso = true; mostrarAlertaCochePasado(); }
            else if (puedeRecoger && cocheYaPaso) { cocheYaPaso = false; actualizarPanelViajeActivo(false); }
            actualizarMarcadorMiCoche(movil.lat, movil.lon, cocheYaPaso);
        } catch (err) { console.error("Error verificando posicion:", err); }
    }

    navigator.geolocation.watchPosition(function(p) {
        miLat = p.coords.latitude; miLon = p.coords.longitude;

        if(val !== "" && miLat !== 0) {
            const dest = paradas[val].c; guiaDestino.setLatLngs([[miLat, miLon], dest]);
            markerDestinoFlecha.setLatLng(dest).addTo(map);
            const bounds = L.latLngBounds([miLat, miLon], dest); map.fitBounds(bounds, { padding: [80, 80] });

    function seleccionarAsiento(cocheId, numAsiento) {
        if (miViajeActivo) return;
        if (cocheSeleccionado && cocheSeleccionado !== cocheId) {
            asientosElegidos = [];
            document.querySelectorAll('.asiento-libre').forEach(function(el) { el.classList.remove('seleccionado'); });
            document.querySelectorAll('.coche-card').forEach(function(el) { el.classList.remove('seleccionado'); });
        }
        cocheSeleccionado = cocheId;
        const idx = asientosElegidos.indexOf(numAsiento);
        const el = document.getElementById('as-' + cocheId + '-' + numAsiento);
        if (idx > -1) { asientosElegidos.splice(idx, 1); if(el) el.classList.remove('seleccionado'); }
        else {
            if (asientosElegidos.length >= 2) { showToast("Maximo 2 asientos por pasajero", "error"); return; }
            asientosElegidos.push(numAsiento); if(el) el.classList.add('seleccionado');
        }
        document.querySelectorAll('.coche-card').forEach(function(el) { el.classList.remove('seleccionado'); });
        const card = document.getElementById('coche-card-' + cocheId);
        if(card) card.classList.add('seleccionado');
        actualizarBoton();
    }

    function actualizarBoton() {
        const btn = document.getElementById('btn-pedir'); let nuevoTexto = ''; let nuevoDisabled = true;
        if (!gpsListo) { nuevoTexto = "Buscando GPS..."; }
        else if (!document.getElementById('destino-select').value) { nuevoTexto = "Selecciona tu destino"; }
        else if (asientosElegidos.length > 0) { nuevoTexto = "Reservar " + asientosElegidos.length + " asiento(s)"; nuevoDisabled = false; }
        else { nuevoTexto = "Selecciona un asiento"; }
        if (nuevoTexto !== ultimoEstadoBoton) { btn.innerText = nuevoTexto; btn.disabled = nuevoDisabled; ultimoEstadoBoton = nuevoTexto; }
    }

    async function renderizarFlotaDisponible() {
        if (miViajeActivo) return;
        const container = document.getElementById('flota-container');
        const sentido = document.getElementById('sentido-select').value;
        const destIdx = document.getElementById('destino-select').value;
        if (!destIdx) {
            container.innerHTML = ''; const msg = document.createElement('div'); msg.className = 'empty-state'; msg.innerHTML = '<div class="empty-state-icon">📍</div><div class="empty-state-title">Selecciona tu destino</div><div class="empty-state-desc">Para ver los moviles disponibles</div>'; container.appendChild(msg); ultimaFlotaHTML = ''; actualizarBoton(); return;
        }
        if (!gpsListo) {
            container.innerHTML = ''; const msg = document.createElement('div'); msg.className = 'empty-state'; msg.innerHTML = '<div class="empty-state-icon">📡</div><div class="empty-state-title">Esperando senal GPS...</div>'; container.appendChild(msg); ultimaFlotaHTML = ''; actualizarBoton(); return;
        }
        container.innerHTML = '';
        const spinner = document.createElement('div'); spinner.className = 'empty-state'; spinner.innerHTML = '<span class="spinner" style="width:20px;height:20px;margin-bottom:8px;"></span><div class="empty-state-title">Buscando moviles...</div>'; container.appendChild(spinner); actualizarBoton();
        try {
            const { data: rpcData, error: errMoviles } = await _s.rpc('obtener_flota', { p_sentido: sentido, p_destino_idx: parseInt(destIdx), p_lat: miLat, p_lon: miLon });
            if (errMoviles) throw errMoviles;
            const movilesRaw = (rpcData && rpcData.moviles) ? rpcData.moviles : [];
            const moviles = movilesRaw || [];
            const movilesConParada = moviles.map(function(m) { return { ...m, paradaCalculada: calcularParadaMasCerca(m.latitud, m.longitud), distancia: m.distancia || Math.sqrt(Math.pow(miLat - m.latitud, 2) + Math.pow(miLon - m.longitud, 2)) }; });
            const movilesValidos = movilesConParada.filter(function(m) { return movilPuedeRecoger(m.paradaCalculada, parseInt(destIdx), sentido); }).sort(function(a, b) { return a.distancia - b.distancia; });
            if (movilesValidos.length === 0) {
                container.innerHTML = ''; const msg = document.createElement('div'); msg.className = 'empty-state'; msg.innerHTML = '<div class="empty-state-icon">🚫</div><div class="empty-state-title">No hay moviles disponibles</div><div class="empty-state-desc">Todos ya pasaron tu parada o no hay online</div>'; container.appendChild(msg); ultimaFlotaHTML = ''; ultimoEstadoBoton = ''; actualizarBoton(); return;
            }
            let hayCochesConLugar = false; container.innerHTML = '';
            for (const movil of movilesValidos) {
                const asientosOcupados = {}; const ocupadosArray = movil.asientos_ocupados || [];
                ocupadosArray.forEach(function(r) { asientosOcupados[r.asiento_num] = r.nombre_pasajero; });
                const asientosLibres = [1,2,3,4].filter(function(n) { return !asientosOcupados[n]; });
                if (asientosLibres.length > 0) hayCochesConLugar = true;
                const estaSeleccionado = cocheSeleccionado === movil.id;
                const distanciaKm = (movil.distancia * 111).toFixed(1);
                const card = document.createElement('div'); card.className = 'coche-card' + (estaSeleccionado ? ' seleccionado' : ''); card.id = 'coche-card-' + movil.id;
                const header = document.createElement('div'); header.className = 'coche-header';
                const infoMain = document.createElement('div'); infoMain.className = 'coche-info-main';
                const avatar = document.createElement('div'); avatar.className = 'coche-avatar'; avatar.textContent = '🚗';
                const infoTexts = document.createElement('div');
                const cocheNum = document.createElement('div'); cocheNum.className = 'coche-titulo'; cocheNum.textContent = 'Coche ' + movil.id;
                const cocheInfo = document.createElement('div'); cocheInfo.className = 'coche-sub'; cocheInfo.textContent = movil.chofer || 'Conductor';
                infoTexts.appendChild(cocheNum); infoTexts.appendChild(cocheInfo); infoMain.appendChild(avatar); infoMain.appendChild(infoTexts);
                const distDiv = document.createElement('div'); distDiv.className = 'coche-dist'; distDiv.textContent = distanciaKm + ' km';
                header.appendChild(infoMain); header.appendChild(distDiv); card.appendChild(header);
                const asientosGrid = document.createElement('div'); asientosGrid.className = 'asientos-grid';
                for (let num = 1; num <= 4; num++) {
                    const nombreOcupante = asientosOcupados[num]; const seleccionado = estaSeleccionado && asientosElegidos.includes(num);
                    const asientoBox = document.createElement('div'); asientoBox.className = 'asiento-box' + (nombreOcupante ? ' asiento-ocupado' : ' asiento-libre') + (seleccionado ? ' seleccionado' : ''); asientoBox.id = 'as-' + movil.id + '-' + num;
                    if (!nombreOcupante) { asientoBox.onclick = (function(cid, n) { return function() { seleccionarAsiento(cid, n); }; })(movil.id, num); }
                    const numDiv = document.createElement('div'); numDiv.className = 'asiento-num'; numDiv.textContent = num; asientoBox.appendChild(numDiv);
                    if (nombreOcupante) {
                        const nombreLimpio = escaparHTML(sanitizarInput(nombreOcupante)); const nombreCorto = nombreLimpio.length > 7 ? nombreLimpio.substring(0,6)+'...' : nombreLimpio;
                        asientoBox.title = nombreLimpio;
                        const nombreDiv = document.createElement('div'); nombreDiv.className = 'asiento-nombre'; nombreDiv.textContent = nombreCorto; asientoBox.appendChild(nombreDiv);
                        const lockDiv = document.createElement('div'); lockDiv.className = 'asiento-lock'; lockDiv.textContent = '🔒'; asientoBox.appendChild(lockDiv);
                    } else {
                        const libreDiv = document.createElement('div'); libreDiv.style.fontSize = '9px'; libreDiv.style.color = 'var(--text-muted)'; libreDiv.textContent = 'Libre'; asientoBox.appendChild(libreDiv);
                    }
                    asientosGrid.appendChild(asientoBox);
                }
                card.appendChild(asientosGrid);
                const footer = document.createElement('div'); footer.className = 'coche-footer';
                const status = document.createElement('div'); status.className = 'coche-status';
                if (asientosLibres.length === 0) { status.innerHTML = '<span class="status-dot lleno"></span> Lleno'; }
                else if (asientosLibres.length === 4) { status.innerHTML = '<span class="status-dot online"></span> Todos libres'; }
                else { status.innerHTML = '<span class="status-dot online"></span> ' + asientosLibres.length + ' libre(s)'; }
                footer.appendChild(status); card.appendChild(footer); container.appendChild(card);
            }
            if (!hayCochesConLugar) {
                container.innerHTML = ''; const msg = document.createElement('div'); msg.className = 'empty-state'; msg.innerHTML = '<div class="empty-state-icon">🚫</div><div class="empty-state-title">Todos los moviles estan llenos</div><div class="empty-state-desc">Intenta en unos minutos</div>'; container.appendChild(msg); ultimaFlotaHTML = ''; ultimoEstadoBoton = ''; actualizarBoton(); return;
            }
            ultimaFlotaHTML = container.innerHTML; actualizarBoton();
        } catch (err) {
            console.error("Error:", err); container.innerHTML = '';
            const msg = document.createElement('div'); msg.className = 'empty-state'; msg.innerHTML = '<div class="empty-state-icon">❌</div><div class="empty-state-title">Error de conexion</div><div class="empty-state-desc">Verifica tu internet</div>'; container.appendChild(msg);
            ultimaFlotaHTML = ''; ultimoEstadoBoton = ''; actualizarBoton();
        }
    }

    async function confirmarViajePasajero() {
        const nomRaw = document.getElementById('nombre-input').value.trim(); const nom = sanitizarInput(nomRaw);
        if (!nom || nom.length < 2) { showToast("Ingresa un nombre valido (solo letras, maximo 20 caracteres)", "error"); document.getElementById('nombre-input').value = ''; return; }
        document.getElementById('nombre-input').value = nom;
        const destIdx = parseInt(document.getElementById('destino-select').value);
        if (isNaN(destIdx)) { showToast("Selecciona una parada de destino", "error"); return; }
        if (!cocheSeleccionado || asientosElegidos.length === 0) { showToast("Selecciona un coche y al menos un asiento", "error"); return; }
        const btn = document.getElementById('btn-pedir'); btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Reservando...';
        try {
            const { data: rpcData, error } = await _s.rpc('reservar_asientos', { p_nombre: nom, p_id_movil: cocheSeleccionado, p_asientos: asientosElegidos, p_destino_idx: destIdx, p_lat: miLat, p_lon: miLon });
            if (error) throw error;
            if (rpcData && rpcData.colision) { showToast("Algunos asientos ya fueron tomados. Elegi otros.", "error"); asientosElegidos = []; cocheSeleccionado = null; ultimaFlotaHTML = ''; renderizarFlotaDisponible(); return; }
            if (rpcData && rpcData.success) { localStorage.setItem('usuario_nombre', nom); showToast("Viaje reservado!", "success"); setTimeout(function() { location.reload(); }, 800); }
            else { throw new Error("Respuesta inesperada del servidor"); }
        } catch (err) { console.error("Error:", err); showToast(err.message || "Error de conexion", "error"); btn.disabled = false; btn.innerText = "Selecciona un asiento"; }
    }

    async function finalizarViaje() {
        const btn = document.getElementById('btn-cancelar'); const nom = document.getElementById('nombre-input').value.trim();
        if (btn.disabled) return; btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Finalizando...';
        if (!nom) { showToast("Error: No se encontro tu nombre.", "error"); btn.disabled = false; btn.innerText = "Terminar mi viaje"; return; }
        try {
            const { data: rpcData, error } = await _s.rpc('finalizar_viaje', { p_nombre: nom });
            if (error) throw error;
            if (rpcData && rpcData.error) { showToast(rpcData.error, "error"); btn.disabled = false; btn.innerText = "Terminar mi viaje"; return; }
            if (intervaloViajeActivo) { clearInterval(intervaloViajeActivo); }
            location.reload();
        } catch (err) { console.error("Error al finalizar:", err); showToast("Error de conexion al finalizar. Intenta de nuevo.", "error"); btn.disabled = false; btn.innerText = "Terminar mi viaje"; }
    }

    async function actualizarMapaTaxis() {
        const sentidoSeleccionado = document.getElementById('sentido-select').value; const destIdx = document.getElementById('destino-select').value;
        try {
            const { data: rpcData, error } = await _s.rpc('obtener_taxis', { p_sentido: sentidoSeleccionado });
            if (error) throw error;
            const moviles = (rpcData && Array.isArray(rpcData)) ? rpcData : (rpcData && rpcData.taxis && Array.isArray(rpcData.taxis)) ? rpcData.taxis : [];
            if (moviles.length > 0) {
                const idsOnline = moviles.map(function(m) { return m.id.toString(); });
                Object.keys(markerTaxis).forEach(function(id) { if(!idsOnline.includes(id)) { map.removeLayer(markerTaxis[id]); delete markerTaxis[id]; } });
                moviles.forEach(function(t) {
                    let yaPaso = false;
                    if (destIdx !== "") { const paradaMovil = calcularParadaMasCerca(t.latitud || t.lat, t.longitud || t.lon); yaPaso = !movilPuedeRecoger(paradaMovil, parseInt(destIdx), sentidoSeleccionado); }
                    const iconoUsar = yaPaso ? iconTPasado : iconT;
                    const lat = t.latitud || t.lat || 0; const lon = t.longitud || t.lon || 0;
                    if(markerTaxis[t.id]) { markerTaxis[t.id].setLatLng([lat, lon]); markerTaxis[t.id].setIcon(iconoUsar); }
                    else { markerTaxis[t.id] = L.marker([lat, lon], { icon: iconoUsar }).addTo(map); }
                });
            }
        } catch (err) { console.error("Error actualizando flota:", err); }
    }

    setInterval(function() { if (!miViajeActivo) actualizarMapaTaxis(); }, 15000);
    actualizarMapaTaxis();
</script>
