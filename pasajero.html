    <style>
        :root {
            --celeste: #00d2ff;
            --amarillo: #ffcc00;
            --dark: #121212;
            --panel: #1e1e1e;
        }

        body, html { margin: 0; padding: 0; background: var(--dark); height: 100vh; font-family: sans-serif; overflow: hidden; }

        /* --- SPLASH SCREEN --- */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 1s ease;
        }
        .logo-splash {
            width: 150px; height: 150px; border: 4px solid var(--celeste);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 50px; color: var(--celeste); box-shadow: 0 0 30px var(--celeste);
            margin-bottom: 20px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* --- TARJETA DE PRESENTACIÓN (15x15) --- */
        .promo-card {
            background: linear-gradient(135deg, var(--panel), #2a2a2a);
            border: 2px solid var(--celeste); border-radius: 15px;
            padding: 10px; text-align: center; margin-bottom: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .promo-card h2 { margin: 0; color: var(--amarillo); font-size: 16px; }
        .promo-card p { margin: 2px 0; color: #fff; font-size: 22px; font-weight: 900; }

        /* --- INTERFAZ PRINCIPAL --- */
        .header { background: var(--panel); border-bottom: 2px solid var(--celeste); padding: 12px; text-align: center; }
        .header h1 { margin: 0; font-size: 18px; color: var(--celeste); text-transform: uppercase; }

        #map { flex-grow: 1; width: 100%; height: 50vh; }
        
        .bottom-ui { 
            background: var(--panel); border-top: 2px solid var(--celeste); 
            padding: 15px; display: flex; flex-direction: column; gap: 8px;
            border-radius: 20px 20px 0 0; position: relative; z-index: 100;
        }

        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; font-size: 14px; }
        
        .asientos-container { display: flex; justify-content: space-around; margin: 5px 0; }
        .asiento-btn { 
            width: 50px; height: 50px; border: 2px solid var(--celeste); 
            border-radius: 12px; background: transparent; color: var(--celeste); 
            font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center;
        }
        .asiento-btn.selected { background: var(--amarillo); border-color: var(--amarillo); color: #000; box-shadow: 0 0 15px var(--amarillo); }
        .asiento-btn.occupied { border-color: #444; color: #444; pointer-events: none; }

        .btn-pedir { 
            background: #28a745; color: white; border: none; padding: 15px; 
            border-radius: 12px; font-weight: bold; font-size: 16px; 
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        }
        .btn-pedir:disabled { background: #444; }

    </style>
</head>
