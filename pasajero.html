        <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }
        #map { height: 60vh; width: 100%; }
        .bottom-ui { background: var(--panel); padding: 20px; border-radius: 25px 25px 0 0; display: flex; flex-direction: column; gap: 10px; }
        .btn-pedir { background: #28a745; color: white; padding: 15px; border-radius: 12px; font-weight: bold; border: none; }
        .selector-coche { display: flex; gap: 10px; margin-bottom: 10px; }
        .opcion-coche { flex: 1; padding: 10px; border: 2px solid var(--celeste); border-radius: 10px; text-align: center; color: white; cursor: pointer; }
        .opcion-coche.selected { background: var(--celeste); color: black; font-weight: bold; }
        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; }
        .asientos-grid { display: flex; justify-content: space-around; }
        .asiento-btn { width: 50px; height: 50px; border: 2px solid var(--celeste); border-radius: 12px; color: var(--celeste); display: flex; align-items: center; justify-content: center; }
        .asiento-btn.selected { background: var(--amarillo); color: black; border-color: var(--amarillo); }
    </style>
</head>
<body>

<div id="map"></div>

<div class="bottom-ui">
    <div class="selector-coche">
        <div id="sel-1" class="opcion-coche selected" onclick="seleccionarCoche(1)">IDA (Coche 1)</div>
        <div id="sel-2" class="opcion-coche" onclick="seleccionarCoche(2)">VUELTA (Coche 2)</div>
    </div>
    <input type="text" id="nombre-input" placeholder="Tu Nombre">
    <select id="destino-select">
        <option value="" disabled selected>¿A qué parada vas?</option>
    </select>
    <div class="asientos-grid">
        <div class="asiento-btn" onclick="toggleAsiento(1)" id="as-1">1</div>
        <div class="asiento-btn" onclick="toggleAsiento(2)" id="as-2">2</div>
        <div class="asiento-btn" onclick="toggleAsiento(3)" id="as-3">3</div>
        <div class="asiento-btn" onclick="toggleAsiento(4)" id="as-4">4</div>
    </div>
    <button class="btn-pedir" onclick="confirmarViajePasajero()">SOLICITAR VIAJE</button>
</div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    let miCocheId = 1; // Por defecto
    let miLat = 0, miLon = 0, asientosElegidos = [];
    
    // Carga de paradas y mapa (igual que antes)
    const paradas = [/* ... tus 25 paradas ... */]; 
    const map = L.map('map', { zoomControl: false }).setView([-34.561264, -58.770506], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function seleccionarCoche(id) {
        miCocheId = id;
        document.getElementById('sel-1').className = (id === 1) ? 'opcion-coche selected' : 'opcion-coche';
        document.getElementById('sel-2').className = (id === 2) ? 'opcion-coche selected' : 'opcion-coche';
    }

    function toggleAsiento(num) {
        const i = asientosElegidos.indexOf(num);
        if(i > -1) { asientosElegidos.splice(i, 1); document.getElementById('as-'+num).classList.remove('selected'); }
        else { asientosElegidos.push(num); document.getElementById('as-'+num).classList.add('selected'); }
    }

    async function confirmarViajePasajero() {
        const nom = document.getElementById('nombre-input').value;
        const destIdx = document.getElementById('destino-select').value;
        if (!nom || !destIdx || asientosElegidos.length === 0) { alert("Completa los datos."); return; }
        
        // ENVÍO DIRECTO AL COCHE SELECCIONADO
        const res = asientosElegidos.map(n => ({ 
            asiento_num: n, 
            id_movil: miCocheId, // Usamos el ID que seleccionaste arriba
            estado: 'en_curso', 
            nombre_pasajero: nom, 
            pasajero_lat: miLat, 
            pasajero_lon: miLon, 
            destino_idx: parseInt(destIdx) 
        }));
        
        await _s.from('reservas_activas').insert(res);
        alert("Viaje solicitado al Coche " + miCocheId);
        location.reload();
    }

    // Geolocation y listeners siguen igual...
</script>
</body>
</html>
