<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
        
        .header { background: var(--panel); border-bottom: 2px solid var(--celeste); padding: 15px; text-align: center; z-index: 1000; }
        #map { flex-grow: 1; width: 100%; }
        
        .bottom-ui { background: var(--panel); border-top: 2px solid var(--celeste); padding: 15px; display: flex; flex-direction: column; gap: 8px; border-radius: 25px 25px 0 0; z-index: 1000; max-height: 45vh; overflow-y: auto; }
        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; }
        .btn-pedir { background: #28a745; color: white; padding: 15px; border-radius: 12px; border: none; font-weight: bold; }
        .btn-asiento { background: #333; border: 2px solid #555; padding: 10px; border-radius: 8px; color: white; width: 100%; }
        .btn-asiento.active { background: var(--celeste); color: black; border-color: white; }
    </style>
</head>
<body>

    <div class="header"><h1>SOLICITAR VIAJE</h1></div>
    <div id="map"></div>

    <div class="bottom-ui">
        <input type="text" id="nombre-input" placeholder="Tu Nombre">
        <select id="destino-select">
            <option value="" disabled selected>Esperando información...</option>
        </select>
        <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:5px;">
            <button class="btn-asiento" onclick="seleccionarAsiento(1)" id="as-1">1</button>
            <button class="btn-asiento" onclick="seleccionarAsiento(2)" id="as-2">2</button>
            <button class="btn-asiento" onclick="seleccionarAsiento(3)" id="as-3">3</button>
            <button class="btn-asiento" onclick="seleccionarAsiento(4)" id="as-4">4</button>
        </div>
        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajePasajero()">SOLICITAR VIAJE</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    let asientosElegidos = 0;
    
    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let routeLayer = null;
    let stopMarkers = [];

    // --- LÓGICA DE DIBUJO ---
    function dibujarMapa(listaParadas) {
        if(routeLayer) map.removeLayer(routeLayer);
        stopMarkers.forEach(m => map.removeLayer(m));
        stopMarkers = [];

        // Dibujar ruta (Línea)
        routeLayer = L.polyline(listaParadas.map(p => p.c), { color: '#00d2ff', weight: 6, opacity: 0.6 }).addTo(map);

        // Dibujar paradas (Círculos celeste borde negro)
        listaParadas.forEach(p => {
            const m = L.circleMarker(p.c, { 
                radius: 6, 
                color: '#000', // Borde negro
                weight: 2, 
                fillColor: '#00d2ff', // Relleno celeste
                fillOpacity: 1 
            }).addTo(map);
            stopMarkers.push(m);
        });
    }

    function renderizarParadas(haciaAdelante) {
        const selDest = document.getElementById('destino-select');
        selDest.innerHTML = '<option value="" disabled selected>Selecciona tu destino...</option>';
        
        let lista = haciaAdelante ? [...paradas] : [...paradas].reverse();
        
        lista.forEach(p => {
            const originalIndex = paradas.indexOf(p);
            const opt = document.createElement('option');
            opt.value = originalIndex;
            opt.innerText = p.n;
            selDest.appendChild(opt);
        });
        
        // Llamamos a la nueva función de dibujo
        dibujarMapa(paradas); // Dibujamos sobre la ruta base, independiente del sentido
    }

    function seleccionarAsiento(num) {
        asientosElegidos = num;
        document.querySelectorAll('.btn-asiento').forEach((b, i) => b.classList.toggle('active', i+1 === num));
    }

    async function confirmarViajePasajero() {
        const nom = document.getElementById('nombre-input').value;
        const dest = document.getElementById('destino-select').value;
        if(!nom || !dest || asientosElegidos === 0) return alert("Completa tus datos");
        
        await _s.from('solicitudes_viaje').insert([{ nombre_pasajero: nom, destino_idx: dest, asientos: asientosElegidos }]);
        alert("Solicitud enviada");
    }

    _s.channel('cambios_driver')
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'estado_movil' }, payload => {
          if(payload.new.hasOwnProperty('hacia_adelante')) renderizarParadas(payload.new.hacia_adelante);
      })
      .subscribe();

    renderizarParadas(true);
</script>
</body>
</html>
