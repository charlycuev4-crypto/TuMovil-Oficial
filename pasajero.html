<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - Pasajero Inteligente</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Mantenemos tus estilos originales que están geniales */
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; color: white; height: 100vh; overflow: hidden; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease-out; }
        .splash-logo { font-size: 80px; margin-bottom: 20px; animation: pulse 2s infinite; }
        .splash-title { color: #FFD700; font-size: 32px; font-weight: 900; letter-spacing: 4px; margin: 0; }
        .loader { width: 40px; height: 40px; border: 3px solid rgba(255,215,0,0.2); border-top: 3px solid #FFD700; border-radius: 50%; margin-top: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .top-ui { position: absolute; top: 10px; width: 100%; padding: 0 15px; z-index: 1000; }
        .dest-card { background: rgba(0, 0, 0, 0.9); border: 2px solid #FFD700; border-radius: 15px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        input#nombre-pax { width: 100%; background: rgba(255,255,255,0.05); color: #FFD700; border: 1px solid #FFD700; border-radius: 8px; padding: 10px; font-weight: bold; font-size: 16px; outline: none; }
        select { width: 100%; background: #000; color: white; border: none; font-size: 16px; padding: 10px 0; border-top: 1px solid #333; }
        .bottom-panel { position: absolute; bottom: 15px; width: 92%; left: 4%; background: rgba(0, 0, 0, 0.9); border: 2px solid #FFD700; border-radius: 25px; padding: 15px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        #resumen-viaje { background: rgba(255, 215, 0, 0.1); border: 1px dashed #FFD700; border-radius: 12px; padding: 8px; text-align: center; display: none; }
        .resaltado { color: #FFD700; font-weight: 800; font-size: 18px; }
        .asientos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn-as { aspect-ratio: 1; border: 2px solid #FFD700; border-radius: 12px; background: transparent; color: #FFD700; font-size: 18px; font-weight: bold; }
        .btn-as.selected { background: #FFD700 !important; color: #000 !important; }
        .btn-as.busy { border-color: #333; color: #333; pointer-events: none; opacity: 0.5; }
        .btn-confirm { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; background: #333; color: #666; pointer-events: none; }
        .btn-confirm.ready { background: #4cd964 !important; color: black !important; pointer-events: auto !important; }
        .btn-cancel { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; background: #ff3b30; color: white; display: none; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-logo">🚕</div>
        <h1 class="splash-title">TU MÓVIL</h1>
        <div class="loader"></div>
    </div>

    <div class="top-ui">
        <div class="dest-card">
            <input type="text" id="nombre-pax" placeholder="ESCRIBE TU NOMBRE" oninput="validarFormulario()">
            <select id="select-destino" onchange="validarFormulario()">
                <option value="" disabled selected>--- SELECCIONA DESTINO ---</option>
            </select>
        </div>
    </div>
    
    <div id="map"></div>

    <div class="bottom-panel">
        <div id="resumen-viaje"><p style="margin:0;">Total a pagar: <span class="resaltado" id="precio-resumen">$0</span></p></div>
        <div class="asientos-grid" id="grid-asientos">
            <button class="btn-as" id="b1" onclick="toggleAsiento(1)">1</button>
            <button class="btn-as" id="b2" onclick="toggleAsiento(2)">2</button>
            <button class="btn-as" id="b3" onclick="toggleAsiento(3)">3</button>
            <button class="btn-as" id="b4" onclick="toggleAsiento(4)">4</button>
        </div>
        <button id="btn-accion" class="btn-confirm" onclick="confirmarReserva()">Confirmar Viaje</button>
        <button id="btn-finalizar" class="btn-cancel" onclick="finalizarViaje()">Finalizar Mi Viaje</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    const rutaOficial = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const sel = document.getElementById('select-destino');
    rutaOficial.forEach((p,i) => { sel.innerHTML += `<option value="${i}">${p.n}</option>`; });

    const map = L.map('map', { zoomControl: false }).setView(rutaOficial[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    L.polyline(rutaOficial.map(p => p.c), {color: '#00d4ff', weight: 4, opacity: 0.5}).addTo(map);
    rutaOficial.forEach(p => L.circleMarker(p.c, { radius: 6, color: '#000', weight:2, fillColor: '#FFF', fillOpacity: 1 }).addTo(map));

    // ICONOS PARA LA FLOTA
    const iconTaxi1 = L.divIcon({ html: '<div style="background:#FFD700; border-radius:50%; padding:5px; border:2px solid black;">🚖1</div>', className: 'taxi-icon', iconAnchor: [15, 15] });
    const iconTaxi2 = L.divIcon({ html: '<div style="background:#ffffff; border-radius:50%; padding:5px; border:2px solid black;">🚖2</div>', className: 'taxi-icon', iconAnchor: [15, 15] });
    const iconUser = L.divIcon({ html: '👤', className: 'user-icon', iconAnchor: [12, 12] });

    let mTaxi1 = L.marker([0,0], { icon: iconTaxi1 }).addTo(map).setOpacity(0);
    let mTaxi2 = L.marker([0,0], { icon: iconTaxi2 }).addTo(map).setOpacity(0);
    let mYo = L.marker([0,0], { icon: iconUser }).addTo(map);
    const mDest = L.marker([0,0]).addTo(map); mDest.setOpacity(0);

    let miLat, miLon, asientosElegidos = [];

    async function monitorearViajeRealtime() {
        const nom = localStorage.getItem('mi_nombre');
        if(!nom) return;
        _s.channel('cambios_viaje').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'reservas_activas' }, payload => {
            if (payload.new.nombre_pasajero === nom && payload.new.estado === 'finalizado') {
                alert("¡Viaje Terminado por el Conductor!");
                localStorage.clear(); location.reload();
            }
        }).subscribe();
    }

    async function refrescarAsientos() {
        if(localStorage.getItem('viaje_en_curso')) return;
        // Solo mostramos como "ocupados" los asientos que están ocupados en AMBOS móviles 
        // para que el pasajero sepa que el sistema está trabajando.
        const { data } = await _s.from('reservas_activas').select('asiento_num').eq('estado', 'en_curso');
        // Aquí podrías filtrar por móvil si quisieras ser más específico, 
        // pero para simplificar, si el asiento está tomado en el móvil 1, se bloquea.
        const ocupados = data?.map(d => d.asiento_num) || [];
        for(let i=1; i<=4; i++) {
            const btn = document.getElementById('b'+i);
            if(ocupados.includes(i)) btn.classList.add('busy');
            else btn.classList.remove('busy');
        }
    }

    navigator.geolocation.watchPosition(p => {
        miLat = p.coords.latitude; miLon = p.coords.longitude;
        mYo.setLatLng([miLat, miLon]);
    }, null, { enableHighAccuracy: true });

    function toggleAsiento(n) {
        if(localStorage.getItem('viaje_en_curso')) return;
        const idx = asientosElegidos.indexOf(n);
        if (idx > -1) {
            asientosElegidos.splice(idx, 1);
            document.getElementById('b'+n).classList.remove('selected');
        } else {
            asientosElegidos.push(n);
            document.getElementById('b'+n).classList.add('selected');
        }
        actualizarResumen(); validarFormulario();
    }

    function actualizarResumen() {
        document.getElementById('precio-resumen').innerText = '$' + (asientosElegidos.length * 1000);
        document.getElementById('resumen-viaje').style.display = asientosElegidos.length > 0 ? 'block' : 'none';
    }

    function validarFormulario() {
        const d = document.getElementById('select-destino').value;
        const n = document.getElementById('nombre-pax').value.trim();
        if (d !== "" && rutaOficial[d]) mDest.setLatLng(rutaOficial[d].c).setOpacity(1);
        if(asientosElegidos.length > 0 && d !== "" && n !== "") document.getElementById('btn-accion').classList.add('ready');
        else document.getElementById('btn-accion').classList.remove('ready');
    }

    // --- LA NUEVA LÓGICA INTELIGENTE ---
    async function confirmarReserva() {
        const n = document.getElementById('nombre-pax').value.trim();
        const d = document.getElementById('select-destino').value;

        // 1. Preguntamos quién tiene lugar
        const { data: coches } = await _s.from('estado_movil').select('*').order('id', {ascending: true});
        
        let movilIdAsignado = 1; // Por defecto el 1
        if(coches[0].asientos_libres < asientosElegidos.length) {
            if(coches[1] && coches[1].asientos_libres >= asientosElegidos.length) {
                movilIdAsignado = 2;
                alert("Móvil 1 lleno. Asignado al Móvil 2");
            } else {
                alert("No hay asientos disponibles en ningún móvil.");
                return;
            }
        }

        const reservas = asientosElegidos.map(num => ({
            asiento_num: num, 
            id_movil: movilIdAsignado, // Guardamos el ID del móvil
            pasajero_lat: miLat, 
            pasajero_lon: miLon,
            destino_idx: d, 
            nombre_pasajero: n, 
            estado: 'en_curso'
        }));

        const { error } = await _s.from('reservas_activas').insert(reservas);
        if(!error) { 
            localStorage.setItem('viaje_en_curso', 'true'); 
            localStorage.setItem('mi_nombre', n); 
            localStorage.setItem('mi_movil_id', movilIdAsignado);
            location.reload(); 
        }
    }

    async function finalizarViaje() {
        if(!confirm("¿Deseas bajar del móvil?")) return;
        await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('nombre_pasajero', localStorage.getItem('mi_nombre'));
        localStorage.clear(); location.reload();
    }

    async function recuperarEstado() {
        if(localStorage.getItem('viaje_en_curso')) {
            const nom = localStorage.getItem('mi_nombre');
            const { data } = await _s.from('reservas_activas').select('*').eq('estado', 'en_curso').eq('nombre_pasajero', nom);
            if(data && data.length > 0) {
                document.getElementById('nombre-pax').value = nom; document.getElementById('nombre-pax').disabled = true;
                const dIdx = data[0].destino_idx; document.getElementById('select-destino').value = dIdx; document.getElementById('select-destino').disabled = true;
                document.getElementById('btn-accion').style.display = 'none'; document.getElementById('btn-finalizar').style.display = 'block';
                asientosElegidos = data.map(r => r.asiento_num);
                asientosElegidos.forEach(n => document.getElementById('b' + n).classList.add('selected'));
                actualizarResumen();
                monitorearViajeRealtime();
            } else { localStorage.clear(); }
        }
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
    }

    setInterval(refrescarAsientos, 10000);
    recuperarEstado();
    refrescarAsientos();

    // SEGUIMIENTO DE TODA LA FLOTA EN EL MAPA
    setInterval(async () => {
        const { data: coches } = await _s.from('estado_movil').select('*');
        if (coches) {
            coches.forEach(c => {
                if (c.id === 1) {
                    if (c.latitud !== 0) mTaxi1.setLatLng([c.latitud, c.longitud]).setOpacity(1);
                    else mTaxi1.setOpacity(0);
                }
                if (c.id === 2) {
                    if (c.latitud !== 0) mTaxi2.setLatLng([c.latitud, c.longitud]).setOpacity(1);
                    else mTaxi2.setOpacity(0);
                }
            });
        }
    }, 5000);
</script>
</body>
</html>
