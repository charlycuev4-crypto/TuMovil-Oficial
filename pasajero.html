<script>
    // ... (Mantén tu configuración de Supabase y rutaOficial arriba) ...

    const map = L.map('map', { zoomControl: false }).setView([-34.577, -58.755], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // FUERZO EL DIBUJO DE PUNTOS AQUÍ
    function dibujarRutaEnMapa() {
        const puntosRuta = rutaOficial.map(p => p.c);
        L.polyline(puntosRuta, { color: '#00d4ff', weight: 4, dashArray: '5, 10' }).addTo(map);
        
        rutaOficial.forEach(p => {
            L.circleMarker(p.c, { 
                radius: 6, 
                color: '#00d4ff', 
                fillColor: '#000', 
                fillOpacity: 1,
                weight: 2 
            }).addTo(map);
        });
    }

    // Función de confirmación con detector de errores real
    async function confirmarReserva() {
        const n = document.getElementById('nombre-pax').value.trim();
        const d = document.getElementById('select-destino').value;
        const btn = document.getElementById('btn-accion');

        btn.innerText = "RESERVANDO...";
        btn.disabled = true;

        const reservas = asientosElegidos.map(num => ({
            asiento_num: num, 
            lat_pax: miLat, 
            lon_pax: miLon,
            destino_idx: d, 
            nombre_pasajero: n, 
            estado: 'en_curso'
        }));

        const { error } = await _s.from('reservas_activas').insert(reservas);
        
        if(!error) { 
            localStorage.setItem('viaje_en_curso', 'true'); 
            localStorage.setItem('mi_nombre', n); 
            recuperarEstado();
        } else {
            // Esto te dirá si el error es de la tabla o de permisos
            alert("Error de Supabase: " + error.message);
            btn.innerText = "Confirmar Reserva";
            btn.disabled = false;
        }
    }

    // Iniciar todo
    dibujarRutaEnMapa();
    setTimeout(recuperarEstado, 1000);
</script>
