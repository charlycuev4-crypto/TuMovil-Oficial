<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; --azul-gps: #007AFF; }
        
        body, html { 
            margin: 0; padding: 0; background: var(--dark); height: 100%; 
            width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif;
        }

        /* SPLASH FUTURISTA */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .anillo {
            width: 160px; height: 160px; border: 4px solid var(--celeste);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 25px var(--celeste); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* UI ENCUADRADA */
        .header { background: var(--panel); border-bottom: 2px solid var(--celeste); padding: 10px; text-align: center; flex-shrink: 0; }
        .header h1 { margin: 0; font-size: 18px; color: var(--celeste); letter-spacing: 2px; }

        #map { flex-grow: 1; width: 100%; }
        
        .bottom-ui { 
            background: var(--panel); border-top: 2px solid var(--celeste); 
            padding: 15px 15px env(safe-area-inset-bottom);
            display: flex; flex-direction: column; gap: 8px;
            border-radius: 25px 25px 0 0; z-index: 100;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
            max-height: 42vh; overflow-y: auto;
        }

        .promo-card {
            background: rgba(0, 210, 255, 0.05); border: 1px solid var(--celeste);
            border-radius: 12px; padding: 8px; text-align: center;
        }

        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }
        
        .asientos-grid { display: flex; justify-content: space-around; margin: 5px 0; }
        .asiento-btn { 
            width: 50px; height: 50px; border: 2px solid var(--celeste); 
            border-radius: 12px; background: transparent; color: var(--celeste); 
            font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center;
            text-shadow: 0 0 5px var(--celeste);
        }
        .asiento-btn.selected { background: var(--amarillo); border-color: var(--amarillo); color: #000; box-shadow: 0 0 15px var(--amarillo); text-shadow: none; }
        .asiento-btn.occupied { border-color: #333; color: #333; pointer-events: none; opacity: 0.3; }

        .btn-pedir { 
            background: #28a745; color: white; border: none; padding: 15px; 
            border-radius: 12px; font-weight: bold; font-size: 16px;
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.3);
        }
        .btn-pedir:disabled { background: #444; color: #888; }

        /* Estilo de la flecha GPS */
        .flecha-gps {
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 25px solid var(--azul-gps);
            filter: drop-shadow(0 0 5px rgba(0, 122, 255, 0.8));
        }
    </style>
</head>
<body>

    <div id="splash">
        <div class="anillo"><span style="font-size: 60px;">🚕</span></div>
        <h2 style="color: var(--celeste); margin-top: 20px;">TUMOVIL</h2>
    </div>

    <div class="header"><h1>SOLICITAR VIAJE</h1></div>

    <div id="map"></div>

    <div class="bottom-ui">
        <div class="promo-card">
            <b style="color:var(--amarillo);">TARIFA PLANA: $1000 POR ASIENTO</b>
        </div>

        <input type="text" id="nombre-input" placeholder="Tu Nombre">
        <select id="destino-select" onchange="actualizarMapaRuta()">
            <option value="" disabled selected>¿Hacia qué parada vas?</option>
        </select>

        <div class="asientos-grid">
            <div class="asiento-btn" onclick="toggleAsiento(1)" id="as-1">1</div>
            <div class="asiento-btn" onclick="toggleAsiento(2)" id="as-2">2</div>
            <div class="asiento-btn" onclick="toggleAsiento(3)" id="as-3">3</div>
            <div class="asiento-btn" onclick="toggleAsiento(4)" id="as-4">4</div>
        </div>

        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajePasajero()" disabled>⌛ BUSCANDO GPS...</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    function cerrarSplash() {
        const s = document.getElementById('splash');
        s.style.opacity = '0';
        setTimeout(() => s.style.visibility = 'hidden', 800);
    }
    setTimeout(cerrarSplash, 4500);

    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const trayectoCoords = paradas.map(p => p.c);
    L.polyline(trayectoCoords, { color: '#00d2ff', weight: 4, opacity: 0.4 }).addTo(map);

    paradas.forEach(p => {
        L.circleMarker(p.c, { radius: 6, color: '#000', weight: 2, fillColor: '#00d2ff', fillOpacity: 1 }).addTo(map);
    });

    // ICONO DE FLECHA AZUL
    const iconFlecha = L.divIcon({ 
        html: '<div id="flecha-pas" class="flecha-gps"></div>', 
        className: 'gps-arrow', 
        iconAnchor: [12, 12] 
    });
    const iconT = L.divIcon({ html: '<span style="font-size:25px;">🚕</span>', iconAnchor: [12, 12] });

    let markerPasajero = L.marker([0,0], { icon: iconFlecha }).addTo(map);
    let guiaDestino = L.polyline([], { color: '#ffcc00', dashArray: '8, 8', weight: 4 }).addTo(map);
    let markerTaxis = {};
    let miLat = 0, miLon = 0, asientosElegidos = [];

    const selDest = document.getElementById('destino-select');
    paradas.forEach((p, i) => {
        const opt = document.createElement('option'); opt.value = i; opt.innerText = p.n;
        selDest.appendChild(opt);
    });

    navigator.geolocation.watchPosition(p => {
        miLat = p.coords.latitude; miLon = p.coords.longitude;
        const rumbo = p.coords.heading;

        markerPasajero.setLatLng([miLat, miLon]);
        
        // Rotar flecha si hay movimiento
        if(rumbo !== null) {
            const el = document.getElementById('flecha-pas');
            if(el) el.style.transform = `rotate(${rumbo}deg)`;
        }

        actualizarMapaRuta();
        document.getElementById('btn-pedir').disabled = false;
        document.getElementById('btn-pedir').innerText = "🏁 SOLICITAR MI VIAJE";
        cerrarSplash();
    }, null, { enableHighAccuracy: true });

    function actualizarMapaRuta() {
        const val = document.getElementById('destino-select').value;
        if(val !== "" && miLat !== 0) {
            const dest = paradas[val].c;
            guiaDestino.setLatLngs([[miLat, miLon], dest]);
            
            // Auto-encuadre para ver flecha y destino
            const bounds = L.latLngBounds([miLat, miLon], dest);
            map.fitBounds(bounds, { padding: [70, 70] });
        }
    }

    function toggleAsiento(num) {
        const i = asientosElegidos.indexOf(num);
        if(i > -1) { asientosElegidos.splice(i, 1); document.getElementById('as-'+num).classList.remove('selected'); }
        else { asientosElegidos.push(num); document.getElementById('as-'+num).classList.add('selected'); }
    }

    async function actualizarFlota() {
        const { data: moviles } = await _s.from('estado_movil').select('*').neq('latitud', 0).order('ultima_conexion', {ascending:true}).limit(1);
        Object.keys(markerTaxis).forEach(id => map.removeLayer(markerTaxis[id]));
        if (moviles && moviles.length > 0) {
            const t = moviles[0];
            markerTaxis[t.id] = L.marker([t.latitud, t.longitud], { icon: iconT }).addTo(map).bindTooltip("Coche 0"+t.id);
            const { data: ocup } = await _s.from('reservas_activas').select('asiento_num').eq('id_movil', t.id).eq('estado', 'en_curso');
            document.querySelectorAll('.asiento-btn').forEach(b => b.classList.remove('occupied'));
            if(ocup) ocup.forEach(o => document.getElementById('as-' + o.asiento_num).classList.add('occupied'));
        }
    }

    async function confirmarViajePasajero() {
        const nom = document.getElementById('nombre-input').value;
        const destIdx = document.getElementById('destino-select').value;
        if (!nom || !destIdx || asientosElegidos.length === 0) { alert("Completa todos los campos."); return; }
        
        const { data: moviles } = await _s.from('estado_movil').select('id').neq('latitud', 0).limit(1);
        if (!moviles || moviles.length === 0) { alert("Sin unidades disponibles."); return; }
        
        const idCar = moviles[0].id;
        const res = asientosElegidos.map(n => ({
            asiento_num: n, id_movil: idCar, estado: 'en_curso',
            nombre_pasajero: nom, pasajero_lat: miLat, pasajero_lon: miLon,
            destino_idx: parseInt(destIdx)
        }));
        await _s.from('reservas_activas').insert(res);
        alert("Viaje confirmado con el Coche 0" + idCar);
        location.reload();
    }

    setInterval(actualizarFlota, 5000);
    actualizarFlota();
</script>
</body>
</html>
