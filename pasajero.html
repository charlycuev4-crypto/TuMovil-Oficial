<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasajero - Tu Móvil Oficial</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; background: #f8f9fa; }
        #map { height: 65vh; width: 100%; }
        .panel { height: 35vh; background: white; text-align: center; border-radius: 25px 25px 0 0; margin-top: -20px; position: relative; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center; }
        #res-asientos { font-size: 60px; font-weight: bold; color: #28a745; margin: 5px 0; }
        .sub { color: #888; font-size: 12px; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="panel">
    <div class="sub">ASIENTOS DISPONIBLES</div>
    <div id="res-asientos">--</div>
    <div class="sub">Móvil Santa Brígida • En Vivo</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const _supabase = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52dW1kbHhlcnZyZXdxaWlhaWNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTA4NTMsImV4cCI6MjA4OTg4Njg1M30.ejh7dtL2O6JHeoVq47cUK_hXAfRetJPyzks1yI-Lrhs');

    var map = L.map('map').setView([-34.5612, -58.7705], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var carMarker = L.marker([-34.5612, -58.7705]).addTo(map);

    function actualizarPasajero(datos) {
        const { latitud, longitud, asientos_libres } = datos;
        if(latitud && longitud) {
            carMarker.setLatLng([latitud, longitud]);
            map.panTo([latitud, longitud]);
        }
        document.getElementById('res-asientos').innerText = asientos_libres;
    }

    // 1. CARGAR ESTADO ACTUAL AL ABRIR
    async function inicializar() {
        const { data } = await _supabase.from('estado_movil').select('*').eq('id', 1).single();
        if (data) actualizarPasajero(data);
    }

    // 2. ESCUCHAR CAMBIOS EN TIEMPO REAL
    _supabase.channel('movil_vivo').on('postgres_changes', 
        { event: 'UPDATE', schema: 'public', table: 'estado_movil', filter: 'id=eq.1' }, 
        (payload) => { actualizarPasajero(payload.new); }
    ).subscribe();

    inicializar();
</script>
</body>
</html>
