<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - Solicitar Viaje</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* [Manteniendo tus estilos originales para no romper el diseño] */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; min-height: 100vh; overflow-x: hidden; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease-out; }
        .splash-logo { font-size: 80px; margin-bottom: 20px; animation: pulse 2s infinite; }
        .splash-title { color: #FFD700; font-size: 36px; font-weight: 900; letter-spacing: 3px; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .header { background: #111; padding: 20px; text-align: center; border-bottom: 2px solid #FFD700; }
        .header h1 { color: #FFD700; font-size: 24px; font-weight: 900; }
        .hidden { display: none !important; }
        .btn { width: calc(100% - 40px); margin: 0 20px; padding: 18px; border: none; border-radius: 50px; font-size: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; background: #FFD700; color: #000; }
        /* Añadido para el selector de paradas */
        .parada-lista { padding: 20px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-logo">🚕</div>
        <h1 class="splash-title">TuMovil</h1>
    </div>

    <div class="header"><h1>🚕 TuMovil</h1></div>

    <div id="paso-formulario">
        <div class="parada-lista">
            <label style="color: #FFD700;">Selecciona tu Parada (Radio 2km):</label>
            <select id="select-parada" style="width:100%; padding:15px; margin-top:10px; border-radius:10px; background:#222; color:#fff; border:1px solid #FFD700;">
                <option value="">Cargando paradas...</option>
            </select>
        </div>
        <button class="btn" onclick="iniciarViaje()">SOLICITAR VIAJE</button>
    </div>

<script>
    const _s = supabase.createClient('URL_SUPABASE', 'KEY_SUPABASE');
    
    // Lista de tus paradas
    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    // Función para calcular distancia en metros entre dos puntos (Haversine)
    function calcularDistancia(lat1, lon1, lat2, lon2) {
        const R = 6371000; // Radio tierra en metros
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    // Inicializar paradas
    window.onload = () => {
        const sel = document.getElementById('select-parada');
        sel.innerHTML = '<option value="">Selecciona una parada cercana...</option>';
        paradas.forEach((p, i) => {
            const opt = document.createElement('option');
            opt.value = i; opt.innerText = p.n; sel.appendChild(opt);
        });

        navigator.geolocation.getCurrentPosition(pos => {
            const myLat = pos.coords.latitude;
            const myLon = pos.coords.longitude;
            let encontrada = false;

            paradas.forEach((p, i) => {
                const dist = calcularDistancia(myLat, myLon, p.c[0], p.c[1]);
                // Si está dentro de 2000 metros (2km), la seleccionamos
                if (dist <= 2000) {
                    sel.value = i;
                    encontrada = true;
                }
            });

            if(!encontrada) alert("Estás a más de 2km de cualquier parada. Puedes seleccionar una manualmente.");
            
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => document.getElementById('splash').classList.add('hidden'), 800);
        }, () => {
            alert("No pudimos obtener tu ubicación, selecciona tu parada manualmente.");
            document.getElementById('splash').classList.add('hidden');
        }, { enableHighAccuracy: true });
    };

    function iniciarViaje() {
        const val = document.getElementById('select-parada').value;
        if(val === "") { alert("Por favor, selecciona una parada primero."); return; }
        alert("Viaje solicitado desde: " + paradas[val].n);
    }
</script>
</body>
</html>
