<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; }
        
        body, html { 
            margin: 0; padding: 0; background: var(--dark); height: 100%; 
            width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif;
        }

        /* SPLASH SCREEN */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        /* ENCUADRE RESPONSIVO */
        .header { background: var(--panel); border-bottom: 2px solid var(--celeste); padding: 10px; text-align: center; flex-shrink: 0; }
        .header h1 { margin: 0; font-size: 18px; color: var(--celeste); text-shadow: 0 0 10px var(--celeste); }

        #map { flex-grow: 1; width: 100%; }
        
        .bottom-ui { 
            background: var(--panel); border-top: 2px solid var(--celeste); 
            padding: 15px 15px env(safe-area-inset-bottom);
            display: flex; flex-direction: column; gap: 8px;
            border-radius: 20px 20px 0 0; z-index: 100;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.5);
            max-height: 40vh; overflow-y: auto; /* Evita que se salga de la pantalla */
        }

        .promo-card {
            background: rgba(0, 210, 255, 0.1); border: 1px solid var(--celeste);
            border-radius: 10px; padding: 8px; text-align: center;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }
        
        .asientos-grid { display: flex; justify-content: space-around; margin: 5px 0; }
        .asiento-btn { 
            width: 50px; height: 50px; border: 2px solid var(--celeste); 
            border-radius: 12px; background: transparent; color: var(--celeste); 
            font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center;
            text-shadow: 0 0 5px var(--celeste); transition: 0.3s;
        }
        .asiento-btn.selected { background: var(--amarillo); border-color: var(--amarillo); color: #000; box-shadow: 0 0 15px var(--amarillo); text-shadow: none; }
        .asiento-btn.occupied { border-color: #333; color: #333; pointer-events: none; opacity: 0.4; }

        .btn-pedir { 
            background: #28a745; color: white; border: none; padding: 15px; 
            border-radius: 12px; font-weight: bold; font-size: 16px;
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.4);
        }
        .btn-pedir:disabled { background: #444; color: #888; box-shadow: none; }

        /* Icono de Persona Personalizado */
        .person-icon { font-size: 30px; text-shadow: 0 0 10px white; }
    </style>
</head>
<body>

    <div id="splash">
        <div style="font-size: 80px; margin-bottom: 20px;">🚕</div>
        <h2 style="color: var(--celeste); letter-spacing: 5px;">TUMOVIL</h2>
    </div>

    <div class="header"><h1>SOLICITAR VIAJE</h1></div>

    <div id="map"></div>

    <div class="bottom-ui">
        <div class="promo-card">
            <b style="color:var(--amarillo);">PROMO: VIAJES A $1000</b>
        </div>

        <input type="text" id="nombre-input" placeholder="Tu Nombre">
        <select id="destino-select" onchange="dibujarRutaDestino()">
            <option value="" disabled selected>¿A dónde vas?</option>
        </select>

        <div class="asientos-grid">
            <div class="asiento-btn" onclick="toggleAsiento(1)" id="as-1">1</div>
            <div class="asiento-btn" onclick="toggleAsiento(2)" id="as-2">2</div>
            <div class="asiento-btn" onclick="toggleAsiento(3)" id="as-3">3</div>
            <div class="asiento-btn" onclick="toggleAsiento(4)" id="as-4">4</div>
        </div>

        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajePasajero()" disabled>⌛ BUSCANDO GPS...</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Iconos personalizados
    const iconPersona = L.divIcon({ html: '<div class="person-icon">🚶</div>', className: 'p-marker', iconAnchor: [15, 30] });
    const iconTaxi = L.divIcon({ html: '<span style="font-size:25px;">🚕</span>', className: 't-marker', iconAnchor: [12, 12] });

    let markerPersona = L.marker([0,0], { icon: iconPersona }).addTo(map);
    let lineaRuta = L.polyline([], { color: var(--amarillo), dashArray: '10, 10', weight: 3 }).addTo(map);
    let markerTaxis = {};
    let miLat = 0, miLon = 0, asientosElegidos = [];

    // Llenar destinos
    const selectDestino = document.getElementById('destino-select');
    paradas.forEach((p, idx) => {
        const option = document.createElement('option');
        option.value = idx; option.innerText = p.n;
        selectDestino.appendChild(option);
    });

    // GPS y Salida del Splash
    navigator.geolocation.watchPosition(p => {
        miLat = p.coords.latitude; miLon = p.coords.longitude;
        markerPersona.setLatLng([miLat, miLon]);
        dibujarRutaDestino(); 
        document.getElementById('btn-pedir').disabled = false;
        document.getElementById('btn-pedir').innerText = "🏁 SOLICITAR VIAJE";
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
    }, null, { enableHighAccuracy: true });

    function dibujarRutaDestino() {
        const idx = document.getElementById('destino-select').value;
        if (idx !== "" && miLat !== 0) {
            const destinoCoord = paradas[idx].c;
            lineaRuta.setLatLngs([[miLat, miLon], destinoCoord]);
            map.fitBounds(lineaRuta.getBounds(), { padding: [50, 50] });
        }
    }

    function toggleAsiento(num) {
        const index = asientosElegidos.indexOf(num);
        if (index > -1) {
            asientosElegidos.splice(index, 1);
            document.getElementById('as-' + num).classList.remove('selected');
        } else {
            asientosElegidos.push(num);
            document.getElementById('as-' + num).classList.add('selected');
        }
    }

    async function actualizarTaxis() {
        const { data: moviles } = await _s.from('estado_movil').select('*').neq('latitud', 0).order('ultima_conexion', {ascending:true}).limit(1);
        Object.keys(markerTaxis).forEach(id => map.removeLayer(markerTaxis[id]));
        if (moviles && moviles.length > 0) {
            const t = moviles[0];
            markerTaxis[t.id] = L.marker([t.latitud, t.longitud], { icon: iconTaxi }).addTo(map).bindTooltip("Coche 0"+t.id);
            const { data: ocup } = await _s.from('reservas_activas').select('asiento_num').eq('id_movil', t.id).eq('estado', 'en_curso');
            document.querySelectorAll('.asiento-btn').forEach(b => b.classList.remove('occupied'));
            if(ocup) ocup.forEach(o => document.getElementById('as-' + o.asiento_num).classList.add('occupied'));
        }
    }

    async function confirmarViajePasajero() {
        const nombreVal = document.getElementById('nombre-input').value;
        const destinoIdx = document.getElementById('destino-select').value;
        if (!nombreVal || !destinoIdx || asientosElegidos.length === 0) { alert("Completa todos los datos."); return; }
        
        const { data: moviles } = await _s.from('estado_movil').select('id').neq('latitud', 0).limit(1);
        if (!moviles || moviles.length === 0) { alert("Sin coches disponibles."); return; }
        
        const idMovil = moviles[0].id;
        const res = asientosElegidos.map(n => ({
            asiento_num: n, id_movil: idMovil, estado: 'en_curso',
            nombre_pasajero: nombreVal, pasajero_lat: miLat, pasajero_lon: miLon,
            destino_idx: parseInt(destinoIdx)
        }));
        await _s.from('reservas_activas').insert(res);
        alert("Viaje solicitado con éxito.");
        location.reload();
    }

    setInterval(actualizarTaxis, 5000);
    actualizarTaxis();
</script>
</body>
</html>
