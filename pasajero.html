<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASAJERO - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #111; border-bottom: 2px solid #FFD700; padding: 10px; text-align: center; color: #FFD700; }
        .header h1 { margin: 0; font-size: 18px; letter-spacing: 2px; }
        
        #map { flex-grow: 1; width: 100%; background: #000; }
        
        .bottom-ui { background: #111; border-top: 2px solid #FFD700; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        label { color: #FFD700; font-size: 11px; font-weight: bold; }
        input, select { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; font-size: 14px; }
        
        /* DISEÑO DE ASIENTOS PARA EL PASAJERO */
        .asientos-container { display: flex; justify-content: center; gap: 10px; margin: 5px 0; }
        .asiento-btn { 
            width: 50px; height: 50px; border: 2px solid #FFD700; border-radius: 10px; 
            background: #000; color: #FFD700; font-weight: bold; 
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .asiento-btn.selected { background: #FFD700; color: #000; transform: scale(1.1); }
        .asiento-btn.occupied { background: #444; border-color: #666; color: #888; pointer-events: none; }

        .btn-pedir { background: #4cd964; color: black; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; width: 100%; }
        .btn-pedir:disabled { background: #444; color: #888; }
        .taxi-icon { font-size: 25px; }
    </style>
</head>
<body>

    <div class="header"><h1>SOLICITAR MI VIAJE</h1></div>
    <div id="map"></div>

    <div class="bottom-ui">
        <div class="input-group">
            <label>MI NOMBRE</label>
            <input type="text" id="nombre-input" placeholder="Nombre para el chofer">
        </div>

        <div class="input-group">
            <label>MI DESTINO</label>
            <select id="destino-select">
                <option value="" disabled selected>Seleccione parada...</option>
            </select>
        </div>

        <label style="text-align: center;">ELIGE TU ASIENTO ($1000)</label>
        <div class="asientos-container" id="selector-asientos">
            <div class="asiento-btn" onclick="seleccionarAsiento(1)" id="as-1">1</div>
            <div class="asiento-btn" onclick="seleccionarAsiento(2)" id="as-2">2</div>
            <div class="asiento-btn" onclick="seleccionarAsiento(3)" id="as-3">3</div>
            <div class="asiento-btn" onclick="seleccionarAsiento(4)" id="as-4">4</div>
        </div>

        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajePasajero()" disabled>⌛ BUSCANDO GPS...</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.polyline(paradas.map(p => p.c), { color: '#00d4ff', weight: 6, opacity: 0.5 }).addTo(map);
    paradas.forEach(p => { L.circleMarker(p.c, { radius: 5, color: '#000', fillColor: '#FFF', fillOpacity: 1 }).addTo(map); });

    const marcadorMiLoc = L.circleMarker([0,0], { color: '#007bff', radius: 10, fillOpacity: 1 }).addTo(map);
    const markerTaxis = {};
    const iconTaxi = L.divIcon({ html: '🚕', className: 'taxi-icon', iconAnchor: [15, 15] });

    let miLat = 0, miLon = 0, asientoSeleccionado = null;

    // Cargar selector de destinos
    const selectDestino = document.getElementById('destino-select');
    paradas.forEach((p, idx) => {
        const option = document.createElement('option');
        option.value = idx; option.innerText = p.n;
        selectDestino.appendChild(option);
    });

    // Iniciar GPS
    navigator.geolocation.getCurrentPosition(p => {
        miLat = p.coords.latitude; miLon = p.coords.longitude;
        marcadorMiLoc.setLatLng([miLat, miLon]); map.panTo([miLat, miLon]);
        document.getElementById('btn-pedir').innerText = "🏁 SOLICITAR VIAJE";
        document.getElementById('btn-pedir').disabled = false;
    }, null, { enableHighAccuracy: true });

    function seleccionarAsiento(num) {
        asientoSeleccionado = num;
        document.querySelectorAll('.asiento-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('as-' + num).classList.add('selected');
    }

    async function actualizarTaxisYAsientos() {
        const { data: moviles } = await _s.from('estado_movil').select('*').neq('latitud', 0).order('ultima_conexion', {ascending:true}).limit(1);
        
        Object.keys(markerTaxis).forEach(id => map.removeLayer(markerTaxis[id]));
        
        if (moviles && moviles.length > 0) {
            const taxi = moviles[0];
            markerTaxis[taxi.id] = L.marker([taxi.latitud, taxi.longitud], { icon: iconTaxi }).addTo(map).bindTooltip("Coche 0"+taxi.id, {permanent:true});

            // Bloquear asientos ya ocupados en ese taxi
            const { data: ocupados } = await _s.from('reservas_activas').select('asiento_num').eq('id_movil', taxi.id).eq('estado', 'en_curso');
            document.querySelectorAll('.asiento-btn').forEach(b => b.classList.remove('occupied'));
            if(ocupados) ocupados.forEach(o => {
                document.getElementById('as-' + o.asiento_num).classList.add('occupied');
            });
        }
    }

    async function confirmarViajePasajero() {
        const nombreVal = document.getElementById('nombre-input').value;
        const destinoIdx = document.getElementById('destino-select').value;

        if (!nombreVal || !destinoIdx || !asientoSeleccionado) {
            alert("Completa: Nombre, Destino y elige un Asiento (1-4)."); return;
        }

        document.getElementById('btn-pedir').disabled = true;
        const { data: moviles } = await _s.from('estado_movil').select('id').neq('latitud', 0).order('ultima_conexion', { ascending: true }).limit(1);

        if (!moviles || moviles.length === 0) {
            alert("No hay coches en línea."); resetBoton(); return;
        }

        const idAsignado = moviles[0].id;
        const { error } = await _s.from('reservas_activas').insert([{
            asiento_num: asientoSeleccionado,
            id_movil: idAsignado,
            estado: 'en_curso',
            nombre_pasajero: nombreVal,
            pasajero_lat: miLat, pasajero_lon: miLon,
            destino_idx: destinoIdx
        }]);

        if (!error) { alert("¡Viaje pedido al Coche 0" + idAsignado + "! Asiento: " + asientoSeleccionado); }
        resetBoton();
    }

    function resetBoton() { document.getElementById('btn-pedir').disabled = false; document.getElementById('btn-pedir').innerText = "🏁 SOLICITAR VIAJE"; }

    setInterval(actualizarTaxisYAsientos, 3000);
    actualizarTaxisYAsientos();
</script>
</body>
</html>
