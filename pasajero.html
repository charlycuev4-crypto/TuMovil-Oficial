<style>
    /* Agregamos el estilo para el contador de tarifa igual a tu captura */
    .card-tarifa {
        background: rgba(17, 17, 17, 0.95); border: 2px solid #00d4ff; 
        border-radius: 15px; padding: 10px; width: 45%; margin-bottom: 10px;
        text-align: center; box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
    }
    .monto { color: #fff; font-size: 24px; font-weight: bold; }
    .label-tarifa { color: #00d4ff; font-size: 10px; font-weight: bold; display: block; }
</style>

<div class="overlay bottom">
    <div id="ui-dist" class="dist-tag" style="display:none;">EL MÓVIL ESTÁ A: <span id="v-dist">0</span>m</div>
    
    <div class="card-tarifa">
        <span class="label-tarifa">TU TARIFA</span>
        <span class="monto">$ <span id="total-pago">0</span></span>
    </div>

    <div class="card-asientos">
        <div class="asientos-grid">
            <button id="as1" class="btn-as" onclick="gestionarAsiento(1)">1</button>
            <button id="as2" class="btn-as" onclick="gestionarAsiento(2)">2</button>
            <button id="as3" class="btn-as" onclick="gestionarAsiento(3)">3</button>
            <button id="as4" class="btn-as" onclick="gestionarAsiento(4)">4</button>
        </div>
        <button class="btn-finalizar" onclick="liberarAsiento()">FINALIZAR MI VIAJE</button>
    </div>
</div>

<script>
    // Variables para el control de tarifa
    let asientosSeleccionadosLocal = 0;

    async function gestionarAsiento(n) {
        if (navigator.vibrate) navigator.vibrate(80);
        
        const { data } = await _s.from('estado_movil').select('asientos_libres').eq('id', 1).single();
        
        if(data && data.asientos_libres > 0) {
            // Restamos uno en la base de datos
            await _s.from('estado_movil').update({ asientos_libres: data.asientos_libres - 1 }).eq('id', 1);
            
            // Sumamos uno al contador local para el precio
            asientosSeleccionadosLocal++;
            actualizarTarifa();
        }
    }

    async function liberarAsiento() {
        const { data } = await _s.from('estado_movil').select('asientos_libres').eq('id', 1).single();
        if(data && data.asientos_libres < 4) {
            await _s.from('estado_movil').update({ asientos_libres: 4 }).eq('id', 1);
            
            // Reset de tarifa
            asientosSeleccionadosLocal = 0;
            actualizarTarifa();
        }
    }

    function actualizarTarifa() {
        // Multiplicamos por $1000 como sugeriste
        const total = asientosSeleccionadosLocal * 1000;
        document.getElementById('total-pago').innerText = total;
        
        // Alerta visual si elige más de uno
        const montoElem = document.getElementById('total-pago');
        if(asientosSeleccionadosLocal > 1) {
            montoElem.style.color = "#ff3b30"; // Rojo si elige de más
        } else {
            montoElem.style.color = "#fff";
        }
    }

    // Sincronización con el canal de Supabase...
    _s.channel('cambios').on('postgres_changes', {event:'UPDATE', schema:'public', table:'estado_movil'}, r => {
        // Si el conductor resetea todo, nosotros también reseteamos la tarifa local
        if(r.new.asientos_libres === 4) {
            asientosSeleccionadosLocal = 0;
            actualizarTarifa();
        }
        // ... (resto del código de mapa y botones)
    }).subscribe();
</script>
