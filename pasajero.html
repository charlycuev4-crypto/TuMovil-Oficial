<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero Oficial</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --celeste: #00d2ff;
            --amarillo: #ffcc00;
            --dark: #0a0a1a;
            --panel: rgba(20, 20, 40, 0.85);
            --success: #4cd964;
            --danger: #ff3b30;
            --glass: rgba(0, 0, 0, 0.75);
        }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden;
            display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

        /* SPLASH SCREEN */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3e 50%, #0d2b3a 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; transition: opacity 0.8s ease, visibility 0.8s; }
        .splash-ring { width: 160px; height: 160px; border: 3px solid var(--celeste); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.4), inset 0 0 20px rgba(0, 210, 255, 0.1);
            animation: pulseRing 2s infinite; }
        @keyframes pulseRing { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
        #splash h2 { color: var(--celeste); margin-top: 20px; font-size: 24px; letter-spacing: 4px; font-weight: 800; }
        #splash p { color: #888; font-size: 13px; margin-top: 6px; }
        .splash-loading { width: 160px; height: 3px; background: #222; border-radius: 3px; margin-top: 16px; overflow: hidden; }
        .splash-loading-inner { width: 0%; height: 100%; background: linear-gradient(90deg, var(--celeste), var(--amarillo));
            border-radius: 3px; animation: loadBar 1.5s ease forwards; }
        @keyframes loadBar { to { width: 100%; } }

        /* HEADER */
        .header { background: var(--glass); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.3); padding: 12px; text-align: center; flex-shrink: 0; }
        .header h1 { margin: 0; font-size: 18px; color: var(--celeste); letter-spacing: 3px; font-weight: 800; }

        #map { flex-grow: 1; width: 100%; transition: all 0.4s ease; }

        /* ESTADOS DE VIAJE */
        body.viaje-activo #map { height: 55vh !important; flex: none !important; }
        body.viaje-activo .bottom-ui { max-height: 45vh; }
        body.a-bordo #map { height: 85vh !important; flex: none !important; }
        body.a-bordo .header { display: none; }
        body.a-bordo .bottom-ui {
            max-height: 15vh; min-height: 70px; padding: 10px 15px env(safe-area-inset-bottom);
            gap: 8px; border-radius: 20px 20px 0 0; overflow: hidden;
            display: flex; flex-direction: row; align-items: center; justify-content: space-between;
        }
        body.a-bordo .bottom-ui > *:not(#btn-cancelar):not(#info-viaje-abordo):not(#panel-anuncio-parada) { display: none !important; }
        body.a-bordo #btn-cancelar { display: block !important; margin: 0; padding: 14px 22px;
            font-size: 15px; height: auto; white-space: nowrap; flex-shrink: 0; }
        #info-viaje-abordo { display: none; color: white; font-size: 14px; text-align: left;
            flex: 1; padding-right: 10px; min-width: 0; }
        body.a-bordo #info-viaje-abordo { display: block !important; }

        /* BOTTOM UI */
        .bottom-ui { background: var(--glass); backdrop-filter: blur(15px);
            border-top: 1px solid rgba(0, 210, 255, 0.3); padding: 16px 16px env(safe-area-inset-bottom);
            display: flex; flex-direction: column; gap: 10px; border-radius: 25px 25px 0 0;
            z-index: 100; box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
            max-height: 55vh; overflow-y: auto; transition: all 0.4s ease; }

        body.viaje-activo .form-element { display: none !important; }
        body.viaje-activo #btn-pedir { display: none !important; }

        /* TARJETA PROMO */
        .promo-card { background: linear-gradient(135deg, rgba(0, 210, 255, 0.08), rgba(255, 204, 0, 0.05));
            border: 1px solid rgba(0, 210, 255, 0.3); border-radius: 14px; padding: 12px;
            text-align: center; font-size: 15px; font-weight: 700; }

        input, select { background: rgba(42, 42, 42, 0.9); border: 1px solid #444; color: white;
            padding: 14px; border-radius: 12px; font-size: 16px; width: 100%; box-sizing: border-box;
            backdrop-filter: blur(5px); transition: all 0.2s; }
        input:focus, select:focus { border-color: var(--celeste); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); outline: none; }

        /* PANEL VIAJE ACTIVO */
        .viaje-activo-panel {
            background: linear-gradient(135deg, rgba(26, 26, 62, 0.9) 0%, rgba(13, 43, 58, 0.9) 100%);
            backdrop-filter: blur(15px); border: 1px solid rgba(0, 210, 255, 0.4);
            border-radius: 20px; padding: 18px; margin-bottom: 10px;
            animation: slideIn 0.5s ease; transition: border-color 0.5s ease;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .viaje-activo-panel.alerta-pasado { border-color: var(--danger);
            animation: shake 0.5s ease; box-shadow: 0 8px 32px rgba(255, 59, 48, 0.3); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .viaje-activo-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px;
            padding-bottom: 14px; border-bottom: 1px solid rgba(0, 210, 255, 0.15); }
        .viaje-activo-icono { width: 56px; height: 56px; background: linear-gradient(135deg, var(--celeste), #0088cc);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 26px; flex-shrink: 0; transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); }
        .viaje-activo-panel.alerta-pasado .viaje-activo-icono {
            background: linear-gradient(135deg, var(--danger), #c0392b);
            animation: pulseDanger 1s infinite; box-shadow: 0 0 20px rgba(255, 59, 48, 0.4); }
        @keyframes pulseDanger { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .viaje-activo-titulo { flex: 1; }
        .viaje-activo-titulo .coche-numero { font-size: 22px; font-weight: 800; color: var(--amarillo); margin: 0; text-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }
        .viaje-activo-titulo .conductor-nombre { font-size: 14px; color: rgba(255,255,255,0.8); margin: 4px 0 0 0; }
        .viaje-activo-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .info-box { background: rgba(0, 0, 0, 0.3); border-radius: 12px; padding: 12px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05); }
        .info-box-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
        .info-box-valor { font-size: 16px; color: var(--celeste); font-weight: 800; margin-top: 4px; }
        .viaje-activo-destino { background: rgba(255, 204, 0, 0.08); border: 1px solid rgba(255, 204, 0, 0.3);
            border-radius: 12px; padding: 12px; text-align: center; font-size: 14px;
            color: var(--amarillo); margin-bottom: 14px; font-weight: 600; }
        .viaje-activo-status { display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 13px; color: var(--success); padding: 12px; border-radius: 12px;
            background: rgba(76, 217, 100, 0.08); border: 1px solid rgba(76, 217, 100, 0.2); }
        .viaje-activo-status.alerta { color: var(--danger); background: rgba(255, 59, 48, 0.08); border-color: rgba(255, 59, 48, 0.2); font-weight: 700; }
        .status-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%;
            animation: blink 1.5s infinite; box-shadow: 0 0 8px var(--success); }
        .status-dot.alerta { background: var(--danger); animation: blinkFast 0.5s infinite; box-shadow: 0 0 8px var(--danger); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes blinkFast { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .alerta-parada { background: rgba(255, 59, 48, 0.08); border: 1px solid var(--danger);
            border-radius: 12px; padding: 14px; text-align: center; margin-bottom: 12px;
            animation: slideIn 0.3s ease; }
        .alerta-parada-texto { color: #ff6b6b; font-size: 14px; font-weight: 700; }
        .alerta-parada-sub { color: #ff9999; font-size: 12px; margin-top: 6px; }

        /* PANEL ANUNCIO PARADA */
        #panel-anuncio-parada {
            position: fixed; top: 60px; left: 15px; right: 15px; z-index: 1000;
            background: linear-gradient(135deg, rgba(10,10,30,0.95) 0%, rgba(26,26,62,0.95) 100%);
            backdrop-filter: blur(15px); border: 2px solid var(--amarillo); border-radius: 24px;
            padding: 20px; animation: slideIn 0.5s ease, pulseBorder 2s infinite;
            display: none; text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 40px rgba(255, 204, 0, 0.1);
            max-width: 500px; margin: 0 auto;
        }
        body.a-bordo #panel-anuncio-parada { top: 15px; }
        #panel-anuncio-parada.visible { display: block; }
        #panel-anuncio-parada .anuncio-icono { font-size: 36px; margin-bottom: 8px; }
        #panel-anuncio-parada .anuncio-titulo { color: var(--amarillo); font-size: 12px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px; }
        #panel-anuncio-parada .anuncio-mensaje { color: white; font-size: 17px; font-weight: 700;
            line-height: 1.4; white-space: pre-line; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
        #panel-anuncio-parada .anuncio-btn-ok {
            background: linear-gradient(135deg, var(--success), #34c759); color: white; border: none;
            padding: 14px 36px; border-radius: 24px; font-weight: 800; font-size: 15px;
            margin-top: 14px; cursor: pointer; width: 100%; box-shadow: 0 4px 20px rgba(76, 217, 100, 0.3);
            transition: all 0.2s;
        }
        #panel-anuncio-parada .anuncio-btn-ok:active { transform: scale(0.96); }
        @keyframes pulseBorder {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 204, 0, 0.2), 0 8px 32px rgba(0,0,0,0.6); }
            50% { box-shadow: 0 0 35px rgba(255, 204, 0, 0.5), 0 8px 32px rgba(0,0,0,0.6); }
        }

        /* BANNER LLEGADA */
        #banner-llegada { position: fixed; top: 0; left: 0; right: 0;
            background: linear-gradient(180deg, var(--celeste) 0%, #0088cc 100%);
            color: white; padding: 24px 16px 30px; text-align: center;
            z-index: 99999; transform: translateY(-120%);
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 10px 40px rgba(0, 210, 255, 0.5); }
        #banner-llegada.visible { transform: translateY(0); }
        #banner-llegada .llegada-icono { font-size: 55px; margin-bottom: 5px; animation: bounceCar 1s infinite; }
        @keyframes bounceCar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        #banner-llegada .llegada-titulo { font-size: 24px; font-weight: 900; margin-bottom: 5px; }
        #banner-llegada .llegada-sub { font-size: 15px; opacity: 0.9; margin-bottom: 18px; }
        #banner-llegada .llegada-botones { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn-llegada { border: none; padding: 16px 22px; border-radius: 16px; font-weight: 800;
            font-size: 15px; cursor: pointer; flex: 1; min-width: 100px; transition: all 0.2s; }
        .btn-llegada:active { transform: scale(0.96); }
        .btn-llegada-si { background: var(--success); color: white; box-shadow: 0 4px 15px rgba(76, 217, 100, 0.4); }
        .btn-llegada-no { background: rgba(255,255,255,0.2); color: white; border: 2px solid rgba(255,255,255,0.5); }
        .btn-llegada-rechazar { background: var(--danger); color: white; border: 2px solid rgba(255,255,255,0.3); }
        .llegada-timer { position: absolute; top: 15px; right: 15px; width: 48px; height: 48px;
            border-radius: 50%; background: rgba(0,0,0,0.3); display: flex;
            align-items: center; justify-content: center; font-weight: 800; font-size: 20px; }

        /* FLOTA / ASIENTOS */
        .flota-container { max-height: 240px; overflow-y: auto; }
        .coche-card { background: rgba(26, 26, 26, 0.9); backdrop-filter: blur(5px);
            border-radius: 16px; padding: 14px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.08); animation: slideIn 0.3s ease;
            transition: all 0.3s ease; }
        .coche-card.seleccionado { border-color: var(--celeste);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2), inset 0 0 10px rgba(0, 210, 255, 0.05); }
        .coche-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .coche-num { font-weight: 800; font-size: 15px; color: white; }
        .coche-info { font-size: 11px; color: #888; }
        .coche-dist { font-size: 11px; color: var(--amarillo); font-weight: 700; }
        .asientos-row { display: flex; gap: 8px; justify-content: center; }
        .asiento-box { width: 60px; height: 54px; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 11px; transition: all 0.2s; }
        .asiento-libre { background: rgba(42, 42, 42, 0.9); border: 2px solid var(--celeste); color: var(--celeste); cursor: pointer; }
        .asiento-libre:hover { background: var(--celeste); color: black; transform: scale(1.05); }
        .asiento-libre.seleccionado { background: linear-gradient(135deg, var(--amarillo), #E6B800);
            border-color: var(--amarillo); color: black; box-shadow: 0 0 15px rgba(255, 204, 0, 0.3); }
        .asiento-ocupado { background: rgba(26, 26, 26, 0.9); border: 2px solid #333; color: #555; cursor: not-allowed; }
        .asiento-num { font-size: 14px; font-weight: 800; }
        .asiento-nombre { font-size: 9px; text-align: center; line-height: 1.1; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap; max-width: 50px; }
        .asiento-lock { font-size: 10px; }
        .sin-coches { text-align: center; padding: 18px; color: #666; font-size: 13px; }
        .sin-coches b { color: #ff4444; display: block; margin-bottom: 6px; font-size: 15px; }

        /* BOTONES */
        .btn-pedir { background: linear-gradient(135deg, var(--success), #34c759); color: white;
            border: none; padding: 16px; border-radius: 16px; font-weight: 800; font-size: 17px;
            transition: all 0.3s; box-shadow: 0 4px 20px rgba(76, 217, 100, 0.3); }
        .btn-pedir:disabled { background: #333; color: #666; box-shadow: none; }
        .btn-pedir:not(:disabled):active { transform: scale(0.97); }
        .btn-cancelar { background: linear-gradient(135deg, var(--danger), #c0392b); color: white;
            border: none; padding: 16px; border-radius: 16px; font-weight: 800;
            display: none; margin-top: 5px; font-size: 16px;
            box-shadow: 0 4px 20px rgba(255, 59, 48, 0.3); transition: all 0.2s; }
        .btn-cancelar:disabled { background: #661a22; color: #999; }
        .btn-cancelar:active { transform: scale(0.97); }

        /* TOASTS */
        .toast-container { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            z-index: 10001; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast {
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); color: white;
            padding: 12px 24px; border-radius: 16px; font-size: 13px; font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            animation: toastIn 0.4s ease, toastOut 0.4s ease 2.6s forwards;
            max-width: 90vw; text-align: center;
        }
        .toast.success { border-color: rgba(76, 217, 100, 0.4); color: #4cd964; }
        .toast.warning { border-color: rgba(255, 204, 0, 0.4); color: #ffcc00; }
        .toast.error { border-color: rgba(255, 59, 48, 0.4); color: #ff3b30; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { to { opacity: 0; transform: translateY(10px); } }

        .spinner { display: inline-block; width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,.3); border-radius: 50%;
            border-top-color: #fff; animation: spin 1s ease-in-out infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-height: 500px) { body, html { overflow-y: auto !important; height: auto !important; } #map { min-height: 200px; } }
        input:focus, select:focus { scroll-margin-bottom: 300px; }
    </style>
</head>
<body>
    <div id="splash">

    <div class="toast-container" id="toast-container"></div>

    <div class="header"><h1>SOLICITAR VIAJE</h1></div>
    
    <div id="map"></div>

    <div class="bottom-ui">
        <div class="promo-card form-element"><b style="color:var(--amarillo);">TARIFA PLANA: $1000 POR ASIENTO</b></div>
        <select id="sentido-select" class="form-element">
            <option value="IDA">Hacia IDA</option>
            <option value="VUELTA">Hacia VUELTA</option>
        </select>
        <input type="text" id="nombre-input" class="form-element" placeholder="Tu Nombre" maxlength="20">
        <select id="destino-select" class="form-element">
            <option value="" disabled selected>¿A qué parada vas?</option>

        <div class="flota-container form-element" id="flota-container">

        <div id="info-viaje-abordo">

            <div style="color: #aaa; font-size: 12px;">📍 <span id="info-destino-abordo">--</span></div>
        </div>

        <button class="btn-cancelar" id="btn-cancelar" onclick="finalizarViaje()">TERMINAR MI VIAJE</button>
    </div>

<script>

    function calcularParadaMasCerca(lat, lon) {
        let minDist = Infinity, paradaIdx = -1;
        paradas.forEach((p, i) => {
            const dist = Math.sqrt(Math.pow(lat - p.c[0], 2) + Math.pow(lon - p.c[1], 2));
            if (dist < minDist) { minDist = dist; paradaIdx = i; }
        });
        return paradaIdx;
    }

    function movilPuedeRecoger(movilParada, paradaPasajero, sentido) {
        if (sentido === 'IDA') return movilParada <= paradaPasajero;
        return movilParada >= paradaPasajero;
    }

    function iniciarVerificacionLlegada() {
        if (intervaloVerificarLlegada) clearInterval(intervaloVerificarLlegada);
        verificarLlegadaCoche();
        intervaloVerificarLlegada = setInterval(verificarLlegadaCoche, 8000);
    }

    async function verificarLlegadaCoche() {
        if (!miViajeActivo || pasajeroABordo || llegadaMostrada) return;
        const nom = miNombrePasajero;
        if (!nom) return;
        try {
            const { data: rpcData, error } = await _s.rpc('verificar_llegada_coche', { p_nombre: nom });
            if (error) throw error;
            if (!rpcData || !rpcData.encontrado) return;
            if (!rpcData.llego) return;
            mostrarBannerLlegada();
        } catch (err) { console.error("Error verificando llegada:", err); }
    }

    function mostrarBannerLlegada() {
        if (llegadaMostrada) return;
        llegadaMostrada = true;
        const banner = document.getElementById('banner-llegada');
        const timerEl = document.getElementById('llegada-timer');
        banner.classList.add('visible');
        segundosRestantes = 30;
        timerEl.textContent = segundosRestantes;
        timerEl.style.background = 'rgba(0,0,0,0.3)';
        reproducirAlarmaLlegada();
        vibrarAlarma();
        timerLlegada = setInterval(() => {
            segundosRestantes--;
            timerEl.textContent = segundosRestantes;
            if (segundosRestantes <= 10) timerEl.style.background = 'rgba(255, 59, 48, 0.5)';
            if (segundosRestantes <= 0) { clearInterval(timerLlegada); confirmarSubida(true); }
        }, 1000);
    }

    async function confirmarSubida(autoConfirmado) {
        const nom = miNombrePasajero;
        if (timerLlegada) { clearInterval(timerLlegada); timerLlegada = null; }
        document.getElementById('banner-llegada').classList.remove('visible');
        try {
            const { data: rpcData, error } = await _s.rpc('confirmar_abordo', { p_nombre: nom });
            if (error) throw error;
            if (rpcData && rpcData.success) {
                pasajeroABordo = true;
                activarModoABordo();
                if (autoConfirmado) mostrarToast('✅ Subida confirmada automáticamente', 'success');
                iniciarEscuchaAnuncios();
            }
        } catch (err) { console.error("Error confirmando abordo:", err); }
    }

    async function rechazarViaje() {
        let nom = miNombrePasajero;
        if (!nom) { nom = document.getElementById('nombre-input').value.trim(); }
        if (!nom) {
            const guardado = localStorage.getItem('usuario_nombre');
            if (guardado) { nom = guardado; miNombrePasajero = guardado; }
        }
        if (!nom) { alert("Error: no se encontró tu nombre."); return; }
        if (!confirm("¿Estás seguro de que querés cancelar tu reserva? El conductor será notificado.")) return;
        if (timerLlegada) { clearInterval(timerLlegada); timerLlegada = null; }
        document.getElementById('banner-llegada').classList.remove('visible');
        let cancelado = false;
        try {
            const { data: rpcData, error } = await _s.rpc('cancelar_viaje_pasajero', { p_nombre: nom });
            if (error) throw error;
            if (rpcData && rpcData.success) { cancelado = true; }
        } catch (err) { console.warn("RPC cancelar falló:", err); }
        if (!cancelado) {
            try {
                const { data, error } = await _s.from('reservas_activas')
                    .update({ estado: 'cancelado_por_pasajero' })
                    .eq('nombre_pasajero', nom)
                    .eq('estado', 'en_curso')
                    .select();
                if (!error && data && data.length > 0) { cancelado = true; }
                else if (!error && (!data || data.length === 0)) { cancelado = true; }
            } catch (err2) { console.error("Directo también falló:", err2); }
        }
        mostrarToast(cancelado ? 'Viaje cancelado' : 'Se limpió la pantalla', cancelado ? 'success' : 'warning');
        limpiarEstadoViaje();
    }

    function posponerSubida() {
        if (timerLlegada) { clearInterval(timerLlegada); timerLlegada = null; }
        document.getElementById('banner-llegada').classList.remove('visible');
        llegadaMostrada = false;
        setTimeout(() => verificarLlegadaCoche(), 15000);
    }

    function activarModoABordo() {
        document.body.classList.remove('viaje-activo');
        document.body.classList.add('a-bordo');
        if (datosViajeActivo && datosViajeActivo.length > 0) {
            const viaje = datosViajeActivo[0];
            const destino = paradas[viaje.destino_idx];
            document.getElementById('info-coche-id').textContent = viaje.id_movil || '--';
            document.getElementById('info-destino-abordo').textContent = destino ? destino.n : '--';
        }
        setTimeout(() => {
            map.invalidateSize();
            if (markerMiCoche) { const latLng = markerMiCoche.getLatLng(); map.setView(latLng, 17); }
        }, 400);
        if (intervaloVerificarLlegada) { clearInterval(intervaloVerificarLlegada); intervaloVerificarLlegada = null; }
    }

    function iniciarEscuchaAnuncios() {
        if (canalRealtime) return;
        if (!miNombrePasajero) return;
        verificarAnuncioPendiente();
        canalRealtime = _s.channel('anuncios-parada-' + miNombrePasajero)
            .on('postgres_changes', {
                event: 'UPDATE', schema: 'public', table: 'reservas_activas',
                filter: 'nombre_pasajero=eq.' + miNombrePasajero
            }, (payload) => {
                const nuevo = payload.new;
                if (nuevo.anuncio_parada && !nuevo.anuncio_visto) {
                    mostrarAnuncioParada(nuevo.anuncio_parada);
                }
            })
            .subscribe((status) => { console.log('Realtime status:', status); });
    }

    async function verificarAnuncioPendiente() {
        try {
            const { data, error } = await _s.from('reservas_activas')
                .select('anuncio_parada, anuncio_visto')
                .eq('nombre_pasajero', miNombrePasajero)
                .eq('estado', 'en_curso')
                .single();
            if (error) throw error;
            if (data && data.anuncio_parada && !data.anuncio_visto) {
                mostrarAnuncioParada(data.anuncio_parada);
            }
        } catch (err) { console.error('Error verificando anuncio pendiente:', err); }
    }

    function mostrarAnuncioParada(mensaje) {
        const panel = document.getElementById('panel-anuncio-parada');

        texto.innerText = mensaje;
        panel.classList.add('visible');
        reproducirAlarmaLlegada();

        if (timerAutoCerrarAnuncio) clearTimeout(timerAutoCerrarAnuncio);
        timerAutoCerrarAnuncio = setTimeout(() => {

        }, 12000);
    }

    async function marcarAnuncioVisto() {
        const panel = document.getElementById('panel-anuncio-parada');
        panel.classList.remove('visible');
        if (timerAutoCerrarAnuncio) { clearTimeout(timerAutoCerrarAnuncio); timerAutoCerrarAnuncio = null; }
        if (!miNombrePasajero) return;
        try { await _s.rpc('marcar_anuncio_visto', { p_nombre: miNombrePasajero }); }
        catch (err) { console.error("Error marcando anuncio visto:", err); }
    }

    let audioCtx = null;
    function inicializarAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function reproducirAlarmaLlegada() {
        inicializarAudio();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime);
        oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15);
        oscillator.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.3);
        gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.8);
        setTimeout(() => {
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2); gain2.connect(audioCtx.destination);
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(440, audioCtx.currentTime);
            gain2.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
            osc2.start(audioCtx.currentTime); osc2.stop(audioCtx.currentTime + 0.6);
        }, 200);
    }
    function vibrarAlarma() {
        if ('vibrate' in navigator) navigator.vibrate([300, 100, 300, 100, 500]);
    }

    window.onload = async () => {
        const nombreGuardado = localStorage.getItem('usuario_nombre');
        if (nombreGuardado) {
            document.getElementById('nombre-input').value = nombreGuardado;
            miNombrePasajero = nombreGuardado;
            await cargarDatosViajeActivo(nombreGuardado);
        }
        setTimeout(() => {
            const splash = document.getElementById('splash');
            if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.style.visibility = 'hidden', 800); }
        }, 2000);
    };

    async function cargarDatosViajeActivo(nombre) {
        miNombrePasajero = nombre;
        try {
            const { data: rpcData, error } = await _s.rpc('obtener_viaje_activo', { p_nombre: nombre });
            if (error) throw error;
            const data = (rpcData && rpcData.viaje && Array.isArray(rpcData.viaje)) ? rpcData.viaje : [];
            if (data.length > 0) {
                miViajeActivo = true;
                datosViajeActivo = data;
                asientosElegidos = data.map(r => r.asiento_num);
                const primerViaje = data[0];
                if (primerViaje.estado_pasajero === 'a_bordo') {
                    pasajeroABordo = true;
                    activarModoABordo();
                    iniciarEscuchaAnuncios();
                }
                if (primerViaje.destino_idx !== undefined) document.getElementById('destino-select').value = primerViaje.destino_idx;
                if (primerViaje.estado_movil && primerViaje.estado_movil.sentido_flujo) document.getElementById('sentido-select').value = primerViaje.estado_movil.sentido_flujo;
                if (primerViaje.destino_idx !== undefined && miLat !== 0) actualizarMapaRuta();
                bloquearPanelParaViajeActivo();
                if (!pasajeroABordo) { iniciarMonitoreoViajeActivo(); iniciarVerificacionLlegada(); }
                iniciarPollingEstado();
            } else { limpiarUI(); }
        } catch (err) { console.error("Error al cargar viaje activo:", err); }
    }

    function iniciarPollingEstado() {
        if (intervaloPolling) clearInterval(intervaloPolling);
        if (pasajeroABordo) return;
        intervaloPolling = setInterval(async () => {
            if (pasajeroABordo || !miNombrePasajero) { clearInterval(intervaloPolling); return; }
            try {
                const { data: rpcData, error } = await _s.rpc('obtener_viaje_activo', { p_nombre: miNombrePasajero });
                if (error) return;
                const data = (rpcData && rpcData.viaje && Array.isArray(rpcData.viaje)) ? rpcData.viaje : [];
                if (data.length > 0 && data[0].estado_pasajero === 'a_bordo') {
                    pasajeroABordo = true;
                    activarModoABordo();
                    iniciarEscuchaAnuncios();
                    clearInterval(intervaloPolling);
                } else if (data.length === 0) { limpiarEstadoViaje(); }
            } catch (e) { console.error('Error polling:', e); }
        }, 5000);
    }

    function iniciarMonitoreoViajeActivo() {
        verificarPosicionCoche();
        intervaloViajeActivo = setInterval(verificarPosicionCoche, 10000);
    }

    async function verificarPosicionCoche() {
        if (!miViajeActivo || !datosViajeActivo || datosViajeActivo.length === 0) return;
        if (pasajeroABordo) return;
        const viaje = datosViajeActivo[0];
        const idMovil = viaje.id_movil;
        const sentido = (viaje.estado_movil && viaje.estado_movil.sentido_flujo) ? viaje.estado_movil.sentido_flujo : document.getElementById('sentido-select').value;
        const paradaPasajero = calcularParadaMasCerca(viaje.pasajero_lat || miLat, viaje.pasajero_lon || miLon);
        try {
            const { data: rpcData, error } = await _s.rpc('verificar_posicion_coche', { p_id_movil: idMovil });
            if (error || !rpcData || !rpcData.encontrado) return;
            const movil = rpcData;
            const paradaCoche = calcularParadaMasCerca(movil.lat, movil.lon);
            const puedeRecoger = movilPuedeRecoger(paradaCoche, paradaPasajero, sentido);
            if (!puedeRecoger && !cocheYaPaso) { cocheYaPaso = true; mostrarAlertaCochePasado(); }
            else if (puedeRecoger && cocheYaPaso) { cocheYaPaso = false; actualizarPanelViajeActivo(false); }
            actualizarMarcadorMiCoche(movil.lat, movil.lon, cocheYaPaso);
        } catch (err) { console.error("Error verificando posicion:", err); }
    }

    function mostrarAlertaCochePasado() {
        actualizarPanelViajeActivo(true);
        const container = document.getElementById('viaje-activo-container');
        const panel = container.querySelector('.viaje-activo-panel');
        if (panel) {
            const alertaExistente = panel.querySelector('.alerta-parada');
            if (!alertaExistente) {
                const alerta = document.createElement('div');
                alerta.className = 'alerta-parada';
                alerta.innerHTML = '<div class="alerta-parada-texto">EL COCHE YA PASO TU PARADA</div><div class="alerta-parada-sub">El conductor no puede retroceder. Finaliza el viaje para liberar tu asiento.</div>';
                const statusElement = panel.querySelector('.viaje-activo-status');
                if (statusElement) panel.insertBefore(alerta, statusElement);
            }
        }
        const btn = document.getElementById('btn-cancelar');
        btn.innerText = "FINALIZAR VIAJE (COCHE PASO)";
        btn.style.background = "linear-gradient(135deg, #ff4444, #c0392b)";
    }

    function actualizarPanelViajeActivo(alerta) {
        const container = document.getElementById('viaje-activo-container');
        const panel = container.querySelector('.viaje-activo-panel');
        if (!panel) return;
        if (alerta) {
            panel.classList.add('alerta-pasado');
            const status = panel.querySelector('.viaje-activo-status');
            if (status) { status.classList.add('alerta'); status.innerHTML = '<div class="status-dot alerta"></div><span>COCHE YA PASO - NO PUEDE RETROCEDER</span>'; }
        } else {
            panel.classList.remove('alerta-pasado');
            const status = panel.querySelector('.viaje-activo-status');
            if (status) { status.classList.remove('alerta'); status.innerHTML = '<div class="status-dot"></div><span>Conductor en camino...</span>'; }
        }
    }

    function actualizarMarcadorMiCoche(lat, lon, pasado) {
        if (markerMiCoche) map.removeLayer(markerMiCoche);
        const icono = pasado ? L.divIcon({ html: '<div style="font-size:30px; opacity:0.5; filter: grayscale(1);">🚕</div>', iconAnchor: [15, 15] }) : iconMiCoche;
        markerMiCoche = L.marker([lat, lon], { icon: icono, zIndexOffset: 1000 }).addTo(map);
        if (pasado && miLat !== 0) map.fitBounds(L.latLngBounds([miLat, miLon], [lat, lon]), { padding: [100, 100] });
    }

    function bloquearPanelParaViajeActivo() {
        document.body.classList.add('viaje-activo');
        document.getElementById('btn-pedir').style.display = 'none';
        document.getElementById('btn-cancelar').style.display = 'block';
        document.getElementById('nombre-input').disabled = true;
        document.getElementById('destino-select').disabled = true;
        document.getElementById('sentido-select').disabled = true;
        renderizarPanelViajeActivo();
        setTimeout(() => map.invalidateSize(), 350);
    }

    function renderizarPanelViajeActivo() {
        const container = document.getElementById('viaje-activo-container');
        container.style.display = 'block';
        if (!datosViajeActivo || datosViajeActivo.length === 0) { container.innerHTML = '<div class="sin-coches">Ya tenes un viaje activo</div>'; return; }
        const viaje = datosViajeActivo[0];
        const movil = viaje.estado_movil || {};
        const destino = paradas[viaje.destino_idx] || {n: 'Destino'};
        const asientos = datosViajeActivo.map(v => v.asiento_num).join(', ');
        const estadoPax = viaje.estado_pasajero || 'esperando';
        container.innerHTML = '';
        const panel = document.createElement('div');
        panel.className = 'viaje-activo-panel';
        panel.id = 'viaje-activo-panel';
        const header = document.createElement('div');
        header.className = 'viaje-activo-header';
        const icono = document.createElement('div');
        icono.className = 'viaje-activo-icono';
        icono.textContent = estadoPax === 'a_bordo' ? '✅' : '🚗';
        const titulo = document.createElement('div');
        titulo.className = 'viaje-activo-titulo';
        titulo.innerHTML = '<p class="coche-numero">Coche ' + (viaje.id_movil || '---') + '</p><p class="conductor-nombre">' + (movil.chofer || 'Conductor') + '</p>';
        header.appendChild(icono); header.appendChild(titulo); panel.appendChild(header);
        const infoBox = document.createElement('div');
        infoBox.className = 'viaje-activo-info';
        infoBox.innerHTML = '<div class="info-box"><div class="info-box-label">Asiento(s)</div><div class="info-box-valor">' + asientos + '</div></div><div class="info-box"><div class="info-box-label">Tarifa</div><div class="info-box-valor">$' + (datosViajeActivo.length * 1000) + '</div></div>';
        panel.appendChild(infoBox);
        const destinoDiv = document.createElement('div');
        destinoDiv.className = 'viaje-activo-destino';
        destinoDiv.textContent = 'Destino: ' + destino.n;
        panel.appendChild(destinoDiv);
        const status = document.createElement('div');
        status.className = 'viaje-activo-status';
        status.id = 'viaje-status';
        if (estadoPax === 'a_bordo') status.innerHTML = '<div class="status-dot" style="background:#00d2ff;animation:none;box-shadow:0 0 8px #00d2ff;"></div><span>Ya estas a bordo - Viajando a destino</span>';
        else status.innerHTML = '<div class="status-dot"></div><span>Conductor en camino...</span>';
        panel.appendChild(status);
        container.appendChild(panel);
    }

    navigator.geolocation.watchPosition(p => {
        miLat = p.coords.latitude; miLon = p.coords.longitude;
        markerPasajero.setLatLng([miLat, miLon]);
        actualizarMapaRuta();
        if (!gpsListo) {
            gpsListo = true;
            document.getElementById('btn-pedir').disabled = false;
            if (!miViajeActivo) document.getElementById('btn-pedir').innerText = "SELECCIONA TU DESTINO";
        }
    }, (err) => { console.error("GPS Error:", err); document.getElementById('btn-pedir').innerText = "GPS NO DISPONIBLE"; }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });

    function actualizarMapaRuta() {
        const val = document.getElementById('destino-select').value;
        if (val !== "" && miLat !== 0) {
            const dest = paradas[val].c;
            guiaDestino.setLatLngs([[miLat, miLon], dest]);
            markerDestinoFlecha.setLatLng(dest).addTo(map);
            const bounds = L.latLngBounds([miLat, miLon], dest);
            map.fitBounds(bounds, { padding: [80, 80] });
        }
    }

    document.getElementById('destino-select').addEventListener('change', () => { actualizarMapaRuta(); renderizarFlotaDisponible(); });
    document.getElementById('sentido-select').addEventListener('change', () => { renderizarFlotaDisponible(); });

    function seleccionarAsiento(cocheId, numAsiento) {
        if (miViajeActivo) return;
        if (cocheSeleccionado && cocheSeleccionado !== cocheId) {
            asientosElegidos = [];
            document.querySelectorAll('.asiento-libre').forEach(el => el.classList.remove('seleccionado'));
            document.querySelectorAll('.coche-card').forEach(el => el.classList.remove('seleccionado'));
        }
        cocheSeleccionado = cocheId;
        const idx = asientosElegidos.indexOf(numAsiento);
        const el = document.getElementById('as-' + cocheId + '-' + numAsiento);
        if (idx > -1) {
            asientosElegidos.splice(idx, 1);
            if (el) el.classList.remove('seleccionado');
        } else {
            if (asientosElegidos.length >= 2) { alert("Maximo 2 asientos por pasajero"); return; }
            asientosElegidos.push(numAsiento);
            if (el) el.classList.add('seleccionado');
        }
        document.querySelectorAll('.coche-card').forEach(el => el.classList.remove('seleccionado'));
        const card = document.getElementById('coche-card-' + cocheId);
        if (card) card.classList.add('seleccionado');
        actualizarBoton();
    }

    function actualizarBoton() {
        const btn = document.getElementById('btn-pedir');
        let nuevoTexto = '', nuevoDisabled = true;
        if (!gpsListo) nuevoTexto = "BUSCANDO GPS...";
        else if (!document.getElementById('destino-select').value) nuevoTexto = "SELECCIONA TU DESTINO";
        else if (asientosElegidos.length > 0) { nuevoTexto = 'RESERVAR ' + asientosElegidos.length + ' ASIENTO(S)'; nuevoDisabled = false; }
        else nuevoTexto = "SELECCIONA UN ASIENTO";
        if (nuevoTexto !== ultimoEstadoBoton) { btn.innerText = nuevoTexto; btn.disabled = nuevoDisabled; ultimoEstadoBoton = nuevoTexto; }
    }

    async function renderizarFlotaDisponible() {
        if (miViajeActivo) return;
        const container = document.getElementById('flota-container');
        const sentido = document.getElementById('sentido-select').value;
        const destIdx = document.getElementById('destino-select').value;
        if (!destIdx) { container.innerHTML = '<div class="sin-coches">Selecciona tu destino para ver coches</div>'; ultimaFlotaHTML = ''; actualizarBoton(); return; }
        if (!gpsListo) { container.innerHTML = '<div class="sin-coches">Esperando señal GPS...</div>'; ultimaFlotaHTML = ''; actualizarBoton(); return; }
        container.innerHTML = '<div class="sin-coches"><span class="spinner"></span>Buscando moviles...</div>';
        actualizarBoton();
        try {
            const { data: rpcData, error: errMoviles } = await _s.rpc('obtener_flota', { p_sentido: sentido, p_destino_idx: parseInt(destIdx), p_lat: miLat, p_lon: miLon });
            if (errMoviles) throw errMoviles;
            const movilesRaw = (rpcData && rpcData.moviles) ? rpcData.moviles : [];
            const moviles = movilesRaw || [];
            const movilesConParada = moviles.map(m => ({ ...m, paradaCalculada: calcularParadaMasCerca(m.latitud, m.longitud), distancia: m.distancia || Math.sqrt(Math.pow(miLat - m.latitud, 2) + Math.pow(miLon - m.longitud, 2)) }));
            const movilesValidos = movilesConParada.filter(m => movilPuedeRecoger(m.paradaCalculada, parseInt(destIdx), sentido)).sort((a, b) => a.distancia - b.distancia);
            if (movilesValidos.length === 0) { container.innerHTML = '<div class="sin-coches"><b>No hay moviles disponibles</b><br>Todos ya pasaron tu parada o no hay online</div>'; ultimaFlotaHTML = ''; ultimoEstadoBoton = ''; actualizarBoton(); return; }
            let hayCochesConLugar = false;
            container.innerHTML = '';
            for (const movil of movilesValidos) {
                const asientosOcupados = {};
                const ocupadosArray = movil.asientos_ocupados || [];
                ocupadosArray.forEach(r => { asientosOcupados[r.asiento_num] = r.nombre_pasajero; });
                const asientosLibres = [1,2,3,4].filter(n => !asientosOcupados[n]);
                if (asientosLibres.length > 0) hayCochesConLugar = true;
                const estaSeleccionado = cocheSeleccionado === movil.id;
                const distanciaKm = (movil.distancia * 111).toFixed(1);
                const card = document.createElement('div');
                card.className = 'coche-card ' + (estaSeleccionado ? 'seleccionado' : '');
                card.id = 'coche-card-' + movil.id;
                card.innerHTML = '<div class="coche-header"><div><span class="coche-num">Coche ' + movil.id + '</span><div class="coche-info">' + (movil.chofer || 'Conductor') + '</div></div><div class="coche-dist">' + distanciaKm + ' km</div></div><div class="asientos-row" id="asientos-row-' + movil.id + '"></div><div class="coche-info" style="margin-top:4px;text-align:center;" id="disp-' + movil.id + '"></div>';
                const asientosRow = card.querySelector('#asientos-row-' + movil.id);
                for (let num = 1; num <= 4; num++) {
                    const nombreOcupante = asientosOcupados[num];
                    const seleccionado = estaSeleccionado && asientosElegidos.includes(num);
                    const asientoBox = document.createElement('div');
                    asientoBox.className = 'asiento-box ' + (nombreOcupante ? 'asiento-ocupado' : 'asiento-libre') + ' ' + (seleccionado ? 'seleccionado' : '');
                    asientoBox.id = 'as-' + movil.id + '-' + num;
                    if (!nombreOcupante) asientoBox.onclick = () => seleccionarAsiento(movil.id, num);
                    if (nombreOcupante) {
                        const nombreLimpio = escaparHTML(sanitizarInput(nombreOcupante));
                        const nombreCorto = nombreLimpio.length > 7 ? nombreLimpio.substring(0,6)+'...' : nombreLimpio;
                        asientoBox.innerHTML = '<div class="asiento-num">' + num + '</div><div class="asiento-nombre">' + nombreCorto + '</div><div class="asiento-lock">🔒</div>';
                        asientoBox.title = nombreLimpio;
                    } else {
                        asientoBox.innerHTML = '<div class="asiento-num">' + num + '</div><div style="font-size:9px;">LIBRE</div>';
                    }
                    asientosRow.appendChild(asientoBox);
                }
                const disp = card.querySelector('#disp-' + movil.id);
                if (asientosLibres.length === 0) disp.innerHTML = '<span style="color:#ff4444;">LLENO</span>';
                else if (asientosLibres.length === 4) disp.innerHTML = '<span style="color:#4cd964;">Todos libres</span>';
                else disp.textContent = asientosLibres.length + ' libre(s)';
                container.appendChild(card);
            }
            if (!hayCochesConLugar) { container.innerHTML = '<div class="sin-coches"><b>Todos los moviles estan llenos</b><br>Intenta en unos minutos</div>'; ultimaFlotaHTML = ''; ultimoEstadoBoton = ''; actualizarBoton(); return; }
            ultimaFlotaHTML = container.innerHTML;
            actualizarBoton();
        } catch (err) {
            console.error("Error:", err);
            container.innerHTML = '<div class="sin-coches"><b>Error de conexion</b><br>Verifica tu internet</div>';
            ultimaFlotaHTML = ''; ultimoEstadoBoton = ''; actualizarBoton();
        }
    }

    async function confirmarViajePasajero() {
        const nomRaw = document.getElementById('nombre-input').value.trim();
        const nom = sanitizarInput(nomRaw);
        if (!nom || nom.length < 2) { alert("Ingresa un nombre valido (solo letras, maximo 20 caracteres)."); document.getElementById('nombre-input').value = ''; return; }
        document.getElementById('nombre-input').value = nom;
        const destIdx = parseInt(document.getElementById('destino-select').value);
        if (isNaN(destIdx)) { alert("Selecciona una parada de destino."); return; }
        if (!cocheSeleccionado || asientosElegidos.length === 0) { alert("Selecciona un coche y al menos un asiento."); return; }
        const btn = document.getElementById('btn-pedir');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>RESERVANDO...';
        try {
            const { data: rpcData, error } = await _s.rpc('reservar_asientos', { p_nombre: nom, p_id_movil: cocheSeleccionado, p_asientos: asientosElegidos, p_destino_idx: destIdx, p_lat: miLat, p_lon: miLon });
            if (error) throw error;
            if (rpcData && rpcData.colision) { alert("Algunos asientos ya fueron tomados. Eleji otros."); asientosElegidos = []; cocheSeleccionado = null; ultimaFlotaHTML = ''; renderizarFlotaDisponible(); return; }
            if (rpcData && rpcData.success) {
                localStorage.setItem('usuario_nombre', nom);
                miNombrePasajero = nom;
                location.reload();
            } else { throw new Error("Respuesta inesperada del servidor"); }
        } catch (err) {
            console.error("Error:", err);
            alert(err.message || "Error de conexion.");
            btn.disabled = false;
            btn.innerText = "SELECCIONA UN ASIENTO";
        }
    }

    async function finalizarViaje() {
        const btn = document.getElementById('btn-cancelar');
        let nombreFinal = miNombrePasajero;
        if (!nombreFinal) { nombreFinal = document.getElementById('nombre-input').value.trim(); }
        if (!nombreFinal) {
            const nombreGuardado = localStorage.getItem('usuario_nombre');
            if (nombreGuardado) { nombreFinal = nombreGuardado; miNombrePasajero = nombreGuardado; }
        }
        if (!nombreFinal) { alert("Error: No se encontro tu nombre."); btn.disabled = false; btn.innerText = "TERMINAR MI VIAJE"; return; }
        if (btn.disabled) return;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>FINALIZANDO...';
        let finalizado = false;
        try {
            const { data: rpcData, error } = await _s.rpc('finalizar_viaje', { p_nombre: nombreFinal });
            if (!error && rpcData && rpcData.success) { finalizado = true; }
        } catch (err) { console.warn("RPC finalizar fallo:", err); }
        if (!finalizado) {
            try {
                const { data, error } = await _s.from('reservas_activas')
                    .update({ estado: 'finalizado' })
                    .eq('nombre_pasajero', nombreFinal)
                    .eq('estado', 'en_curso')
                    .select();
                if (!error && data && data.length > 0) { finalizado = true; }
                else if (!error && (!data || data.length === 0)) { finalizado = true; }
            } catch (err2) { console.error("Directo tambien fallo:", err2); }
        }
        mostrarToast(finalizado ? 'Viaje finalizado' : 'Se limpio la pantalla', finalizado ? 'success' : 'warning');
        limpiarEstadoViaje();
    }

    function limpiarEstadoViaje() {
        if (intervaloViajeActivo) clearInterval(intervaloViajeActivo);
        if (intervaloVerificarLlegada) clearInterval(intervaloVerificarLlegada);
        if (timerLlegada) clearInterval(timerLlegada);
        if (intervaloPolling) clearInterval(intervaloPolling);
        if (timerAutoCerrarAnuncio) clearTimeout(timerAutoCerrarAnuncio);
        if (canalRealtime) { try { canalRealtime.unsubscribe(); } catch(e) { console.log("Error unsubscribing:", e); } canalRealtime = null; }
        localStorage.removeItem('usuario_nombre');
        miNombrePasajero = '';
        miViajeActivo = false;
        pasajeroABordo = false;
        asientosElegidos = [];
        cocheSeleccionado = null;
        datosViajeActivo = null;
        cocheYaPaso = false;
        llegadaMostrada = false;
        limpiarUI();
        const splash = document.getElementById('splash');
        if (splash) splash.style.visibility = 'hidden';
        location.reload();
    }

    function limpiarUI() {
        document.body.classList.remove('viaje-activo', 'a-bordo');
        document.getElementById('btn-pedir').style.display = 'block';
        document.getElementById('btn-cancelar').style.display = 'none';
        document.getElementById('nombre-input').disabled = false;
        document.getElementById('destino-select').disabled = false;
        document.getElementById('sentido-select').disabled = false;
        document.getElementById('viaje-activo-container').style.display = 'none';
        document.getElementById('viaje-activo-container').innerHTML = '';
        document.getElementById('btn-cancelar').innerText = "TERMINAR MI VIAJE";
        document.getElementById('btn-cancelar').style.background = "linear-gradient(135deg, #ff3b30, #c0392b)";
    }

    async function actualizarMapaTaxis() {
        const sentidoSeleccionado = document.getElementById('sentido-select').value;
        const destIdx = document.getElementById('destino-select').value;
        try {
            const { data: rpcData, error } = await _s.rpc('obtener_taxis', { p_sentido: sentidoSeleccionado });
            if (error) throw error;
            const moviles = (rpcData && Array.isArray(rpcData)) ? rpcData : (rpcData && rpcData.taxis && Array.isArray(rpcData.taxis)) ? rpcData.taxis : [];
            if (moviles.length > 0) {
                const idsOnline = moviles.map(m => m.id.toString());
                Object.keys(markerTaxis).forEach(id => {
                    if (!idsOnline.includes(id)) { map.removeLayer(markerTaxis[id]); delete markerTaxis[id]; }
                });
                moviles.forEach(t => {
                    let yaPaso = false;
                    if (destIdx !== "") { const paradaMovil = calcularParadaMasCerca(t.latitud || t.lat, t.longitud || t.lon); yaPaso = !movilPuedeRecoger(paradaMovil, parseInt(destIdx), sentidoSeleccionado); }
                    const iconoUsar = yaPaso ? iconTPasado : iconT;
                    const lat = t.latitud || t.lat || 0;
                    const lon = t.longitud || t.lon || 0;
                    if (markerTaxis[t.id]) { markerTaxis[t.id].setLatLng([lat, lon]); markerTaxis[t.id].setIcon(iconoUsar); }
                    else { markerTaxis[t.id] = L.marker([lat, lon], { icon: iconoUsar }).addTo(map); }
                });
            }
        } catch (err) { console.error("Error actualizando flota:", err); }
    }

    setInterval(() => { if (!miViajeActivo) actualizarMapaTaxis(); }, 15000);
    actualizarMapaTaxis();
</script>
