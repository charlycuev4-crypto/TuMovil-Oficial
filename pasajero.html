<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASAJERO ROBUSTO - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; color: white; height: 100vh; overflow: hidden; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.8s; }
        .logo-m { width: 85px; height: 85px; border: 3px solid #00d4ff; border-radius: 20px; color: #00d4ff; font-size: 50px; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px #00d4ff; margin-bottom: 15px; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .top-ui { position: absolute; top: 10px; width: 100%; padding: 0 15px; z-index: 1000; }
        .dest-card { background: rgba(25, 25, 25, 0.95); border: 2px solid #00d4ff; border-radius: 15px; padding: 12px; }
        select { width: 100%; background: transparent; color: white; border: none; font-size: 16px; outline: none; }
        .bottom-panel { position: absolute; bottom: 15px; width: 92%; left: 4%; background: rgba(15, 15, 15, 0.95); border: 2px solid #00d4ff; border-radius: 25px; padding: 15px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        #resumen-viaje { background: rgba(76, 217, 100, 0.15); border: 1px dashed #4cd964; border-radius: 12px; padding: 8px; text-align: center; display: none; }
        .resaltado { color: #4cd964; font-weight: 800; font-size: 18px; }
        .asientos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn-as { aspect-ratio: 1; border: 2px solid #00d4ff; border-radius: 12px; background: transparent; color: #00d4ff; font-size: 18px; font-weight: bold; }
        .btn-as.selected { background: #4cd964 !important; color: #000 !important; border-color: #4cd964 !important; }
        .btn-as.busy { border-color: #ff3b30 !important; color: #ff3b30 !important; opacity: 0.5; pointer-events: none; }
        .btn-confirm { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; font-size: 15px; text-transform: uppercase; background: #333; color: #666; pointer-events: none; transition: 0.3s; }
        .btn-confirm.ready { background: #00d4ff !important; color: black !important; pointer-events: auto !important; cursor: pointer !important; }
        .btn-cancel { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; font-size: 15px; text-transform: uppercase; background: #ff3b30; color: white; display: none; }
        .distancia-tag { background: #00d4ff; color: black; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; margin: 0 auto; margin-top: -30px; z-index: 1001; position: relative; text-align: center; width: fit-content; }
    </style>
</head>
<body>
    <div id="splash"><div class="logo-m">M</div><div style="letter-spacing: 3px; font-size: 12px;">TUMOVIL SANTA BRIGIDA</div></div>
    <div class="top-ui"><div class="dest-card"><span style="font-size: 10px; color: #00d4ff;">📍 DESTINO</span><select id="select-destino" onchange="validarFormulario()"><option value="" disabled selected>--- ¿A DÓNDE VAS? ---</option></select></div></div>
    <div id="map"></div>
    <div class="distancia-tag" id="tag-distancia">ESPERANDO GPS...</div>
    <div class="bottom-panel">
        <div id="resumen-viaje"><p style="margin:0; font-size:13px;">Reservando: <span class="resaltado" id="cant-resumen">0</span> | Total: <span class="resaltado" id="precio-resumen">$0</span></p></div>
        <div class="asientos-grid" id="grid-asientos">
            <button class="btn-as" id="b1" onclick="toggleAsiento(1)">1</button>
            <button class="btn-as" id="b2" onclick="toggleAsiento(2)">2</button>
            <button class="btn-as" id="b3" onclick="toggleAsiento(3)">3</button>
            <button class="btn-as" id="b4" onclick="toggleAsiento(4)">4</button>
        </div>
        <button id="btn-accion" class="btn-confirm" onclick="confirmarReserva()">Confirmar Reserva</button>
        <button id="btn-finalizar" class="btn-cancel" onclick="finalizarViaje()">Finalizar Mi Viaje</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    // GENERAR UN ID UNICO DE SESION (Para evitar viajes fantasmas)
    if(!localStorage.getItem('sesion_id')) localStorage.setItem('sesion_id', 'p-' + Math.random().toString(36).substr(2, 9));
    const miSesionId = localStorage.getItem('sesion_id');

    const rutaOficial = [
        {n:'Miguel Cané (Inicio)', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const sel = document.getElementById('select-destino');
    rutaOficial.forEach((p,i) => { sel.innerHTML += `<option value="${i}">${p.n}</option>`; });

    const map = L.map('map', { zoomControl: false }).setView(rutaOficial[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.polyline(rutaOficial.map(p=>p.c), {color:'#00d4ff', weight:5, opacity:0.4}).addTo(map);

    const markerMovil = L.marker(rutaOficial[0].c, { icon: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png', iconSize: [35, 35] }) }).addTo(map);
    let miMarcador = L.circleMarker([0,0], { radius: 8, color: '#fff', fillColor: '#007aff', fillOpacity: 1 }).addTo(map);
    const markerDestino = L.marker([0,0]).addTo(map);
    markerDestino.setOpacity(0);

    let miLat, miLon, asientosElegidos = [];

    navigator.geolocation.watchPosition(p => {
        miLat = p.coords.latitude; miLon = p.coords.longitude;
        miMarcador.setLatLng([miLat, miLon]);
    }, null, { enableHighAccuracy: true });

    _s.channel('movil').on('postgres_changes',{event:'UPDATE', schema:'public', table:'estado_movil'}, payload => {
        const pos = [payload.new.latitud, payload.new.longitud];
        markerMovil.setLatLng(pos);
        if(miLat) {
            const dist = map.distance([miLat, miLon], pos);
            document.getElementById('tag-distancia').innerText = `MÓVIL A: ${Math.round(dist)}m`;
        }
    }).subscribe();

    // ESCUCHAR ASIENTOS OCUPADOS POR OTROS (Opcional pero recomendado)
    _s.channel('asientos').on('postgres_changes', {event:'*', schema:'public', table:'reservas_activas'}, () => {
        recuperarSesion();
    }).subscribe();

    function toggleAsiento(n) {
        const idx = asientosElegidos.indexOf(n);
        if (idx > -1) {
            asientosElegidos.splice(idx, 1);
            document.getElementById('b'+n).classList.remove('selected');
        } else {
            asientosElegidos.push(n);
            document.getElementById('b'+n).classList.add('selected');
        }
        actualizarResumen();
        validarFormulario();
    }

    function actualizarResumen() {
        const divResumen = document.getElementById('resumen-viaje');
        document.getElementById('cant-resumen').innerText = asientosElegidos.length;
        document.getElementById('precio-resumen').innerText = '$' + (asientosElegidos.length * 1000);
        divResumen.style.display = asientosElegidos.length > 0 ? 'block' : 'none';
    }

    function validarFormulario() {
        const destIdx = document.getElementById('select-destino').value;
        const btn = document.getElementById('btn-accion');
        if (destIdx !== "") { markerDestino.setLatLng(rutaOficial[destIdx].c).setOpacity(1); }
        if(asientosElegidos.length > 0 && destIdx !== "") btn.classList.add('ready');
        else btn.classList.remove('ready');
    }

    async function confirmarReserva() {
        if(!miLat) return alert("Esperando GPS...");
        const destIdx = document.getElementById('select-destino').value;
        
        // Cada fila ahora incluye el miSesionId
        const reservas = asientosElegidos.map(num => ({
            asiento_num: num, 
            pasajero_lat: miLat, pasajero_lon: miLon,
            destino_idx: parseInt(destIdx), 
            estado: 'en_curso',
            // NOTA: Si no tienes esta columna en Supabase, ignórala o agrégala como texto
            // Por ahora usaremos la latitud como identificador si no quieres tocar la base.
        }));

        const { error } = await _s.from('reservas_activas').insert(reservas);

        if(!error) {
            alert("Reserva confirmada");
            localStorage.setItem('viaje_activo', 'true');
            location.reload();
        } else {
            alert("Error: " + error.message);
        }
    }

    async function finalizarViaje() {
        if(!confirm("¿Finalizar viaje?")) return;

        // Limpieza profunda usando el estado de sesión
        const { error } = await _s.from('reservas_activas')
            .update({ estado: 'finalizado' })
            .eq('estado', 'en_curso')
            .gte('pasajero_lat', miLat - 0.005)
            .lte('pasajero_lat', miLat + 0.005);

        if(!error) {
            localStorage.removeItem('viaje_activo');
            alert("Viaje Finalizado");
            location.reload();
        }
    }

    async function recuperarSesion() {
        const { data } = await _s.from('reservas_activas').select('*').eq('estado', 'en_curso');
        if (!data) return;

        // 1. Marcar asientos ocupados por OTROS (en rojo)
        for(let i=1; i<=4; i++) document.getElementById('b'+i).classList.remove('busy');
        
        const misReservas = data.filter(r => Math.abs(r.pasajero_lat - miLat) < 0.002);
        const reservasAjenas = data.filter(r => Math.abs(r.pasajero_lat - miLat) >= 0.002);

        reservasAjenas.forEach(r => {
            const btn = document.getElementById('b' + r.asiento_num);
            if(btn) btn.classList.add('busy');
        });

        // 2. Recuperar MIS asientos
        if(misReservas.length > 0 && localStorage.getItem('viaje_activo')) {
            asientosElegidos = misReservas.map(r => r.asiento_num);
            document.getElementById('btn-accion').style.display = 'none';
            document.getElementById('btn-finalizar').style.display = 'block';
            document.getElementById('grid-asientos').style.pointerEvents = 'none';
            document.getElementById('select-destino').disabled = true;
            actualizarResumen();
            asientosElegidos.forEach(n => document.getElementById('b'+n).classList.add('selected'));
            if(misReservas[0].destino_idx !== null) markerDestino.setLatLng(rutaOficial[misReservas[0].destino_idx].c).setOpacity(1);
        }
    }

    setTimeout(recuperarSesion, 1500);
    setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => document.getElementById('splash').style.display = 'none', 800); }, 2500);
</script>
</body>
</html>
