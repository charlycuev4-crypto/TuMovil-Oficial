<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASAJERO - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .ui-overlay { position: absolute; width: 100%; z-index: 1000; pointer-events: none; }
        .top-info { top: 10px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .info-box { background: rgba(0,0,0,0.9); border: 2px solid #4cd964; border-radius: 12px; padding: 10px; width: 90%; text-align: center; color: #4cd964; font-weight: bold; pointer-events: auto; }
        .bottom-ui { bottom: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .booking-panel { background: rgba(18,18,18,0.95); border: 3px solid #00d4ff; border-radius: 20px; padding: 15px; width: 90%; pointer-events: auto; }
        .taxi-icon { font-size: 25px; }
        .user-icon { font-size: 20px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-overlay top-info">
        <div class="info-box" id="status">BUSCANDO MÓVIL EN VIVO...</div>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    // Mapa centrado en la zona de trabajo
    const map = L.map('map', { zoomControl: false }).setView([-34.566, -58.742], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Iconos
    const iconTaxi = L.divIcon({ html: '🚕', className: 'taxi-icon', iconAnchor: [12, 12] });
    const iconUser = L.divIcon({ html: '👤', className: 'user-icon', iconAnchor: [10, 10] });

    let marcadorTaxi = L.marker([0,0], { icon: iconTaxi }).addTo(map);
    let marcadorYo = L.marker([0,0], { icon: iconUser }).addTo(map);

    // 1. VER AL CONDUCTOR EN TIEMPO REAL
    async function seguirConductor() {
        const { data, error } = await _s.from('estado_movil').select('*').eq('id', 1).single();
        if (data) {
            const pos = [data.latitud, data.longitud];
            marcadorTaxi.setLatLng(pos);
            document.getElementById('status').innerText = "MÓVIL EN CAMINO 🚕";
            document.getElementById('status').style.borderColor = "#4cd964";
        }
    }

    // 2. VER MI PROPIA UBICACIÓN
    navigator.geolocation.watchPosition(p => {
        const myPos = [p.coords.latitude, p.coords.longitude];
        marcadorYo.setLatLng(myPos);
        // Si es la primera vez, centramos el mapa en el usuario
        if (marcadorYo.getLatLng().lat === 0) map.setView(myPos, 15);
    }, err => console.error("Error GPS pasajero"), { enableHighAccuracy: true });

    // Escuchar cambios de Supabase cada 5 segundos para no saturar
    setInterval(seguirConductor, 5000);
    seguirConductor();

</script>
</body>
</html>
