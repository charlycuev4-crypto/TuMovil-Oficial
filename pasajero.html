<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let misAsientosLocal = [];
    let ultimoMontoPagado = 0; 
    let viajeConfirmado = false; 
    const PRECIO_ASIENTO = 1000;
    let miPos = null;

    const rutaCompleta = [
        {n:'Miguel Cané (Inicio)', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(rutaCompleta[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.polyline(rutaCompleta.map(p=>p.c), {color:'#00d4ff', weight:5, opacity:0.7}).addTo(map);
    const busIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [38, 38] });
    let markerBus = L.marker(rutaCompleta[0].c, { icon: busIcon }).addTo(map);
    let markerDest = null;

    const sel = document.getElementById('sel-p');
    rutaCompleta.forEach((p,i)=>{ let o=document.createElement('option'); o.value=i; o.text=p.n; sel.add(o); });

    // GPS del Pasajero
    navigator.geolocation.watchPosition(p => { 
        miPos = [p.coords.latitude, p.coords.longitude]; 
    }, null, {enableHighAccuracy:true});

    function marcarDestino() {
        const p = rutaCompleta[sel.value];
        if(markerDest) map.removeLayer(markerDest);
        markerDest = L.marker(p.c).addTo(map).bindPopup(p.n).openPopup();
        map.flyTo(p.c, 16);
    }

    function toggleSeleccion(n) {
        if (viajeConfirmado) return;
        const btn = document.getElementById('as' + n);
        if (btn.classList.contains('ocupado')) return;
        if (misAsientosLocal.includes(n)) {
            misAsientosLocal = misAsientosLocal.filter(id => id !== n);
            btn.classList.remove('seleccionado-local');
        } else {
            misAsientosLocal.push(n);
            btn.classList.add('seleccionado-local');
        }
        actualizarUI();
    }

    function actualizarUI() {
        const totalActual = misAsientosLocal.length * PRECIO_ASIENTO;
        const visorMonto = document.getElementById('monto');
        
        if (viajeConfirmado) {
            visorMonto.innerText = `$${ultimoMontoPagado}`;
            document.getElementById('btn-confirmar').style.display = 'none';
            document.getElementById('btn-finalizar').style.display = 'block';
        } else {
            visorMonto.innerText = totalActual > 0 ? `$${totalActual}` : "$0";
            document.getElementById('btn-confirmar').style.display = misAsientosLocal.length > 0 ? 'block' : 'none';
            document.getElementById('btn-finalizar').style.display = 'none';
        }
    }

    async function confirmarReserva() {
        if (misAsientosLocal.length === 0 || !miPos) {
            alert("Selecciona asientos y activa tu GPS");
            return;
        }
        
        const { data } = await _s.from('estado_movil').select('asientos_libres').eq('id', 1).single();
        const dest = rutaCompleta[sel.value].c;

        if(data && data.asientos_libres >= misAsientosLocal.length) {
            ultimoMontoPagado = misAsientosLocal.length * PRECIO_ASIENTO; 
            
            const { error } = await _s.from('estado_movil').update({ 
                asientos_libres: data.asientos_libres - misAsientosLocal.length,
                pasa_lat_origen: miPos[0], 
                pasa_lng_origen: miPos[1],
                pasa_lat_destino: dest[0], 
                pasa_lng_destino: dest[1]
            }).eq('id', 1);

            if(!error) {
                viajeConfirmado = true;
                misAsientosLocal = []; 
                actualizarUI();
                alert("¡Reserva confirmada! El conductor ya tiene tu destino.");
            }
        } else {
            alert("No hay suficientes asientos disponibles.");
        }
    }

    async function liberarAsiento() {
        // Obtenemos el estado actual para devolver los asientos correctos
        const { data } = await _s.from('estado_movil').select('asientos_libres').eq('id', 1).single();
        
        // RESET TOTAL: Limpiamos coordenadas y liberamos asientos
        // Calculamos cuántos asientos liberar (puedes poner 4 directo si es un solo pasajero)
        const { error } = await _s.from('estado_movil').update({ 
            asientos_libres: 4, 
            pasa_lat_origen: null, 
            pasa_lng_origen: null,
            pasa_lat_destino: null, 
            pasa_lng_destino: null
        }).eq('id', 1);

        if (!error) {
            viajeConfirmado = false; 
            ultimoMontoPagado = 0;
            document.querySelectorAll('.btn-as').forEach(b => b.classList.remove('seleccionado-local'));
            actualizarUI();
            alert("Viaje finalizado. ¡Gracias!");
            location.reload(); // Limpiamos la app
        }
    }

    // Escucha de cambios del Conductor y otros Pasajeros
    _s.channel('cambios').on('postgres_changes', {event:'UPDATE', schema:'public', table:'estado_movil'}, r => {
        const d_movil = r.new;
        
        // Mover el bus del conductor en el mapa
        markerBus.setLatLng([d_movil.latitud, d_movil.longitud]);
        
        // Calcular distancia al bus
        if(miPos) {
            const dist = map.distance(markerBus.getLatLng(), miPos);
            document.getElementById('ui-dist').style.display = 'block';
            document.getElementById('v-dist').innerText = Math.round(dist);
        }

        // Actualizar visual de asientos ocupados (Rojos)
        const ocupados = 4 - d_movil.asientos_libres;
        for(let i=1; i<=4; i++) {
            const btn = document.getElementById('as'+i);
            if (i <= ocupados) btn.classList.add('ocupado');
            else btn.classList.remove('ocupado');
        }
    }).subscribe();

    window.onload = () => {
        setTimeout(() => { document.getElementById('splash').style.display='none'; }, 2000);
    };
</script>
