<div class="top-ui">
    <div class="dest-card">
        <input type="text" id="nombre-pax" placeholder="TU NOMBRE (Ej: Carlos)" 
               style="width: 100%; background: rgba(255,255,255,0.1); color: #4cd964; border: 1px solid #4cd964; border-radius: 8px; padding: 10px; margin-bottom: 8px; font-weight: bold; outline: none;">
        
        <select id="select-destino" onchange="validarFormulario()">
            <option value="" disabled selected>--- ¿A DÓNDE VAS? ---</option>
        </select>
    </div>
</div>

<script>
    /* ... (Mantené el resto del código igual) ... */

    // ACTUALIZAMOS LA FUNCIÓN DE VALIDAR
    function validarFormulario() {
        const d = document.getElementById('select-destino').value;
        const n = document.getElementById('nombre-pax').value.trim();
        const b = document.getElementById('btn-accion');
        
        if (d !== "") markerDestino.setLatLng(rutaOficial[d].c).setOpacity(1);
        
        // Ahora el botón solo se activa si hay nombre, asiento y destino
        if(asientosElegidos.length > 0 && d !== "" && n !== "") {
            b.classList.add('ready');
        } else {
            b.classList.remove('ready');
        }
    }

    // Escuchar cuando el usuario escribe el nombre para validar el botón
    document.getElementById('nombre-pax').addEventListener('input', validarFormulario);

    // ACTUALIZAMOS LA FUNCIÓN DE CONFIRMAR
    async function confirmarReserva() {
        const nombre = document.getElementById('nombre-pax').value.trim();
        if(!miLat) return alert("Esperando GPS...");
        if(!nombre) return alert("Por favor, poné tu nombre.");

        const d = document.getElementById('select-destino').value;
        const btn = document.getElementById('btn-accion');
        btn.disabled = true; btn.innerText = "PROCESANDO...";

        const reservas = asientosElegidos.map(num => ({
            asiento_num: parseInt(num), 
            pasajero_lat: parseFloat(miLat), 
            pasajero_lon: parseFloat(miLon),
            destino_idx: parseInt(d), 
            nombre_pasajero: nombre, // <--- AGREGAMOS EL NOMBRE AQUÍ
            estado: 'en_curso'
        }));

        const { error } = await _s.from('reservas_activas').insert(reservas);
        
        /* ... (Resto de la lógica de éxito/error igual) ... */
    }
</script>
