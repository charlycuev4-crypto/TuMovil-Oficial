<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Conductor - Santa Brígida</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        h2 { letter-spacing: 2px; margin-bottom: 20px; color: #f8f9fa; }
        
        /* Contenedor de botones igual a tu captura exitosa */
        .grid-asientos { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 320px; margin: 20px auto; }
        
        .btn-asiento { height: 100px; font-size: 32px; font-weight: bold; border: none; border-radius: 20px; cursor: pointer; color: white; transition: 0.2s; }
        
        /* Colores: Verde para libre, Rojo para ocupado */
        .libre { background: #28a745; box-shadow: 0 4px 15px rgba(40,167,69,0.3); } 
        .ocupado { background: #dc3545; box-shadow: 0 4px 15px rgba(220,53,69,0.3); }
        
        .gps-status { margin-top: 30px; background: #222; padding: 15px; border-radius: 15px; border: 1px solid #333; color: #ffc107; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>
    <h2>CONTROL DE ASIENTOS</h2>
    
    <div class="grid-asientos">
        <button id="a1" class="libre" onclick="toggle(0)">1</button>
        <button id="a2" class="libre" onclick="toggle(1)">2</button>
        <button id="a3" class="libre" onclick="toggle(2)">3</button>
        <button id="a4" class="libre" onclick="toggle(3)">4</button>
    </div>

    <div class="gps-status" id="gps-display">
        🛰️ Buscando señal GPS...
    </div>

<script>
    // Conexión con tus llaves reales
    const _supabase = supabase.createClient(
        'https://nvumdlxervrewqiiaicl.supabase.co', 
        'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE'
    );
    
    // Estado inicial: todos los asientos libres (true)
    let estadoAsientos = [true, true, true, true];

    async function toggle(index) {
        // Cambiamos el estado (si era true pasa a false y viceversa)
        estadoAsientos[index] = !estadoAsientos[index];
        
        // Actualizamos el color del botón en pantalla
        const btn = document.getElementById('a' + (index + 1));
        btn.className = 'btn-asiento ' + (estadoAsientos[index] ? 'libre' : 'ocupado');
        
        // Contamos cuántos asientos quedaron en verde (true)
        const cantidadLibres = estadoAsientos.filter(asiento => asiento === true).length;
        
        // ENVIAR A SUPABASE: Esto hace que el número cambie en la app del pasajero
        const { error } = await _supabase
            .from('estado_movil')
            .update({ asientos_libres: cantidadLibres })
            .eq('id', 1);

        if (error) console.log("Error al actualizar asientos:", error.message);
    }

    // TRANSMITIR GPS EN TIEMPO REAL
    navigator.geolocation.watchPosition(async (pos) => {
        const { latitude, longitude } = pos.coords;
        
        // Mostramos en pantalla para que sepas que está funcionando
        document.getElementById('gps-display').innerText = `📍 GPS OK: ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
        
        // Enviamos la posición a la base de datos
        await _supabase
            .from('estado_movil')
            .update({ 
                latitud: latitude, 
                longitud: longitude 
            })
            .eq('id', 1);
            
    }, (err) => {
        document.getElementById('gps-display').innerText = "❌ Error GPS: " + err.message;
    }, { 
        enableHighAccuracy: true 
    });
</script>
</body>
</html>
