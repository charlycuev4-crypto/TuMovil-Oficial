<button id="btn-reservar" onclick="reservarLugar()" style="display:none; width:100%; margin-top:10px; background:#00ff88; color:#000; border:none; padding:12px; border-radius:10px; font-weight:bold; font-size:16px; cursor:pointer; box-shadow: 0 4px 10px rgba(0,255,136,0.3);">
    📩 RESERVAR MI LUGAR
</button>

<script>
// Función para reservar
async function reservarLugar() {
    const { data } = await _s.from('estado_movil').select('asientos_libres').eq('id', 1).single();
    
    if (data.asientos_libres > 0) {
        const nuevosAsientos = data.asientos_libres - 1;
        const { error } = await _s.from('estado_movil').update({ asientos_libres: nuevosAsientos }).eq('id', 1);

        if (!error) {
            alert("¡Lugar reservado! El chofer ya recibió tu aviso.");
            document.getElementById('btn-reservar').style.display = 'none';
            document.getElementById('btn-reservar').innerText = "✅ YA RESERVASTE";
        }
    } else {
        alert("Lo siento, no quedan lugares libres.");
    }
}

        map.flyTo(p.c, 16);
        document.getElementById('btn-reservar').style.display = 'block'; // Muestra el botón al elegir parada
    }
}
</script>
