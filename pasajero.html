<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
        
        #map { flex-grow: 1; width: 100%; }
        
        .bottom-ui { background: var(--panel); border-top: 2px solid var(--celeste); padding: 15px; border-radius: 25px 25px 0 0; z-index: 100; }
        
        /* Contenedor del auto */
        #info-chofer { display: none; background: #2a2a2a; padding: 12px; border-radius: 12px; border: 1px solid var(--celeste); margin-bottom: 10px; text-align: center; color: white; }
        
        .promo-card { background: rgba(0, 210, 255, 0.05); border: 1px solid var(--celeste); border-radius: 12px; padding: 8px; text-align: center; margin-bottom: 10px; }
        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 5px; }
        .asientos-grid { display: flex; justify-content: space-around; margin: 5px 0; }
        .asiento-btn { width: 50px; height: 50px; border: 2px solid var(--celeste); border-radius: 12px; background: transparent; color: var(--celeste); display: flex; align-items: center; justify-content: center; }
        .asiento-btn.selected { background: var(--amarillo); color: #000; font-weight: bold; }
        .btn-pedir { background: #28a745; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; }
        .btn-cancelar { background: #dc3545; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="header" style="background:#1e1e1e; padding:10px; text-align:center; color:#00d2ff;"><h1>TU MOVIL</h1></div>
    <div id="map"></div>

    <div class="bottom-ui">
        <div id="info-chofer">
            <h4 style="margin:0; font-size:10px; text-transform:uppercase; color:var(--celeste);">🚗 Vehículo Asignado</h4>
            <p id="texto-vehiculo" style="margin:5px 0 0 0; font-weight:bold;"></p>
        </div>

        <div class="promo-card"><b style="color:var(--amarillo);">TARIFA PLANA: $1000 POR ASIENTO</b></div>
        <select id="sentido-select" onchange="actualizarFlota()">
            <option value="IDA">Hacia IDA</option>
            <option value="VUELTA">Hacia VUELTA</option>
        </select>
        <input type="text" id="nombre-input" placeholder="Tu Nombre">
        <select id="destino-select"></select>
        <div class="asientos-grid">
            <div class="asiento-btn" onclick="toggleAsiento(1)" id="as-1">1</div>
            <div class="asiento-btn" onclick="toggleAsiento(2)" id="as-2">2</div>
            <div class="asiento-btn" onclick="toggleAsiento(3)" id="as-3">3</div>
            <div class="asiento-btn" onclick="toggleAsiento(4)" id="as-4">4</div>
        </div>
        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajePasajero()">SOLICITAR VIAJE</button>
        <button class="btn-cancelar" id="btn-cancelar" onclick="finalizarViaje()">TERMINAR VIAJE</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    // ... [Tu código de paradas y mapa aquí] ...
    
    // Función para mostrar auto SIN RECARGAR
    async function mostrarAutoUI(id_movil) {
        const { data } = await _s.from('estado_movil').select('marca, modelo, patente').eq('id', id_movil).single();
        if(data) {
            document.getElementById('info-chofer').style.display = 'block';
            document.getElementById('texto-vehiculo').innerText = `${data.marca} ${data.modelo} | ${data.patente}`;
        }
    }

    async function confirmarViajePasajero() {
        const nom = document.getElementById('nombre-input').value;
        const sentido = document.getElementById('sentido-select').value;
        if (!nom) return alert("Pon tu nombre");
        
        const { data: moviles } = await _s.from('estado_movil').select('id').eq('esta_online', true).eq('sentido_flujo', sentido).limit(1);
        if(!moviles || moviles.length === 0) return alert("No hay móviles");
        
        // Insertar reserva
        await _s.from('reservas_activas').insert({ nombre_pasajero: nom, id_movil: moviles[0].id, estado: 'en_curso', asiento_num: 1 });
        localStorage.setItem('usuario_nombre', nom);
        
        // Cambiar UI sin recargar
        document.getElementById('btn-pedir').style.display = 'none';
        document.getElementById('btn-cancelar').style.display = 'block';
        mostrarAutoUI(moviles[0].id);
    }

    async function finalizarViaje() {
        const nom = localStorage.getItem('usuario_nombre');
        await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('nombre_pasajero', nom);
        
        // Resetear UI
        document.getElementById('btn-pedir').style.display = 'block';
        document.getElementById('btn-cancelar').style.display = 'none';
        document.getElementById('info-chofer').style.display = 'none';
    }

    // Inicialización de flota y mapa...
</script>
</body>
</html>
