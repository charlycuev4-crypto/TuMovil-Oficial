        <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pasajero Conectado</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f0f2f5; }
        #map { height: 55vh; width: 100%; }
        .controles { 
            position: fixed; bottom: 0; width: 100%; background: white; 
            padding: 20px; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            z-index: 1000; box-sizing: border-box;
        }
        select { 
            width: 100%; padding: 12px; border: 2px solid #00d4ff; 
            border-radius: 10px; font-size: 16px; margin-bottom: 15px;
        }
        .asientos { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .asiento { 
            width: 55px; height: 55px; border: 2px solid #00d4ff; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #00d4ff; font-size: 18px;
        }
        .asiento.marcado { background: #ff4444; border-color: #ff4444; color: white; }
        .boton-confirmar {
            width: 100%; padding: 15px; background: #28a745; color: white;
            border: none; border-radius: 10px; font-weight: bold; font-size: 18px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="controles">
    <select id="mi-destino">
        <option value="">¿A dónde vas?</option>
        <option value="Miguel Cané">Miguel Cané</option>
        <option value="Cané y Los Aromos">Cané y Los Aromos</option>
        <option value="Maternidad">Maternidad</option>
        <option value="Abasto y Roca">Abasto y Roca</option>
        </select>

    <div class="asientos">
        <div class="asiento" onclick="marcar(this)">1</div>
        <div class="asiento" onclick="marcar(this)">2</div>
        <div class="asiento" onclick="marcar(this)">3</div>
        <div class="asiento" onclick="marcar(this)">4</div>
    </div>

    <button class="boton-confirmar" onclick="enviarAlConductor()">CONFIRMAR DESTINO</button>
</div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    const map = L.map('map').setView([-34.5612, -58.7705], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function marcar(el) {
        el.classList.toggle('marcado');
    }

    async function enviarAlConductor() {
        const destino = document.getElementById('mi-destino').value;
        const seleccionados = document.querySelectorAll('.asiento.marcado').length;

        if(!destino || seleccionados === 0) {
            return alert("Por favor elige destino y al menos 1 asiento");
        }

        // ESTA ES LA MEJORA QUE BUSCABAS:
        const { error } = await _s.from('estado_movil').update({
            asientos_libres: 4 - seleccionados,
            pasajero_destino: destino // Esto es lo que el conductor ve en su cuadro
        }).eq('id', 1);

        if(!error) {
            alert("¡Enviado! El conductor ya sabe que vas a: " + destino);
        } else {
            alert("Error al avisar al conductor.");
        }
    }
</script>
</body>
</html>
