        <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - Prueba Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --primary: #00e5ff; --bg: #121212; --accent: #ffca28; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; display: flex; flex-direction: column; height: 100vh; }
        
        #map { height: 35vh; width: 100%; border-bottom: 2px solid var(--primary); }
        .container { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        h2 { color: var(--primary); text-align: center; margin: 5px 0; font-size: 1.2rem; }
        .banner { border: 1px solid var(--accent); padding: 10px; text-align: center; color: var(--accent); border-radius: 8px; font-weight: bold; background: rgba(255, 202, 40, 0.1); }
        
        select, input { background: #2c2c2c; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; width: 100%; font-size: 16px; }
        
        .asientos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .asiento-btn { padding: 15px 0; background: #2c2c2c; border: 2px solid #444; border-radius: 10px; text-align: center; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .asiento-btn.active { border-color: var(--accent); background: #3d3d00; color: var(--accent); }
        
        .btn-enviar { background: #d32f2f; color: white; border: none; padding: 18px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-enviar:disabled { background: #444; color: #888; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="container">
        <h2>SOLICITAR VIAJE</h2>
        <div class="banner" id="status-distancia">Calculando distancia...</div>
        
        <input type="text" id="nombre-usuario" placeholder="Tu nombre">
        
        <select id="select-parada">
            <option value="Murillo y Güiraldes">Murillo y Güiraldes</option>
            <option value="Parada 8">Parada 8</option>
        </select>

        <div class="asientos-grid" id="grid-asientos">
            <div class="asiento-btn" onclick="seleccionarAsiento(1)" id="a1">1</div>
            <div class="asiento-btn" onclick="seleccionarAsiento(2)" id="a2">2</div>
            <div class="asiento-btn" onclick="seleccionarAsiento(3)" id="a3">3</div>
            <div class="asiento-btn" onclick="seleccionarAsiento(4)" id="a4">4</div>
        </div>

        <button class="btn-enviar" id="btn-accion" onclick="enviarSolicitud()" disabled>
            BUSCANDO UBICACIÓN...
        </button>
    </div>

    <script>
        // CONFIGURACIÓN
        const supabase = supabase.createClient('TU_URL', 'TU_KEY');
        const LIMITE_PRUEBA_KM = 5; // <--- Aquí está tu umbral de 5km
        
        const PARADAS = {
            "Murillo y Güiraldes": { lat: -34.5500, lng: -58.7000 },
            "Parada 8": { lat: -34.5510, lng: -58.7010 }
        };

        let asientoElegido = 0;
        
        // --- LÓGICA DE DISTANCIA ---
        function getDistanciaKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function verificarUbicacion() {
            const btn = document.getElementById('btn-accion');
            const statusBanner = document.getElementById('status-distancia');
            const parada = document.getElementById('select-parada').value;
            
            navigator.geolocation.getCurrentPosition((pos) => {
                const dist = getDistanciaKm(pos.coords.latitude, pos.coords.longitude, PARADAS[parada].lat, PARADAS[parada].lng);
                
                // Si la distancia es menor a 5km, habilitamos para la prueba
                if (dist <= LIMITE_PRUEBA_KM) {
                    btn.disabled = false;
                    btn.innerText = "SOLICITAR VIAJE";
                    statusBanner.innerText = "PARADA A " + dist.toFixed(2) + " KM - ¡PUEDES PROBAR!";
                } else {
                    btn.disabled = true;
                    btn.innerText = "FUERA DE RANGO (MÁS DE 5KM)";
                    statusBanner.innerText = "ESTÁS A " + dist.toFixed(2) + " KM DE LA PARADA";
                }
            }, (err) => {
                statusBanner.innerText = "ERROR DE GPS";
            }, { enableHighAccuracy: true });
        }

        function seleccionarAsiento(num) {
            asientoElegido = num;
            document.querySelectorAll('.asiento-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('a' + num).classList.add('active');
        }

        async function enviarSolicitud() {
            if(asientoElegido === 0) { alert("Selecciona un asiento"); return; }
            
            // Aquí se envía a Supabase
            const { data, error } = await supabase.from('viajes').insert([{
                nombre: document.getElementById('nombre-usuario').value,
                parada: document.getElementById('select-parada').value,
                asientos: asientoElegido,
                status: 'pendiente'
            }]);

            if(error) alert("Error: " + error.message);
            else alert("Solicitud enviada. ¡Verifica el panel del conductor!");
        }

        // Ejecutar verificación constante para la prueba
        setInterval(verificarUbicacion, 3000); 
        verificarUbicacion();
    </script>
</body>
</html>
