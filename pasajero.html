            <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasajero - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #00d2ff; }
        .btn-accion { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-solicitar { background: #28a745; color: white; }
        .btn-cancelar { background: #ff4444; color: white; }
        .asiento-btn { display: inline-block; width: 45px; height: 45px; margin: 5px; border: 2px solid #00d2ff; border-radius: 10px; text-align: center; line-height: 45px; cursor: pointer; }
        .selected { background: #ffcc00; color: #000; border-color: #ffcc00; }
    </style>
</head>
<body>

    <div class="box">
        <h3>Solicitar Viaje</h3>
        <input type="text" id="nombre" placeholder="Nombre Pasajero" style="width: 100%; padding: 10px; margin-bottom: 10px;">
        
        <p>Selecciona la cantidad de asientos:</p>
        <div id="grid-asientos">
            <div class="asiento-btn" onclick="seleccionar(1)" id="as-1">1</div>
            <div class="asiento-btn" onclick="seleccionar(2)" id="as-2">2</div>
            <div class="asiento-btn" onclick="seleccionar(3)" id="as-3">3</div>
            <div class="asiento-btn" onclick="seleccionar(4)" id="as-4">4</div>
        </div>

        <button class="btn-accion btn-solicitar" onclick="confirmarReserva()">SOLICITAR VIAJE</button>
        <button class="btn-accion btn-cancelar" onclick="cancelarReserva()">CANCELAR / FINALIZAR VIAJE</button>
    </div>

<script>
    const _s = supabase.createClient('https://TU_URL_SUPABASE', 'TU_KEY_SUPABASE');
    let seleccionados = 0;
    let idMovilAsignado = null; // Guardamos el ID para poder cancelar

    function seleccionar(num) {
        seleccionados = num;
        document.querySelectorAll('.asiento-btn').forEach(b => b.classList.remove('selected'));
        for(let i=1; i<=num; i++) document.getElementById('as-'+i).classList.add('selected');
    }

    async function confirmarReserva() {
        const nombre = document.getElementById('nombre').value;
        if(seleccionados === 0 || !nombre) { alert("Selecciona asientos y nombre"); return; }

        // 1. Buscamos conductor con espacio suficiente
        const { data: choferes } = await _s.from('estado_movil')
            .select('id, asientos_libres')
            .eq('esta_online', true)
            .gte('asientos_libres', seleccionados) // Solo los que tienen cupo para lo que pidió
            .limit(1);

        if(!choferes || choferes.length === 0) { alert("No hay móviles con espacio suficiente."); return; }
        
        idMovilAsignado = choferes[0].id;

        // 2. Actualizamos el estado del conductor (Restamos los asientos)
        await _s.from('estado_movil')
            .update({ asientos_libres: choferes[0].asientos_libres - seleccionados })
            .eq('id', idMovilAsignado);

        alert("¡Viaje solicitado! Reservaste " + seleccionados + " asientos.");
    }

    async function cancelarReserva() {
        if(!idMovilAsignado) { alert("No tienes viaje activo."); return; }

        // 1. Recuperamos los asientos del conductor
        const { data: chofer } = await _s.from('estado_movil')
            .select('asientos_libres')
            .eq('id', idMovilAsignado)
            .single();

        // 2. Devolvemos los asientos al conductor (Sumamos)
        await _s.from('estado_movil')
            .update({ asientos_libres: chofer.asientos_libres + seleccionados })
            .eq('id', idMovilAsignado);
        
        alert("Viaje cancelado. Asientos liberados.");
        idMovilAsignado = null;
        seleccionados = 0;
    }
</script>
</body>
</html>
