    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - Selección Directa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        .top-info { position: absolute; top: 10px; width: 100%; z-index: 1000; text-align: center; }
        .badge-status { background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 20px; border: 1px solid #FFD700; font-size: 14px; }

        .bottom-ui { 
            position: absolute; bottom: 0; width: 100%; z-index: 1000; 
            background: linear-gradient(to top, #000 80%, transparent);
            padding: 20px 0; display: none; /* Se muestra al tocar un taxi */
        }
        .container { padding: 0 20px; }
        .asientos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .btn-as { aspect-ratio: 1; border: 2px solid #00d4ff; border-radius: 12px; background: transparent; color: #00d4ff; font-weight: bold; font-size: 18px; }
        .btn-as.ocupado { border-color: #ff3b30; color: #ff3b30; opacity: 0.5; pointer-events: none; }
        .btn-as.selected { background: #4cd964; color: #000; border-color: #4cd964; }
        
        .btn-confirm { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; background: #00d4ff; color: black; font-size: 18px; }
        
        .taxi-icon { background: #FFD700; color: black; border-radius: 50%; border: 2px solid white; text-align: center; font-weight: bold; line-height: 30px; width: 30px; height: 30px; }
    </style>
</head>
<body>

    <div class="top-info">
        <span class="badge-status" id="pax-msg">Toca un taxi amarillo en el mapa</span>
    </div>

    <div id="map"></div>

    <div class="bottom-ui" id="panel-reserva">
        <div class="container">
            <h3 id="txt-movil" style="margin:0 0 10px 0; color:#FFD700">Móvil seleccionado</h3>
            <div class="asientos-grid" id="grid-asientos">
                </div>
            <button class="btn-confirm" onclick="confirmarViaje()">RESERVAR AHORA</button>
        </div>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let map = L.map('map', { zoomControl: false }).setView([-34.561264, -58.770506], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let taxiMarkers = {};
    let movilSeleccionado = null;
    let asientoSeleccionado = null;
    let miLat, miLon;

    // GPS Pasajero
    navigator.geolocation.watchPosition(p => {
        miLat = p.coords.latitude; miLon = p.coords.longitude;
    }, null, { enableHighAccuracy: true });

    // 1. RASTREAR TAXIS Y SUS ASIENTOS
    async function actualizarMapa() {
        const { data: moviles } = await _s.from('estado_movil').select('*').eq('en_servicio', true);
        const { data: reservas } = await _s.from('reservas_activas').select('*').eq('estado', 'en_curso');

        moviles?.forEach(m => {
            if(!taxiMarkers[m.id]) {
                taxiMarkers[m.id] = L.marker([m.latitud, m.longitud], {
                    icon: L.divIcon({ html: `<div class="taxi-icon">${m.id}</div>`, className:'' })
                }).addTo(map).on('click', () => abrirReserva(m.id, reservas));
            } else {
                taxiMarkers[m.id].setLatLng([m.latitud, m.longitud]);
            }
        });
    }
    setInterval(actualizarMapa, 3000);

    // 2. ABRIR PANEL DE ASIENTOS DEL TAXI TOCADO
    function abrirReserva(id, todasLasReservas) {
        movilSeleccionado = id;
        asientoSeleccionado = null;
        document.getElementById('txt-movil').innerText = `Móvil ${id} - Elige tu asiento`;
        document.getElementById('panel-reserva').style.display = 'block';
        
        const grid = document.getElementById('grid-asientos');
        grid.innerHTML = '';

        // Filtrar reservas solo de este móvil
        const ocupados = todasLasReservas.filter(r => r.id_movil == id).map(r => r.asiento_num);

        for(let i=1; i<=4; i++) {
            let isOcupado = ocupados.includes(i);
            grid.innerHTML += `
                <button class="btn-as ${isOcupado ? 'ocupado' : ''}" 
                        id="as-${i}" 
                        onclick="seleccionarAsiento(${i})">${i}</button>`;
        }
    }

    function seleccionarAsiento(n) {
        asientoSeleccionado = n;
        document.querySelectorAll('.btn-as').forEach(b => b.classList.remove('selected'));
        document.getElementById(`as-${n}`).classList.add('selected');
    }

    // 3. CONFIRMAR (ESTILO UBER)
    async function confirmarViaje() {
        if(!asientoSeleccionado) return alert("Selecciona un asiento");
        
        const nombre = prompt("¿Tu nombre?"); // Simplificado para la prueba
        if(!nombre) return;

        const { error } = await _s.from('reservas_activas').insert([{
            asiento_num: asientoSeleccionado,
            id_movil: movilSeleccionado,
            nombre_pasajero: nombre,
            pasajero_lat: miLat,
            pasajero_lon: miLon,
            estado: 'en_curso'
        }]);

        if(!error) {
            alert("Reserva confirmada. ¡El móvil va en camino!");
            document.getElementById('panel-reserva').style.display = 'none';
        }
    }
</script>
</body>
</html>
