<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero Oficial</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --celeste: #00d2ff;
            --amarillo: #ffcc00;
            --dark: #0a0a1a;
            --panel: rgba(20, 20, 40, 0.85);
            --success: #4cd964;
            --danger: #ff3b30;
            --glass: rgba(0, 0, 0, 0.75);
        }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden;
            display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

        /* SPLASH SCREEN */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3e 50%, #0d2b3a 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; transition: opacity 0.8s ease, visibility 0.8s; }
        .splash-ring { width: 160px; height: 160px; border: 3px solid var(--celeste); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.4), inset 0 0 20px rgba(0, 210, 255, 0.1);
            animation: pulseRing 2s infinite; }
        @keyframes pulseRing { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
        #splash h2 { color: var(--celeste); margin-top: 20px; font-size: 24px; letter-spacing: 4px; font-weight: 800; }
        #splash p { color: #888; font-size: 13px; margin-top: 6px; }
        .splash-loading { width: 160px; height: 3px; background: #222; border-radius: 3px; margin-top: 16px; overflow: hidden; }
        .splash-loading-inner { width: 0%; height: 100%; background: linear-gradient(90deg, var(--celeste), var(--amarillo));
            border-radius: 3px; animation: loadBar 1.5s ease forwards; }
        @keyframes loadBar { to { width: 100%; } }

        /* HEADER */
        .header { background: var(--glass); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.3); padding: 12px; text-align: center; flex-shrink: 0; }
        .header h1 { margin: 0; font-size: 18px; color: var(--celeste); letter-spacing: 3px; font-weight: 800; }

        #map { flex-grow: 1; width: 100%; transition: all 0.4s ease; }

        /* ESTADOS DE VIAJE */
        body.viaje-activo #map { height: 55vh !important; flex: none !important; }
        body.viaje-activo .bottom-ui { max-height: 45vh; }
        body.a-bordo #map { height: 85vh !important; flex: none !important; }
        body.a-bordo .header { display: none; }
        body.a-bordo .bottom-ui {
            max-height: 15vh; min-height: 70px; padding: 10px 15px env(safe-area-inset-bottom);
            gap: 8px; border-radius: 20px 20px 0 0; overflow: hidden;
            display: flex; flex-direction: row; align-items: center; justify-content: space-between;
        }
        body.a-bordo .bottom-ui > *:not(#btn-cancelar):not(#info-viaje-abordo):not(#panel-anuncio-parada) { display: none !important; }
        body.a-bordo #btn-cancelar { display: block !important; margin: 0; padding: 14px 22px;
            font-size: 15px; height: auto; white-space: nowrap; flex-shrink: 0; }
        #info-viaje-abordo { display: none; color: white; font-size: 14px; text-align: left;
            flex: 1; padding-right: 10px; min-width: 0; }
        body.a-bordo #info-viaje-abordo { display: block !important; }

        /* BOTTOM UI */
        .bottom-ui { background: var(--glass); backdrop-filter: blur(15px);
            border-top: 1px solid rgba(0, 210, 255, 0.3); padding: 16px 16px env(safe-area-inset-bottom);
            display: flex; flex-direction: column; gap: 10px; border-radius: 25px 25px 0 0;
            z-index: 100; box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
            max-height: 55vh; overflow-y: auto; transition: all 0.4s ease; }

        body.viaje-activo .form-element { display: none !important; }
        body.viaje-activo #btn-pedir { display: none !important; }

        /* TARJETA PROMO */
        .promo-card { background: linear-gradient(135deg, rgba(0, 210, 255, 0.08), rgba(255, 204, 0, 0.05));
            border: 1px solid rgba(0, 210, 255, 0.3); border-radius: 14px; padding: 12px;
            text-align: center; font-size: 15px; font-weight: 700; }

        input, select { background: rgba(42, 42, 42, 0.9); border: 1px solid #444; color: white;
            padding: 14px; border-radius: 12px; font-size: 16px; width: 100%; box-sizing: border-box;
            backdrop-filter: blur(5px); transition: all 0.2s; }
        input:focus, select:focus { border-color: var(--celeste); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); outline: none; }

        /* PANEL VIAJE ACTIVO */
        .viaje-activo-panel {
            background: linear-gradient(135deg, rgba(26, 26, 62, 0.9) 0%, rgba(13, 43, 58, 0.9) 100%);
            backdrop-filter: blur(15px); border: 1px solid rgba(0, 210, 255, 0.4);
            border-radius: 20px; padding: 18px; margin-bottom: 10px;
            animation: slideIn 0.5s ease; transition: border-color 0.5s ease;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .viaje-activo-panel.alerta-pasado { border-color: var(--danger);
            animation: shake 0.5s ease; box-shadow: 0 8px 32px rgba(255, 59, 48, 0.3); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .viaje-activo-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px;
            padding-bottom: 14px; border-bottom: 1px solid rgba(0, 210, 255, 0.15); }
        .viaje-activo-icono { width: 56px; height: 56px; background: linear-gradient(135deg, var(--celeste), #0088cc);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 26px; flex-shrink: 0; transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); }
        .viaje-activo-panel.alerta-pasado .viaje-activo-icono {
            background: linear-gradient(135deg, var(--danger), #c0392b);
            animation: pulseDanger 1s infinite; box-shadow: 0 0 20px rgba(255, 59, 48, 0.4); }
        @keyframes pulseDanger { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .viaje-activo-titulo { flex: 1; }
        .viaje-activo-titulo .coche-numero { font-size: 22px; font-weight: 800; color: var(--amarillo); margin: 0; text-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }
        .viaje-activo-titulo .conductor-nombre { font-size: 14px; color: rgba(255,255,255,0.8); margin: 4px 0 0 0; }
        .viaje-activo-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .info-box { background: rgba(0, 0, 0, 0.3); border-radius: 12px; padding: 12px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05); }
        .info-box-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
        .info-box-valor { font-size: 16px; color: var(--celeste); font-weight: 800; margin-top: 4px; }
        .viaje-activo-destino { background: rgba(255, 204, 0, 0.08); border: 1px solid rgba(255, 204, 0, 0.3);
            border-radius: 12px; padding: 12px; text-align: center; font-size: 14px;
            color: var(--amarillo); margin-bottom: 14px; font-weight: 600; }
        .viaje-activo-status { display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 13px; color: var(--success); padding: 12px; border-radius: 12px;
            background: rgba(76, 217, 100, 0.08); border: 1px solid rgba(76, 217, 100, 0.2); }
