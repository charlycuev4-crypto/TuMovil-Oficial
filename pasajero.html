<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pasajero</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #f4f4f9; }
        #map { height: 60vh; width: 100%; }
        
        .panel-reserva {
            position: fixed; bottom: 0; width: 100%; background: white;
            padding: 15px; border-radius: 20px 20px 0 0;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.15); z-index: 1000;
            box-sizing: border-box;
        }

        .select-destino {
            width: 100%; padding: 12px; border: 2px solid #00d4ff;
            border-radius: 10px; font-size: 16px; margin-bottom: 15px;
        }

        .contenedor-asientos { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .asiento {
            width: 60px; height: 60px; border: 2px solid #00d4ff; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #00d4ff; font-size: 22px; cursor: pointer;
        }
        .asiento.seleccionado { background-color: #ff4444; border-color: #ff4444; color: white; }

        .btn-confirmar {
            width: 100%; padding: 15px; background-color: #28a745; color: white;
            border: none; border-radius: 12px; font-weight: bold; font-size: 18px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="panel-reserva">
    <select id="destino" class="select-destino">
        <option value="">¿DÓNDE TE BAJÁS?</option>
        <option value="Miguel Cané">Miguel Cané</option>
        <option value="Cané y Los Aromos">Cané y Los Aromos</option>
        <option value="Los Aromos 11016">Los Aromos 11016</option>
        <option value="Los Aromos 10874">Los Aromos 10874</option>
        <option value="Los Aromos y Murillo">Los Aromos y Murillo</option>
        <option value="Murillo 601">Murillo 601</option>
        <option value="Murillo y Güiraldes">Murillo y Güiraldes</option>
        <option value="Murillo y Watt">Murillo y Watt</option>
        <option value="A. Prado 2555">A. Prado 2555</option>
        <option value="Prado y Payró">Prado y Payró</option>
        <option value="Prado 1744">Prado 1744</option>
        <option value="Boulevard Caveri">Boulevard Caveri</option>
        <option value="Caveri y Azara">Caveri y Azara</option>
        <option value="Caveri y Vedia">Caveri y Vedia</option>
        <option value="Caveri y Tablada">Caveri y Tablada</option>
        <option value="Caveri y Echeverría">Caveri y Echeverría</option>
        <option value="Caveri y Gálvez">Caveri y Gálvez</option>
        <option value="Caveri (Final)">Caveri (Final)</option>
        <option value="Libertador y Aero">Libertador y Aero</option>
        <option value="Libertador 7300">Libertador 7300</option>
        <option value="Libertador 7200">Libertador 7200</option>
        <option value="Libertador y Maza">Libertador y Maza</option>
        <option value="Maza y Albatros">Maza y Albatros</option>
        <option value="Maternidad">Maternidad</option>
        <option value="Abasto y Roca">Abasto y Roca</option>
    </select>

    <div class="contenedor-asientos">
        <div class="asiento" onclick="toggleAsiento(this, 1)">1</div>
        <div class="asiento" onclick="toggleAsiento(this, 2)">2</div>
        <div class="asiento" onclick="toggleAsiento(this, 3)">3</div>
        <div class="asiento" onclick="toggleAsiento(this, 4)">4</div>
    </div>

    <button class="btn-confirmar" onclick="reservarViaje()">CONFIRMAR RESERVA</button>
</div>

<script>
    // Configuración de Supabase
    const supabaseClient = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    // Mapa centrado en la ruta
    const map = L.map('map').setView([-34.5612, -58.7705], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let asientosSeleccionados = 0;

    function toggleAsiento(elemento, numero) {
        elemento.classList.toggle('seleccionado');
        asientosSeleccionados = document.querySelectorAll('.asiento.seleccionado').length;
    }

    async function reservarViaje() {
        const destinoSeleccionado = document.getElementById('destino').value;

        if (!destinoSeleccionado) {
            alert("Por favor, selecciona tu parada de destino.");
            return;
        }

        if (asientosSeleccionados === 0) {
            alert("Por favor, selecciona al menos un asiento.");
            return;
        }

        // Enviamos los datos a la tabla 'estado_movil' con la estructura original
        const { error } = await supabaseClient
            .from('estado_movil')
            .update({ 
                asientos_libres: 4 - asientosSeleccionados,
                pasajero_destino: destinoSeleccionado 
            })
            .eq('id', 1);

        if (!error) {
            alert("¡Reserva confirmada con éxito!");
        } else {
            console.error(error);
            alert("Error al conectar con el servidor.");
        }
    }
</script>

</body>
</html>
