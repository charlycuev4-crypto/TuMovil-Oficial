<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - Pasajero Inteligente</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; font-family: sans-serif; color: white; }
        #map { height: 50vh; width: 100%; }
        .bottom-ui { background: var(--panel); padding: 20px; border-radius: 20px 20px 0 0; }
        select, input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; background: #333; color: white; border: none; }
        .asientos-grid { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .asiento-btn { padding: 15px; background: #444; border-radius: 10px; cursor: pointer; }
        .asiento-btn.selected { background: var(--amarillo); color: black; }
        .btn-pedir { width: 100%; padding: 20px; background: #28a745; border: none; border-radius: 10px; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="bottom-ui">
        <input type="text" id="nombre-input" placeholder="Tu Nombre">
        
        <select id="destino-select">
            <option value="" disabled selected>¿A qué parada vas?</option>
        </select>

        <div class="asientos-grid" id="grid">
            </div>

        <button class="btn-pedir" onclick="confirmarViajePasajero()">SOLICITAR VIAJE INTELIGENTE</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    // Lista de paradas (la misma que tenías)
    const paradas = [/* ... tus paradas ... */]; 
    let asientosElegidos = [];

    // Llenar selector
    const sel = document.getElementById('destino-select');
    paradas.forEach((p, i) => sel.options.add(new Option(p.n, i)));

    async function confirmarViajePasajero() {
        const nom = document.getElementById('nombre-input').value;
        const destIdx = parseInt(document.getElementById('destino-select').value);
        
        if (!nom || isNaN(destIdx) || asientosElegidos.length === 0) { 
            alert("Completa tus datos y asientos."); return; 
        }

        // --- LÓGICA DE DIRECCIÓN INTELIGENTE ---
        // Si el destino es mayor a la mitad, asumimos que va hacia adelante
        const vaHaciaAdelante = destIdx > 5; 

        // BUSCAMOS COCHES:
        // 1. Que estén en servicio
        // 2. Que vayan en la misma dirección que el pasajero
        // 3. Que tengan asientos libres (>0)
        const { data: moviles, error } = await _s.from('estado_movil')
            .select('id, asientos_libres')
            .eq('en_servicio', true)
            .eq('hacia_adelante', vaHaciaAdelante)
            .gt('asientos_libres', 0);

        if (error || !moviles || moviles.length === 0) {
            alert("No hay unidades disponibles en tu sentido. Intenta en unos segundos.");
            return;
        }

        // Asignamos al primer coche que cumplió los filtros
        const choferAsignado = moviles[0].id;

        const res = asientosElegidos.map(n => ({ 
            asiento_num: n, 
            id_movil: choferAsignado, 
            estado: 'en_curso', 
            nombre_pasajero: nom, 
            destino_idx: destIdx 
        }));

        const { error: insertError } = await _s.from('reservas_activas').insert(res);
        
        if (!insertError) {
            alert("¡Viaje solicitado exitosamente!");
            location.reload();
        } else {
            alert("Error al procesar: " + insertError.message);
        }
    }

    // Funciones de utilidad (toggle asientos, etc) se mantienen iguales...
</script>
</body>
</html>
