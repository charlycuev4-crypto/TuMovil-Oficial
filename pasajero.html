<style>
    /* Agregamos este detalle para que el auto se vea bien */
    .coche-header { display: flex; flex-direction: column; gap: 2px; }
    .coche-num { font-weight: bold; color: var(--celeste); font-size: 14px; }
    .coche-auto { font-size: 11px; color: var(--amarillo); text-transform: uppercase; }
</style>

<script>
    // USAMOS TU CONFIGURACIÓN DE SUPABASE
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    // ... (Tus paradas y mapa se mantienen igual) ...

    async function renderizarFlotaDisponible() {
        if (miViajeActivo) return;
        const container = document.getElementById('flota-container');
        const sentido = document.getElementById('sentido-select').value;
        const destIdx = document.getElementById('destino-select').value;

        if (!destIdx || !gpsListo) return;

        try {
            // BUSCAMOS LOS MÓVILES INCLUYENDO CHOFER, MARCA Y PATENTE
            const { data: moviles } = await _s.from('estado_movil')
                .select('id, latitud, longitud, chofer, marca, modelo, patente') // <-- AQUÍ TRAEMOS TODO
                .eq('esta_online', true)
                .eq('sentido_flujo', sentido);

            let html = '';
            for (const movil of moviles) {
                const { data: ocupados } = await _s.from('reservas_activas')
                    .select('asiento_num, nombre_pasajero')
                    .eq('id_movil', movil.id)
                    .eq('estado', 'en_curso');

                const dictOcupados = {};
                if (ocupados) ocupados.forEach(r => dictOcupados[r.asiento_num] = r.nombre_pasajero);

                html += `
                <div class="coche-card" id="coche-card-${movil.id}">
                    <div class="coche-header">
                        <span class="coche-num">🚕 MÓVIL ${movil.id} - ${movil.chofer || 'SIN NOMBRE'}</span>
                        <span class="coche-auto">${movil.marca || ''} ${movil.modelo || ''} | ${movil.patente || 'S/P'}</span>
                    </div>
                    <div class="asientos-row">
                        ${[1, 2, 3, 4].map(num => {
                            if (dictOcupados[num]) {
                                return `<div class="asiento-box asiento-ocupado"><b>${num}</b><br>OCUPADO</div>`;
                            }
                            return `<div class="asiento-box asiento-libre" id="as-${movil.id}-${num}" onclick="seleccionarAsiento(${movil.id}, ${num})"><b>${num}</b><br>LIBRE</div>`;
                        }).join('')}
                    </div>
                </div>`;
            }
            container.innerHTML = html || '<div class="sin-coches">No hay coches cerca</div>';
        } catch (e) { console.error(e); }
    }

    // REGLA DE ORO PARA EVITAR VIAJES FANTASMAS:
    async function confirmarViajePasajero() {
        const nom = document.getElementById('nombre-input').value.trim();
        const dest = document.getElementById('destino-select').value;
        
        if (!nom || !cocheSeleccionado || asientosElegidos.length === 0) return alert("Faltan datos");

        const btn = document.getElementById('btn-pedir');
        btn.disabled = true;
        btn.innerText = "🔄 PROCESANDO...";

        // Insertamos la reserva
        const reservas = asientosElegidos.map(n => ({ 
            id_movil: cocheSeleccionado, 
            asiento_num: n, 
            nombre_pasajero: nom, 
            destino_idx: dest, 
            estado: 'en_curso',
            pasajero_lat: miLat,
            pasajero_lon: miLon
        }));

        const { error } = await _s.from('reservas_activas').insert(reservas);

        if (error) {
            alert("Error al reservar. Intentá de nuevo.");
            btn.disabled = false;
        } else {
            // Guardamos en el teléfono que ya tenemos un viaje para que no se borre al refrescar
            localStorage.setItem('viaje_en_curso', 'true');
            localStorage.setItem('usuario_nombre', nom);
            location.reload(); 
        }
    }
    
    // ... (El resto de tus funciones de GPS y Mapa se mantienen) ...
</script>
