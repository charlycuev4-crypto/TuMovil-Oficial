<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASAJERO - Tu Móvil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; justify-content: center; }
        .card { background: #111; border: 2px solid #00d4ff; border-radius: 20px; padding: 25px; width: 85%; text-align: center; box-shadow: 0 0 20px #00d4ff44; }
        .monto { color: #00ff88; font-size: 45px; font-weight: bold; margin-bottom: 20px; display: block; }
        .grid { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; }
        .btn-as { width: 65px; height: 65px; border-radius: 12px; border: 2px solid #00d4ff; background: none; color: #00d4ff; font-size: 22px; font-weight: bold; cursor: pointer; }
        .selected { background: #ff3b30; border-color: #ff3b30; color: #fff; }
        .btn-fin { background: #ff3b30; border: none; color: #fff; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="card">
        <span style="color: #888; font-size: 12px;">IMPORTE A PAGAR</span>
        <span class="monto" id="monto">$ 0</span>
        <div class="grid">
            <button id="a1" class="btn-as" onclick="sel(1)">1</button>
            <button id="a2" class="btn-as" onclick="sel(2)">2</button>
            <button id="a3" class="btn-as" onclick="sel(3)">3</button>
            <button id="a4" class="btn-as" onclick="sel(4)">4</button>
        </div>
        <button class="btn-fin" onclick="reset()">Finalizar Viaje</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    let elegidos = [];

    // 1. EL PASAJERO ENVÍA SU GPS AL CONDUCTOR
    navigator.geolocation.watchPosition(async p => {
        await _s.from('estado_movil').update({ lat_p: p.coords.latitude, lon_p: p.coords.longitude }).eq('id', 1);
    }, null, { enableHighAccuracy: true });

    async function sel(n) {
        const b = document.getElementById('a'+n);
        if(elegidos.includes(n)) {
            elegidos = elegidos.filter(x => x !== n);
            b.classList.remove('selected');
        } else {
            elegidos.push(n);
            b.classList.add('selected');
        }
        document.getElementById('monto').innerText = '$ ' + (elegidos.length * 1000);
        // Actualizar asientos libres para que el conductor lo vea
        await _s.from('estado_movil').update({ asientos_libres: 4 - elegidos.length }).eq('id', 1);
    }

    async function reset() {
        await _s.from('estado_movil').update({ asientos_libres: 4, lat_p: null, lon_p: null }).eq('id', 1);
        location.reload();
    }
</script>
</body>
</html>
