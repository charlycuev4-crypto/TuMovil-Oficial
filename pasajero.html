<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
        
        #map { flex-grow: 1; width: 100%; }
        
        .header { background: var(--panel); border-bottom: 2px solid var(--celeste); padding: 10px; text-align: center; color: var(--celeste); }
        .header h1 { margin: 0; font-size: 18px; letter-spacing: 2px; }

        .bottom-ui { background: var(--panel); border-top: 2px solid var(--celeste); padding: 15px; border-radius: 25px 25px 0 0; z-index: 100; }
        
        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 10px; }

        /* ESTILO DE ASIENTOS (BOLITAS) */
        .asientos-row { display: flex; gap: 8px; justify-content: center; margin-top: 10px; }
        .asiento-box { 
            width: 55px; height: 55px; border-radius: 50%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold;
            border: 2px solid black; /* BORDE NEGRO COMO PEDISTE */
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .asiento-libre { background: var(--celeste); color: black; cursor: pointer; }
        .asiento-libre.seleccionado { background: var(--amarillo); border-color: white; transform: scale(1.1); }
        .asiento-ocupado { background: #444; color: #888; border-color: #222; cursor: not-allowed; }

        .coche-card { background: #1a1a1a; border-radius: 15px; padding: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .coche-card.seleccionado { border-color: var(--celeste); background: #222; }
        
        .btn-pedir { background: #28a745; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn-pedir:disabled { background: #333; }

        .map-tiles { filter: invert(100%) hue-rotate(180deg) brightness(95%); }
    </style>
</head>
<body>

    <div class="header"><h1>SOLICITAR VIAJE</h1></div>
    <div id="map"></div>

    <div class="bottom-ui">
        <select id="sentido-select">
            <option value="IDA">Hacia IDA</option>
            <option value="VUELTA">Hacia VUELTA</option>
        </select>
        
        <input type="text" id="nombre-input" placeholder="Tu Nombre">
        <select id="destino-select">
            <option value="" disabled selected>¿A qué parada vas?</option>
        </select>
        
        <div id="flota-container" style="max-height: 200px; overflow-y: auto;">
            <div style="text-align:center; color:#666; padding:20px;">Seleccioná destino para ver coches</div>
        </div>
        
        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajePasajero()" disabled>SELECCIONÁ ASIENTO</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    // TUS PARADAS
    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    // INICIAR MAPA
    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { className: 'map-tiles' }).addTo(map);

    let miLat = 0, miLon = 0;
    let cocheSeleccionado = null;
    let asientosElegidos = [];
    let markerTaxis = {};

    // CARGAR SELECT
    const selDest = document.getElementById('destino-select');
    paradas.forEach((p, i) => { 
        const opt = document.createElement('option'); opt.value = i; opt.innerText = p.n; selDest.appendChild(opt); 
    });

    // GPS
    navigator.geolocation.watchPosition(p => {
        miLat = p.coords.latitude; miLon = p.coords.longitude;
    }, null, { enableHighAccuracy: true });

    // RENDERIZAR FLOTA CON DATOS DE AUTO
    async function renderizarFlota() {
        const container = document.getElementById('flota-container');
        const sentido = document.getElementById('sentido-select').value;
        const destIdx = selDest.value;
        if(!destIdx) return;

        try {
            const { data: moviles } = await _s.from('estado_movil')
                .select('id, chofer, marca, modelo, patente, color')
                .eq('esta_online', true)
                .eq('sentido_flujo', sentido);

            if(!moviles || moviles.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">No hay coches en este sentido</div>';
                return;
            }

            let html = '';
            for(const m of moviles) {
                const { data: ocupados } = await _s.from('reservas_activas').select('asiento_num').eq('id_movil', m.id).eq('estado', 'en_curso');
                const asientosOcupados = ocupados ? ocupados.map(r => r.asiento_num) : [];
                
                html += `
                <div class="coche-card ${cocheSeleccionado == m.id ? 'seleccionado' : ''}">
                    <div style="display:flex; justify-content:space-between;">
                        <b>🚗 Coche ${m.id} - ${m.marca || ''} ${m.modelo || ''}</b>
                        <span style="color:var(--amarillo); font-size:12px;">${m.patente || ''}</span>
                    </div>
                    <div class="asientos-row">
                        ${[1,2,3,4].map(n => {
                            const estaOcupado = asientosOcupados.includes(n);
                            const estaSel = cocheSeleccionado == m.id && asientosElegidos.includes(n);
                            return `<div class="asiento-box ${estaOcupado ? 'asiento-ocupado' : 'asiento-libre'} ${estaSel ? 'seleccionado' : ''}" 
                                     onclick="${estaOcupado ? '' : `seleccionarAsiento(${m.id}, ${n})`}">
                                     ${n}</div>`;
                        }).join('')}
                    </div>
                </div>`;
            }
            container.innerHTML = html;
        } catch(e) { console.log(e); }
    }

    function seleccionarAsiento(id, n) {
        if(cocheSeleccionado !== id) { cocheSeleccionado = id; asientosElegidos = []; }
        const idx = asientosElegidos.indexOf(n);
        if(idx > -1) asientosElegidos.splice(idx, 1);
        else if(asientosElegidos.length < 2) asientosElegidos.push(n);
        
        document.getElementById('btn-pedir').disabled = asientosElegidos.length === 0;
        document.getElementById('btn-pedir').innerText = `RESERVAR ${asientosElegidos.length} ASIENTO(S)`;
        renderizarFlota();
    }

    async function confirmarViajePasajero() {
        const nom = document.getElementById('nombre-input').value;
        if(!nom) return alert("Poné tu nombre");
        
        const reservas = asientosElegidos.map(n => ({
            id_movil: cocheSeleccionado,
            asiento_num: n,
            nombre_pasajero: nom,
            estado: 'en_curso',
            destino_idx: selDest.value,
            pasajero_lat: miLat,
            pasajero_lon: miLon
        }));

        const { error } = await _s.from('reservas_activas').insert(reservas);
        if(!error) {
            alert("¡Viaje reservado!");
            location.reload();
        }
    }

    // ACTUALIZAR CADA 10 SEG
    setInterval(renderizarFlota, 10000);
    selDest.addEventListener('change', renderizarFlota);
    document.getElementById('sentido-select').addEventListener('change', renderizarFlota);

</script>
</body>
</html>
