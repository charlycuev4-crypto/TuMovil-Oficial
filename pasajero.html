    function calcularParadaMasCerca(lat, lon) {
        let minDist = Infinity, paradaIdx = -1;
        paradas.forEach((p, i) => {
            const dist = Math.sqrt(Math.pow(lat - p.c[0], 2) + Math.pow(lon - p.c[1], 2));
            if (dist < minDist) { minDist = dist; paradaIdx = i; }
        });
        return paradaIdx;
    }

    function movilPuedeRecoger(movilParada, paradaPasajero, sentido) {
        if (sentido === 'IDA') return movilParada <= paradaPasajero;

    async function verificarLlegadaCoche() {

            if (!rpcData || !rpcData.encontrado) return;
            if (!rpcData.llego) return;
            mostrarBannerLlegada();
        } catch (err) { console.error("Error verificando llegada:", err); }

    function mostrarBannerLlegada() {

    async function rechazarViaje() {

        if (!confirm("¿Estás seguro de que querés cancelar tu reserva? El conductor será notificado.")) return;

        let cancelado = false;
        try {

                else if (!error && (!data || data.length === 0)) { cancelado = true; }

    function iniciarEscuchaAnuncios() {
        if (canalRealtime) return;

        verificarAnuncioPendiente();

                const nuevo = payload.new;
                if (nuevo.anuncio_parada && !nuevo.anuncio_visto) {
                    mostrarAnuncioParada(nuevo.anuncio_parada);
                }
            })
            .subscribe();
    }

    async function verificarAnuncioPendiente() {

            if (error) throw error;
            if (data && data.anuncio_parada && !data.anuncio_visto) {
                mostrarAnuncioParada(data.anuncio_parada);
            }
        } catch (err) { console.error('Error verificando anuncio pendiente:', err); }
    }

    let audioCtx = null;
    function inicializarAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // 🔊 ALARMA BITONAL DE ALTA INTENSIDAD (Actualizada)
    function reproducirAlarmaLlegada() {
        inicializarAudio();
        const ahora = audioCtx.currentTime;
        
        for (let i = 0; i < 3; i++) {
            const tiempoInicio = ahora + (i * 0.25);
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.type = 'sawtooth'; // Onda penetrante tipo sierra
            
            // Alternancia de frecuencias agudas llamativas (Notas B5 y E6)
            const frecuencia = (i % 2 === 0) ? 987.77 : 1318.51;
            oscillator.frequency.setValueAtTime(frecuencia, tiempoInicio);
            
            gainNode.gain.setValueAtTime(0.5, tiempoInicio);
            gainNode.gain.exponentialRampToValueAtTime(0.01, tiempoInicio + 0.2);
            
            oscillator.start(tiempoInicio);
            oscillator.stop(tiempoInicio + 0.22);
        }
    }

    function vibrarAlarma() {
        if ('vibrate' in navigator) navigator.vibrate([300, 100, 300, 100, 500]);
    }

    async function cargarDatosViajeActivo(nombre) {
        miNombrePasajero = nombre;
        try {
            const { data: rpcData, error } = await _s.rpc('obtener_viaje_activo', { p_nombre: nombre });
            if (error) throw error;
            const data = (rpcData && rpcData.viaje && Array.isArray(rpcData.viaje)) ? rpcData.viaje : [];
            if (data.length > 0) {
                miViajeActivo = true;
                datosViajeActivo = data;
                asientosElegidos = data.map(r => r.asiento_num);
                const primerViaje = data[0];
                if (primerViaje.estado_pasajero === 'a_bordo') {
                    pasajeroABordo = true;
                    activarModoABordo();
                    iniciarEscuchaAnuncios();
                }
                if (primerViaje.destino_idx !== undefined) document.getElementById('destino-select').value = primerViaje.destino_idx;
                if (primerViaje.estado_movil && primerViaje.estado_movil.sentido_flujo) document.getElementById('sentido-select').value = primerViaje.estado_movil.sentido_flujo;
                if (primerViaje.destino_idx !== undefined && miLat !== 0) actualizarMapaRuta();
                bloquearPanelParaViajeActivo();
                if (!pasajeroABordo) { iniciarSeguimientoAutoRealtime(primerViaje.id_movil); iniciarVerificacionLlegada(); }
                iniciarPollingEstado();
            } else { limpiarUI(); }
        } catch (err) { console.error("Error al cargar viaje activo:", err); }
    }

    function iniciarPollingEstado() {
        if (intervaloPolling) clearInterval(intervaloPolling);
        if (pasajeroABordo) return;
        intervaloPolling = setInterval(async () => {
            if (pasajeroABordo || !miNombrePasajero) { clearInterval(intervaloPolling); return; }
            try {
                const { data: rpcData, error } = await _s.rpc('obtener_viaje_activo', { p_nombre: miNombrePasajero });
                if (error) return;
                const data = (rpcData && rpcData.viaje && Array.isArray(rpcData.viaje)) ? rpcData.viaje : [];
                if (data.length > 0 && data[0].estado_pasajero === 'a_bordo') {
                    pasajeroABordo = true;
                    activarModoABordo();
                    iniciarEscuchaAnuncios();
                    if (canalSeguimientoAuto) { canalSeguimientoAuto.unsubscribe(); canalSeguimientoAuto = null; }
                    clearInterval(intervaloPolling);
                } else if (data.length === 0) { limpiarEstadoViaje(); }
            } catch (e) { console.error('Error polling:', e); }
        }, 5000);
    }

    // 📡 SEGUIMIENTO EN TIEMPO REAL VÍA WEBSOCKETS (Actualizado)
    function iniciarSeguimientoAutoRealtime(idMovil) {
        if (!idMovil) return;
        if (canalSeguimientoAuto) { canalSeguimientoAuto.unsubscribe(); }

        // Primero hacemos una consulta inicial rápida para situarlo
        _s.from('estado_movil').select('latitud, longitud').eq('id', idMovil).single().then(({data}) => {
            if(data) procesarNuevaUbicacionCoche(data.latitud, data.longitud);
        });

        // Nos suscribimos a los cambios de posición exactos de ese coche en Supabase
        canalSeguimientoAuto = _s.channel('seguimiento-chofer-' + idMovil)
            .on('postgres_changes', {
                event: 'UPDATE',
                schema: 'public',
                table: 'estado_movil',
                filter: 'id=eq.' + idMovil
            }, (payload) => {
                const movilActualizado = payload.new;
                procesarNuevaUbicacionCoche(movilActualizado.latitud, movilActualizado.longitud);
            })
            .subscribe();
    }

    function procesarNuevaUbicacionCoche(lat, lon) {
        if (!miViajeActivo || !datosViajeActivo || datosViajeActivo.length === 0 || pasajeroABordo) return;
        
        const viaje = datosViajeActivo[0];
        const sentido = (viaje.estado_movil && viaje.estado_movil.sentido_flujo) ? viaje.estado_movil.sentido_flujo : document.getElementById('sentido-select').value;
        const paradaPasajero = calcularParadaMasCerca(viaje.pasajero_lat || miLat, viaje.pasajero_lon || miLon);
        
        const paradaCoche = calcularParadaMasCerca(lat, lon);
        const puedeRecoger = movilPuedeRecoger(paradaCoche, paradaPasajero, sentido);
        
        if (!puedeRecoger && !cocheYaPaso) { 
            cocheYaPaso = true; 
            mostrarAlertaCochePasado(); 
        } else if (puedeRecoger && cocheYaPaso) { 
            cocheYaPaso = false; 
            actualizarPanelViajeActivo(false); 
        }
        
        actualizarMarcadorMiCoche(lat, lon, cocheYaPaso);
    }

    function mostrarAlertaCochePasado() {
        actualizarPanelViajeActivo(true);
        const container = document.getElementById('viaje-activo-container');
        const panel = container.querySelector('.viaje-activo-panel');
        if (panel) {
            const alertaExistente = panel.querySelector('.alerta-parada');
            if (!alertaExistente) {
                const alerta = document.createElement('div');
                alerta.className = 'alerta-parada';
                alerta.innerHTML = '<div class="alerta-parada-texto">EL COCHE YA PASO TU PARADA</div><div class="alerta-parada-sub">El conductor no puede retroceder. Finaliza el viaje para liberar tu asiento.</div>';
                const statusElement = panel.querySelector('.viaje-activo-status');
                if (statusElement) panel.insertBefore(alerta, statusElement);
            }
        }
        const btn = document.getElementById('btn-cancelar');
        btn.innerText = "FINALIZAR VIAJE (COCHE PASO)";
        btn.style.background = "linear-gradient(135deg, #ff4444, #c0392b)";
    }

    function actualizarPanelViajeActivo(alerta) {
        const container = document.getElementById('viaje-activo-container');
        const panel = container.querySelector('.viaje-activo-panel');
        if (!panel) return;
        if (alerta) {
            panel.classList.add('alerta-pasado');
            const status = panel.querySelector('.viaje-activo-status');
            if (status) { status.classList.add('alerta'); status.innerHTML = '<div class="status-dot alerta"></div><span>COCHE YA PASO - NO PUEDE RETROCEDER</span>'; }
        } else {
            panel.classList.remove('alerta-pasado');
            const status = panel.querySelector('.viaje-activo-status');
            if (status) { status.classList.remove('alerta'); status.innerHTML = '<div class="status-dot"></div><span>Conductor en camino...</span>'; }
        }
    }

    function actualizarMarcadorMiCoche(lat, lon, pasado) {
        if (markerMiCoche) map.removeLayer(markerMiCoche);
        const icono = pasado ? L.divIcon({ html: '<div style="font-size:30px; opacity:0.5; filter: grayscale(1);">🚕</div>', iconAnchor: [15, 15] }) : iconMiCoche;
        markerMiCoche = L.marker([lat, lon], { icon: icono, zIndexOffset: 1000 }).addTo(map);
        if (miLat !== 0) map.fitBounds(L.latLngBounds([miLat, miLon], [lat, lon]), { padding: [100, 100] });
    }

        const container = document.getElementById('viaje-activo-container');
        container.style.display = 'block';
        if (!datosViajeActivo || datosViajeActivo.length === 0) { container.innerHTML = '<div class="sin-coches">Ya tenes un viaje activo</div>'; return; }
        const viaje = datosViajeActivo[0];
        const movil = viaje.estado_movil || {};
        const destino = paradas[viaje.destino_idx] || {n: 'Destino'};
        const asientos = datosViajeActivo.map(v => v.asiento_num).join(', ');
        const estadoPax = viaje.estado_pasajero || 'esperando';
        container.innerHTML = '';
        const panel = document.createElement('div');
        panel.className = 'viaje-activo-panel';
        panel.id = 'viaje-activo-panel';
        const header = document.createElement('div');
        header.className = 'viaje-activo-header';
        const icono = document.createElement('div');
        icono.className = 'viaje-activo-icono';
        icono.textContent = estadoPax === 'a_bordo' ? '✅' : '🚗';
        const titulo = document.createElement('div');
        titulo.className = 'viaje-activo-titulo';
        titulo.innerHTML = '<p class="coche-numero">Coche ' + (viaje.id_movil || '---') + '</p><p class="conductor-nombre">' + (movil.chofer || 'Conductor') + '</p>';
        header.appendChild(icono); header.appendChild(titulo); panel.appendChild(header);
        const infoBox = document.createElement('div');
        infoBox.className = 'viaje-activo-info';
        infoBox.innerHTML = '<div class="info-box"><div class="info-box-label">Asiento(s)</div><div class="info-box-valor">' + asientos + '</div></div><div class="info-box"><div class="info-box-label">Tarifa</div><div class="info-box-valor">$' + (datosViajeActivo.length * 1000) + '</div></div>';
        panel.appendChild(infoBox);
        const destinoDiv = document.createElement('div');
        destinoDiv.className = 'viaje-activo-destino';
        destinoDiv.textContent = 'Destino: ' + destino.n;
        panel.appendChild(destinoDiv);
        const status = document.createElement('div');
        status.className = 'viaje-activo-status';
        status.id = 'viaje-status';
        if (estadoPax === 'a_bordo') status.innerHTML = '<div class="status-dot" style="background:#00d2ff;animation:none;box-shadow:0 0 8px #00d2ff;"></div><span>Ya estas a bordo - Viajando a destino</span>';
        else status.innerHTML = '<div class="status-dot"></div><span>Conductor en camino...</span>';
        panel.appendChild(status);
        container.appendChild(panel);
    }

    navigator.geolocation.watchPosition(p => {
        miLat = p.coords.latitude; miLon = p.coords.longitude;
        markerPasajero.setLatLng([miLat, miLon]);
        actualizarMapaRuta();
        if (!gpsListo) {
            gpsListo = true;
            document.getElementById('btn-pedir').disabled = false;
            if (!miViajeActivo) document.getElementById('btn-pedir').innerText = "SELECCIONA TU DESTINO";
        }
    }, (err) => { console.error("GPS Error:", err); document.getElementById('btn-pedir').innerText = "GPS NO DISPONIBLE"; }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });

    function actualizarMapaRuta() {
        const val = document.getElementById('destino-select').value;
        if (val !== "" && miLat !== 0) {
            const dest = paradas[val].c;
            guiaDestino.setLatLngs([[miLat, miLon], dest]);
            markerDestinoFlecha.setLatLng(dest).addTo(map);
            const bounds = L.latLngBounds([miLat, miLon], dest);
            map.fitBounds(bounds, { padding: [80, 80] });
        }
    }

    document.getElementById('destino-select').addEventListener('change', () => { actualizarMapaRuta(); renderizarFlotaDisponible(); });
    document.getElementById('sentido-select').addEventListener('change', () => { renderizarFlotaDisponible(); });

    function seleccionarAsiento(cocheId, numAsiento) {
        if (miViajeActivo) return;
        if (cocheSeleccionado && cocheSeleccionado !== cocheId) {
            asientosElegidos = [];
            document.querySelectorAll('.asiento-libre').forEach(el => el.classList.remove('seleccionado'));
            document.querySelectorAll('.coche-card').forEach(el => el.classList.remove('seleccionado'));
        }
        cocheSeleccionado = cocheId;
        const idx = asientosElegidos.indexOf(numAsiento);
        const el = document.getElementById('as-' + cocheId + '-' + numAsiento);
        if (idx > -1) {
            asientosElegidos.splice(idx, 1);
            if (el) el.classList.remove('seleccionado');
        } else {
            if (asientosElegidos.length >= 2) { alert("Maximo 2 asientos por pasajero"); return; }
            asientosElegidos.push(numAsiento);
            if (el) el.classList.add('seleccionado');
        }
        document.querySelectorAll('.coche-card').forEach(el => el.classList.remove('seleccionado'));
        const card = document.getElementById('coche-card-' + cocheId);
        if (card) card.classList.add('seleccionado');
        actualizarBoton();
    }

    function actualizarBoton() {
        const btn = document.getElementById('btn-pedir');
        let nuevoTexto = '', nuevoDisabled = true;
        if (!gpsListo) nuevoTexto = "BUSCANDO GPS...";
        else if (!document.getElementById('destino-select').value) nuevoTexto = "SELECCIONA TU DESTINO";
        else if (asientosElegidos.length > 0) { nuevoTexto = 'RESERVAR ' + asientosElegidos.length + ' ASIENTO(S)'; nuevoDisabled = false; }
        else nuevoTexto = "SELECCIONA UN ASIENTO";
        if (nuevoTexto !== ultimoEstadoBoton) { btn.innerText = nuevoTexto; btn.disabled = nuevoDisabled; ultimoEstadoBoton = nuevoTexto; }
    }

    async function renderizarFlotaDisponible() {
        if (miViajeActivo) return;
        const container = document.getElementById('flota-container');
        const sentido = document.getElementById('sentido-select').value;
        const destIdx = document.getElementById('destino-select').value;
        if (!destIdx) { container.innerHTML = '<div class="sin-coches">Selecciona tu destino para ver coches</div>'; ultimaFlotaHTML = ''; actualizarBoton(); return; }
        if (!gpsListo) { container.innerHTML = '<div class="sin-coches">Esperando señal GPS...</div>'; ultimaFlotaHTML = ''; actualizarBoton(); return; }
        container.innerHTML = '<div class="sin-coches"><span class="spinner"></span>Buscando moviles...</div>';
        actualizarBoton();
        try {
            const { data: rpcData, error: errMoviles } = await _s.rpc('obtener_flota', { p_sentido: sentido, p_destino_idx: parseInt(destIdx), p_lat: miLat, p_lon: miLon });
            if (errMoviles) throw errMoviles;
            const movilesRaw = (rpcData && rpcData.moviles) ? rpcData.moviles : [];
            const moviles = movilesRaw || [];
            const movilesConParada = moviles.map(m => ({ ...m, paradaCalculada: calcularParadaMasCerca(m.latitud, m.longitud), distancia: m.distancia || Math.sqrt(Math.pow(miLat - m.latitud, 2) + Math.pow(miLon - m.longitud, 2)) }));
            const movilesValidos = movilesConParada.filter(m => movilPuedeRecoger(m.paradaCalculada, parseInt(destIdx), sentido)).sort((a, b) => a.distancia - b.distancia);
            if (movilesValidos.length === 0) { container.innerHTML = '<div class="sin-coches"><b>No hay moviles disponibles</b><br>Todos ya pasaron tu parada o no hay online</div>'; ultimaFlotaHTML = ''; ultimoEstadoBoton = ''; actualizarBoton(); return; }
            let hayCochesConLugar = false;
            container.innerHTML = '';
            for (const movil of movilesValidos) {
                const asientosOcupados = {};
                const ocupadosArray = movil.asientos_ocupados || [];
                ocupadosArray.forEach(r => { asientosOcupados[r.asiento_num] = r.nombre_pasajero; });
                const asientosLibres = [1,2,3,4].filter(n => !asientosOcupados[n]);
                if (asientosLibres.length > 0) hayCochesConLugar = true;
                const estaSeleccionado = cocheSeleccionado === movil.id;
                const distanciaKm = (movil.distancia * 111).toFixed(1);
                const card = document.createElement('div');
                card.className = 'coche-card ' + (estaSeleccionado ? 'seleccionado' : '');
                card.id = 'coche-card-' + movil.id;
                card.innerHTML = '<div class="coche-header"><div><span class="coche-num">Coche ' + movil.id + '</span><div class="coche-info">' + (movil.chofer || 'Conductor') + '</div></div><div class="coche-dist">' + distanciaKm + ' km</div></div><div class="asientos-row" id="asientos-row-' + movil.id + '"></div><div class="coche-info" style="margin-top:4px;text-align:center;" id="disp-' + movil.id + '"></div>';
                const asientosRow = card.querySelector('#asientos-row-' + movil.id);
                for (let num = 1; num <= 4; num++) {
                    const nombreOcupante = asientosOcupados[num];
                    const seleccionado = estaSeleccionado && asientosElegidos.includes(num);
                    const asientoBox = document.createElement('div');
                    asientoBox.className = 'asiento-box ' + (nombreOcupante ? 'asiento-ocupado' : 'asiento-libre') + ' ' + (seleccionado ? 'seleccionado' : '');
                    asientoBox.id = 'as-' + movil.id + '-' + num;
                    if (!nombreOcupante) asientoBox.onclick = () => seleccionarAsiento(movil.id, num);
                    if (nombreOcupante) {
                        const nombreLimpio = escaparHTML(sanitizarInput(nombreOcupante));
                        const nombreCorto = nombreLimpio.length > 7 ? nombreLimpio.substring(0,6)+'...' : nombreLimpio;
                        asientoBox.innerHTML = '<div class="asiento-num">' + num + '</div><div class="asiento-nombre">' + nombreCorto + '</div><div class="asiento-lock">🔒</div>';
                        asientoBox.title = nombreLimpio;
                    } else {
                        asientoBox.innerHTML = '<div class="asiento-num">' + num + '</div><div style="font-size:9px;">LIBRE</div>';
                    }
                    asientosRow.appendChild(asientoBox);
                }
                const disp = card.querySelector('#disp-' + movil.id);
                if (asientosLibres.length === 0) disp.innerHTML = '<span style="color:#ff4444;">LLENO</span>';
                else if (asientosLibres.length === 4) disp.innerHTML = '<span style="color:#4cd964;">Todos libres</span>';
                else disp.textContent = asientosLibres.length + ' libre(s)';
                container.appendChild(card);
            }
            if (!hayCochesConLugar) { container.innerHTML = '<div class="sin-coches"><b>Todos los moviles estan llenos</b><br>Intenta en unos minutos</div>'; ultimaFlotaHTML = ''; ultimoEstadoBoton = ''; actualizarBoton(); return; }
            ultimaFlotaHTML = container.innerHTML;
            actualizarBoton();
        } catch (err) {
            console.error("Error:", err);
            container.innerHTML = '<div class="sin-coches"><b>Error de conexion</b><br>Verifica tu internet</div>';
            ultimaFlotaHTML = ''; ultimoEstadoBoton = ''; actualizarBoton();
        }
    }

    async function confirmarViajePasajero() {
        const nomRaw = document.getElementById('nombre-input').value.trim();
        const nom = sanitizarInput(nomRaw);
        if (!nom || nom.length < 2) { alert("Ingresa un nombre valido (solo letras, maximo 20 caracteres)."); document.getElementById('nombre-input').value = ''; return; }
        document.getElementById('nombre-input').value = nom;
        const destIdx = parseInt(document.getElementById('destino-select').value);
        if (isNaN(destIdx)) { alert("Selecciona una parada de destino."); return; }
        if (!cocheSeleccionado || asientosElegidos.length === 0) { alert("Selecciona un coche y al menos un asiento."); return; }
        const btn = document.getElementById('btn-pedir');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>RESERVANDO...';
        try {
            const { data: rpcData, error } = await _s.rpc('reservar_asientos', { p_nombre: nom, p_id_movil: cocheSeleccionado, p_asientos: asientosElegidos, p_destino_idx: destIdx, p_lat: miLat, p_lon: miLon });
            if (error) throw error;
            if (rpcData && rpcData.colision) { alert("Algunos asientos ya fueron tomados. Eleji otros."); asientosElegidos = []; cocheSeleccionado = null; ultimaFlotaHTML = ''; renderizarFlotaDisponible(); return; }
            if (rpcData && rpcData.success) {
                localStorage.setItem('usuario_nombre', nom);
                miNombrePasajero = nom;
                location.reload();
            } else { throw new Error("Respuesta inesperada del servidor"); }
        } catch (err) {
            console.error("Error:", err);
            alert(err.message || "Error de conexion.");
            btn.disabled = false;
            btn.innerText = "SELECCIONA UN ASIENTO";
        }
    }

    async function finalizarViaje() {
        const btn = document.getElementById('btn-cancelar');
        let nombreFinal = miNombrePasajero;
        if (!nombreFinal) { nombreFinal = document.getElementById('nombre-input').value.trim(); }
        if (!nombreFinal) {
            const nombreGuardado = localStorage.getItem('usuario_nombre');
            if (nombreGuardado) { nombreFinal = nombreGuardado; miNombrePasajero = nombreGuardado; }
        }
        if (!nombreFinal) { alert("Error: No se encontro tu nombre."); btn.disabled = false; btn.innerText = "TERMINAR MI VIAJE"; return; }
        if (btn.disabled) return;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>FINALIZANDO...';
        let finalizado = false;
        try {
            const { data: rpcData, error } = await _s.rpc('finalizar_viaje', { p_nombre: nombreFinal });
            if (!error && rpcData && rpcData.success) { finalizado = true; }
        } catch (err) { console.warn("RPC finalizar fallo:", err); }
        if (!finalizado) {
            try {
                const { data, error } = await _s.from('reservas_activas')
                    .update({ estado: 'finalizado' })
                    .eq('nombre_pasajero', nombreFinal)
                    .eq('estado', 'en_curso')
                    .select();
                if (!error && data && data.length > 0) { finalizado = true; }
                else if (!error && (!data || data.length === 0)) { finalizado = true; }
            } catch (err2) { console.error("Directo tambien fallo:", err2); }
        }
        mostrarToast(finalizado ? 'Viaje finalizado' : 'Se limpio la pantalla', finalizado ? 'success' : 'warning');
        limpiarEstadoViaje();
    }

    function limpiarEstadoViaje() {
        if (intervaloVerificarLlegada) clearInterval(intervaloVerificarLlegada);
        if (timerLlegada) clearInterval(timerLlegada);
        if (intervaloPolling) clearInterval(intervaloPolling);
        if (timerAutoCerrarAnuncio) clearTimeout(timerAutoCerrarAnuncio);
        if (canalRealtime) { try { canalRealtime.unsubscribe(); } catch(e) {} canalRealtime = null; }
        if (canalSeguimientoAuto) { try { canalSeguimientoAuto.unsubscribe(); } catch(e) {} canalSeguimientoAuto = null; }
        localStorage.removeItem('usuario_nombre');
        miNombrePasajero = '';
        miViajeActivo = false;
        pasajeroABordo = false;
        asientosElegidos = [];
        cocheSeleccionado = null;
        datosViajeActivo = null;
        cocheYaPaso = false;
        llegadaMostrada = false;
        limpiarUI();
        const splash = document.getElementById('splash');
        if (splash) splash.style.visibility = 'hidden';
        location.reload();
    }

    function limpiarUI() {
        document.body.classList.remove('viaje-activo', 'a-bordo');
        document.getElementById('btn-pedir').style.display = 'block';
        document.getElementById('btn-cancelar').style.display = 'none';
        document.getElementById('nombre-input').disabled = false;
        document.getElementById('destino-select').disabled = false;
        document.getElementById('sentido-select').disabled = false;
        document.getElementById('viaje-activo-container').style.display = 'none';
        document.getElementById('viaje-activo-container').innerHTML = '';
        document.getElementById('btn-cancelar').innerText = "TERMINAR MI VIAJE";
        document.getElementById('btn-cancelar').style.background = "linear-gradient(135deg, #ff3b30, #c0392b)";
    }

    async function actualizarMapaTaxis() {
        if (miViajeActivo) return; // Si el viaje está activo, se encarga el canal realtime individual
        const sentidoSeleccionado = document.getElementById('sentido-select').value;
        const destIdx = document.getElementById('destino-select').value;
        try {
            const { data: rpcData, error } = await _s.rpc('obtener_taxis', { p_sentido: sentidoSeleccionado });
            if (error) throw error;
            const moviles = (rpcData && Array.isArray(rpcData)) ? rpcData : (rpcData && rpcData.taxis && Array.isArray(rpcData.taxis)) ? rpcData.taxis : [];
            if (moviles.length > 0) {
                const idsOnline = moviles.map(m => m.id.toString());
                Object.keys(markerTaxis).forEach(id => {
                    if (!idsOnline.includes(id)) { map.removeLayer(markerTaxis[id]); delete markerTaxis[id]; }
                });
                moviles.forEach(t => {
                    let yaPaso = false;
                    if (destIdx !== "") { const paradaMovil = calcularParadaMasCerca(t.latitud || t.lat, t.longitud || t.lon); yaPaso = !movilPuedeRecoger(paradaMovil, parseInt(destIdx), sentidoSeleccionado); }
                    const iconoUsar = yaPaso ? iconTPasado : iconT;
                    const lat = t.latitud || t.lat || 0;
                    const lon = t.longitud || t.lon || 0;
                    if (markerTaxis[t.id]) { markerTaxis[t.id].setLatLng([lat, lon]); markerTaxis[t.id].setIcon(iconoUsar); }
                    else { markerTaxis[t.id] = L.marker([lat, lon], { icon: iconoUsar }).addTo(map); }
                });
            }
        } catch (err) { console.error("Error actualizando flota:", err); }
    }

    setInterval(() => { if (!miViajeActivo) actualizarMapaTaxis(); }, 15000);
    actualizarMapaTaxis();
</script>
