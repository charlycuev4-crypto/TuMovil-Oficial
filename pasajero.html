<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pasajero - Tu Móvil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #f0f0f0; height: 100vh; font-family: 'Arial', sans-serif; overflow: hidden; }

        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        /* SELECTOR ESTILO CONDUCTOR */
        .top-panel {
            position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1000;
            background: rgba(0, 0, 0, 0.85); border: 2px solid #00d4ff;
            border-radius: 12px; padding: 10px; color: white;
        }
        select {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: #222; color: white; font-size: 16px; margin-top: 5px;
        }

        /* ASIENTOS ESTILO CONDUCTOR (Reflejo) */
        .bottom-panel {
            position: absolute; bottom: 25px; left: 0; right: 0;
            display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 1000;
        }
        .asientos-cont {
            display: flex; gap: 10px; background: rgba(0, 0, 0, 0.8);
            padding: 12px 15px; border-radius: 20px; border: 1px solid #00d4ff;
        }
        .btn-as {
            width: 52px; height: 52px; border-radius: 10px; border: 2px solid #00d4ff;
            background: transparent; color: #00d4ff; font-size: 20px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        /* Rojo cuando el conductor lo ocupa o alguien reservó */
        .ocupado { background: #ff3b30 !important; border-color: #ff3b30 !important; color: white !important; }
        /* Verde cuando el pasajero actual selecciona para reservar */
        .mi-reserva { background: #00ff88 !important; border-color: white !important; color: black !important; }

        .distancia-label {
            background: #00d4ff; color: black; padding: 5px 15px;
            border-radius: 20px; font-weight: bold; font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="top-panel">
        <label style="font-size: 10px; color: #00d4ff; font-weight: bold;">¿DÓNDE BAJÁS?</label>
        <select id="paradas-select" onchange="irAParada()">
            <option value="">Seleccioná tu parada...</option>
        </select>
    </div>

    <div class="bottom-panel">
        <div id="distancia-visor" class="distancia-label">MÓVIL EN CAMINO...</div>
        <div class="asientos-cont">
            <button id="b1" class="btn-as" onclick="confirmarLugar(1)">1</button>
            <button id="b2" class="btn-as" onclick="confirmarLugar(2)">2</button>
            <button id="b3" class="btn-as" onclick="confirmarLugar(3)">3</button>
            <button id="b4" class="btn-as" onclick="confirmarLugar(4)">4</button>
        </div>
        <span style="color: white; font-size: 10px; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 10px;">TOCÁ UN ASIENTO LIBRE PARA RESERVAR</span>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    const paradas = {
        "maternidad": { n: "Maternidad Estela de Carlotto", c: [-34.5855, -58.7498] },
        "barrio202": { n: "Barrio 202", c: [-34.5690, -58.7670] },
        "stabriga": { n: "Santa Brígida (Centro)", c: [-34.5611, -58.7705] }
    };

    // Llenar el select
    const sel = document.getElementById('paradas-select');
    for (let key in paradas) {
        let opt = document.createElement('option');
        opt.value = key; opt.innerText = paradas[key].n;
        sel.appendChild(opt);
    }

    const map = L.map('map', { zoomControl: false }).setView([-34.5611, -58.7705], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let markerMovil = L.marker([-34.5611, -58.7705], {
        icon: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [35, 35] })
    }).addTo(map);

    let markerDestino = L.marker([0,0], { opacity: 0 }).addTo(map);

    // ESCUCHAR AL CONDUCTOR Y ACTUALIZAR ASIENTOS
    _s.channel('cambios-pasajero').on('postgres_changes', {event:'UPDATE', schema:'public', table:'estado_movil'}, payload => {
        const d = payload.new;
        markerMovil.setLatLng([d.latitud, d.longitud]);
        actualizarAsientosVisual(d.asientos_libres);
    }).subscribe();

    function actualizarAsientosVisual(libres) {
        const ocupados = 4 - libres;
        for(let i=1; i<=4; i++) {
            const btn = document.getElementById('b'+i);
            if(i <= ocupados) {
                btn.className = 'btn-as ocupado';
                btn.disabled = true;
            } else {
                btn.className = 'btn-as';
                btn.disabled = false;
            }
        }
    }

    async function confirmarLugar(nro) {
        const confirmacion = confirm("¿Querés reservar el asiento " + nro + "?");
        if(!confirmacion) return;

        const { data } = await _s.from('estado_movil').select('asientos_libres').eq('id', 1).single();
        
        if(data.asientos_libres > 0) {
            const nuevosLibres = data.asientos_libres - 1;
            await _s.from('estado_movil').update({ asientos_libres: nuevosLibres }).eq('id', 1);
            
            // Efecto visual de reserva propia
            document.getElementById('b'+nro).className = 'btn-as mi-reserva';
            alert("¡Lugar confirmado! El chofer ya lo ve en su panel.");
        }
    }

    function irAParada() {
        const p = paradas[sel.value];
        if(p) {
            markerDestino.setLatLng(p.c).setOpacity(1).bindPopup(p.n).openPopup();
            map.flyTo(p.c, 16);
        }
    }
</script>
</body>
</html>
