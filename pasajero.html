<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - Pasajero</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; color: white; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .top-ui { position: absolute; top: 10px; width: 100%; padding: 0 15px; z-index: 1000; box-sizing: border-box; }
        .dest-card { background: rgba(25, 25, 25, 0.95); border: 2px solid #FFD700; border-radius: 15px; padding: 12px; }
        input#nombre-pax { width: 100%; background: rgba(255,255,255,0.1); color: #4cd964; border: 1px solid #4cd964; border-radius: 8px; padding: 12px; font-weight: bold; margin-bottom: 10px; outline: none; box-sizing: border-box; font-size: 16px; }
        select { width: 100%; background: #222; color: white; border: 1px solid #333; border-radius: 8px; padding: 12px; font-size: 16px; }
        .bottom-panel { position: absolute; bottom: 15px; width: 92%; left: 4%; background: rgba(15, 15, 15, 0.95); border: 2px solid #00d4ff; border-radius: 25px; padding: 15px; z-index: 1000; box-sizing: border-box; }
        .asientos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .btn-as { aspect-ratio: 1; border: 2px solid #00d4ff; border-radius: 12px; background: transparent; color: #00d4ff; font-weight: bold; font-size: 18px; }
        .btn-as.selected { background: #4cd964 !important; color: #000 !important; border-color: #4cd964 !important; }
        .btn-confirm { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; background: #333; color: #666; pointer-events: none; font-size: 18px; }
        .btn-confirm.ready { background: #00d4ff !important; color: black !important; pointer-events: auto !important; }
        .btn-cancel { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; background: #ff3b30; color: white; display: none; }
        .taxi-icon { font-size: 30px; }
    </style>
</head>
<body>
    <div class="top-ui">
        <div class="dest-card">
            <input type="text" id="nombre-pax" placeholder="TU NOMBRE" oninput="validarFormulario()">
            <select id="select-destino" onchange="autoSeleccionar()">
                <option value="" disabled selected>¿A DÓNDE VAS?</option>
            </select>
        </div>
    </div>
    <div id="map"></div>
    <div class="bottom-panel">
        <div class="asientos-grid">
            <button class="btn-as" id="b1" onclick="toggleAsiento(1)">1</button>
            <button class="btn-as" id="b2" onclick="toggleAsiento(2)">2</button>
            <button class="btn-as" id="b3" onclick="toggleAsiento(3)">3</button>
            <button class="btn-as" id="b4" onclick="toggleAsiento(4)">4</button>
        </div>
        <button id="btn-accion" class="btn-confirm" onclick="confirmarReserva()">Confirmar Reserva</button>
        <button id="btn-finalizar" class="btn-cancel" onclick="finalizarViaje()">Finalizar Mi Viaje</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    const paradas = [{n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]}, {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]}, {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]}, {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]}, {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]}, {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]}, {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]}, {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]}, {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]}, {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]}, {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]}, {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]}, {n:'Abasto y Roca', c:[-34.586030, -58.747278]}];

    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.polyline(paradas.map(p => p.c), {color: '#00d4ff', weight: 4, opacity: 0.6}).addTo(map);
    paradas.forEach(p => L.circleMarker(p.c, { radius: 5, color: '#00d4ff', fillColor: '#000', fillOpacity: 1 }).addTo(map));

    const sel = document.getElementById('select-destino');
    paradas.forEach((p,i) => { sel.innerHTML += `<option value="${i}">${p.n}</option>`; });

    let mYo = L.circleMarker([0,0], { color: '#4cd964', radius: 10, fillOpacity: 1, weight: 3 }).addTo(map);
    let mTaxi = L.marker([0,0], { icon: L.divIcon({ html: '🚕', className: 'taxi-icon' }) }).addTo(map);
    let miLat, miLon, asientosElegidos = [];

    navigator.geolocation.watchPosition(p => {
        miLat = p.coords.latitude; miLon = p.coords.longitude;
        mYo.setLatLng([miLat, miLon]);
    }, null, { enableHighAccuracy: true });

    async function trackTaxi() {
        const { data } = await _s.from('estado_movil').select('*').limit(1).single();
        if (data && data.en_servicio) mTaxi.setLatLng([data.latitud, data.longitud]).setOpacity(1);
        else mTaxi.setOpacity(0);
    }
    setInterval(trackTaxi, 4000);

    function autoSeleccionar() {
        if(asientosElegidos.length === 0) toggleAsiento(1);
        validarFormulario();
    }

    function toggleAsiento(n) {
        if(localStorage.getItem('v_curso')) return;
        const btn = document.getElementById('b'+n);
        const idx = asientosElegidos.indexOf(n);
        if(idx > -1) { asientosElegidos.splice(idx, 1); btn.classList.remove('selected'); }
        else { asientosElegidos.push(n); btn.classList.add('selected'); }
        validarFormulario();
    }

    function validarFormulario() {
        const d = document.getElementById('select-destino').value;
        const n = document.getElementById('nombre-pax').value.trim();
        const btn = document.getElementById('btn-accion');
        if(asientosElegidos.length > 0 && d !== "" && n !== "") btn.classList.add('ready');
        else btn.classList.remove('ready');
    }

    async function confirmarReserva() {
        const nombre = document.getElementById('nombre-pax').value.trim();
        const destIdx = parseInt(document.getElementById('select-destino').value);
        const res = asientosElegidos.map(num => ({
            asiento_num: num, pasajero_lat: miLat, pasajero_lon: miLon,
            destino_idx: destIdx, nombre_pasajero: nombre, estado: 'en_curso'
        }));
        const { error } = await _s.from('reservas_activas').insert(res);
        if(!error) {
            localStorage.setItem('v_curso', 'true');
            localStorage.setItem('mi_n', nombre);
            location.reload();
        }
    }

    if(localStorage.getItem('v_curso')) {
        document.getElementById('btn-accion').style.display = 'none';
        document.getElementById('btn-finalizar').style.display = 'block';
        document.getElementById('nombre-pax').disabled = true;
    }
    function finalizarViaje() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
