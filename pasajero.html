<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pasajero - MÓVIL EN VIVO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; font-family: 'Arial', sans-serif; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.8s;
        }
        .logo-m {
            width: 90px; height: 90px; border: 3px solid #00d4ff;
            border-radius: 25px; color: #00d4ff; font-size: 55px;
            font-weight: bold; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 0 25px #00d4ff;
            margin-bottom: 20px;
        }
        .text-m { color: white; font-size: 20px; font-weight: bold; letter-spacing: 2px; }

        .overlay { position: absolute; z-index: 1000; width: 100%; display: flex; justify-content: center; padding: 10px; }
        .top { top: 10px; }
        .bottom { bottom: 20px; flex-direction: column; align-items: center; }

        .card { 
            background: #000; border: 2px solid #00d4ff; 
            border-radius: 20px; padding: 15px; width: 95%;
            text-align: center; box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        select {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333;
            background: #1a1a1a; color: #fff; font-size: 16px;
        }

        .asientos-grid { display: flex; gap: 12px; margin-bottom: 10px; justify-content: center; }
        .btn-as { 
            width: 60px; height: 60px; border-radius: 15px; border: 2px solid #00d4ff; 
            background: transparent; color: #00d4ff; font-weight: bold; font-size: 22px; 
        }
        .ocupado { background: #ff3b30 !important; border-color: #ff3b30 !important; color: white !important; }
        
        /* BOTÓN FINALIZAR VIAJE PASAJERO */
        .btn-fin {
            background: #ff3b30; color: white; border: none; padding: 10px;
            border-radius: 10px; font-weight: bold; width: 100%;
            margin-top: 10px; text-transform: uppercase; display: none;
        }

        .instruccion { color: #fff; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .dist-tag { background: #00d4ff; color: #000; padding: 5px 15px; border-radius: 10px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="splash"><div class="logo-m">M</div><div class="text-m">MÓVIL EN VIVO</div></div>
    <div id="map"></div>

    <div class="overlay top">
        <div class="card" style="background: #111;">
            <span style="color:#00d4ff; font-size:11px; font-weight:bold; display:block; margin-bottom:5px;">📍 TU DESTINO</span>
            <select id="sel-p" onchange="marcarDestino()"></select>
        </div>
    </div>

    <div class="overlay bottom">
        <div id="ui-dist" class="dist-tag" style="display:none;">DISTANCIA: <span id="v-dist">0</span>m</div>
        <div class="card">
            <div class="asientos-grid">
                <button id="as1" class="btn-as" onclick="reservar(1)">1</button>
                <button id="as2" class="btn-as" onclick="reservar(2)">2</button>
                <button id="as3" class="btn-as" onclick="reservar(3)">3</button>
                <button id="as4" class="btn-as" onclick="reservar(4)">4</button>
            </div>
            <div id="txt-inst" class="instruccion">Presione un asiento para viajar</div>
            <button id="btn-finalizar" class="btn-fin" onclick="finalizarMiViaje()">Finalizar mi viaje</button>
        </div>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    let miAsiento = null;

    const paradas = [{n:'M. Cané y Marchena', c:[-34.561128, -58.770586]}, {n:'Murillo 601', c:[-34.565342, -58.772061]}, {n:'Cruce Castelar', c:[-34.586030, -58.747278]}];
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const busIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448333.png', iconSize: [35, 35] });
    let markerBus = L.marker(paradas[0].c, { icon: busIcon }).addTo(map);
    let miPos = null;

    navigator.geolocation.watchPosition(p => { miPos = [p.coords.latitude, p.coords.longitude]; }, null, {enableHighAccuracy:true});

    const sel = document.getElementById('sel-p');
    paradas.forEach((p, i) => { let o = document.createElement('option'); o.value = i; o.text = p.n; sel.add(o); });

    function marcarDestino() {
        const p = paradas[sel.value];
        map.flyTo(p.c, 16);
        L.marker(p.c).addTo(map).bindPopup("Tu parada").openPopup();
    }

    async function reservar(n) {
        if (miAsiento !== null) return;
        if (navigator.vibrate) navigator.vibrate(80);
        
        const { data } = await _s.from('estado_movil').select('asientos_libres').eq('id', 1).single();
        if(data && data.asientos_libres > 0) {
            await _s.from('estado_movil').update({ asientos_libres: data.asientos_libres - 1 }).eq('id', 1);
            miAsiento = n;
            document.getElementById('btn-finalizar').style.display = 'block';
            document.getElementById('txt-inst').innerText = "VIAJE EN CURSO - ASIENTO " + n;
        }
    }

    async function finalizarMiViaje() {
        const { data } = await _s.from('estado_movil').select('asientos_libres').eq('id', 1).single();
        if(data) {
            await _s.from('estado_movil').update({ asientos_libres: data.asientos_libres + 1 }).eq('id', 1);
            miAsiento = null;
            document.getElementById('btn-finalizar').style.display = 'none';
            document.getElementById('txt-inst').innerText = "Presione un asiento para viajar";
            alert("Has finalizado tu viaje. ¡Gracias!");
        }
    }

    _s.channel('cambios').on('postgres_changes', {event:'UPDATE', schema:'public', table:'estado_movil'}, r => {
        markerBus.setLatLng([r.new.latitud, r.new.longitud]);
        if(miPos) {
            const d = map.distance(markerBus.getLatLng(), miPos);
            document.getElementById('ui-dist').style.display = 'block';
            document.getElementById('v-dist').innerText = Math.round(d);
        }
        const ocup = 4 - r.new.asientos_libres;
        for(let i=1; i<=4; i++) {
            document.getElementById('as'+i).className = 'btn-as ' + (i <= ocup ? 'ocupado' : '');
        }
    }).subscribe();

    setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => document.getElementById('splash').style.display = 'none', 800); }, 2000);
</script>
</body>
</html>
