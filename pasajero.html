<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Conexión - Pasajero</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; text-align: center; background: #f0f2f5; }
        #map { height: 50vh; width: 100%; }
        .panel-prueba { height: 50vh; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px 20px 0 0; margin-top: -20px; position: relative; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .btn-test { background: #28a745; color: white; border: none; padding: 20px 40px; font-size: 24px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(40,167,69,0.3); transition: 0.3s; }
        .btn-test:active { transform: scale(0.95); background: #218838; }
        #status-msg { margin-top: 15px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="panel-prueba">
        <p style="color:#888; font-weight: bold;">TOCÁ PARA PROBAR CONEXIÓN</p>
        <button id="btn-asiento" class="btn-test" onclick="probarComunicacion()">?</button>
        <p id="status-msg">Esperando señal de Supabase...</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const _supabase = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52dW1kbHhlcnZyZXdxaWlhaWNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTA4NTMsImV4cCI6MjA4OTg4Njg1M30.ejh7dtL2O6JHeoVq47cUK_hXAfRetJPyzks1yI-Lrhs');

        var map = L.map('map').setView([-34.5747, -58.7744], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var carMarker = L.marker([-34.5747, -58.7744]).addTo(map);

        // Función para enviar un cambio desde el pasajero
        async function probarComunicacion() {
            const boton = document.getElementById('btn-asiento');
            const actual = boton.innerText === "?" ? 4 : parseInt(boton.innerText);
            const nuevoValor = actual > 0 ? actual - 1 : 4; // Va bajando de 4 a 0

            document.getElementById('status-msg').innerText = "Enviando señal...";
            
            const { error } = await _supabase
                .from('estado_movil')
                .update({ asientos_libres: nuevoValor })
                .eq('id', 1);

            if (error) {
                document.getElementById('status-msg').innerText = "Error: " + error.message;
            }
        }

        // Escuchar la respuesta (si Supabase lo cambia, el botón se actualiza)
        _supabase.channel('test_canal').on('postgres_changes', 
            { event: 'UPDATE', schema: 'public', table: 'estado_movil', filter: 'id=eq.1' }, 
            (payload) => {
                const { latitud, longitud, asientos_libres } = payload.new;
                document.getElementById('btn-asiento').innerText = asientos_libres;
                carMarker.setLatLng([latitud, longitud]);
                map.panTo([latitud, longitud]);
                document.getElementById('status-msg').innerText = "¡Conexión OK! " + new Date().toLocaleTimeString();
            }
        ).subscribe();

        // Carga inicial
        async function inicio() {
            const { data } = await _supabase.from('estado_movil').select('*').eq('id', 1).single();
            if (data) {
                document.getElementById('btn-asiento').innerText = data.asientos_libres;
                carMarker.setLatLng([data.latitud, data.longitud]);
            }
        }
        inicio();
    </script>
</body>
</html>
