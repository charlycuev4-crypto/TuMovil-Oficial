<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero Inteligente</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
        
        #map { flex-grow: 1; width: 100%; }
        .bottom-ui { background: var(--panel); border-top: 2px solid var(--celeste); padding: 15px; display: flex; flex-direction: column; gap: 10px; border-radius: 25px 25px 0 0; z-index: 100; box-shadow: 0 -10px 25px rgba(0,0,0,0.5); }
        
        .selector-sentido { display: flex; gap: 10px; margin-bottom: 5px; }
        .btn-sentido { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid #444; background: #2a2a2a; color: white; font-weight: bold; cursor: pointer; }
        .btn-sentido.active { border-color: var(--celeste); box-shadow: 0 0 10px var(--celeste); }

        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .asientos-grid { display: flex; justify-content: space-around; }
        .asiento-btn { width: 50px; height: 50px; border: 2px solid var(--celeste); border-radius: 12px; background: transparent; color: var(--celeste); font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .asiento-btn.selected { background: var(--amarillo); border-color: var(--amarillo); color: #000; }
        .btn-pedir { background: #28a745; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="bottom-ui">
        <div class="selector-sentido">
            <button id="btn-ida" class="btn-sentido" onclick="seleccionarSentido(true)">IDA (Santa Brígida → Cruce)</button>
            <button id="btn-vuelta" class="btn-sentido" onclick="seleccionarSentido(false)">VUELTA (Cruce → Santa Brígida)</button>
        </div>
        
        <input type="text" id="nombre-input" placeholder="Tu Nombre">
        <select id="destino-select">
            <option value="" disabled selected>¿A qué parada vas?</option>
        </select>

        <div class="asientos-grid">
            <div class="asiento-btn" onclick="toggleAsiento(1)" id="as-1">1</div>
            <div class="asiento-btn" onclick="toggleAsiento(2)" id="as-2">2</div>
            <div class="asiento-btn" onclick="toggleAsiento(3)" id="as-3">3</div>
            <div class="asiento-btn" onclick="toggleAsiento(4)" id="as-4">4</div>
        </div>

        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajePasajero()">SOLICITAR VIAJE</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    // Variables globales
    let sentidoSeleccionado = null; 
    let asientosElegidos = [];
    let miLat = 0, miLon = 0;

    // Lógica del nuevo selector
    function seleccionarSentido(esIda) {
        sentidoSeleccionado = esIda;
        document.getElementById('btn-ida').className = esIda ? 'btn-sentido active' : 'btn-sentido';
        document.getElementById('btn-vuelta').className = !esIda ? 'btn-sentido active' : 'btn-sentido';
    }

    // --- AQUÍ ESTÁ LA LÓGICA INTELIGENTE ACTUALIZADA ---
    async function confirmarViajePasajero() {
        const nom = document.getElementById('nombre-input').value;
        const destIdx = parseInt(document.getElementById('destino-select').value);
        
        // Validación de sentido
        if (sentidoSeleccionado === null) { alert("Por favor, selecciona si vas de IDA o VUELTA."); return; }
        
        if (!nom || isNaN(destIdx) || asientosElegidos.length === 0) { 
            alert("Completa todos los datos."); return; 
        }

        // BUSCAMOS USANDO EL SENTIDO QUE EL USUARIO ELIGIÓ (sentidoSeleccionado)
        const { data: moviles, error } = await _s.from('estado_movil')
            .select('id')
            .eq('en_servicio', true)
            .eq('hacia_adelante', sentidoSeleccionado) // Ya no adivinamos, usamos la elección
            .gt('asientos_libres', 0);

        if (error || !moviles || moviles.length === 0) { 
            alert("No hay choferes disponibles en el sentido seleccionado."); 
            return; 
        }

        const choferAsignado = moviles[0].id;
        
        const res = asientosElegidos.map(n => ({ 
            asiento_num: n, id_movil: choferAsignado, estado: 'en_curso', 
            nombre_pasajero: nom, pasajero_lat: miLat, pasajero_lon: miLon, destino_idx: destIdx 
        }));

        const { error: insertError } = await _s.from('reservas_activas').insert(res);
        if(!insertError) { alert("¡Viaje solicitado!"); location.reload(); }
    }

    // --- Resto de funciones (toggleAsiento, etc.) ---
    function toggleAsiento(num) {
        const i = asientosElegidos.indexOf(num);
        if(i > -1) { asientosElegidos.splice(i, 1); document.getElementById('as-'+num).classList.remove('selected'); }
        else { asientosElegidos.push(num); document.getElementById('as-'+num).classList.add('selected'); }
    }

    // (Aquí iría el resto de tu código original de mapa y paradas...)
</script>
</body>
</html>
