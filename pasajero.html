<script>

    // ... (Mantener la constante rutaOficial igual) ...

    let miLat, miLon, asientoElegido = null, idReservaActual = null;

    // --- NUEVA FUNCIÓN: RECUPERAR VIAJE SI SE CIERRA LA APP ---
    async function recuperarSesion() {
        // Buscamos si hay un viaje 'en_curso' (podés filtrarlo por ID si tuvieras login, 
        // pero por ahora buscamos el último activo para probar)
        const { data, error } = await _s.from('reservas_activas')
            .select('*')
            .eq('estado', 'en_curso')
            .order('created_at', { ascending: false })
            .limit(1);

        if (data && data.length > 0) {
            idReservaActual = data[0].id;
            // Bloqueamos la interfaz porque ya hay un viaje activo
            document.getElementById('btn-accion').style.display = 'none';
            document.getElementById('btn-finalizar').style.display = 'block';
            document.getElementById('grid-asientos').style.pointerEvents = 'none';
            document.getElementById('v-total').innerText = '$1000';
            console.log("Sesión recuperada: Viaje ID " + idReservaActual);
        }
    }

    // GPS y Marcadores (Igual que antes)
    navigator.geolocation.watchPosition(p => {
        miLat = p.coords.latitude; miLon = p.coords.longitude;
        if(typeof miMarcador !== 'undefined') miMarcador.setLatLng([miLat, miLon]);
    }, null, { enableHighAccuracy: true });

    // ... (Mantener funciones seleccionarAsiento y validarFormulario igual) ...

    async function confirmarReserva() {
        const destIdx = document.getElementById('select-destino').value;
        if(destIdx === "") return alert("Selecciona un destino");
        
        const { data, error } = await _s.from('reservas_activas').insert([{
            asiento_num: asientoElegido,
            pasajero_lat: miLat,
            pasajero_lon: miLon,
            destino_idx: parseInt(destIdx),
            estado: 'en_curso'
        }]).select();

        if(!error) {
            idReservaActual = data[0].id;
            document.getElementById('btn-accion').style.display = 'none';
            document.getElementById('btn-finalizar').style.display = 'block';
            document.getElementById('grid-asientos').style.pointerEvents = 'none';
        }
    }

    async function finalizarViaje() {
        if(!confirm("¿Llegaste?")) return;
        await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('id', idReservaActual);
        // Al finalizar, limpiamos la pantalla
        location.reload();
    }

    // INICIO: Al cargar la página, intentamos recuperar la sesión
    recuperarSesion();
    
    // Quitar splash (Igual que antes)
    setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => document.getElementById('splash').style.display = 'none', 800); }, 2500);
</script>
