<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - Pasajero</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; }
        #map { height: 50vh; width: 100%; }
        
        .pax-card { background: #111; border: 2px solid #FFD700; margin: 10px; padding: 10px; border-radius: 10px; text-align: center; }
        .pax-name { color: #FFD700; font-weight: bold; font-size: 20px; }

        .radar-flota { display: flex; justify-content: space-around; padding: 10px; background: #222; font-size: 12px; }
        .movil-info { padding: 5px; border-radius: 5px; }

        .btn-as { width: 60px; height: 60px; margin: 5px; border: 2px solid #4cd964; background: transparent; color: #4cd964; border-radius: 10px; font-weight: bold; }
        .btn-as.selected { background: #4cd964; color: black; }
        
        .btn-confirm { width: 90%; margin: 10px 5%; padding: 20px; background: #4cd964; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <div class="pax-card">
        <div class="pax-name">CARLOS</div>
    </div>

    <div class="radar-flota" id="radar-flota">
        <span>Móvil 1: --</span> <span>Móvil 2: --</span> <span>Móvil 3: --</span>
    </div>

    <div id="map"></div>

    <div style="text-align: center; padding: 10px;">
        <select id="select-destino" style="width: 90%; padding: 10px; border-radius: 8px;">
            <option value="" disabled selected>SELECCIONÁ TU DESTINO</option>
        </select>
        
        <div style="margin-top: 15px;">
            <button class="btn-as" id="as-1" onclick="toggleAsiento(1)">1</button>
            <button class="btn-as" id="as-2" onclick="toggleAsiento(2)">2</button>
            <button class="btn-as" id="as-3" onclick="toggleAsiento(3)">3</button>
            <button class="btn-as" id="as-4" onclick="toggleAsiento(4)">4</button>
        </div>

        <button class="btn-confirm" id="btn-confirmar" onclick="confirmarViaje()">CONFIRMAR VIAJE ($0)</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    // Configuración de Paradas (Línea con borde negro)
    const paradas = [{n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Roca y Abasto', c:[-34.586030, -58.747278]} /* ... agregar todas ... */];
    let map = L.map('map', {zoomControl: false}).setView(paradas[0].c, 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    paradas.forEach((p, i) => {
        L.circleMarker(p.c, { radius: 8, color: '#000', weight: 3, fillColor: '#00d4ff', fillOpacity: 1 }).addTo(map);
        document.getElementById('select-destino').innerHTML += `<option value="${i}">${p.n}</option>`;
    });

    let asientosElegidos = [];
    let conteoFlota = {1:0, 2:0, 3:0};

    // REPASO INTELIGENTE: Mira cuántos asientos tiene cada móvil
    async function actualizarRadar() {
        const { data } = await _s.from('reservas_activas').select('id_movil').eq('estado', 'en_curso');
        conteoFlota = {1:0, 2:0, 3:0};
        data?.forEach(r => { if(conteoFlota[r.id_movil] !== undefined) conteoFlota[r.id_movil]++; });

        document.getElementById('radar-flota').innerHTML = `
            <span style="color:${conteoFlota[1]>=4?'red':'#4cd964'}">M1: ${conteoFlota[1]}/4</span>
            <span style="color:${conteoFlota[2]>=4?'red':'#4cd964'}">M2: ${conteoFlota[2]}/4</span>
            <span style="color:${conteoFlota[3]>=4?'red':'#4cd964'}">M3: ${conteoFlota[3]}/4</span>
        `;
    }
    setInterval(actualizarRadar, 3000);

    function toggleAsiento(n) {
        const idx = asientosElegidos.indexOf(n);
        if(idx > -1) asientosElegidos.splice(idx, 1);
        else asientosElegidos.push(n);
        
        document.querySelectorAll('.btn-as').forEach(b => b.classList.remove('selected'));
        asientosElegidos.forEach(as => document.getElementById('as-'+as).classList.add('selected'));
        document.getElementById('btn-confirmar').innerText = `CONFIRMAR VIAJE ($${asientosElegidos.length * 1000})`;
    }

    async function confirmarViaje() {
        const dest = document.getElementById('select-destino').value;
        if(dest === "" || asientosElegidos.length === 0) return alert("Elegí destino y asientos");

        // LÓGICA DE DISTRIBUCIÓN AUTOMÁTICA
        let idAsignado = 0;
        if(conteoFlota[1] < 4) idAsignado = 1;
        else if(conteoFlota[2] < 4) idAsignado = 2;
        else if(conteoFlota[3] < 4) idAsignado = 3;
        else return alert("Todos los móviles están llenos.");

        const reservas = asientosElegidos.map(as => ({
            asiento_num: as, nombre_pasajero: "Carlos", destino_idx: parseInt(dest),
            id_movil: idAsignado, estado: 'en_curso'
        }));

        const { error } = await _s.from('reservas_activas').insert(reservas);
        if(!error) {
            alert(`Confirmado con Móvil ${idAsignado}`);
            location.reload();
        }
    }
</script>
</body>
</html>
