<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Master Definitivo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; --borde: #000; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
        
        /* UI Master */
        .header { background: var(--panel); border-bottom: 2px solid var(--celeste); padding: 15px; text-align: center; }
        .header h1 { margin: 0; font-size: 18px; color: var(--celeste); letter-spacing: 2px; }
        #map { flex-grow: 1; width: 100%; }
        .bottom-ui { background: var(--panel); border-top: 2px solid var(--celeste); padding: 15px; border-radius: 25px 25px 0 0; z-index: 100; box-shadow: 0 -10px 25px rgba(0,0,0,0.5); }
        
        .asientos-grid { display: flex; justify-content: space-around; margin: 15px 0; }
        .asiento-btn { width: 50px; height: 50px; border: 2px solid var(--celeste); border-radius: 12px; background: transparent; color: var(--celeste); font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .asiento-btn.selected { background: var(--amarillo); border-color: var(--amarillo); color: #000; }
        
        .btn-pedir { background: #28a745; width: 100%; padding: 15px; border-radius: 12px; color: white; font-weight: bold; border: none; }
        .btn-cancelar { background: #dc3545; width: 100%; padding: 15px; border-radius: 12px; color: white; font-weight: bold; border: none; display: none; }
    </style>
</head>
<body>

    <div class="header"><h1>TUMOVIL - MASTER</h1></div>
    <div id="map"></div>

    <div class="bottom-ui">
        <select id="sentido-select" onchange="actualizarFlota()">
            <option value="IDA">IDA (1 al 25)</option>
            <option value="VUELTA">VUELTA (25 al 1)</option>
        </select>
        <input type="text" id="nombre-input" placeholder="Nombre Pasajero" style="width:100%; padding:10px; margin-top:10px; border-radius:10px;">
        <select id="destino-select" style="width:100%; padding:10px; margin-top:10px; border-radius:10px;"></select>
        
        <div class="asientos-grid">
            <div class="asiento-btn" onclick="toggleAsiento(1)" id="as-1">1</div>
            <div class="asiento-btn" onclick="toggleAsiento(2)" id="as-2">2</div>
            <div class="asiento-btn" onclick="toggleAsiento(3)" id="as-3">3</div>
            <div class="asiento-btn" onclick="toggleAsiento(4)" id="as-4">4</div>
        </div>
        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajeCascada()">SOLICITAR VIAJE</button>
        <button class="btn-cancelar" id="btn-cancelar" onclick="finalizarViaje()">TERMINAR VIAJE</button>
    </div>

<script>
    const _s = supabase.createClient('TU_URL', 'TU_KEY');
    
    // Paradas con estilo visual solicitado
    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]},
        {n:'Caveri (Final)', c:[-34.584740, -58.748804]} // (Ejemplo reducido para la estructura)
    ];

    const map = L.map('map').setView([-34.56, -58.76], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // DIBUJAR PARADAS: Celeste con borde negro (como pediste)
    paradas.forEach(p => {
        L.circleMarker(p.c, { 
            radius: 8, 
            color: '#000000', // Borde negro
            fillColor: '#00d2ff', // Celeste
            fillOpacity: 1, 
            weight: 2 
        }).addTo(map).bindPopup(p.n);
    });

    let asientosElegidos = [];
    const selDest = document.getElementById('destino-select');
    paradas.forEach((p, i) => { 
        const opt = document.createElement('option'); opt.value = i; opt.innerText = p.n; selDest.appendChild(opt); 
    });

    // LÓGICA DE CASCADA (Buscar disponibilidad en orden)
    async function confirmarViajeCascada() {
        const sentido = document.getElementById('sentido-select').value;
        const nombre = document.getElementById('nombre-input').value;
        
        // 1. Obtener choferes disponibles en el sentido correcto
        const { data: choferes } = await _s.from('estado_movil')
            .select('id, capacidad_actual')
            .eq('esta_online', true)
            .eq('sentido_flujo', sentido);

        if (!choferes || choferes.length === 0) { alert("No hay móviles en este sentido."); return; }

        // 2. Lógica de cascada: intentar asignar al primer chofer con espacio
        let asignado = false;
        for (let chofer of choferes) {
            // Aquí puedes añadir la lógica de revisar si hay asientos libres
            // Si tiene espacio, insertamos
            await _s.from('reservas_activas').insert({
                nombre_pasajero: nombre,
                id_movil: chofer.id,
                asiento_num: asientosElegidos[0], // Simplificado para el ejemplo
                estado: 'en_curso',
                destino_idx: document.getElementById('destino-select').value
            });
            asignado = true;
            break;
        }

        if(asignado) alert("¡Viaje solicitado con éxito!");
    }

    function toggleAsiento(num) {
        const i = asientosElegidos.indexOf(num);
        if(i > -1) { asientosElegidos.splice(i, 1); document.getElementById('as-'+num).classList.remove('selected'); }
        else { asientosElegidos.push(num); document.getElementById('as-'+num).classList.add('selected'); }
    }

    // Lógica de retorno 25 -> 1 incluida en la estructura de paradas que manejes
    // La función finalizarViaje y actualizarFlota se mantienen con la estructura anterior
</script>
</body>
</html>
