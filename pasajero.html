<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASAJERO - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* Panel Superior */
        .header { background: #111; border-bottom: 2px solid #FFD700; padding: 15px; text-align: center; color: #FFD700; }
        .header h1 { margin: 0; font-size: 20px; font-weight: 900; letter-spacing: 2px; }
        
        /* Mapa */
        #map { flex-grow: 1; width: 100%; background: #000; }
        
        /* UI Inferior */
        .bottom-ui { background: #111; border-top: 2px solid #FFD700; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { color: #FFD700; font-size: 12px; font-weight: bold; }
        input, select { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; font-size: 14px; }
        input:focus, select:focus { border-color: #FFD700; outline: none; }
        
        .btn-pedir { background: #4cd964; color: black; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; width: 100%; transition: background 0.3s; }
        .btn-pedir:active { background: #3cc755; transform: scale(0.98); }
        .btn-pedir:disabled { background: #444; color: #888; cursor: not-allowed; }

        .taxi-icon { font-size: 25px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>SOLICITAR MI VIAJE</h1>
    </div>

    <div id="map"></div>

    <div class="bottom-ui">
        <div class="input-group">
            <label>NOMBRE DEL PASAJERO</label>
            <input type="text" id="nombre-input" placeholder="Ej: Juan Pérez">
        </div>

        <div class="input-group">
            <label>SELECCIONAR DESTINO (Parada)</label>
            <select id="destino-select">
                <option value="" disabled selected>Cargando paradas...</option>
            </select>
        </div>

        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajePasajero()" disabled>
            ⌛ BUSCANDO GPS...
        </button>
    </div>

<script>
    // --- CONFIGURACIÓN SUPABASE ---
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    // --- LAS 25 PARADAS ORIGINALES ---
    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    // --- INICIALIZAR MAPA ---
    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Dibujar Ruta Azul
    L.polyline(paradas.map(p => p.c), { color: '#00d4ff', weight: 6, opacity: 0.5 }).addTo(map);

    // Dibujar Paradas (Círculos blancos con borde negro)
    paradas.forEach(p => {
        L.circleMarker(p.c, { radius: 6, color: '#000', weight: 3, fillColor: '#FFF', fillOpacity: 1 }).addTo(map);
    });

    // Marcador de mi ubicación (Punto Azul)
    const marcadorMiLoc = L.circleMarker([0,0], { color: '#007bff', radius: 10, fillOpacity: 1 }).addTo(map);

    // Marcadores de Taxis Online
    const markerTaxis = {};
    const iconTaxi = L.divIcon({ html: '🚕', className: 'taxi-icon', iconAnchor: [15, 15] });

    let miLat = 0, miLon = 0;

    // --- CARGAR DESTINOS ---
    const selectDestino = document.getElementById('destino-select');
    paradas.forEach((p, idx) => {
        const option = document.createElement('option');
        option.value = idx; option.innerText = p.n;
        selectDestino.appendChild(option);
    });

    // --- INICIAR GPS ---
    navigator.geolocation.getCurrentPosition(p => {
        miLat = p.coords.latitude; miLon = p.coords.longitude;
        marcadorMiLoc.setLatLng([miLat, miLon]);
        map.panTo([miLat, miLon]);
        document.getElementById('btn-pedir').innerText = "🏁 SOLICITAR VIAJE";
        document.getElementById('btn-pedir').disabled = false;
    }, null, { enableHighAccuracy: true });

    // --- ACTUALIZAR TAXIS EN TIEMPO REAL ---
    async function actualizarTaxis() {
        // Solo traemos conductores que estén ONLINE (latitud != 0)
        const { data: moviles } = await _s.from('estado_movil').select('id, latitud, longitud').neq('latitud', 0);

        // Limpiar marcadores viejos
        Object.keys(markerTaxis).forEach(id => map.removeLayer(markerTaxis[id]));

        if (moviles) {
            moviles.forEach(m => {
                // Crear y guardar el nuevo marcador
                markerTaxis[m.id] = L.marker([m.latitud, m.longitud], { icon: iconTaxi })
                    .addTo(map)
                    .bindTooltip("Coche 0" + m.id, { permanent: true, direction: 'top' });
            });
        }
    }

    // --- FUNCIÓN CRÍTICA: CONFIRMAR VIAJE CON FILTRO ---
    async function confirmarViajePasajero() {
        const nombreVal = document.getElementById('nombre-input').value;
        const destinoIdx = document.getElementById('destino-select').value;

        if (!nombreVal || !destinoIdx) {
            alert("Por favor ingrese su Nombre y seleccione un Destino."); return;
        }

        document.getElementById('btn-pedir').disabled = true;
        document.getElementById('btn-pedir').innerText = "⌛ BUSCANDO CHOFER...";

        // 1. BUSCAR CONDUCTOR ONLINE (Solo latitud != 0) Y LLEGADO PRIMERO
        const { data: moviles, error: errM } = await _s.from('estado_movil')
            .select('id')
            .neq('latitud', 0) // <--- ESTE ES EL FILTRO QUE SOLUCIONA TU PROBLEMA
            .order('ultima_conexion', { ascending: true }) // <--- FILA DE ESPERA (Arribo)
            .limit(1);

        if (errM || !moviles || moviles.length === 0) {
            alert("Atención: No hay conductores conectados en este momento. Intente más tarde.");
            resetBotonPedir(); return;
        }

        const idAsignado = moviles[0].id;
        console.log("Asignando viaje al Coche: " + idAsignado);

        // 2. INSERTAR LA RESERVA PARA ESE CONDUCTORespecífico
        const { error } = await _s.from('reservas_activas').insert([
            {
                asiento_num: 1, // Se asigna el asiento 1 por defecto (lógica simple)
                id_movil: idAsignado, // Guardamos el ID del que SÍ está conectado
                estado: 'en_curso',
                nombre_pasajero: nombreVal,
                pasajero_lat: miLat,
                pasajero_lon: miLon,
                destino_idx: destinoIdx
            }
        ]);

        if (!error) {
            alert("¡Viaje confirmado con el Coche 0" + idAsignado + "!");
        } else {
            console.error("Error al reservar:", error);
            alert("Ocurrió un error al solicitar el viaje.");
        }
        resetBotonPedir();
    }

    function resetBotonPedir() {
        document.getElementById('btn-pedir').disabled = false;
        document.getElementById('btn-pedir').innerText = "🏁 SOLICITAR VIAJE";
    }

    // Suscripción al Realtime de móviles para verlos moverse
    _s.channel('taxis_realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'estado_movil' }, actualizarTaxis)
      .subscribe();
    
    // Carga inicial de taxis
    actualizarTaxis();
</script>
</body>
</html>
