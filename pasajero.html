<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pasajero PRO - Mapa Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: white; overflow: hidden; }
        #map { height: 45vh; width: 100%; border-bottom: 2px solid #00d4ff; }
        
        /* OVERLAY DE INICIO */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0e14; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        input { padding: 15px; width: 80%; border-radius: 10px; border: 1px solid #00d4ff; background: #1e2530; color: white; font-size: 18px; margin-bottom: 20px; outline: none; }
        
        .panel-pax { padding: 15px; height: 55vh; background: #151921; }
        .selector-parada { width: 100%; padding: 15px; background: #1e2530; color: #00d4ff; border: 2px solid #00d4ff; border-radius: 8px; margin-bottom: 15px; font-weight: bold; font-size: 16px; }
        
        /* ESTADO BLOQUEADO */
        .bloqueado { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        
        .asientos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .asiento { background: #1e2530; border: 2px solid #00d4ff; padding: 15px; text-align: center; border-radius: 10px; color: #00d4ff; font-weight: bold; font-size: 20px; }
        .asiento.ocupado { background: #ff3b30; border-color: #ff3b30; color: white; box-shadow: 0 0 15px rgba(255, 59, 48, 0.5); }
        
        .footer-pax { margin-top: 20px; padding: 15px; background: #00d4ff; color: #0b0e14; border-radius: 10px; text-align: center; font-weight: 900; font-size: 18px; }
        .msg-alerta { color: #ffeb3b; font-size: 13px; margin-bottom: 8px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div style="font-size: 40px; font-weight: 900; color: #00d4ff; margin-bottom: 10px;">M</div>
        <h2 style="letter-spacing: 2px; margin-bottom: 30px;">REGISTRO DE VIAJE</h2>
        <input type="text" id="pax-nombre" placeholder="Tu Nombre y Apellido">
        <button style="padding: 15px 50px; background: #00d4ff; border: none; border-radius: 10px; font-weight: 900; cursor: pointer;" onclick="iniciarApp()">INGRESAR</button>
    </div>

    <div id="map"></div>

    <div class="panel-pax">
        <label style="color: #888; font-size: 12px; font-weight: bold;">PASO 1: ¿A DÓNDE VAS?</label>
        <select id="destino" class="selector-parada" onchange="verificarDestino()">
            <option value="">-- SELECCIONA TU PARADA --</option>
        </select>

        <div id="aviso-destino" class="msg-alerta">⚠️ ELIGE DESTINO PARA HABILITAR ASIENTOS</div>
        
        <label style="color: #888; font-size: 12px; font-weight: bold;">PASO 2: RESERVA TU LUGAR</label>
        <div id="contenedor-asientos" class="asientos-grid bloqueado">
            <div id="as-1" class="asiento" onclick="toggleAsiento(1)">1</div>
            <div id="as-2" class="asiento" onclick="toggleAsiento(2)">2</div>
            <div id="as-3" class="asiento" onclick="toggleAsiento(3)">3</div>
            <div id="as-4" class="asiento" onclick="toggleAsiento(4)">4</div>
        </div>

        <div class="footer-pax">TOTAL A PAGAR: $<span id="total">0</span></div>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    let nombrePasajero = "";
    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    // Cargar paradas en el menú desplegable
    const select = document.getElementById('destino');
    paradas.forEach((p, i) => { select.innerHTML += `<option value="${i}">${p.n}</option>`; });

    // Inicializar Mapa
    const map = L.map('map', {zoomControl: false}).setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // --- DIBUJAR RUTA Y CÍRCULOS (Como en el Admin) ---
    const puntosRuta = paradas.map(p => p.c);
    L.polyline(puntosRuta, {color: '#00d4ff', weight: 3, opacity: 0.5, dashArray: '5, 10'}).addTo(map);

    paradas.forEach(p => {
        L.circleMarker(p.c, {
            radius: 6,
            color: '#00d4ff',
            fillColor: '#00d4ff',
            fillOpacity: 1
        }).addTo(map).bindTooltip(p.n, {direction: 'top', className: 'tooltip-pax'});
    });

    function iniciarApp() {
        const n = document.getElementById('pax-nombre').value;
        if(n.length > 2) {
            nombrePasajero = n;
            document.getElementById('login-overlay').style.display = 'none';
        } else {
            alert("Por favor, ingresa tu nombre completo.");
        }
    }

    function verificarDestino() {
        const destinoVal = document.getElementById('destino').value;
        const contAsientos = document.getElementById('contenedor-asientos');
        const aviso = document.getElementById('aviso-destino');

        if(destinoVal !== "") {
            contAsientos.classList.remove('bloqueado');
            aviso.style.display = 'none';
        } else {
            contAsientos.classList.add('bloqueado');
            aviso.style.display = 'block';
        }
    }

    async function toggleAsiento(num) {
        const el = document.getElementById('as-'+num);
        el.classList.toggle('ocupado');
        
        const seleccionados = document.querySelectorAll('.asiento.ocupado').length;
        document.getElementById('total').innerText = seleccionados * 1000;

        // Actualizar Supabase con toda la info junta
        await _s.from('estado_movil').update({
            asientos_libres: 4 - seleccionados,
            pasajero_destino: document.getElementById('destino').value,
            pasajero_nombre: nombrePasajero
        }).eq('id', 1);
    }
</script>
</body>
</html>
