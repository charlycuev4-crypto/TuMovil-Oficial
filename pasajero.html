<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasajero - Tu Móvil Oficial</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #f8f9fa; }
        #map { height: 60vh; width: 100%; }
        .panel-info { 
            height: 40vh; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            border-radius: 25px 25px 0 0; 
            margin-top: -25px; 
            position: relative; 
            z-index: 1000; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1); 
        }
        .label { color: #888; font-size: 14px; font-weight: bold; text-transform: uppercase; }
        #res-asientos { font-size: 80px; font-weight: bold; color: #28a745; line-height: 1; margin: 10px 0; }
        .status-badge { background: #e7f3ff; color: #007bff; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="panel-info">
        <div class="label">Asientos Disponibles</div>
        <div id="res-asientos">--</div>
        <div class="status-badge">MÓVIL SANTA BRÍGIDA • EN VIVO</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 1. CONFIGURACIÓN DE CONEXIÓN (Tus llaves de Supabase)
        const _supabase = supabase.createClient(
            'https://nvumdlxervrewqiiaicl.supabase.co', 
            'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52dW1kbHhlcnZyZXdxaWlhaWNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTA4NTMsImV4cCI6MjA4OTg4Njg1M30.ejh7dtL2O6JHeoVq47cUK_hXAfRetJPyzks1yI-Lrhs'
        );

        // 2. INICIALIZAR EL MAPA
        // Centramos cerca de Miguel Cané inicialmente
        var map = L.map('map').setView([-34.5612, -58.7705], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // Marcador del auto (el que se va a mover)
        var carMarker = L.marker([-34.5612, -58.7705]).addTo(map);

        // 3. FUNCIÓN PARA ACTUALIZAR LA VISTA DEL PASAJERO
        function actualizarInterfaz(datos) {
            const { latitud, longitud, asientos_libres } = datos;
            
            // Mover el marcador a tu ubicación real transmitida
            if (latitud && longitud) {
                carMarker.setLatLng([latitud, longitud]);
                map.panTo([latitud, longitud]);
            }

            // Cambiar las rayitas por el número real de asientos
            document.getElementById('res-asientos').innerText = asientos_libres;
            console.log("¡Recibido!", datos);
        }

        // 4. CARGA INICIAL: ¿Cómo está el móvil justo ahora?
        async function consultarEstado() {
            const { data, error } = await _supabase
                .from('estado_movil')
                .select('*')
                .eq('id', 1)
                .single();

            if (data) {
                actualizarInterfaz(data);
            } else {
                console.error("Error cargando datos iniciales:", error);
            }
        }

        // 5. ESCUCHAR EN TIEMPO REAL (Lo más importante)
        // Cada vez que vos toques un botón en tu panel, Supabase nos avisa acá
        _supabase
            .channel('canal_pasajero')
            .on('postgres_changes', 
                { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'estado_movil', 
                    filter: 'id=eq.1' 
                }, 
                (payload) => {
                    actualizarInterfaz(payload.new);
                }
            )
            .subscribe();

        // Arrancamos
        consultarEstado();
    </script>
</body>
</html>
