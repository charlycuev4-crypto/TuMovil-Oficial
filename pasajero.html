<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasajeros - Tu Móvil Santa Brígida</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; }
        #map { height: 350px; width: 100%; }
        .panel { padding: 20px; }
        .asientos-grid { display: flex; justify-content: space-around; margin: 15px 0; }
        .btn-asiento { width: 55px; height: 55px; border: 2px solid #007bff; background: white; color: #007bff; font-weight: bold; border-radius: 12px; }
        .btn-asiento.seleccionado { background: #007bff; color: white; }
        .btn-confirmar { background: #007bff; color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="panel">
        <h3 style="text-align:center">Asientos disponibles: <span id="libres">--</span></h3>
        <div class="asientos-grid">
            <button class="btn-asiento" onclick="seleccionar(1, this)">1</button>
            <button class="btn-asiento" onclick="seleccionar(2, this)">2</button>
            <button class="btn-asiento" onclick="seleccionar(3, this)">3</button>
            <button class="btn-asiento" onclick="seleccionar(4, this)">4</button>
        </div>
        <select id="destino" style="width:100%; padding:10px; margin-top:10px;"></select>
        <button class="btn-confirmar" onclick="reservar()">RESERVAR MI LUGAR</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52dW1kbHhlcnZyZXdxaWlhaWNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTA4NTMsImV4cCI6MjA4OTg4Njg1M30.ejh7dtL2O6JJeoVq47cUK_hXAfRetJPyzks1yI-Lrhs');
        
        var map = L.map('map').setView([-34.561128, -58.770586], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var auto = L.marker([-34.561128, -58.770586]).addTo(map);

        let elegido = null;
        let libres = 4;

        async function inicio() {
            const { data: p } = await _supabase.from('paradas').select('*').order('orden');
            p.forEach(parada => {
                let o = document.createElement('option');
                o.text = parada.nombre; o.value = parada.id;
                document.getElementById('destino').add(o);
            });

            const { data: e } = await _supabase.from('estado_movil').select('asientos_libres').eq('id', 1).single();
            libres = e.asientos_libres;
            document.getElementById('libres').innerText = libres;
        }

        function seleccionar(n, btn) {
            elegido = n;
            document.querySelectorAll('.btn-asiento').forEach(b => b.classList.remove('seleccionado'));
            btn.classList.add('seleccionado');
        }

        async function reservar() {
            if(!elegido) return alert("Elegí asiento");
            await _supabase.from('estado_movil').update({ asientos_libres: libres - 1 }).eq('id', 1);
            alert("Reserva confirmada");
        }

        _supabase.channel('movimiento').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'estado_movil' }, (payload) => {
            auto.setLatLng([payload.new.latitud, payload.new.longitud]);
            document.getElementById('libres').innerText = payload.new.asientos_libres;
            libres = payload.new.asientos_libres;
        }).subscribe();

        inicio();
    </script>
</body>
</html>
