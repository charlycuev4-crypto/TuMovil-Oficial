<div class="top-ui">
    <div class="dest-card" style="margin-bottom: 8px; border-color: #4cd964;">
        <input type="text" id="nombre-pasajero" placeholder="Escribe tu nombre aquí" 
               style="width: 100%; background: transparent; color: #4cd964; border: none; font-size: 16px; font-weight: bold; outline: none; text-align: center;"
               oninput="validarFormulario()">
    </div>
    
    <div class="dest-card">
        <select id="select-destino" onchange="validarFormulario()">
            <option value="" disabled selected>--- ¿A DÓNDE VAS? ---</option>
        </select>
    </div>
</div>

<script>
    // ... (Mantén tu configuración de Supabase y rutaOficial arriba)

    function validarFormulario() {
        const d = document.getElementById('select-destino').value;
        const n = document.getElementById('nombre-pasajero').value.trim();
        const b = document.getElementById('btn-accion');
        
        if (d !== "") markerDestino.setLatLng(rutaOficial[d].c).setOpacity(1);

        // RESET DEL BOTÓN
        b.innerText = "CONFIRMAR RESERVA"; 
        
        // REGLA: Necesitamos Asiento + Destino + Nombre (mínimo 3 letras)
        if(asientosElegidos.length > 0 && d !== "" && n.length >= 3) {
            b.classList.add('ready');
            b.disabled = false;
        } else {
            b.classList.remove('ready');
            b.disabled = true;
        }
    }

    async function confirmarReserva() {
        if(!miLat) return alert("Esperando GPS...");
        
        const d = document.getElementById('select-destino').value;
        const nombre = document.getElementById('nombre-pasajero').value.trim();
        const btn = document.getElementById('btn-accion');
        
        btn.disabled = true; 
        btn.innerText = "PROCESANDO...";

        // Mapeamos los datos incluyendo la nueva columna de Supabase
        const reservas = asientosElegidos.map(num => ({
            asiento_num: parseInt(num), 
            pasajero_lat: parseFloat(miLat), 
            pasajero_lon: parseFloat(miLon),
            destino_idx: parseInt(d), 
            nombre_pasajero: nombre, // <--- Este nombre va a la columna que creaste
            estado: 'en_curso'
        }));

        const { error } = await _s.from('reservas_activas').insert(reservas);

        if(!error) {
            localStorage.setItem('viaje_en_curso', 'true');
            localStorage.setItem('mi_nombre_guardado', nombre); // Guardamos para no reescribir
            
            btn.style.display = 'none';
            document.getElementById('btn-finalizar').style.display = 'block';
            document.getElementById('grid-asientos').style.pointerEvents = 'none';
            document.getElementById('select-destino').disabled = true;
            document.getElementById('nombre-pasajero').disabled = true;
            
            alert(`¡Buen viaje, ${nombre}! Reserva confirmada.`);
        } else {
            alert("Error en la base de datos: " + error.message);
            validarFormulario();
        }
    }

    // Al cargar la página, recuperamos el nombre si ya lo usó antes
    window.onload = () => {
        const nombrePrevio = localStorage.getItem('mi_nombre_guardado');
        if(nombrePrevio) {
            document.getElementById('nombre-pasajero').value = nombrePrevio;
        }
        // ... aquí disparas tu recuperarSesion() y el splash
    };

    // ... (Mantén el resto de tus funciones como finalizarViaje)
</script>
