<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
        
        #map { flex-grow: 1; width: 100%; z-index: 1; }
        
        /* Esta capa asegura que la UI esté siempre arriba y sea clicable */
        .bottom-ui { 
            background: var(--panel); border-top: 2px solid var(--celeste); 
            padding: 15px; display: flex; flex-direction: column; gap: 8px; 
            z-index: 1000; /* CRÍTICO: Debe ser mayor al mapa */
            position: relative;
        }
        
        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; }
        .asientos-grid { display: flex; justify-content: space-around; margin: 5px 0; }
        .asiento-btn { width: 50px; height: 50px; border: 2px solid var(--celeste); border-radius: 12px; background: transparent; color: var(--celeste); font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .asiento-btn.selected { background: var(--amarillo); color: #000; }
        .btn-pedir { background: #28a745; color: white; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-cancelar { background: #dc3545; color: white; padding: 15px; border-radius: 12px; border: none; display: none; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="bottom-ui">
        <input type="text" id="nombre-input" placeholder="Tu Nombre">
        <select id="destino-select" onchange="actualizarMapaRuta()">
            <option value="" disabled selected>¿A qué parada vas?</option>
        </select>
        <div class="asientos-grid">
            <div class="asiento-btn" onclick="toggleAsiento(1)" id="as-1">1</div>
            <div class="asiento-btn" onclick="toggleAsiento(2)" id="as-2">2</div>
            <div class="asiento-btn" onclick="toggleAsiento(3)" id="as-3">4</div>
            <div class="asiento-btn" onclick="toggleAsiento(4)" id="as-4">4</div>
        </div>
        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajePasajero()">SOLICITAR VIAJE</button>
        <button class="btn-cancelar" id="btn-cancelar" onclick="finalizarViaje()">TERMINAR MI VIAJE</button>
    </div>

<script>
    // Conexión Supabase (Igual a la tuya)
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    // Tus Paradas originales
    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}
    ];

    // Inicializar Mapa
    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    // Variables globales (para que las funciones las vean)
    let asientosElegidos = [];
    let miViajeActivo = false;

    // Cargar opciones en el select
    const selDest = document.getElementById('destino-select');
    paradas.forEach((p, i) => { 
        const opt = document.createElement('option'); 
        opt.value = i; opt.innerText = p.n; 
        selDest.appendChild(opt); 
    });

    // Función de actualización de ruta (Global)
    window.actualizarMapaRuta = () => {
        const val = document.getElementById('destino-select').value;
        if(val !== "") console.log("Destino seleccionado:", paradas[val].n);
    };

    // Función de selección (Global)
    window.toggleAsiento = (num) => {
        if(miViajeActivo) return;
        const btn = document.getElementById('as-'+num);
        const i = asientosElegidos.indexOf(num);
        if(i > -1) { 
            asientosElegidos.splice(i, 1); 
            btn.classList.remove('selected'); 
        } else { 
            asientosElegidos.push(num); 
            btn.classList.add('selected'); 
        }
    };

    // Confirmar viaje (Global)
    window.confirmarViajePasajero = async () => {
        const nom = document.getElementById('nombre-input').value;
        const destIdx = document.getElementById('destino-select').value;
        if (!nom || !destIdx || asientosElegidos.length === 0) { alert("Completa tus datos."); return; }
        
        alert("Enviando datos...");
        // Aquí mantienes tu lógica de inserción
    };

    window.finalizarViaje = () => { location.reload(); };
</script>
</body>
</html>
