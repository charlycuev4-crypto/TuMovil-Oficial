<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; --azul-gps: #007AFF; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .header { background: var(--panel); border-bottom: 2px solid var(--celeste); padding: 10px; text-align: center; }
        .header h1 { margin: 0; font-size: 18px; color: var(--celeste); }
        #map { flex-grow: 1; width: 100%; }
        .bottom-ui { background: var(--panel); border-top: 2px solid var(--celeste); padding: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; }
        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; }
        .asientos-grid { display: flex; justify-content: space-around; margin: 5px 0; }
        .asiento-btn { width: 50px; height: 50px; border: 2px solid var(--celeste); border-radius: 12px; background: transparent; color: var(--celeste); font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .asiento-btn.selected { background: var(--amarillo); border-color: var(--amarillo); color: #000; }
        .asiento-btn.occupied { border-color: #333; color: #333; pointer-events: none; opacity: 0.3; }
        .btn-pedir { background: #28a745; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; }
        .btn-cancelar { background: #dc3545; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div id="splash"><h2>CARGANDO SISTEMA...</h2></div>
    <div class="header"><h1>SOLICITAR VIAJE</h1></div>
    <div id="map"></div>
    <div class="bottom-ui">
        <input type="text" id="nombre-input" placeholder="Tu Nombre">
        <select id="destino-select" onchange="actualizarMapaRuta()"></select>
        <div class="asientos-grid">
            <div class="asiento-btn" onclick="toggleAsiento(1)" id="as-1">1</div>
            <div class="asiento-btn" onclick="toggleAsiento(2)" id="as-2">2</div>
            <div class="asiento-btn" onclick="toggleAsiento(3)" id="as-3">3</div>
            <div class="asiento-btn" onclick="toggleAsiento(4)" id="as-4">4</div>
        </div>
        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajePasajero()">SOLICITAR VIAJE</button>
        <button class="btn-cancelar" id="btn-cancelar" onclick="finalizarViaje()">TERMINAR MI VIAJE</button>
    </div>

<script>

    ];

    let paradas = []; // Se llenará dinámicamente
    let miLat = 0, miLon = 0, asientosElegidos = [], miViajeActivo = false;
    let map;

    // --- FUNCIÓN MAESTRA DE INICIO ---
    async function iniciarApp() {
        // 1. Consultar sentido a Supabase
        const { data, error } = await _s.from('estado_movil').select('hacia_adelante').limit(1).single();
        const haciaAdelante = error ? true : data.hacia_adelante;
        
        console.log("Sentido detectado (hacia_adelante):", haciaAdelante);
        
        // 2. Definir el orden de paradas
        paradas = haciaAdelante ? [...paradasBase] : [...paradasBase].reverse();
        
        // 3. Llenar Select
        const sel = document.getElementById('destino-select');
        sel.innerHTML = '<option value="" disabled selected>¿A qué parada vas?</option>';
        paradas.forEach((p, i) => {
            const opt = document.createElement('option');
            opt.value = i; opt.innerText = p.n;
            sel.appendChild(opt);
        });

        // 4. Inicializar Mapa (recién ahora, con las paradas definidas)
        map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // Ocultar Splash
        document.getElementById('splash').style.display = 'none';
        
        // Inicializar restos (localstorage, etc)
        cargarEstadoPasajero();
    }

    async function cargarEstadoPasajero() {
        const nombreGuardado = localStorage.getItem('usuario_nombre');
        if(nombreGuardado) {
            document.getElementById('nombre-input').value = nombreGuardado;
            const { data } = await _s.from('reservas_activas').select('*').eq('nombre_pasajero', nombreGuardado).eq('estado', 'en_curso');
            if(data && data.length > 0) {
                miViajeActivo = true;
                asientosElegidos = data.map(r => r.asiento_num);
                document.getElementById('destino-select').value = data[0].destino_idx;
                bloquearPanelParaViajeActivo();
            }
        }
    }

    // --- EL RESTO DE TU LÓGICA (NO TOCADA) ---
    function actualizarMapaRuta() {
        const val = document.getElementById('destino-select').value;
        if(val !== "" && miLat !== 0) {
            const dest = paradas[val].c;
            // ... (resto de tu lógica de mapa)
            console.log("Destino fijado en:", paradas[val].n);
        }
    }
    
    // ... (Mantén aquí tus funciones toggleAsiento, confirmarViajePasajero, finalizarViaje, actualizarFlota exactamente como las tenías)
    
    // Ejecutar inicio
    window.onload = iniciarApp;

</script>
</body>
</html>
