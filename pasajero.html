<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASAJERO - Solicitud TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0d0d1a; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 24px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h2 { text-align: center; color: #00d2ff; margin-bottom: 20px; font-weight: 800; letter-spacing: 1px; }
        label { display: block; margin: 12px 0 6px 4px; font-size: 11px; text-transform: uppercase; color: #888; font-weight: 700; letter-spacing: 1px; }
        input, select { width: 100%; padding: 14px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; color: white; font-size: 15px; font-weight: 600; outline: none; transition: border-color 0.2s; }
        input:focus, select:focus { border-color: #00d2ff; }
        
        /* CONTENEDOR PRECIO DINÁMICO */
        .price-tag { background: rgba(52, 199, 89, 0.1); border: 1px solid rgba(52, 199, 89, 0.2); border-radius: 14px; padding: 12px; margin-top: 15px; text-align: center; display: flex; justify-content: space-between; align-items: center; }
        .price-label { font-size: 12px; font-weight: 700; color: #34c759; text-transform: uppercase; }
        .price-val { font-size: 20px; font-weight: 900; color: #34c759; }

        .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #00d2ff 0%, #0066cc 100%); border: none; border-radius: 16px; color: black; font-weight: 800; font-size: 15px; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,210,255,0.3); transition: all 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }
        .info-box { background: rgba(255, 204, 0, 0.1); border: 1px solid rgba(255, 204, 0, 0.2); padding: 12px; border-radius: 12px; font-size: 12px; color: #ffcc00; text-align: center; margin-top: 15px; display: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="card">
        <h2>SOLICITAR VIAJE</h2>
        
        <label>Tu Nombre completo</label>
        <input type="text" id="pax-name" placeholder="Ej: Juan Pérez">

        <label>Asiento Solicitado</label>
        <select id="pax-seat">
            <option value="1">Asiento 1 (Mami)</option>
            <option value="2">Asiento 2 (Cat)</option>
            <option value="3">Asiento 3</option>
            <option value="4">Asiento 4</option>
        </select>

        <label>¿Hasta qué parada vas?</label>
        <select id="pax-dest" onchange="calcularPrecioDinamico()">
            </select>

        <div class="price-tag">
            <span class="price-label">Valor del Viaje</span>
            <span class="price-val" id="display-precio">$1000</span>
        </div>

        <button class="btn" id="btn-pedir" onclick="enviarReserva()">RESERVAR LUGAR</button>
        <div class="info-box" id="info-box"></div>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    const MI_ID_MOVIL = 1;

    const paradas = [
        {n:'Universidad Tecnológica'}, {n:'Parque Tecnológico'}, {n:'Base Aérea'},
        {n:'Miguel Cané'}, {n:'Cané y Los Aromos'}, {n:'Los Aromos 11016'},
        {n:'Los Aromos 10874'}, {n:'Los Aromos y Murillo'}, {n:'Murillo 601'},
        {n:'Murillo y Güiraldes'}, {n:'Murillo y Watt'}, {n:'A. Prado 2555'},
        {n:'Prado y Payró'}, {n:'Prado 1744'}, {n:'Boulevard Caveri'},
        {n:'Caveri y Azara'}, {n:'Caveri y Vedia'}, {n:'Caveri y Tablada'},
        {n:'Caveri y Echeverría'}, {n:'Caveri y Gálvez'}, {n:'Caveri (Final)'},
        {n:'Libertador y Aero'}, {n:'Libertador 7300'}, {n:'Libertador 7200'},
        {n:'Libertador y Maza'}, {n:'Maza y Albatros'}, {n:'Maternidad'}, {n:'Abasto y Roca'}
    ];

    // CARGA DE LISTA DESPLEGABLE
    const selectDest = document.getElementById('pax-dest');
    paradas.forEach((p, idx) => {
        let opt = document.createElement('option');
        opt.value = idx;
        opt.textContent = (idx + 1) + ". " + p.n;
        selectDest.appendChild(opt);
    });

    // SISTEMA DE ESCALONADO AUTOMÁTICO EN LA INTERFAZ
    function calcularPrecioDinamico() {
        const destIdx = parseInt(document.getElementById('pax-dest').value);
        const displayVal = document.getElementById('display-precio');
        
        if (destIdx > 10) {
            displayVal.textContent = "$1500";
        } else {
            displayVal.textContent = "$1000";
        }
    }

    async function enviarReserva() {
        const nombre = document.getElementById('pax-name').value.trim();
        const asiento = parseInt(document.getElementById('pax-seat').value);
        const destino = parseInt(document.getElementById('pax-dest').value);
        const btn = document.getElementById('btn-pedir');
        const info = document.getElementById('info-box');

        if(!nombre) { alert("Por favor ingresá tu nombre"); return; }
        
        btn.disabled = true;
        info.style.display = "block";
        info.innerText = "Verificando disponibilidad en el auto de Carlos...";

        try {
            // Verificar si el chofer está en servicio
            const { data: movil } = await _s.from('estado_movil').select('esta_online').eq('id', MI_ID_MOVIL).single();
            if (!movil || !movil.esta_online) {
                info.innerText = "❌ El conductor no se encuentra en línea en este momento.";
                btn.disabled = false;
                return;
            }

            // Verificar si el asiento ya está ocupado
            const { data: ocupado } = await _s.from('reservas_activas').select('id').eq('id_movil', MI_ID_MOVIL).eq('asiento_num', asiento).eq('estado', 'en_curso');
            if (ocupado && ocupado.length > 0) {
                info.innerText = "⚠️ El asiento " + asiento + " ya está reservado por otro pasajero.";
                btn.disabled = false;
                return;
            }

            // Obtener coordenadas de geolocalización opcionales del pasajero
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await guardarReserva(nombre, asiento, destino, pos.coords.latitude, pos.coords.longitude);
            }, async () => {
                await guardarReserva(nombre, asiento, destino, null, null);
            });

        } catch (e) {
            info.innerText = "❌ Error de conexión de red.";
            btn.disabled = false;
        }
    }

    async function guardarReserva(nombre, asiento, destino, lat, lon) {
        const info = document.getElementById('info-box');
        const btn = document.getElementById('btn-pedir');
        
        const nuevaReserva = {
            id_movil: MI_ID_MOVIL, nombre_pasajero: nombre, asiento_num: asiento,
            destino_idx: destino, estado: 'en_curso', estado_pasajero: 'esperando',
            pasajero_lat: lat, pasajero_lon: lon, fecha_reserva: new Date().toISOString()
        };

        const { error } = await _s.from('reservas_activas').insert(nuevaReserva);
        if (error) {
            info.innerText = "❌ Error al confirmar tu lugar.";
            btn.disabled = false;
        } else {
            info.style.background = "rgba(52, 199, 89, 0.1)";
            info.style.borderColor = "#34c759";
            info.style.color = "#34c759";
            info.innerText = "¡Listo! Tu lugar fue reservado. El auto está en camino.";
            document.getElementById('pax-name').value = "";
        }
    }
    
    // Ejecutar cálculo la primera vez al abrir
    calcularPrecioDinamico();
</script>
</body>
</html>
