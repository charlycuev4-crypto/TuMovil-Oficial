<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - Pasajero Futurista</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --celeste-neon: #00d2ff;
            --azul-profundo: #0072ff;
            --amarillo-vibrante: #fff200;
            --fondo-blanco: #ffffff;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body { 
            margin: 0; padding: 0; background: var(--fondo-blanco); 
            font-family: 'Inter', sans-serif; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden;
        }
        
        /* Header con Degradado Futurista */
        .header { 
            background: linear-gradient(135deg, var(--azul-profundo), var(--celeste-neon));
            padding: 18px; text-align: center;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            z-index: 1000;
        }
        .header h1 { 
            margin: 0; font-size: 22px; font-weight: 900; 
            color: white; text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        #map { flex-grow: 1; width: 100%; z-index: 1; }
        
        /* Panel Inferior con efecto Cristal */
        .bottom-ui { 
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 210, 255, 0.3);
            padding: 20px; display: flex; flex-direction: column; gap: 12px;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
            position: relative; z-index: 1001;
            margin-top: -30px;
        }

        .input-group label { 
            color: var(--azul-profundo); font-size: 11px; font-weight: 800; 
            margin-bottom: 5px; display: block; text-transform: uppercase;
        }

        input, select { 
            background: white; border: 2px solid #e0e0e0; 
            color: #333; padding: 14px; border-radius: 16px; 
            font-size: 15px; width: 100%; box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus { border-color: var(--celeste-neon); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }
        
        /* Asientos con estilo 3D */
        .asientos-container { display: flex; justify-content: space-around; margin: 10px 0; }
        .asiento-btn { 
            width: 60px; height: 60px; border: 2px solid var(--celeste-neon); 
            border-radius: 18px; background: white; color: var(--azul-profundo); 
            font-weight: 900; font-size: 20px;
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .asiento-btn.selected { 
            background: var(--amarillo-vibrante); border-color: var(--amarillo-vibrante);
            color: #000; transform: scale(1.1) translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 242, 0, 0.4);
        }
        .asiento-btn.occupied { background: #eee; border-color: #ddd; color: #bbb; cursor: not-allowed; }

        .total-display {
            background: linear-gradient(90deg, #f0f9ff, #e0f2fe);
            padding: 12px; border-radius: 15px; text-align: center;
            font-weight: 800; font-size: 20px; color: var(--azul-profundo);
            border: 1px dashed var(--celeste-neon);
        }

        .btn-pedir { 
            background: linear-gradient(to right, var(--azul-profundo), var(--celeste-neon));
            color: white; border: none; padding: 18px; border-radius: 20px;
            font-weight: 900; font-size: 18px; text-transform: uppercase;
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.3);
            cursor: pointer; transition: all 0.3s;
        }
        .btn-pedir:active { transform: scale(0.95); opacity: 0.9; }
    </style>
</head>
<body>

    <div class="header">
        <h1>TUMOVIL <span style="color: var(--amarillo-vibrante);">⚡</span> VIAJES</h1>
    </div>

    <div id="map"></div>

    <div class="bottom-ui">
        <div class="input-group">
            <label>👤 Nombre del Pasajero</label>
            <input type="text" id="nombre-input" placeholder="Escribe tu nombre">
        </div>

        <div class="input-group">
            <label>📍 Punto de Destino</label>
            <select id="destino-select">
                <option value="" disabled selected>Selecciona una parada...</option>
            </select>
        </div>

        <div class="asientos-container">
            <div class="asiento-btn" onclick="toggleAsiento(1)" id="as-1">1</div>
            <div class="asiento-btn" onclick="toggleAsiento(2)" id="as-2">2</div>
            <div class="asiento-btn" onclick="toggleAsiento(3)" id="as-3">3</div>
            <div class="asiento-btn" onclick="toggleAsiento(4)" id="as-4">4</div>
        </div>

        <div class="total-display">
            TOTAL: <span id="txt-total">$0</span>
        </div>

        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajePasajero()" disabled>
            ⌛ INICIANDO...
        </button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    // Las 25 paradas originales
    const paradas = [
        {n:'Miguel Cané', c:[-34.561264, -58.770506]}, {n:'Cané y Los Aromos', c:[-34.562160, -58.771380]},
        {n:'Los Aromos 11016', c:[-34.562494, -58.772133]}, {n:'Los Aromos 10874', c:[-34.563541, -58.773244]},
        {n:'Los Aromos y Murillo', c:[-34.564109, -58.773759]}, {n:'Murillo 601', c:[-34.565342, -58.772061]},
        {n:'Murillo y Güiraldes', c:[-34.567268, -58.769484]}, {n:'Murillo y Watt', c:[-34.569090, -58.767095]},
        {n:'A. Prado 2555', c:[-34.571016, -58.764443]}, {n:'Prado y Payró', c:[-34.571956, -58.763201]},
        {n:'Prado 1744', c:[-34.577371, -58.755909]}, {n:'Boulevard Caveri', c:[-34.578528, -58.757064]},
        {n:'Caveri y Azara', c:[-34.579296, -58.755864]}, {n:'Caveri y Vedia', c:[-34.580020, -58.755063]},
        {n:'Caveri y Tablada', c:[-34.580901, -58.753842]}, {n:'Caveri y Echeverría', c:[-34.581998, -58.752441]},
        {n:'Caveri y Gálvez', c:[-34.583319, -58.750710]}, {n:'Caveri (Final)', c:[-34.584740, -58.748804]},
        {n:'Libertador y Aero', c:[-34.585554, -58.749812]}, {n:'Libertador 7300', c:[-34.586494, -58.750574]},
        {n:'Libertador 7200', c:[-34.588041, -58.751542]}, {n:'Libertador y Maza', c:[-34.588273, -58.751338]},
        {n:'Maza y Albatros', c:[-34.588771, -58.750804]}, {n:'Maternidad', c:[-34.588244, -58.749877]},
        {n:'Abasto y Roca', c:[-34.586030, -58.747278]}
    ];

    // Mapa claro moderno
    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    // Dibujar Ruta Celeste Neón
    L.polyline(paradas.map(p => p.c), { color: '#00d2ff', weight: 6, opacity: 0.6 }).addTo(map);

    // DIBUJAR LAS PARADAS: Círculo celeste con borde negro
    paradas.forEach(p => {
        L.circleMarker(p.c, { 
            radius: 7, 
            color: '#000', // Borde negro
            weight: 2.5, 
            fillColor: '#00d2ff', // Fondo celeste
            fillOpacity: 1 
        }).addTo(map);
    });

    const marcadorMiLoc = L.circleMarker([0,0], { color: '#007bff', radius: 10, fillOpacity: 1, weight: 3 }).addTo(map);
    const markerTaxis = {};
    const iconTaxi = L.divIcon({ html: '<span style="font-size:30px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.3));">🚕</span>', className: 'taxi-icon', iconAnchor: [15, 15] });

    let miLat = 0, miLon = 0, asientosElegidos = [];

    // Cargar selector
    const selectDestino = document.getElementById('destino-select');
    paradas.forEach((p, idx) => {
        const option = document.createElement('option');
        option.value = idx; option.innerText = p.n;
        selectDestino.appendChild(option);
    });

    navigator.geolocation.getCurrentPosition(p => {
        miLat = p.coords.latitude; miLon = p.coords.longitude;
        marcadorMiLoc.setLatLng([miLat, miLon]); map.panTo([miLat, miLon]);
        document.getElementById('btn-pedir').innerText = "🚀 PEDIR MI VIAJE";
        document.getElementById('btn-pedir').disabled = false;
    }, null, { enableHighAccuracy: true });

    function toggleAsiento(num) {
        const index = asientosElegidos.indexOf(num);
        if (index > -1) {
            asientosElegidos.splice(index, 1);
            document.getElementById('as-' + num).classList.remove('selected');
        } else {
            asientosElegidos.push(num);
            document.getElementById('as-' + num).classList.add('selected');
        }
        document.getElementById('txt-total').innerText = "$" + (asientosElegidos.length * 1000);
    }

    async function actualizarTaxisYAsientos() {
        const { data: moviles } = await _s.from('estado_movil').select('*').neq('latitud', 0).order('ultima_conexion', {ascending:true}).limit(1);
        Object.keys(markerTaxis).forEach(id => map.removeLayer(markerTaxis[id]));
        if (moviles && moviles.length > 0) {
            const taxi = moviles[0];
