<script>
    // 1. CONFIGURACIÓN DE CONEXIÓN (Tus llaves de la captura 1000251137)
    const SB_URL = "https://nvumdlxervrewqiiaicl.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52dW1kbHhlcnZyZXdxaWlhaWNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTA4NTMsImV4cCI6MjA4OTg4Njg1M30.ejh7dtL2O6JJeoVq47cUK_hXAfRetJPyzks1yI-Lrhs";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    // 2. INICIALIZAR MAPA (Moreno / Santa Brígida)
    var map = L.map('mapa-osm', { zoomControl: false }).setView([-34.561264, -58.770506], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Marcador del móvil (El que se va a mover solo)
    var marcadorMovil = L.marker([-34.561264, -58.770506]).addTo(map)
        .bindPopup("<b>Tu Móvil Oficial</b>");

    // 3. CARGAR LA RUTA AZUL (Desde M. Cané hasta Roca)
    async function dibujarRuta() {
        const { data: paradas, error } = await sb
            .from('paradas')
            .select('*')
            .order('orden', { ascending: true }); //

        if (!error && paradas.length > 0) {
            const puntos = paradas.map(p => [p.latitud, p.longitud]);
            L.polyline(puntos, { color: '#007bff', weight: 5, opacity: 0.7 }).addTo(map);
            
            // Dibujamos los puntitos de las paradas
            paradas.forEach(p => {
                L.circleMarker([p.latitud, p.longitud], { radius: 5, color: '#007bff', fillColor: '#fff', fillOpacity: 1 }).addTo(map);
            });
        }
    }

    // 4. ESCUCHAR AL CONDUCTOR EN TIEMPO REAL (Realtime)
    const canal = sb.channel('cambios-movil')
        .on('postgres_changes', { 
            event: 'UPDATE', 
            schema: 'public', 
            table: 'estado_movil',
            filter: 'id=eq.1' //
        }, (payload) => {
            const datos = payload.new;
            console.log("Señal recibida:", datos);

            // Actualizar GPS en el mapa
            if (datos.latitud && datos.longitud) {
                marcadorMovil.setLatLng([datos.latitud, datos.longitud]);
            }

            // Actualizar Asientos en el panel
            const divAsientos = document.getElementById('asientos-disponibles');
            if (divAsientos) divAsientos.innerText = datos.asientos_libres;

            // Actualizar Estado (Verde/Rojo)
            const indicador = document.getElementById('estado-recorrido');
            if (indicador) {
                if (datos.en_servicio) {
                    indicador.style.backgroundColor = "#28a745"; 
                    indicador.innerText = "✅ MÓVIL EN RECORRIDO";
                } else {
                    indicador.style.backgroundColor = "#dc3545";
                    indicador.innerText = "❌ FUERA DE SERVICIO";
                }
            }
        })
        .subscribe();

    dibujarRuta();
</script>
