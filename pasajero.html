<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TuMovil - Pasajero Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --celeste: #00d2ff; --amarillo: #ffcc00; --dark: #121212; --panel: #1e1e1e; }
        body, html { margin: 0; padding: 0; background: var(--dark); height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: -apple-system, sans-serif; }
        
        /* Splash Screen con Seguridad (No bloquea la app permanentemente) */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.8s; }
        .anillo { width: 160px; height: 160px; border: 4px solid var(--celeste); border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .header { background: var(--panel); border-bottom: 2px solid var(--celeste); padding: 10px; text-align: center; }
        .header h1 { margin: 0; font-size: 18px; color: var(--celeste); }
        #map { flex-grow: 1; width: 100%; }
        .bottom-ui { background: var(--panel); padding: 15px; z-index: 100; }
        input, select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 10px; }
        .btn-pedir { background: #28a745; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="anillo"><span style="font-size: 60px;">🚕</span></div>
        <h2 style="color: white; margin-top: 20px;">TUMOVIL</h2>
    </div>

    <div class="header"><h1>SOLICITAR VIAJE</h1></div>
    <div id="map"></div>
    <div class="bottom-ui">
        <input type="text" id="nombre-input" placeholder="Tu Nombre">
        <select id="destino-select"><option value="" disabled selected>Selecciona destino</option></select>
        <button class="btn-pedir" id="btn-pedir" onclick="confirmarViajePasajero()">RESERVAR</button>
    </div>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    // === LÓGICA DE SEGURIDAD (Splash) ===
    function ocultarSplash() {
        const s = document.getElementById('splash');
        if(s) { s.style.opacity = '0'; setTimeout(() => s.style.display = 'none', 800); }
    }
    // Si la app no ha cargado en 5 segundos, el splash se quita solo
    setTimeout(ocultarSplash, 5000); 

    // === TUS FUNCIONES RPC (Seguridad RLS) ===
    async function confirmarViajePasajero() {
        const btn = document.getElementById('btn-pedir');
        btn.disabled = true; 
        btn.innerText = "PROCESANDO SEGURIDAD...";
        
        const nombre = document.getElementById('nombre-input').value;
        const destino = document.getElementById('destino-select').value;

        // Aquí usamos tu lógica RPC, que es la que respeta tus políticas RLS en Supabase
        const { data, error } = await _s.rpc('insertar_reserva_segura', {
            p_nombre: nombre,
            p_destino_idx: parseInt(destino),
            // ... (Asegúrate de incluir todos los parámetros que tu RPC requiere)
        });

        if (error) {
            console.error("Error en RPC:", error);
            alert("Error: " + error.message);
            btn.disabled = false;
            btn.innerText = "RESERVAR";
        } else {
            alert("Viaje reservado con éxito");
            location.reload();
        }
        
        ocultarSplash(); // Aseguramos que se oculte al finalizar
    }

    // Inicialización del mapa y resto de tu lógica original
    window.onload = () => {
        // ... (Aquí va todo el código de tu Leaflet y carga de paradas original)
        // Al terminar, llamamos a ocultarSplash();
        setTimeout(ocultarSplash, 1000); 
    };
</script>
</body>
</html>
