<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - CONDUCTOR 2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .header { border: 2px solid #FFD700; border-radius: 15px; padding: 10px; margin-bottom: 20px; }
        .header h1 { color: #FFD700; margin: 0; font-size: 24px; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 20px; background: #111; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .val { color: #FFD700; font-weight: bold; font-size: 18px; }
        
        .asientos-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .asiento { background: #222; border: 2px solid #444; border-radius: 15px; padding: 20px; position: relative; }
        .asiento.ocupado { border-color: #4cd964; background: rgba(76, 217, 100, 0.1); }
        .num-as { position: absolute; top: 5px; left: 10px; color: #666; font-weight: bold; }
        .nombre-pax { color: #4cd964; font-weight: bold; font-size: 16px; margin-top: 5px; }
        
        .btn-vaciar { width: 100%; padding: 20px; background: #ff3b30; color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .recaudacion { margin-top: 20px; font-size: 20px; border-top: 1px solid #333; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>UNIDAD: COCHE 02</h1>
        <small id="reloj" style="color: #666;">Conectando GPS...</small>
    </div>

    <div class="status-bar">
        <div>Pasajeros: <span id="pax-count" class="val">0</span>/4</div>
        <div>Estado: <span style="color: #4cd964; font-weight: bold;">ACTIVO</span></div>
    </div>

    <div class="asientos-grid">
        <div id="as1" class="asiento"><span class="num-as">1</span><div class="nombre-pax">-</div></div>
        <div id="as2" class="asiento"><span class="num-as">2</span><div class="nombre-pax">-</div></div>
        <div id="as3" class="asiento"><span class="num-as">3</span><div class="nombre-pax">-</div></div>
        <div id="as4" class="asiento"><span class="num-as">4</span><div class="nombre-pax">-</div></div>
    </div>

    <div class="recaudacion">
        VIAJE ACTUAL: <span id="total-dinero" style="color: #FFD700; font-weight: 900;">$0</span>
    </div>

    <br>
    <button class="btn-vaciar" onclick="vaciarMovil()">VACIAR COCHE 02</button>

<script>
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    // CONFIGURACIÓN CLAVE: ESTE ES EL COCHE 2
    const ID_MOVIL = 2;

    async function actualizarGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (p) => {
                const { error } = await _s.from('estado_movil')
                    .update({ 
                        latitud: p.coords.latitude, 
                        longitud: p.coords.longitude,
                        ultima_conexion: new Date()
                    })
                    .eq('id', ID_MOVIL);
                document.getElementById('reloj').innerText = "GPS Actualizado: " + new Date().toLocaleTimeString();
            });
        }
    }

    async function cargarPasajeros() {
        const { data: reservas } = await _s.from('reservas_activas')
            .select('*')
            .eq('id_movil', ID_MOVIL)
            .eq('estado', 'en_curso');

        // Resetear visual
        for(let i=1; i<=4; i++) {
            const div = document.getElementById('as'+i);
            div.classList.remove('ocupado');
            div.querySelector('.nombre-pax').innerText = "LIBRE";
        }

        let total = 0;
        if(reservas) {
            reservas.forEach(r => {
                const div = document.getElementById('as' + r.asiento_num);
                if(div) {
                    div.classList.add('ocupado');
                    div.querySelector('.nombre-pax').innerText = r.nombre_pasajero;
                    total += 1000;
                }
            });
            document.getElementById('pax-count').innerText = reservas.length;
            document.getElementById('total-dinero').innerText = "$" + total;

            // Actualizar asientos libres en tabla estado_movil
            await _s.from('estado_movil').update({ asientos_libres: 4 - reservas.length }).eq('id', ID_MOVIL);
        }
    }

    async function vaciarMovil() {
        if(!confirm("¿Finalizar todos los viajes del Coche 02?")) return;
        await _s.from('reservas_activas')
            .update({ estado: 'finalizado' })
            .eq('id_movil', ID_MOVIL)
            .eq('estado', 'en_curso');
        location.reload();
    }

    // Ejecución constante
    setInterval(actualizarGPS, 10000);
    setInterval(cargarPasajeros, 5000);
    cargarPasajeros();
</script>
</body>
</html>
