<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONDUCTOR 02 - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .splash-logo { font-size: 80px; margin-bottom: 20px; }
        .splash-title { color: #FFD700; font-size: 32px; font-weight: 900; margin: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; background: #000; }
        .ui-overlay { position: absolute; width: 100%; z-index: 1000; pointer-events: none; }
        .top-stats { top: 10px; display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 0 10px; }
        .stat-row { display: flex; justify-content: space-around; width: 100%; }
        .stat-box { background: rgba(0,0,0,0.85); border: 2px solid #FFD700; border-radius: 12px; padding: 12px; width: 45%; text-align: center; color: white; pointer-events: auto; }
        .sentido-panel { background: #222; border: 2px solid #00d2ff; color: #00d2ff; padding: 12px 40px; border-radius: 30px; font-weight: bold; font-size: 18px; cursor: pointer; pointer-events: auto; text-align: center; }
        .connection-panel { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.9); padding: 10px 20px; border-radius: 30px; border: 1px solid #FFD700; pointer-events: auto; }
        .switch { position: relative; display: inline-block; width: 46px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4cd964; }
        input:checked + .slider:before { transform: translateX(24px); }
        #status-label { color: white; font-size: 12px; font-weight: bold; width: 85px; text-align: center; }
        .bottom-ui { bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        .btn-vaciar { background: #ff3b30; color: white; border: none; padding: 18px 45px; border-radius: 50px; font-weight: bold; font-size: 18px; pointer-events: auto; box-shadow: 0 4px 15px rgba(255,59,48,0.4); }
        .asientos-pills { display: flex; gap: 12px; margin-bottom: 20px; pointer-events: auto; }
        .pill { width: 55px; height: 55px; border: 2px solid #FFD700; border-radius: 12px; color: #FFD700; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; background: rgba(0,0,0,0.85); transition: all 0.3s ease; }
        .pill.active { background: #4cd964; border-color: #4cd964; color: black; transform: scale(1.1); }
        .taxi-icon { font-size: 30px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-logo">🚕</div>
        <h1 class="splash-title">COCHE 02</h1>
    </div>

    <div class="ui-overlay top-stats">
        <div class="connection-panel">
            <span id="status-label">FUERA DE LÍNEA</span>
            <label class="switch">
                <input type="checkbox" id="online-toggle" onchange="gestionarConexion()">
                <span class="slider"></span>
            </label>
        </div>
        <div class="sentido-panel" id="btn-sentido" onclick="cambiarSentido()">SENTIDO: IDA</div>
        <div class="stat-row">
            <div class="stat-box"><small style="color:#FFD700">RECAUDACIÓN</small><div id="txt-plata" style="font-size:22px; font-weight:800; color:#4cd964;">$0</div></div>
            <div class="stat-box"><small style="color:#FFD700">PASAJEROS</small><div id="txt-pax" style="font-size:22px; font-weight:800;">0</div></div>
        </div>
    </div>

    <div id="map"></div>

    <div class="ui-overlay bottom-ui">
        <div class="asientos-pills">
            <div id="pill1" class="pill">1</div>
            <div id="pill2" class="pill">2</div>
            <div id="pill3" class="pill">3</div>
            <div id="pill4" class="pill">4</div>
        </div>
        <button class="btn-vaciar" onclick="vaciarTodo()">🏁 FINALIZAR / VACIAR COCHE 02</button>
    </div>

<script>
    const MI_ID_MOVIL = 2; 
    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');

    let esHaciaAdelante = true;
    let watchId = null;
    let estaOnline = false;

    // --- SEGURIDAD: Limpieza al cerrar la página ---
    window.addEventListener('beforeunload', async () => {
        await _s.from('estado_movil').update({ latitud: 0, longitud: 0 }).eq('id', MI_ID_MOVIL);
    });

    const paradas = [
        {c:[-34.561264, -58.770506]}, {c:[-34.562160, -58.771380]}, {c:[-34.562494, -58.772133]},
        {c:[-34.563541, -58.773244]}, {c:[-34.564109, -58.773759]}, {c:[-34.565342, -58.772061]},
        {c:[-34.567268, -58.769484]}, {c:[-34.569090, -58.767095]}, {c:[-34.571016, -58.764443]},
        {c:[-34.571956, -58.763201]}, {c:[-34.577371, -58.755909]}, {c:[-34.578528, -58.757064]},
        {c:[-34.579296, -58.755864]}, {c:[-34.580020, -58.755063]}, {c:[-34.580901, -58.753842]},
        {c:[-34.581998, -58.752441]}, {c:[-34.583319, -58.750710]}, {c:[-34.584740, -58.748804]},
        {c:[-34.585554, -58.749812]}, {c:[-34.586494, -58.750574]}, {c:[-34.588041, -58.751542]},
        {c:[-34.588273, -58.751338]}, {c:[-34.588771, -58.750804]}, {c:[-34.588244, -58.749877]},
        {c:[-34.586030, -58.747278]}
    ];

    const map = L.map('map', { zoomControl: false }).setView(paradas[0].c, 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    async function cambiarSentido() {
        esHaciaAdelante = !esHaciaAdelante;
        await _s.from('estado_movil').update({ hacia_adelante: esHaciaAdelante }).eq('id', MI_ID_MOVIL);
        actualizarUI();
    }

    function actualizarUI() {
        const btn = document.getElementById('btn-sentido');
        btn.innerText = esHaciaAdelante ? "SENTIDO: IDA" : "SENTIDO: VUELTA";
        btn.style.color = esHaciaAdelante ? "#00d2ff" : "#ffcc00";
        btn.style.borderColor = esHaciaAdelante ? "#00d2ff" : "#ffcc00";
    }

    async function gestionarConexion() {
        estaOnline = document.getElementById('online-toggle').checked;
        const label = document.getElementById('status-label');
        
        if (estaOnline) {
            label.innerText = "EN LÍNEA";
            label.style.color = "#4cd964";
            await _s.from('estado_movil').update({ latitud: paradas[0].c[0], longitud: paradas[0].c[1] }).eq('id', MI_ID_MOVIL);
            iniciarGPS();
        } else {
            detenerTodo();
        }
    }

    function iniciarGPS() {
        watchId = navigator.geolocation.watchPosition(async p => {
            if (!estaOnline) return;
            await _s.from('estado_movil').update({ latitud: p.coords.latitude, longitud: p.coords.longitude }).eq('id', MI_ID_MOVIL);
        }, null, { enableHighAccuracy: true });
    }

    function detenerTodo() {
        // Detiene GPS y limpia estado en BD
        if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }
        estaOnline = false;
        document.getElementById('online-toggle').checked = false;
        document.getElementById('status-label').innerText = "FUERA DE LÍNEA";
        document.getElementById('status-label').style.color = "white";
        _s.from('estado_movil').update({ latitud: 0, longitud: 0 }).eq('id', MI_ID_MOVIL);
    }

    async function vaciarTodo() {
        if(!confirm("¿Finalizar el viaje y vaciar el Coche 02?")) return;
        detenerTodo();
        await _s.from('reservas_activas').update({ estado: 'finalizado' }).eq('estado', 'en_curso').eq('id_movil', MI_ID_MOVIL);
        actualizarDatos();
    }

    async function actualizarDatos() {
        const { data: reservas } = await _s.from('reservas_activas').select('*').eq('estado', 'en_curso').eq('id_movil', MI_ID_MOVIL);
        // ... (resto de lógica de UI igual)
        document.getElementById('txt-pax').innerText = reservas ? reservas.length : 0;
        document.getElementById('txt-plata').innerText = '$' + (reservas ? reservas.length * 1000 : 0);
        document.getElementById('splash').style.display = 'none';
    }

    window.onload = () => { actualizarDatos(); };
    _s.channel('cambios_coche2').on('postgres_changes', { event: '*', schema: 'public', table: 'reservas_activas' }, () => { actualizarDatos(); }).subscribe();
</script>
</body>
</html>
