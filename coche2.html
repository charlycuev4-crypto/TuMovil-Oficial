<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONDUCTOR 02 - TuMovil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.8s ease-out;
        }
        .splash-logo { font-size: 80px; margin-bottom: 20px; animation: pulse 2s infinite; }
        .splash-title { color: #FFD700; font-size: 32px; font-weight: 900; letter-spacing: 4px; margin: 0; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; background: #000; }
        .ui-overlay { position: absolute; width: 100%; z-index: 1000; pointer-events: none; }
        
        .top-stats { top: 10px; display: flex; justify-content: space-around; padding: 0 10px; }
        .stat-box { 
            background: rgba(0,0,0,0.85); 
            border: 2px solid #FFD700; 
            border-radius: 12px; padding: 8px; width: 45%; 
            text-align: center; color: white; pointer-events: auto; 
        }
        
        .connection-panel {
            position: absolute; top: 95px; left: 50%; transform: translateX(-50%);
            z-index: 1001; display: flex; align-items: center; gap: 12px;
            background: rgba(0,0,0,0.9); padding: 8px 15px; border-radius: 30px;
            border: 1px solid #FFD700; pointer-events: auto;
        }
        .switch { position: relative; display: inline-block; width: 46px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #444; transition: .4s; border-radius: 22px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #4cd964; }
        input:checked + .slider:before { transform: translateX(24px); }
        #status-label { color: white; font-size: 11px; font-weight: bold; width: 85px; text-align: center; }

        .bottom-ui { bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        .btn-vaciar { 
            background: #ff3b30; color: white; border: none; padding: 15px 40px; 
            border-radius: 50px; font-weight: bold; font-size: 16px; 
            pointer-events: auto; box-shadow: 0 4px 15px rgba(255,59,48,0.4);
        }
        .asientos-pills { display: flex; gap: 8px; margin-bottom: 15px; pointer-events: auto; }
        .pill { 
            width: 48px; height: 48px; border: 2px solid #FFD700; border-radius: 12px; 
            color: #FFD700; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; background: rgba(0,0,0,0.85); transition: all 0.3s ease; 
        }
        .pill.active { background: #4cd964; border-color: #4cd964; color: black; transform: scale(1.1); }
        
        .taxi-icon { font-size: 30px; }
        .loader { width: 30px; height: 30px; border: 3px solid rgba(255,215,0,0.1); border-top: 3px solid #FFD700; border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-logo">🚕</div>
        <h1 id="titulo-unidad" class="splash-title">COCHE 02</h1>
        <div class="loader"></div>
    </div>

    <div class="connection-panel">
        <span id="status-label">FUERA DE LÍNEA</span>
        <label class="switch">
            <input type="checkbox" id="online-toggle" onchange="gestionarConexion()">
            <span class="slider"></span>
        </label>
    </div>

    <div id="map"></div>

    <div class="ui-overlay top-stats">
        <div class="stat-box"><small style="color:#FFD700">RECAUDACIÓN</small><div id="txt-plata" style="font-size:24px; font-weight:800; color:#4cd964;">$0</div></div>
        <div class="stat-box"><small style="color:#FFD700">PASAJEROS</small><div id="txt-pax" style="font-size:24px; font-weight:800;">0</div></div>
    </div>

    <div class="ui-overlay bottom-ui">
        <div class="asientos-pills">
            <div id="pill1" class="pill">1</div>
            <div id="pill2" class="pill">2</div>
            <div id="pill3" class="pill">3</div>
            <div id="pill4" class="pill">4</div>
        </div>
        <button id="btn-vaciar-text" class="btn-vaciar" onclick="vaciarTodo()">🏁 FINALIZAR VIAJE / VACIAR COCHE 02</button>
    </div>

<script>
    // --- 1. CONFIGURACIÓN ESPECÍFICA PARA EL COCHE 2 ---
    const MI_ID_MOVIL = 2;
