<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil - Conductor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .ui-overlay { position: absolute; width: 100%; z-index: 1000; pointer-events: none; }
        .stat-box { background: rgba(0,0,0,0.85); border: 2px solid #FFD700; border-radius: 12px; padding: 8px; width: 45%; text-align: center; color: white; pointer-events: auto; }
        .pill { width: 48px; height: 48px; border: 2px solid #FFD700; border-radius: 12px; color: #FFD700; display: flex; align-items: center; justify-content: center; font-weight: bold; background: rgba(0,0,0,0.85); transition: all 0.3s ease; }
        .pill.active { background: #4cd964; border-color: #4cd964; color: black; }
        .btn-vaciar { background: #ff3b30; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; pointer-events: auto; }
    </style>
</head>
<body>
    <div class="ui-overlay" style="top: 10px; display: flex; justify-content: space-around;">
        <div class="stat-box"><small>RECAUDACIÓN</small><div id="txt-plata">$0</div></div>
        <div class="stat-box"><small>PASAJEROS</small><div id="txt-pax">0</div></div>
    </div>
    <div id="map"></div>
    <div class="ui-overlay" style="bottom: 20px; display: flex; flex-direction: column; align-items: center;">
        <div class="asientos-pills" style="display:flex; gap:10px; margin-bottom:15px; pointer-events:auto;">
            <div id="pill1" class="pill">1</div><div id="pill2" class="pill">2</div>
            <div id="pill3" class="pill">3</div><div id="pill4" class="pill">4</div>
        </div>
        <button class="btn-vaciar" onclick="vaciarTodo()">FINALIZAR VIAJE</button>
    </div>

<script>
    // ========================================================
    // CONFIGURACIÓN MAESTRA (Cambia solo esto para cada coche)
    // ========================================================
    const MI_ID_MOVIL = 1; // Cambia a 2, 3, etc.
    const CANAL_NAME = 'cambios_coche1'; // Cambia a 'cambios_coche2', etc.
    // ========================================================

    const _s = supabase.createClient('https://nvumdlxervrewqiiaicl.supabase.co', 'sb_publishable_oVmiLSfe_AJ5iDpeAXIukA_CLdHuwkE');
    
    // Lógica para traer datos de MI coche Y el de mi compañero
    async function actualizarDatos() {
        // Traemos las reservas de todos (o del 1 y 2) para tener visión global
        const { data: reservas } = await _s.from('reservas_activas')
            .select('*')
            .eq('estado', 'en_curso')
            .in('id_movil', [1, 2]); // Aquí puedes añadir más IDs: [1, 2, 3]

        // Filtramos solo las que son MÍAS para el tablero
        const misReservas = reservas.filter(r => r.id_movil === MI_ID_MOVIL);
        const reservasCompañero = reservas.filter(r => r.id_movil !== MI_ID_MOVIL);

        // Lógica de "Desbordamiento" (Overflow)
        if (reservasCompañero.length >= 4) {
            console.log("El otro conductor está lleno, prioridad activa");
        }

        // Actualizar UI
        document.getElementById('txt-pax').innerText = misReservas.length;
        document.getElementById('txt-plata').innerText = '$' + (misReservas.length * 1000);
        
        // Resetear píldoras
        for(let i=1; i<=4; i++) { document.getElementById('pill'+i).className = 'pill'; }
        
        // Marcar ocupados
        misReservas.forEach(res => {
            const pill = document.getElementById('pill' + res.asiento_num);
            if(pill) pill.className = 'pill active';
        });
    }

    async function vaciarTodo() {
        await _s.from('reservas_activas').update({ estado: 'finalizado' })
            .eq('estado', 'en_curso').eq('id_movil', MI_ID_MOVIL);
        actualizarDatos();
    }

    _s.channel(CANAL_NAME)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'reservas_activas' }, () => {
          actualizarDatos();
      })
      .subscribe();

    actualizarDatos();
</script>
</body>
</html>
